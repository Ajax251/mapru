<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Конструктор плакатов</title>

<!-- Красивые кириллические шрифты -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&family=Oswald:wght@600;700&family=PT+Sans:wght@700&family=Rubik:wght@700;900&family=Comfortaa:wght@700&family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=PT+Serif:wght@700&family=Prata&family=Yeseva+One&family=Alegreya:wght@800;900&family=Cormorant:wght@700&family=Lobster&family=Pacifico&family=Caveat:wght@700&family=Marck+Script&family=Bad+Script&family=Pattaya&family=Neucha&family=Russo+One&family=Rubik+Mono+One&family=Ruslan+Display&family=Underdog&family=Podkova:wght@700&display=swap" rel="stylesheet">

<!-- Экспорт в изображение -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<style>
:root{
  --ink:#2c3e50;
  --muted:#7f8c8d;
  --bg:#eef1f4;
  --panel:#ffffff;
  --accent:#3498db;
  --line:#e2e6ea;
}
*{box-sizing:border-box;}
body{
  font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;
  background:var(--bg);
  margin:0;padding:0;color:var(--ink);
}

/* ===== Сетка макета приложения ===== */
.app-layout {
  display: flex;
  flex-direction: column;
  min-height: 100vh;
}

/* ===== Панель управления ===== */
.control-panel{
  background:var(--panel);
  box-shadow:0 6px 24px rgba(0,0,0,0.07);
  padding:22px 26px;
  z-index:100;
}
.panel-head{
  display:flex;align-items:center;justify-content:space-between;
  gap:12px;flex-wrap:wrap;margin-bottom:18px;
}
.panel-title{
  margin:0;font-size:20px;font-weight:800;color:var(--ink);
  display:flex;align-items:center;gap:10px;
}
.panel-title .dot{width:12px;height:12px;border-radius:50%;
  background:linear-gradient(135deg,#3498db,#9b59b6);}
.panel-sub{font-size:13px;color:var(--muted);}

.section-label{
  font-size:12px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;
  color:var(--muted);margin:18px 0 10px;
  border-top:1px dashed var(--line);padding-top:14px;
}
.section-label:first-of-type{border-top:none;padding-top:0;}

.controls-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
  gap:15px;align-items:end;
}
.control-group{display:flex;flex-direction:column;gap:6px;}
.control-group label{font-size:13px;font-weight:600;color:var(--muted);}
.control-group .val{color:var(--accent);font-weight:700;}

input[type="text"],select{
  padding:10px;border:1px solid #dcdde1;border-radius:8px;
  font-size:14px;outline:none;background:#fbfbfc;
  transition:border-color .2s,box-shadow .2s;width:100%;
}
input[type="text"]:focus,select:focus{
  border-color:var(--accent);box-shadow:0 0 0 3px rgba(52,152,219,.15);
}
input[type="range"]{width:100%;accent-color:var(--accent);}
input[type="range"]:disabled{opacity: 0.5; cursor: not-allowed;}
input[type="color"]{
  width:100%;height:42px;border:1px solid #dcdde1;border-radius:8px;
  background:#fff;cursor:pointer;padding:4px;
}
input[type="color"]:disabled{opacity: 0.5; cursor: not-allowed;}
select:disabled{opacity: 0.5; cursor: not-allowed; background: #f1f2f6;}

.checkbox-row{display:flex;align-items:center;gap:8px;height:42px;}
.checkbox-row input{width:18px;height:18px;accent-color:var(--accent);}
.checkbox-row label{font-size:14px;color:var(--ink);font-weight:600;}

/* Редактор листов */
.pages-editor{display:flex;flex-direction:column;gap:10px;}
.page-row{display:flex;gap:10px;align-items:center;}
.page-row .idx{
  min-width:30px;height:30px;border-radius:8px;background:var(--accent);
  color:#fff;font-weight:700;display:flex;align-items:center;justify-content:center;
  font-size:13px;flex:none;
}
.icon-btn{
  flex:none;width:38px;height:38px;border-radius:8px;border:none;cursor:pointer;
  font-size:18px;font-weight:700;display:flex;align-items:center;justify-content:center;
  background:#fdecec;color:#e74c3c;transition:background .2s;
}
.icon-btn:hover{background:#f9dcdc;}
.add-btn{
  align-self:flex-start;background:#eaf5ff;color:#2980b9;border:1px dashed #9ac9ec;
  padding:9px 16px;border-radius:8px;font-weight:700;cursor:pointer;font-size:13px;
}
.add-btn:hover{background:#dcefff;}

/* Кнопки экспорта */
.btn-container{display:flex;gap:10px;flex-wrap:wrap;margin-top:6px;}
button.action{
  flex:1;min-width:150px;padding:13px;color:#fff;border:none;border-radius:9px;
  font-weight:700;cursor:pointer;transition:background .2s,transform .1s;font-size:14px;
}
button.action:active{transform:scale(.98);}
.btn-jpg{background:#3498db;}.btn-jpg:hover{background:#2980b9;}
.btn-all{background:#2ecc71;}.btn-all:hover{background:#27ae60;}
.btn-print{background:#8e44ad;}.btn-print:hover{background:#7d3c98;}

/* ===== Предпросмотр ===== */
.preview-container{
  display:flex;flex-direction:column;align-items:center;gap:44px;
  padding-bottom:60px;width:100%;overflow-x:auto;
}
.page-caption{font-size:13px;color:var(--muted);margin-bottom:-30px;font-weight:600;flex-shrink:0;}
.page-scale-wrapper{width:707px;height:500px;position:relative;flex-shrink:0;}
.page{
  width:1414px;height:1000px;transform:scale(.5);transform-origin:top left;
  position:absolute;top:0;left:0;
  box-shadow:0 14px 40px rgba(0,0,0,0.10);border-radius:4px;box-sizing:border-box;
  display:flex;justify-content:center;align-items:center;text-align:center;
  padding:90px;overflow:hidden;transition:background .3s;
}
.deco-border{position:absolute;top:40px;left:40px;right:40px;bottom:40px;
  pointer-events:none;transition:all .3s;border-radius:2px;}
.text-content{z-index:10;word-wrap:break-word;width:100%;max-height:100%;line-height:1.15;
  transition:all .2s;}

/* ===== ТЕМЫ (светлые) ===== */
.theme-blueprint{background:#f2f7fa;color:#1a5276;
  background-image:linear-gradient(rgba(52,152,219,.06) 2px,transparent 2px),
    linear-gradient(90deg,rgba(52,152,219,.06) 2px,transparent 2px);
  background-size:44px 44px;}
.theme-blueprint .deco-border{border:3px solid #2980b9;box-shadow:0 0 0 10px rgba(52,152,219,.05);}
.theme-blueprint .text-content{font-family:'Montserrat',sans-serif;font-weight:900;letter-spacing:2px;}

.theme-cream-gold{background:#fdfbf7;color:#2c3e50;}
.theme-cream-gold .deco-border{border:6px double #d4af37;margin:10px;}
.theme-cream-gold .text-content{font-family:'Playfair Display',serif;font-style:italic;}

.theme-watercolor{background:linear-gradient(135deg,#fff5f5 0%,#ffe3e3 100%);color:#c0392b;}
.theme-watercolor .deco-border{border:3px dashed #ffb6c1;border-radius:40px;margin:15px;}
.theme-watercolor .text-content{font-family:'Pacifico',cursive;}

.theme-sunset-glow{background:linear-gradient(135deg,#fffdf0 0%,#fff9db 100%);color:#d35400;}
.theme-sunset-glow .deco-border{border:5px solid #f39c12;border-radius:12px;}
.theme-sunset-glow .text-content{font-family:'Montserrat',sans-serif;font-weight:900;}

.theme-minimal{background:#ffffff;color:#111111;}
.theme-minimal .deco-border{border-left:20px solid #e74c3c;border-right:20px solid #e74c3c;
  top:60px;bottom:60px;left:60px;right:60px;}
.theme-minimal .text-content{font-family:'Montserrat',sans-serif;font-weight:900;text-transform:uppercase;}

.theme-botanical{background:linear-gradient(135deg,#f3faf4 0%,#e4f3e7 100%);color:#2e6b4f;}
.theme-botanical .deco-border{border:3px solid #7cb69a;border-radius:20px;
  box-shadow:inset 0 0 0 8px rgba(124,182,154,.15);}
.theme-botanical .text-content{font-family:'Cormorant',serif;font-weight:700;}

.theme-marble{background:linear-gradient(135deg,#fbfbfd 0%,#eef0f4 55%,#f6f7fa 100%);color:#34495e;}
.theme-marble .deco-border{border:2px solid #c9ccd4;
  box-shadow:inset 0 0 60px rgba(180,185,195,.25);}
.theme-marble .text-content{font-family:'Prata',serif;letter-spacing:1px;}

.theme-artdeco{background:#faf6ec;color:#8a6d1f;}
.theme-artdeco .deco-border{border:2px solid #bfa14a;
  box-shadow:inset 0 0 0 6px #faf6ec,inset 0 0 0 8px #bfa14a;}
.theme-artdeco .text-content{font-family:'Yeseva One',serif;letter-spacing:3px;text-transform:uppercase;}

.theme-pastel{background:linear-gradient(135deg,#ffeaf4 0%,#eae6ff 50%,#e6f6ff 100%);color:#7b5ea7;}
.theme-pastel .deco-border{border:4px dotted #c9b6f0;border-radius:30px;margin:8px;}
.theme-pastel .text-content{font-family:'Comfortaa',cursive;font-weight:700;}

.theme-newspaper{background:#f7f5f0;color:#1a1a1a;}
.theme-newspaper .deco-border{border:4px solid #1a1a1a;
  box-shadow:inset 0 0 0 3px #f7f5f0,inset 0 0 0 6px #1a1a1a;}
.theme-newspaper .text-content{font-family:'PT Serif',serif;font-weight:700;}

.theme-coral{background:#fff9f7;color:#e05a47;}
.theme-coral .deco-border{border-top:16px solid #ff7f6b;border-bottom:16px solid #ff7f6b;
  top:70px;bottom:70px;left:50px;right:50px;}
.theme-coral .text-content{font-family:'Oswald',sans-serif;font-weight:700;text-transform:uppercase;letter-spacing:2px;}

.theme-lavender{background:linear-gradient(160deg,#f6f0ff 0%,#ede3ff 100%);color:#6c4bb0;}
.theme-lavender .deco-border{border:3px solid #b79ce6;border-radius:50px;margin:12px;
  box-shadow:0 0 0 8px rgba(183,156,230,.12);}
.theme-lavender .text-content{font-family:'Marck Script',cursive;}

.theme-mint{background:linear-gradient(160deg,#f0fbf7 0%,#dff5ec 100%);color:#1f8a70;}
.theme-mint .deco-border{border:3px dashed #5fc9a6;border-radius:16px;}
.theme-mint .text-content{font-family:'Rubik',sans-serif;font-weight:900;}

.theme-tech{background:#f4f6fb;color:#34405e;
  background-image:radial-gradient(rgba(52,73,94,.10) 1.5px,transparent 1.5px);
  background-size:26px 26px;}
.theme-tech .deco-border{border:2px solid #34405e;
  box-shadow:inset 0 0 0 10px rgba(52,64,94,.04);}
.theme-tech .text-content{font-family:'Russo One',sans-serif;letter-spacing:1px;text-transform:uppercase;}

/* ===== WordArt эффекты ===== */
.wa-rainbow{background:linear-gradient(90deg,#e74c3c,#e67e22,#f1c40f,#2ecc71,#3498db,#9b59b6);
  -webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;color:transparent;}
.wa-gold{background:linear-gradient(180deg,#fceabb 0%,#d4af37 45%,#b8860b 55%,#f9df85 100%);
  -webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;color:transparent;
  filter:drop-shadow(2px 3px 2px rgba(0,0,0,.25));}
.wa-chrome{background:linear-gradient(180deg,#eef2f5 0%,#9fb2c2 48%,#5f7488 52%,#dfe7ee 100%);
  -webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;color:transparent;
  filter:drop-shadow(1px 2px 2px rgba(0,0,0,.3));}
.wa-fire{background:linear-gradient(180deg,#fff2b2 0%,#ffb02e 35%,#ff5722 70%,#c0392b 100%);
  -webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;color:transparent;}
.wa-ocean{background:linear-gradient(180deg,#a1e9ff 0%,#3498db 50%,#1a5276 100%);
  -webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;color:transparent;}
.wa-sunset{background:linear-gradient(180deg,#ffd166 0%,#ff6b6b 55%,#a15ac9 100%);
  -webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;color:transparent;}
.wa-outline{-webkit-text-fill-color:transparent;color:transparent;
  -webkit-text-stroke:2px currentColor;}
.wa-3d{text-shadow:1px 1px 0 rgba(0,0,0,.18),2px 2px 0 rgba(0,0,0,.16),
  3px 3px 0 rgba(0,0,0,.14),4px 4px 0 rgba(0,0,0,.12),5px 5px 0 rgba(0,0,0,.10),
  6px 6px 8px rgba(0,0,0,.22);}
.wa-neon{text-shadow:0 0 6px currentColor,0 0 14px currentColor,0 0 26px currentColor;}
.wa-retro{text-shadow:5px 5px 0 rgba(0,0,0,.16),10px 10px 0 rgba(0,0,0,.08);}
.wa-sticker{text-shadow:
  -3px -3px 0 #fff,3px -3px 0 #fff,-3px 3px 0 #fff,3px 3px 0 #fff,
  0 -4px 0 #fff,0 4px 0 #fff,-4px 0 0 #fff,4px 0 0 #fff,
  6px 8px 10px rgba(0,0,0,.30);}

/* ===== АДАПТИВНОСТЬ И ПРОКРУТКА ===== */

/* Настольные мониторы (Боковая панель слева, плакаты справа) */
@media (min-width: 1024px) {
  .app-layout {
    flex-direction: row;
    align-items: flex-start;
    gap: 30px;
    max-width: 1600px;
    margin: 0 auto;
    padding: 30px;
  }
  .control-panel {
    width: 460px;
    flex-shrink: 0;
    position: sticky;
    top: 30px;
    max-height: calc(100vh - 60px);
    overflow-y: auto;
    margin: 0 !important;
    border-radius: 16px !important;
    box-shadow: 0 10px 30px rgba(0,0,0,0.08);
  }
  .preview-container {
    flex-grow: 1;
    min-width: 0; /* предотвращает раздувание флекс-элемента */
    padding-bottom: 40px;
  }
}

/* Мобильные телефоны и планшеты (панель сверху, плакат под ней с прокруткой) */
@media (max-width: 1023px) {
  .control-panel {
    margin: 0 0 20px 0;
    border-radius: 0 0 16px 16px;
  }
  .preview-container {
    padding: 0 15px 40px 15px;
    /* Разрешаем горизонтальную прокрутку, если плакат шире экрана мобильного */
    -webkit-overflow-scrolling: touch;
  }
}

/* Красивый тонкий скроллбар для панели управления */
.control-panel::-webkit-scrollbar {
  width: 6px;
}
.control-panel::-webkit-scrollbar-track {
  background: transparent;
}
.control-panel::-webkit-scrollbar-thumb {
  background-color: rgba(0, 0, 0, 0.15);
  border-radius: 10px;
}
.control-panel::-webkit-scrollbar-thumb:hover {
  background-color: rgba(0, 0, 0, 0.25);
}

/* ===== Печать ===== */
@media print{
  .app-layout {
    display: block !important;
    padding: 0 !important;
    margin: 0 !important;
  }
  body *{visibility:hidden;}
  .no-print{display:none !important;}
  .preview-container,.preview-container *{visibility:visible;}
  .page-caption{display:none !important;}
  .preview-container{padding:0;margin:0;gap:0;overflow:visible !important;}
  .page-scale-wrapper{width:420mm !important;height:297mm !important;
    page-break-after:always;margin:0 !important;padding:0 !important;transform:none !important;}
  .page{width:420mm !important;height:297mm !important;transform:none !important;
    box-shadow:none !important;border-radius:0 !important;position:relative !important;}
  @page{size:A3 landscape;margin:0;}
}
</style>
</head>
<body>

<div class="app-layout">
  
  <div class="control-panel no-print">
    <div class="panel-head">
      <h1 class="panel-title"><span class="dot"></span>Конструктор плакатов</h1>
      <span class="panel-sub">14 тем · 22 шрифта · 12 WordArt-эффектов</span>
    </div>

    <div class="section-label">Листы и текст</div>
    <div id="pagesEditor" class="pages-editor"></div>
    <button class="add-btn" onclick="addPage()">＋ Добавить лист</button>

    <div class="section-label">Оформление</div>
    <div class="controls-grid">
      <div class="control-group">
        <label for="themeSelect">Стиль (тема)</label>
        <select id="themeSelect">
          <option value="theme-blueprint" selected>Инженерный чертёж</option>
          <option value="theme-cream-gold">Благородный крем и золото</option>
          <option value="theme-watercolor">Акварельная нежность</option>
          <option value="theme-sunset-glow">Солнечный блик</option>
          <option value="theme-minimal">Скандинавский минимализм</option>
          <option value="theme-botanical">Ботаника / зелень</option>
          <option value="theme-marble">Светлый мрамор</option>
          <option value="theme-artdeco">Ар-деко (золотые линии)</option>
          <option value="theme-pastel">Пастельный градиент</option>
          <option value="theme-newspaper">Газета / типографика</option>
          <option value="theme-coral">Коралловый модерн</option>
          <option value="theme-lavender">Лавандовая мечта</option>
          <option value="theme-mint">Мятная свежесть</option>
          <option value="theme-tech">Технологичный (точки)</option>
        </select>
      </div>

      <div class="control-group">
        <label for="fontSelect">Шрифт</label>
        <select id="fontSelect">
          <option value="">— по теме —</option>
          <option value="'Montserrat',sans-serif">Montserrat (современный)</option>
          <option value="'Oswald',sans-serif">Oswald (узкий, плакатный)</option>
          <option value="'PT Sans',sans-serif">PT Sans (нейтральный)</option>
          <option value="'Rubik',sans-serif">Rubik (жирный гротеск)</option>
          <option value="'Russo One',sans-serif">Russo One (техно)</option>
          <option value="'Rubik Mono One',monospace">Rubik Mono One (супержир)</option>
          <option value="'Comfortaa',cursive">Comfortaa (округлый)</option>
          <option value="'Pattaya',sans-serif">Pattaya (лёгкий)</option>
          <option value="'Playfair Display',serif">Playfair Display (классика)</option>
          <option value="'PT Serif',serif">PT Serif (книжный)</option>
          <option value="'Prata',serif">Prata (элегантный)</option>
          <option value="'Yeseva One',serif">Yeseva One (журнальный)</option>
          <option value="'Alegreya',serif">Alegreya (литературный)</option>
          <option value="'Cormorant',serif">Cormorant (утончённый)</option>
          <option value="'Podkova',serif">Podkova (плитный)</option>
          <option value="'Lobster',cursive">Lobster (ретро-вывеска)</option>
          <option value="'Pacifico',cursive">Pacifico (праздничный)</option>
          <option value="'Caveat',cursive">Caveat (рукописный)</option>
          <option value="'Marck Script',cursive">Marck Script (перо)</option>
          <option value="'Bad Script',cursive">Bad Script (небрежный)</option>
          <option value="'Neucha',cursive">Neucha (детский)</option>
          <option value="'Ruslan Display',cursive">Ruslan Display (славянский)</option>
          <option value="'Underdog',cursive">Underdog (винтаж)</option>
        </select>
      </div>

      <div class="control-group">
        <label for="waSelect">WordArt-эффект</label>
        <select id="waSelect">
          <option value="" selected>Без эффекта</option>
          <option value="wa-rainbow">🌈 Радуга</option>
          <option value="wa-gold">🥇 Золото</option>
          <option value="wa-chrome">🪞 Хром / металл</option>
          <option value="wa-fire">🔥 Огонь</option>
          <option value="wa-ocean">🌊 Океан</option>
          <option value="wa-sunset">🌇 Закат</option>
          <option value="wa-outline">⭕ Только контур</option>
          <option value="wa-3d">🧱 3D-объём</option>
          <option value="wa-neon">💡 Неоновое свечение</option>
          <option value="wa-retro">📼 Ретро-тень</option>
          <option value="wa-sticker">🏷️ Стикер (обводка)</option>
        </select>
      </div>

      <div class="control-group">
        <label for="fontSizeSlider">Размер шрифта: <span class="val" id="fontSizeVal">130px</span></label>
        <input type="range" id="fontSizeSlider" min="50" max="280" value="130">
      </div>
      <div class="control-group">
        <label for="letterSpacing">Межбуквенный интервал: <span class="val" id="letterSpacingVal">0px</span></label>
        <input type="range" id="letterSpacing" min="-10" max="40" value="0">
      </div>
      <div class="control-group">
        <label for="lineHeight">Высота строки: <span class="val" id="lineHeightVal">1.15</span></label>
        <input type="range" id="lineHeight" min="90" max="200" value="115">
      </div>
      <div class="control-group">
        <label for="rotate">Наклон текста: <span class="val" id="rotateVal">0°</span></label>
        <input type="range" id="rotate" min="-20" max="20" value="0">
      </div>
      <div class="control-group">
        <label for="shadow">Мягкая тень: <span class="val" id="shadowVal">0</span></label>
        <input type="range" id="shadow" min="0" max="40" value="0">
      </div>

      <div class="control-group">
        <label for="transformSelect">Регистр</label>
        <select id="transformSelect">
          <option value="none" selected>Как введено</option>
          <option value="uppercase">ВЕРХНИЙ</option>
          <option value="lowercase">нижний</option>
          <option value="capitalize">С Заглавных</option>
        </select>
      </div>

      <div class="control-group">
        <label for="textColor">Цвет текста</label>
        <input type="color" id="textColor" value="#1a5276">
      </div>
      <div class="checkbox-row">
        <input type="checkbox" id="useThemeColor" checked>
        <label for="useThemeColor">Цвет из темы</label>
      </div>

      <div class="control-group">
        <label for="bgColor">Цвет фона</label>
        <input type="color" id="bgColor" value="#f2f7fa">
      </div>
      <div class="checkbox-row">
        <input type="checkbox" id="useThemeBg" checked>
        <label for="useThemeBg">Фон из темы</label>
      </div>
    </div>

    <!-- Новая секция индивидуальной настройки рамки -->
    <div class="section-label">Настройка рамки</div>
    <div class="controls-grid">
      <div class="checkbox-row" style="grid-column: span 2; height: auto;">
        <input type="checkbox" id="useThemeBorder" checked>
        <label for="useThemeBorder">Рамка из темы</label>
      </div>
      <div class="control-group">
        <label for="borderStyle">Тип линии</label>
        <select id="borderStyle">
          <option value="solid" selected>Сплошная (Solid)</option>
          <option value="dashed">Штриховая (Dashed)</option>
          <option value="dotted">Точечная (Dotted)</option>
          <option value="double">Двойная (Double)</option>
          <option value="none">Без рамки</option>
        </select>
      </div>
      <div class="control-group">
        <label for="borderColor">Цвет рамки</label>
        <input type="color" id="borderColor" value="#2980b9">
      </div>
      <div class="control-group">
        <label for="borderWidth">Толщина: <span class="val" id="borderWidthVal">3px</span></label>
        <input type="range" id="borderWidth" min="1" max="40" value="3">
      </div>
      <div class="control-group">
        <label for="borderInset">Отступ от края: <span class="val" id="borderInsetVal">40px</span></label>
        <input type="range" id="borderInset" min="0" max="120" value="40">
      </div>
      <div class="control-group">
        <label for="borderRadius">Скругление углов: <span class="val" id="borderRadiusVal">2px</span></label>
        <input type="range" id="borderRadius" min="0" max="100" value="2">
      </div>
    </div>

    <div class="section-label">Экспорт</div>
    <div class="controls-grid" style="margin-bottom:14px;">
      <div class="control-group">
        <label for="formatSelect">Формат файла</label>
        <select id="formatSelect">
          <option value="jpeg" selected>JPG (меньше размер)</option>
          <option value="png">PNG (без потерь)</option>
        </select>
      </div>
      <div class="control-group">
        <label for="scaleSelect">Качество (разрешение)</label>
        <select id="scaleSelect">
          <option value="2" selected>2× (стандарт)</option>
          <option value="3">3× (высокое)</option>
          <option value="4">4× (максимум)</option>
        </select>
      </div>
    </div>
    <div class="btn-container">
      <button class="action btn-all" onclick="exportAll(this)">⬇ Скачать все листы</button>
      <button class="action btn-print" onclick="window.print()">🖨 Печать напрямую (А3)</button>
    </div>
  </div>

  <div id="preview" class="preview-container"></div>

</div>

<script>
// ===== Состояние =====
let pages = ["текст1,", "текст2"];

const $ = id => document.getElementById(id);
const themeSelect=$('themeSelect'), fontSelect=$('fontSelect'), waSelect=$('waSelect');
const fontSizeSlider=$('fontSizeSlider'), letterSpacing=$('letterSpacing'), lineHeight=$('lineHeight');
const rotate=$('rotate'), shadow=$('shadow'), transformSelect=$('transformSelect');
const textColor=$('textColor'), useThemeColor=$('useThemeColor');
const bgColor=$('bgColor'), useThemeBg=$('useThemeBg');

// Элементы управления рамкой
const useThemeBorder=$('useThemeBorder'), borderStyle=$('borderStyle'), borderColor=$('borderColor');
const borderWidth=$('borderWidth'), borderInset=$('borderInset'), borderRadius=$('borderRadius');

// ===== Блокировка/разблокировка настроек рамки =====
function toggleBorderControls() {
  const isTheme = useThemeBorder.checked;
  borderStyle.disabled = isTheme;
  borderColor.disabled = isTheme;
  borderWidth.disabled = isTheme;
  borderInset.disabled = isTheme;
  borderRadius.disabled = isTheme;
}

// ===== Рендер листов =====
function renderPages(){
  // Предпросмотр
  const preview=$('preview');
  preview.innerHTML='';
  pages.forEach((txt,i)=>{
    const cap=document.createElement('div');
    cap.className='page-caption no-print';
    cap.textContent='Лист '+(i+1);
    const wrap=document.createElement('div');
    wrap.className='page-scale-wrapper';
    wrap.innerHTML='<div id="page'+i+'" class="page"><div class="deco-border"></div>'+
      '<div id="text'+i+'" class="text-content"></div></div>';
    preview.appendChild(cap);
    preview.appendChild(wrap);
    wrap.querySelector('#text'+i).textContent=txt;
  });
  // Редактор текста
  const ed=$('pagesEditor');
  ed.innerHTML='';
  pages.forEach((txt,i)=>{
    const row=document.createElement('div');
    row.className='page-row';
    row.innerHTML='<div class="idx">'+(i+1)+'</div>';
    const inp=document.createElement('input');
    inp.type='text'; inp.value=txt; inp.placeholder='Текст листа '+(i+1);
    inp.addEventListener('input',()=>{pages[i]=inp.value; const t=$('text'+i); if(t)t.textContent=inp.value;});
    row.appendChild(inp);
    const del=document.createElement('button');
    del.className='icon-btn'; del.title='Удалить лист'; del.textContent='✕';
    del.onclick=()=>{ if(pages.length>1){ pages.splice(i,1); renderPages(); applyAll(); } };
    row.appendChild(del);
    ed.appendChild(row);
  });
}
function addPage(){ pages.push('Новый текст'); renderPages(); applyAll(); }

// ===== Применение стилей =====
const gradientEffects=['wa-rainbow','wa-gold','wa-chrome','wa-fire','wa-ocean','wa-sunset','wa-outline'];

function applyAll(){
  const theme=themeSelect.value;
  const font=fontSelect.value;
  const wa=waSelect.value;
  const size=fontSizeSlider.value+'px';
  const ls=letterSpacing.value+'px';
  const lh=(lineHeight.value/100).toFixed(2);
  const rot=rotate.value;
  const sh=parseInt(shadow.value,10);
  const tr=transformSelect.value;

  pages.forEach((_,i)=>{
    const page=$('page'+i); const text=$('text'+i);
    if(!page||!text) return;

    // Тема
    page.className='page '+theme;
    // Фон
    page.style.background = useThemeBg.checked ? '' : bgColor.value;
    if(!useThemeBg.checked) page.style.backgroundImage='none';

    // Стилизация рамки (тема или пользовательские параметры)
    const decoBorder = page.querySelector('.deco-border');
    if (decoBorder) {
      if (useThemeBorder.checked) {
        // Сбрасываем инлайновые стили, чтобы применились стили из CSS-класса темы
        decoBorder.style.border = '';
        decoBorder.style.top = '';
        decoBorder.style.left = '';
        decoBorder.style.right = '';
        decoBorder.style.bottom = '';
        decoBorder.style.borderRadius = '';
        decoBorder.style.boxShadow = '';
        decoBorder.style.margin = '';
      } else {
        // Применяем пользовательские стили
        decoBorder.style.border = `${borderWidth.value}px ${borderStyle.value} ${borderColor.value}`;
        decoBorder.style.top = borderInset.value + 'px';
        decoBorder.style.left = borderInset.value + 'px';
        decoBorder.style.right = borderInset.value + 'px';
        decoBorder.style.bottom = borderInset.value + 'px';
        decoBorder.style.borderRadius = borderRadius.value + 'px';
        decoBorder.style.boxShadow = 'none'; // отключаем тени темы при ручной настройке
        decoBorder.style.margin = '0';
      }
    }

    // WordArt-класс
    text.className='text-content'+(wa?(' '+wa):'');

    // Базовые стили
    text.style.fontFamily = font || '';
    text.style.fontSize = size;
    text.style.letterSpacing = ls;
    text.style.lineHeight = lh;
    text.style.textTransform = tr;
    text.style.transform = 'rotate('+rot+'deg)';

    // Цвет: градиентные эффекты управляют цветом сами
    if(gradientEffects.includes(wa)){
      if(wa==='wa-outline'){
        text.style.color = useThemeColor.checked ? '' : textColor.value; // stroke = currentColor
      }else{
        text.style.color=''; // фон-градиент клипается в текст
      }
    }else{
      text.style.color = useThemeColor.checked ? '' : textColor.value;
    }

    // Мягкая тень (складывается только если нет WordArt-теней)
    if(sh>0 && !wa){
      text.style.textShadow='0 '+Math.round(sh/3)+'px '+sh+'px rgba(0,0,0,'+Math.min(.06+sh/60,.55).toFixed(2)+')';
    }else if(!wa){
      text.style.textShadow='none';
    }
  });
}

// ===== Обработчики =====
themeSelect.addEventListener('change',()=>{
  applyAll();
});
fontSelect.addEventListener('change',applyAll);
waSelect.addEventListener('change',applyAll);
transformSelect.addEventListener('change',applyAll);
textColor.addEventListener('input',()=>{useThemeColor.checked=false; applyAll();});
useThemeColor.addEventListener('change',applyAll);
bgColor.addEventListener('input',()=>{useThemeBg.checked=false; applyAll();});
useThemeBg.addEventListener('change',applyAll);

fontSizeSlider.addEventListener('input',()=>{$('fontSizeVal').textContent=fontSizeSlider.value+'px'; applyAll();});
letterSpacing.addEventListener('input',()=>{$('letterSpacingVal').textContent=letterSpacing.value+'px'; applyAll();});
lineHeight.addEventListener('input',()=>{$('lineHeightVal').textContent=(lineHeight.value/100).toFixed(2); applyAll();});
rotate.addEventListener('input',()=>{$('rotateVal').textContent=rotate.value+'°'; applyAll();});
shadow.addEventListener('input',()=>{$('shadowVal').textContent=shadow.value; applyAll();});

// Слушатели для настроек рамки
useThemeBorder.addEventListener('change', () => {
  toggleBorderControls();
  applyAll();
});
borderStyle.addEventListener('change', applyAll);
borderColor.addEventListener('input', applyAll);
borderWidth.addEventListener('input', () => {
  $('borderWidthVal').textContent = borderWidth.value + 'px';
  applyAll();
});
borderInset.addEventListener('input', () => {
  $('borderInsetVal').textContent = borderInset.value + 'px';
  applyAll();
});
borderRadius.addEventListener('input', () => {
  $('borderRadiusVal').textContent = borderRadius.value + 'px';
  applyAll();
});

// ===== Экспорт =====
async function exportOne(index,filename){
  const target=$('page'+index);
  const fmt=$('formatSelect').value;
  const scale=parseInt($('scaleSelect').value,10);
  const canvas=await html2canvas(target,{scale:scale,useCORS:true,allowTaint:true,logging:false,backgroundColor:null});
  const mime = fmt==='png' ? 'image/png' : 'image/jpeg';
  const data = fmt==='png' ? canvas.toDataURL(mime) : canvas.toDataURL(mime,0.95);
  const link=document.createElement('a');
  link.href=data; link.download=filename+'.'+(fmt==='png'?'png':'jpg'); link.click();
}

async function exportAll(btn){
  const original=btn.textContent; btn.disabled=true;
  try{
    for(let i=0;i<pages.length;i++){
      btn.textContent='Генерация листа '+(i+1)+'…';
      await exportOne(i,'Plakat_List_'+(i+1));
      await new Promise(r=>setTimeout(r,350));
    }
  }catch(e){
    console.error(e); alert('Ошибка при экспорте. Попробуйте ещё раз.');
  }finally{
    btn.textContent=original; btn.disabled=false;
  }
}

// ===== Инициализация =====
renderPages();
toggleBorderControls();
applyAll();
</script>
</body>
</html>
