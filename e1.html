<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notion AI Chat Client</title>
    <!-- Tailwind CSS для стильного дизайна -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Плавная кастомизация скроллбара */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #1e1e2e; }
        ::-webkit-scrollbar-thumb { background: #45475a; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #585b70; }
    </style>
</head>
<body class="bg-[#181825] text-[#cdd6f4] h-screen flex flex-col overflow-hidden">

    <!-- Верхняя панель конфигурации -->
    <header class="bg-[#11111b] border-b border-[#313244] px-6 py-3 flex flex-wrap items-center justify-between gap-4">
        <div class="flex items-center gap-3">
            <span class="text-2xl">🧠</span>
            <h1 class="text-lg font-bold text-[#f5c2e7]">Notion AI Client</h1>
        </div>
        <div class="flex items-center gap-2 w-full sm:w-auto">
            <label for="backendUrl" class="text-xs text-[#a6adc8] whitespace-nowrap">Адрес бэкенда:</label>
            <input type="text" id="backendUrl" value="http://127.0.0.1:8000" 
                   class="bg-[#1e1e2e] border border-[#45475a] rounded px-3 py-1 text-sm text-[#cdd6f4] focus:outline-none focus:border-[#cba6f7] w-full sm:w-64">
        </div>
    </header>

    <!-- Основная область чата -->
    <main class="flex-1 overflow-y-auto px-4 py-6 md:px-0" id="chatContainer">
        <div class="max-w-3xl mx-auto space-y-6" id="chatHistory">
            
            <!-- Приветственное сообщение -->
            <div class="flex gap-4 p-4 rounded-lg bg-[#313244]/30 border border-[#313244]">
                <div class="w-8 h-8 rounded-full bg-[#cba6f7] text-[#11111b] flex items-center justify-center font-bold">AI</div>
                <div>
                    <h3 class="font-bold text-[#cba6f7] mb-1">Notion AI</h3>
                    <p class="text-sm leading-relaxed text-[#bac2de]">Привет! Я подключен к вашей подписке Notion AI и готов к работе. Что мы напишем сегодня?</p>
                </div>
            </div>

        </div>
    </main>

    <!-- Нижняя панель ввода -->
    <footer class="bg-[#11111b] border-t border-[#313244] p-4">
        <div class="max-w-3xl mx-auto flex gap-3 items-end">
            <textarea id="promptInput" rows="1" placeholder="Спросите меня о чем-нибудь..." 
                      class="flex-1 bg-[#1e1e2e] border border-[#45475a] rounded-lg px-4 py-3 text-sm text-[#cdd6f4] focus:outline-none focus:border-[#cba6f7] resize-none overflow-y-auto max-h-32"></textarea>
            <button id="sendBtn" class="bg-[#cba6f7] hover:bg-[#f5c2e7] text-[#11111b] font-bold px-5 py-3 rounded-lg text-sm transition duration-200">
                Отправить
            </button>
        </div>
    </footer>

    <script>
        const chatHistory = document.getElementById('chatHistory');
        const chatContainer = document.getElementById('chatContainer');
        const promptInput = document.getElementById('promptInput');
        const sendBtn = document.getElementById('sendBtn');
        const backendUrlInput = document.getElementById('backendUrl');

        // Автоматическое изменение высоты textarea
        promptInput.addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = (this.scrollHeight) + 'px';
        });

        // Функция плавной прокрутки вниз
        function scrollToBottom() {
            chatContainer.scrollTo({
                top: chatContainer.scrollHeight,
                behavior: 'smooth'
            });
        }

        // Создание HTML-блока сообщения
        function createMessageElement(sender, text) {
            const isAI = sender === 'assistant';
            const wrapper = document.createElement('div');
            wrapper.className = `flex gap-4 p-4 rounded-lg transition duration-200 ${isAI ? 'bg-[#313244]/10' : 'bg-[#1e1e2e]/40'}`;

            const avatar = document.createElement('div');
            avatar.className = `w-8 h-8 rounded-full flex items-center justify-center font-bold text-sm shrink-0 ${isAI ? 'bg-[#cba6f7] text-[#11111b]' : 'bg-[#fab387] text-[#11111b]'}`;
            avatar.innerText = isAI ? 'AI' : 'Вы';

            const contentWrapper = document.createElement('div');
            contentWrapper.className = "flex-1";

            const name = document.createElement('h3');
            name.className = `font-bold mb-1 text-sm ${isAI ? 'text-[#cba6f7]' : 'text-[#fab387]'}`;
            name.innerText = isAI ? 'Notion AI' : 'Вы';

            const textNode = document.createElement('p');
            textNode.className = "text-sm leading-relaxed text-[#cdd6f4] whitespace-pre-wrap";
            textNode.textContent = text;

            contentWrapper.appendChild(name);
            contentWrapper.appendChild(textNode);
            wrapper.appendChild(avatar);
            wrapper.appendChild(contentWrapper);
            chatHistory.appendChild(wrapper);
            scrollToBottom();

            return textNode; // Возвращаем ссылку на узел текста, чтобы наполнять его стримом
        }

        async function handleSend() {
            const promptText = promptInput.value.trim();
            const backendUrl = backendUrlInput.value.trim().replace(/\/$/, ""); // Удаляем слэш в конце
            
            if (!promptText) return;

            // Блокируем интерфейс
            promptInput.value = '';
            promptInput.style.height = 'auto';
            promptInput.disabled = true;
            sendBtn.disabled = true;
            sendBtn.classList.add('opacity-50');

            // Отображаем сообщение пользователя
            createMessageElement('user', promptText);

            // Создаем пустой контейнер для ответа ИИ
            const aiTextField = createMessageElement('assistant', 'Думаю...');

            try {
                const response = await fetch(`${backendUrl}/api/chat`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ prompt: promptText })
                });

                if (!response.ok) {
                    throw new Error(`Ошибка сервера: ${response.status}`);
                }
