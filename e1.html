<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>ISS Orbital Simulator 2.0</title>
    <!-- Yandex Maps API -->
    <script src="https://api-maps.yandex.ru/2.1/?apikey=dde71a0e-b612-44b7-b53b-82533420240f&lang=ru_RU" type="text/javascript"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&family=Space+Mono:wght@400;700&display=swap');

        :root {
            --neon: #00f3ff;
            --alert: #ff2a2a;
            --bg: rgba(6, 15, 30, 0.7);
            --ms: 1; /* Масштаб маркера карты */
        }

        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; font-family: 'Rajdhani', sans-serif; color: white; user-select: none; }
        canvas { display: block; width: 100%; height: 100%; outline: none; }

        /* UI Overlays */
        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10; display: flex; flex-direction: column; justify-content: space-between; padding: 20px; box-sizing: border-box; }
        
        .panel { background: var(--bg); backdrop-filter: blur(10px); border: 1px solid rgba(0, 243, 255, 0.3); border-radius: 8px; padding: 15px; pointer-events: auto; box-shadow: 0 0 20px rgba(0, 243, 255, 0.1); }
        
        /* Top Bar */
        #top-bar { display: flex; justify-content: space-between; align-items: flex-start; }
        .title { font-size: 24px; font-weight: 700; color: var(--neon); text-transform: uppercase; letter-spacing: 2px; margin-bottom: 5px; text-shadow: 0 0 10px var(--neon); }
        
        /* Telemetry */
        #telemetry { display: grid; grid-template-columns: 1fr 1fr; gap: 10px 20px; font-size: 16px; margin-bottom: 10px;}
        .tel-label { color: rgba(255,255,255,0.6); text-transform: uppercase; font-size: 12px; }
        .tel-val { font-weight: 600; font-size: 18px; font-variant-numeric: tabular-nums; font-family: 'Space Mono', monospace; }
        
        /* Location Bar */
        .location-box { background: rgba(0, 243, 255, 0.1); border: 1px solid var(--neon); padding: 8px 12px; border-radius: 4px; margin-top: 10px; }
        .location-title { font-size: 11px; color: var(--neon); text-transform: uppercase; letter-spacing: 1px; }
        .location-name { font-size: 18px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 300px; }

        /* Cameras */
        #camera-controls { display: flex; gap: 10px; flex-wrap: wrap; justify-content: flex-end; max-width: 400px;}
        .cam-btn { background: rgba(0,0,0,0.5); border: 1px solid var(--neon); color: var(--neon); padding: 8px 15px; font-family: inherit; font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.2s; border-radius: 4px; text-transform: uppercase; }
        .cam-btn:hover, .cam-btn.active { background: var(--neon); color: #000; box-shadow: 0 0 15px var(--neon); }
        .cam-map-btn { border-color: #ff2020; color: #ff2020; }
        .cam-map-btn:hover, .cam-map-btn.active { background: #ff2020; color: white; box-shadow: 0 0 15px #ff2020; }

        /* Crew */
        #crew-panel { position: absolute; right: 20px; top: 120px; max-width: 200px; }
        .crew-member { display: flex; align-items: center; gap: 10px; margin-top: 8px; font-size: 14px; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 4px; }
        .crew-member::before { content: '👨‍🚀'; }

        /* Bottom Bar */
        #bottom-bar { display: flex; justify-content: space-between; align-items: flex-end; pointer-events: none;}
        #status-sys { color: #00ff88; font-weight: 600; letter-spacing: 1px; animation: pulse 2s infinite; }
        
        @keyframes pulse { 0% {opacity:0.6;} 50% {opacity:1;} 100% {opacity:0.6;} }

        /* Cupola Overlay */
        #cupola-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 5; display: none;
            background: 
                radial-gradient(circle at center, transparent 35%, rgba(0,0,0,0.95) 45%),
                linear-gradient(0deg, rgba(0,0,0,0.8) 0%, transparent 40%, transparent 60%, rgba(0,0,0,0.8) 100%),
                linear-gradient(90deg, rgba(20,25,30,1) 0%, transparent 20%, transparent 80%, rgba(20,25,30,1) 100%);
            box-shadow: inset 0 0 100px #000;
        }
        .cupola-strut { position: absolute; background: #111; border: 1px solid #222; box-shadow: 0 0 20px #000; }
        .strut-v { width: 40px; height: 100%; top: 0; left: 50%; transform: translateX(-50%); }
        .strut-d1 { width: 100%; height: 40px; top: 50%; left: 0; transform: translateY(-50%) rotate(30deg); }
        .strut-d2 { width: 100%; height: 40px; top: 50%; left: 0; transform: translateY(-50%) rotate(-30deg); }

        /* --- NADIR MAP OVERLAY --- */
        #nadir-map-container {
            position: absolute; top: 5%; left: 5%; width: 90%; height: 90%;
            background: #111; border: 2px solid #ff2020; border-radius: 12px;
            display: none; z-index: 50; overflow: hidden; pointer-events: auto;
            box-shadow: 0 0 50px rgba(255, 32, 32, 0.4);
        }
        #ymap-instance { width: 100%; height: 100%; }
        
        /* Крестик из вашего кода */
        .center-marker {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            pointer-events: none; z-index: 100; color: #ff2020;
            animation: marker-breathe 2.8s ease-in-out infinite;
        }
        @keyframes marker-breathe { 0%,100%{opacity:.97} 50%{opacity:.52} }
        .center-marker.type-cross { width: 0; height: 0; filter: drop-shadow(0 0 5px currentColor) drop-shadow(0 0 2px rgba(0,0,0,.6)); }
        .center-marker.type-cross::before, .center-marker.type-cross::after { content: ''; position: absolute; background: currentColor; border-radius: 1px; }
        .center-marker.type-cross::before { width: calc(36px * var(--ms)); height: calc(3px * var(--ms)); top: calc(-1.5px * var(--ms)); left: calc(-18px * var(--ms)); box-shadow: 0 0 0 1px rgba(255,255,255,.5); }
        .center-marker.type-cross::after { width: calc(3px * var(--ms)); height: calc(36px * var(--ms)); top: calc(-18px * var(--ms)); left: calc(-1.5px * var(--ms)); box-shadow: 0 0 0 1px rgba(255,255,255,.5); }
        .mdot { position: absolute; width: calc(6px * var(--ms)); height: calc(6px * var(--ms)); background: currentColor; border-radius: 50%; top: 50%; left: 50%; transform: translate(-50%,-50%); border: 1.5px solid rgba(255,255,255,.8); box-shadow: 0 0 0 1.5px rgba(0,0,0,.3); }
        
        .map-close-btn {
            position: absolute; top: 15px; right: 15px; background: rgba(0,0,0,0.7); color: white;
            border: 1px solid #ff2020; border-radius: 50%; width: 40px; height: 40px;
            font-size: 20px; cursor: pointer; z-index: 101; display: flex; align-items: center; justify-content: center;
        }
        .map-close-btn:hover { background: #ff2020; }

        /* Toast Notifications */
        #toast-container { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); z-index: 9999; display: flex; flex-direction: column; gap: 10px; pointer-events: none; }
        .toast { background: rgba(0, 243, 255, 0.2); border: 1px solid var(--neon); backdrop-filter: blur(8px); padding: 10px 20px; border-radius: 8px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; animation: slideUp 0.3s ease-out forwards; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        #loading { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 24px; color: var(--neon); letter-spacing: 5px; text-transform: uppercase; z-index: 100; text-shadow: 0 0 20px var(--neon); }
    </style>
</head>
<body>

    <div id="loading">ИНИЦИАЛИЗАЦИЯ...</div>

    <!-- Модуль НАДИР (2D Карта) -->
    <div id="nadir-map-container">
        <button class="map-close-btn" id="close-map">✕</button>
        <div class="center-marker type-cross"><div class="mdot"></div></div>
        <div id="ymap-instance"></div>
    </div>

    <!-- Имитация окон модуля Купол -->
    <div id="cupola-overlay">
        <div class="cupola-strut strut-v"></div>
        <div class="cupola-strut strut-d1"></div>
        <div class="cupola-strut strut-d2"></div>
    </div>

    <!-- UI -->
    <div id="ui-layer">
        <div id="top-bar">
            <div class="panel" style="pointer-events: auto;">
                <div class="title">ISS TELEMETRY</div>
                <div id="telemetry">
                    <div><div class="tel-label">Широта</div><div class="tel-val" id="hud-lat">0.0000°</div></div>
                    <div><div class="tel-label">Долгота</div><div class="tel-val" id="hud-lon">0.0000°</div></div>
                    <div><div class="tel-label">Высота</div><div class="tel-val" id="hud-alt">0.0 km</div></div>
                    <div><div class="tel-label">Скорость</div><div class="tel-val" id="hud-vel">0 km/h</div></div>
                </div>
                <div class="location-box">
                    <div class="location-title">МЕСТОПОЛОЖЕНИЕ (НАДИР)</div>
                    <div class="location-name" id="hud-location">Ожидание данных...</div>
                </div>
            </div>
            
            <div id="camera-controls">
                <button class="cam-btn active" data-cam="free">Свободная (EVA)</button>
                <button class="cam-btn" data-cam="cupola">Модуль "Купол"</button>
                <button class="cam-btn" data-cam="panels">Камера панелей</button>
                <button class="cam-btn cam-map-btn" id="btn-nadir">Карта (Nadir)</button>
            </div>
        </div>

        <div class="panel" id="crew-panel">
            <div class="title" style="font-size: 16px;">Экипаж онлайн</div>
            <div id="crew-list">Загрузка...</div>
        </div>

        <div id="bottom-bar">
            <div class="panel" style="padding: 10px 20px;">
                <span id="status-sys">SYSTEMS NOMINAL • POINT CLICK ENABLED</span>
            </div>
        </div>
    </div>

    <div id="toast-container"></div>

    <!-- Библиотеки -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/astronomy-engine@2.1.19/astronomy.browser.min.js"></script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { Lensflare, LensflareElement } from 'three/addons/objects/Lensflare.js';
        import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
        import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
        import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';

        const R_EARTH = 63.71; 
        let issData = { lat: 0, lon: 0, alt: 400, vel: 27000, vis: 'daylight' };
        let currentCam = 'free';
        let yandexMap = null;
        let isMapReady = false;

        // --- ТОСТЫ УВЕДОМЛЕНИЙ ---
        function showToast(message) {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.innerText = message;
            container.appendChild(toast);
            setTimeout(() => { toast.remove(); }, 3000);
        }

        // --- ИНИЦИАЛИЗАЦИЯ YANDEX MAPS ---
        ymaps.ready(() => {
            yandexMap = new ymaps.Map('ymap-instance', {
                center: [0, 0],
                zoom: 5,
                type: 'yandex#satellite',
                controls: ['zoomControl']
            }, { suppressMapOpenBlock: true });

            // Добавляем слой Google Satellite
            const proj = ymaps.projection.sphericalMercator;
            ymaps.layer.storage.add('google#satellite', function() { 
                return new ymaps.Layer('https://mt1.google.com/vt/lyrs=s&x=%x&y=%y&z=%z&hl=ru', {projection: proj}); 
            });
            ymaps.mapType.storage.add('google#satellite', new ymaps.MapType('Google Спутник', ['google#satellite']));
            yandexMap.setType('google#satellite');
            isMapReady = true;
        });

        // --- ИНИЦИАЛИЗАЦИЯ 3D СЦЕНЫ ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x020204);

        const renderer = new THREE.WebGLRenderer({ antialias: false, powerPreference: "high-performance" });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.2;
        renderer.logarithmicDepthBuffer = true;
        document.body.appendChild(renderer.domElement);

        const renderScene = new RenderPass(scene, new THREE.PerspectiveCamera());
        const bloomPass = new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 1.2, 0.5, 0.85);
        const composer = new EffectComposer(renderer);
        composer.addPass(renderScene);
        composer.addPass(bloomPass);

        // --- ЗАГРУЗКА РАСТРОВЫХ ТЕКСТУР ЗЕМЛИ (CORS SAFE) ---
        const textureLoader = new THREE.TextureLoader();
        textureLoader.setCrossOrigin("anonymous");
        
        // Надежные URL для текстур (библиотека Three-Globe)
        const tEarthColor = textureLoader.load('https://unpkg.com/three-globe/example/img/earth-blue-marble.jpg');
        const tEarthBump = textureLoader.load('https://unpkg.com/three-globe/example/img/earth-topology.png');
        const tEarthSpec = textureLoader.load('https://unpkg.com/three-globe/example/img/earth-water.png');
        const tClouds = textureLoader.load('https://unpkg.com/three-globe/example/img/earth-clouds1024.png');
        tEarthColor.colorSpace = THREE.SRGBColorSpace;

        const earthGroup = new THREE.Group();
        scene.add(earthGroup);

        const earthGeo = new THREE.SphereGeometry(R_EARTH, 64, 64);
        const earthMat = new THREE.MeshPhongMaterial({
            map: tEarthColor,
            bumpMap: tEarthBump,
            bumpScale: 0.15,
            specularMap: tEarthSpec,
            specular: new THREE.Color(0x333333),
            shininess: 25
        });
        const earthMesh = new THREE.Mesh(earthGeo, earthMat);
        earthGroup.add(earthMesh);

        const cloudsMat = new THREE.MeshPhongMaterial({
            map: tClouds, transparent: true, opacity: 0.6, blending: THREE.AdditiveBlending, depthWrite: false
        });
        const cloudsMesh = new THREE.Mesh(new THREE.SphereGeometry(R_EARTH + 0.1, 64, 64), cloudsMat);
        earthGroup.add(cloudsMesh);

        // Шейдер атмосферы
        const atmoMat = new THREE.ShaderMaterial({
            vertexShader: `varying vec3 vN; varying vec3 vP; void main(){ vN=normalize(normalMatrix*normal); vP=normalize((modelViewMatrix*vec4(position,1.0)).xyz); gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.0); }`,
            fragmentShader: `uniform vec3 sunDirection; varying vec3 vN; varying vec3 vP; void main(){ float i=pow(0.6-dot(vN,vP),3.5); float sunDot=dot(vN,sunDirection); vec3 finalColor=mix(vec3(1.0,0.4,0.1), vec3(0.3,0.6,1.0), smoothstep(-0.2,0.2,sunDot)); float fade=smoothstep(-0.4,0.1,sunDot); gl_FragColor=vec4(finalColor,i*fade*1.5); }`,
            uniforms: { sunDirection: { value: new THREE.Vector3(1, 0, 0) } },
            transparent: true, blending: THREE.AdditiveBlending, side: THREE.BackSide, depthWrite: false
        });
        const atmosphere = new THREE.Mesh(new THREE.SphereGeometry(R_EARTH + 1.2, 64, 64), atmoMat);
        earthGroup.add(atmosphere);

        // --- МКС И КЛИКАБЕЛЬНЫЕ МОДУЛИ ---
        const iss = new THREE.Group();
        scene.add(iss);

        const matMetal = new THREE.MeshStandardMaterial({ color: 0xdddddd, metalness: 0.9, roughness: 0.3 });
        const matDarkMetal = new THREE.MeshStandardMaterial({ color: 0x444444, metalness: 0.8, roughness: 0.5 });
        const matGold = new THREE.MeshStandardMaterial({ color: 0xffaa00, metalness: 1.0, roughness: 0.2 });
        const matPanel = new THREE.MeshStandardMaterial({ color: 0x051530, metalness: 0.6, roughness: 0.1, side: THREE.DoubleSide });

        const truss = new THREE.Mesh(new THREE.BoxGeometry(2.0, 0.1, 0.1), matDarkMetal);
        truss.userData = { name: "Главная ферма (ITS)" };
        iss.add(truss);

        const core1 = new THREE.Mesh(new THREE.CylinderGeometry(0.08, 0.08, 0.6, 16), matMetal);
        core1.rotation.x = Math.PI/2;
        core1.userData = { name: "Модуль Дестини (Destiny)" };
        iss.add(core1);
        
        const core2 = new THREE.Mesh(new THREE.CylinderGeometry(0.06, 0.06, 0.4, 16), matGold);
        core2.rotation.x = Math.PI/2; core2.position.z = 0.5;
        core2.userData = { name: "Модуль Заря (ФГБ)" };
        iss.add(core2);

        const cupolaMod = new THREE.Mesh(new THREE.CylinderGeometry(0.05, 0.03, 0.1, 8), matMetal);
        cupolaMod.rotation.x = Math.PI/2; cupolaMod.position.set(0, -0.1, 0.2);
        cupolaMod.userData = { name: "Модуль Купол (Cupola)" };
        iss.add(cupolaMod);

        const panels = [];
        function createSolarArray(x, z, name) {
            const group = new THREE.Group();
            group.position.set(x, 0, z);
            const joint = new THREE.Mesh(new THREE.BoxGeometry(0.05, 0.05, 0.2), matDarkMetal);
            const p1 = new THREE.Mesh(new THREE.BoxGeometry(0.3, 1.2, 0.01), matPanel); p1.position.y = 0.65;
            const p2 = new THREE.Mesh(new THREE.BoxGeometry(0.3, 1.2, 0.01), matPanel); p2.position.y = -0.65;
            
            p1.userData = { name: name };
            p2.userData = { name: name };
            joint.userData = { name: "Поворотный механизм (SARJ)" };
            
            group.add(joint, p1, p2);
            return group;
        }

        panels.push(createSolarArray(0.8, 0.1, "Солнечная панель (Крыло 1)"));
        panels.push(createSolarArray(0.5, 0.1, "Солнечная панель (Крыло 2)"));
        panels.push(createSolarArray(-0.8, 0.1, "Солнечная панель (Крыло 3)"));
        panels.push(createSolarArray(-0.5, 0.1, "Солнечная панель (Крыло 4)"));
        panels.forEach(p => iss.add(p));

        // --- ЛУЧИ (RAYCASTING) ДЛЯ КЛИКОВ ---
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();

        window.addEventListener('pointerdown', (e) => {
            if(e.target.tagName !== 'CANVAS' || currentCam !== 'free') return;
            mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
            raycaster.setFromCamera(mouse, cameras.free);
            const intersects = raycaster.intersectObjects(iss.children, true);
            
            if(intersects.length > 0) {
                let obj = intersects[0].object;
                while(obj && !obj.userData.name && obj.parent) { obj = obj.parent; }
                if(obj && obj.userData.name) {
                    showToast(`Выделено: ${obj.userData.name}`);
                }
            }
        });

        // --- КАМЕРЫ ---
        const cameras = {
            free: new THREE.PerspectiveCamera(50, window.innerWidth/window.innerHeight, 0.01, 2000),
            cupola: new THREE.PerspectiveCamera(65, window.innerWidth/window.innerHeight, 0.01, 2000),
            panels: new THREE.PerspectiveCamera(55, window.innerWidth/window.innerHeight, 0.01, 2000)
        };
        
        cameras.cupola.position.set(0, -0.05, 0.2); 
        cameras.cupola.lookAt(0, -10, 0.2);
        iss.add(cameras.cupola);

        cameras.panels.position.set(-1.0, 0.2, -0.2); 
        cameras.panels.lookAt(0, 0, 0); 
        iss.add(cameras.panels);

        cameras.free.position.set(0.5, 0.5, 1.5);
        renderScene.camera = cameras.free;

        const controls = new OrbitControls(cameras.free, renderer.domElement);
        controls.enableDamping = true; controls.minDistance = 0.2; controls.maxDistance = 10;

        // --- СВЕТ ---
        scene.add(new THREE.AmbientLight(0x202530, 0.5));
        const sunLight = new THREE.DirectionalLight(0xffffff, 3.5);
        scene.add(sunLight);
        
        function createFlare() {
            const c = document.createElement("canvas"); c.width = 512; c.height = 512;
            const ctx = c.getContext("2d");
            const grad = ctx.createRadialGradient(256, 256, 0, 256, 256, 256);
            grad.addColorStop(0, "rgba(255, 255, 255, 1)"); grad.addColorStop(0.1, "rgba(255, 240, 200, 0.8)");
            grad.addColorStop(0.5, "rgba(255, 150, 50, 0.2)"); grad.addColorStop(1, "rgba(0, 0, 0, 0)");
            ctx.fillStyle = grad; ctx.fillRect(0, 0, 512, 512); return new THREE.CanvasTexture(c);
        }
        const lensflare = new Lensflare();
        lensflare.addElement(new LensflareElement(createFlare(), 1000, 0, new THREE.Color(0xffffee)));
        sunLight.add(lensflare);

        // --- МАТЕМАТИКА ОРБИТЫ И СОЛНЦА ---
        function getJulianDate(date) { return (date.getTime() / 86400000) + 2440587.5; }
        function getGMST(jd) {
            const T = (jd - 2451545.0) / 36525.0;
            return ((280.46061837 + 360.98564736629 * (jd - 2451545.0) + 0.000387933 * T * T) % 360) * (Math.PI / 180);
        }

        function calculateSunVector(date) {
            const sunEq = Astronomy.Equator('Sun', date, new Astronomy.Observer(0,0,0), false, true);
            const ra = sunEq.ra * 15 * (Math.PI / 180), dec = sunEq.dec * (Math.PI / 180);
            return new THREE.Vector3(Math.cos(dec) * Math.cos(ra), Math.sin(dec), -Math.cos(dec) * Math.sin(ra)).normalize();
        }

        function updatePosition() {
            const latRad = issData.lat * (Math.PI / 180);
            const gmst = getGMST(getJulianDate(new Date()));
            const lonRad = (issData.lon * (Math.PI / 180)) + gmst;
            const R = R_EARTH + (issData.alt / 100);

            const targetPos = new THREE.Vector3(
                R * Math.cos(latRad) * Math.cos(lonRad), R * Math.sin(latRad), -R * Math.cos(latRad) * Math.sin(lonRad)
            );
            iss.position.copy(targetPos);

            const nadir = iss.position.clone().normalize().negate();
            const nextLonRad = ((issData.lon + 0.1) * (Math.PI / 180)) + gmst;
            const nextPos = new THREE.Vector3(R * Math.cos(latRad) * Math.cos(nextLonRad), R * Math.sin(latRad), -R * Math.cos(latRad) * Math.sin(nextLonRad));
            const velocityVec = new THREE.Vector3().subVectors(nextPos, iss.position).normalize();

            const right = new THREE.Vector3().crossVectors(velocityVec, nadir).normalize();
            const forward = new THREE.Vector3().crossVectors(nadir, right).normalize();
            const m = new THREE.Matrix4(); m.makeBasis(right, nadir.negate(), forward);
            iss.quaternion.setFromRotationMatrix(m);
            
            // Синхронизация 2D карты
            if(isMapReady && yandexMap && document.getElementById('nadir-map-container').style.display === 'block') {
                yandexMap.setCenter([issData.lat, issData.lon], yandexMap.getZoom(), { duration: 1000 });
            }
        }

        // --- ГЕОЛОКАЦИЯ (NOMINATIM API) ---
        let lastGeoCheck = 0;
        async function fetchLocationName(lat, lon) {
            const now = Date.now();
            if(now - lastGeoCheck < 10000) return; // Проверка не чаще раза в 10 секунд
            lastGeoCheck = now;
            try {
                const res = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}&zoom=10&accept-language=ru`);
                const data = await res.json();
                const el = document.getElementById('hud-location');
                if (data.error) {
                    el.innerText = "Океан / Открытая вода";
                    el.style.color = "var(--neon)";
                } else {
                    const addr = data.address;
                    const name = addr.city || addr.town || addr.village || addr.state || "";
                    const country = addr.country || "";
                    el.innerText = name ? `${name}, ${country}` : country;
                    el.style.color = "#00ff88";
                }
            } catch (e) {
                document.getElementById('hud-location').innerText = "Океан";
            }
        }

        // --- API ИНТЕРФЕЙСЫ ---
        async function fetchISSData() {
            try {
                const res = await fetch(`https://api.wheretheiss.at/v1/satellites/25544`);
                const data = await res.json();
                issData = { lat: data.latitude, lon: data.longitude, alt: data.altitude, vel: data.velocity, vis: data.visibility };
                
                document.getElementById('hud-lat').innerText = issData.lat.toFixed(4) + '°';
                document.getElementById('hud-lon').innerText = issData.lon.toFixed(4) + '°';
                document.getElementById('hud-alt').innerText = issData.alt.toFixed(1) + ' km';
                document.getElementById('hud-vel').innerText = Math.round(issData.vel) + ' km/h';
                
                document.getElementById('loading').style.display = 'none';
                updatePosition();
                fetchLocationName(issData.lat, issData.lon);
            } catch (e) { console.error("API Error", e); }
        }

        async function fetchCrew() {
            try {
                const res = await fetch('http://api.open-notify.org/astros.json');
                const data = await res.json();
                const list = document.getElementById('crew-list'); list.innerHTML = '';
                data.people.filter(p => p.craft === 'ISS').forEach(p => {
                    list.innerHTML += `<div class="crew-member">${p.name}</div>`;
                });
            } catch (e) { document.getElementById('crew-list').innerText = "Нет связи"; }
        }

        // --- UI УПРАВЛЕНИЕ КАМЕРАМИ ---
        document.querySelectorAll('.cam-btn').forEach(btn => {
            if(btn.id === 'btn-nadir') return;
            btn.addEventListener('click', (e) => {
                document.querySelectorAll('.cam-btn').forEach(b => b.classList.remove('active'));
                e.target.classList.add('active');
                currentCam = e.target.dataset.cam;
                renderScene.camera = cameras[currentCam];
                document.getElementById('cupola-overlay').style.display = (currentCam === 'cupola') ? 'block' : 'none';
                document.getElementById('nadir-map-container').style.display = 'none';
            });
        });

        // Открытие/Закрытие 2D карты
        const btnNadir = document.getElementById('btn-nadir');
        const mapContainer = document.getElementById('nadir-map-container');
        const btnCloseMap = document.getElementById('close-map');

        function openMap() {
            document.querySelectorAll('.cam-btn').forEach(b => b.classList.remove('active'));
            btnNadir.classList.add('active');
            mapContainer.style.display = 'block';
            if(isMapReady) {
                yandexMap.container.fitToViewport();
                yandexMap.setCenter([issData.lat, issData.lon], 5);
            }
        }
        function closeMap() {
            mapContainer.style.display = 'none';
            btnNadir.classList.remove('active');
            document.querySelector('[data-cam="free"]').click(); // Возврат к свободной камере
        }

        btnNadir.addEventListener('click', openMap);
        btnCloseMap.addEventListener('click', closeMap);

        // --- РЕНДЕР ЦИКЛ ---
        function animate() {
            requestAnimationFrame(animate);
            const date = new Date();
            const sunVec = calculateSunVector(date);
            sunLight.position.copy(sunVec).multiplyScalar(1000);
            
            const gmst = getGMST(getJulianDate(date));
            const sunLocalVec = sunVec.clone().applyAxisAngle(new THREE.Vector3(0,1,0), -gmst);
            atmoMat.uniforms.sunDirection.value.copy(sunLocalVec);
            earthMat.uniforms = { sunDirection: { value: sunLocalVec } }; 

            cloudsMesh.rotation.y += 0.0002;

            const sunDirFromIss = sunLight.position.clone().sub(iss.position).normalize();
            panels.forEach(p => { p.rotation.x = THREE.MathUtils.lerp(p.rotation.x, Math.atan2(sunDirFromIss.y, sunDirFromIss.z), 0.01); });

            if(currentCam === 'free') { controls.target.copy(iss.position); controls.update(); }

            composer.render();
        }

        window.addEventListener('resize', () => {
            Object.values(cameras).forEach(cam => { cam.aspect = window.innerWidth / window.innerHeight; cam.updateProjectionMatrix(); });
            renderer.setSize(window.innerWidth, window.innerHeight);
            composer.setSize(window.innerWidth, window.innerHeight);
            if(isMapReady) yandexMap.container.fitToViewport();
        });

        // Запуск
        fetchCrew();
        fetchISSData();
        setInterval(fetchISSData, 3000);
        animate();
    </script>
</body>
</html>
