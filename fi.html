<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Запросы к API ФИАС (Пользовательский ввод)</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            color: #333;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
            background: #fff;
            padding: 25px;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        h1 {
            font-size: 24px;
            margin-top: 0;
            margin-bottom: 20px;
            color: #2c3e50;
            border-bottom: 2px solid #ecf0f1;
            padding-bottom: 10px;
        }
        .input-group {
            margin-bottom: 20px;
            background: #f8f9fa;
            padding: 15px;
            border-radius: 6px;
            border: 1px solid #e9ecef;
        }
        .input-group label {
            display: block;
            font-weight: bold;
            margin-bottom: 8px;
            color: #495057;
            font-size: 14px;
        }
        input[type="text"] {
            width: calc(100% - 22px);
            padding: 10px;
            border: 1px solid #ced4da;
            border-radius: 4px;
            font-size: 14px;
            margin-bottom: 10px;
        }
        input[type="text"]:focus {
            outline: none;
            border-color: #80bdff;
            box-shadow: 0 0 0 0.2rem rgba(0,123,255,.25);
        }
        .btn-row {
            display: flex;
            gap: 10px;
            align-items: center;
        }
        button {
            background-color: #005bff;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
            transition: background 0.3s;
            white-space: nowrap;
        }
        button:hover {
            background-color: #0041b3;
        }
        button:disabled {
            background-color: #ccc;
            cursor: not-allowed;
        }
        .btn-clear {
            background-color: #6c757d;
        }
        .btn-clear:hover {
            background-color: #5a6268;
        }
        pre {
            background-color: #1e1e1e;
            color: #d4d4d4;
            padding: 15px;
            border-radius: 6px;
            overflow-x: auto;
            min-height: 250px;
            font-size: 14px;
            white-space: pre-wrap;
            word-wrap: break-word;
            margin-top: 20px;
        }
        .error-note {
            color: #d9534f;
            font-size: 14px;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>API ФИАС: Поиск адреса</h1>
    
    <div class="error-note" id="warning-msg"></div>

    <!-- Токен -->
    <div class="input-group">
        <label for="tokenInput">Master-Token (авторизация):</label>
        <input type="text" id="tokenInput" value="bfa2407b-1dc4-4714-9346-b678408eb099" placeholder="Введите актуальный master-token...">
    </div>

    <!-- Поиск по ID -->
    <div class="input-group">
        <label for="idInput">Поиск по Object ID:</label>
        <div class="btn-row">
            <input type="text" id="idInput" placeholder="" style="margin-bottom: 0;">
            <button id="btnId" onclick="fetchById()">Запросить по ID</button>
        </div>
    </div>

    <!-- Поиск по GUID -->
    <div class="input-group">
        <label for="guidInput">Поиск по Object GUID:</label>
        <div class="btn-row">
            <input type="text" id="guidInput" placeholder="" style="margin-bottom: 0;">
            <button id="btnGuid" onclick="fetchByGuid()">Запросить по GUID</button>
        </div>
    </div>

    <div>
        <button class="btn-clear" onclick="clearResult()">Очистить результат</button>
    </div>

    <pre id="result">Жду ваших указаний... Введите идентификатор и нажмите кнопку запроса.</pre>
</div>

<script>
    // Базовая функция выполнения запроса
    async function executeFetch(url, btnId) {
        const resultBlock = document.getElementById('result');
        const warningBlock = document.getElementById('warning-msg');
        const token = document.getElementById('tokenInput').value.trim();

        if (!token) {
            alert("Пожалуйста, введите master-token!");
            return;
        }

        resultBlock.textContent = "Выполняется запрос к серверу ФИАС. Пожалуйста, подождите...";
        warningBlock.textContent = "";

        // Блокируем кнопку, чтобы избежать двойных кликов
        const btn = document.getElementById(btnId);
        btn.disabled = true;

        const headers = {
            "accept": "application/json, text/javascript, */*; q=0.01",
            "accept-language": "ru,en;q=0.9",
            "cache-control": "no-cache",
            "master-token": token,
            "pragma": "no-cache"
        };

        try {
            const response = await fetch(url, {
                method: "GET",
                headers: headers,
                mode: "cors"
            });

            if (!response.ok) {
                // Если сервер ответил ошибкой (например, 401 или 403 из-за старого токена)
                if (response.status === 401 || response.status === 403) {
                    throw new Error(`Ошибка ${response.status}: Доступ запрещен. Возможно, ваш Master-Token устарел.`);
                }
                throw new Error(`Ошибка HTTP: статус ${response.status}`);
            }

            const data = await response.json();
            
            // Выводим результат
            resultBlock.textContent = JSON.stringify(data, null, 4);

        } catch (error) {
            console.error(error);
            resultBlock.textContent = `Произошла ошибка:\n${error.message}`;
            
            // Проверка на CORS
            if (error.message === "Failed to fetch" || error.name === "TypeError") {
                warningBlock.innerHTML = `<b>Внимание:</b> Запрос заблокирован браузером из-за политики <b>CORS</b>. Сервер ФИАС запрещает прямые запросы из локальных HTML файлов.<br><br><b>Решение:</b> Установите в браузер расширение "Allow CORS" и включите его на время работы с этой страницей.`;
            }
        } finally {
            btn.disabled = false; // Разблокируем кнопку
        }
    }

    // Обработчик для кнопки "Запросить по ID"
    function fetchById() {
        const objectId = document.getElementById('idInput').value.trim();
        if (!objectId) {
            alert("Введите Object ID!");
            return;
        }
        const url = `https://fias-public-service.nalog.ru/api/spas/v2.0/GetAddressItemById?object_id=${objectId}&address_type=2`;
        executeFetch(url, 'btnId');
    }

    // Обработчик для кнопки "Запросить по GUID"
    function fetchByGuid() {
        const objectGuid = document.getElementById('guidInput').value.trim();
        if (!objectGuid) {
            alert("Введите Object GUID!");
            return;
        }
        const url = `https://fias-public-service.nalog.ru/api/spas/v2.0/GetAddressItemByGuid?object_guid=${objectGuid}&address_type=2`;
        executeFetch(url, 'btnGuid');
    }

    // Очистка экрана
    function clearResult() {
        document.getElementById('result').textContent = "Жду ваших указаний... Введите идентификатор и нажмите кнопку запроса.";
        document.getElementById('warning-msg').textContent = "";
        document.getElementById('idInput').value = "";
        document.getElementById('guidInput').value = "";
    }
</script>

</body>
</html>
