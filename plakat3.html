<style>
:root {
  --primary: #4f46e5;
  --primary-hover: #4338ca;
  --ink: #0f172a;
  --muted: #64748b;
  --bg: #f8fafc;
  --panel: #ffffff;
  --line: #e2e8f0;
  --radius: 12px;
  --shadow-sm: 0 1px 3px rgba(0,0,0,0.05);
  --shadow-md: 0 10px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.05);
}

* { box-sizing: border-box; }
body {
  font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
  background: var(--bg);
  margin: 0; padding: 0;
  color: var(--ink);
  overflow-x: hidden;
}

.app-layout {
  display: flex;
  flex-direction: column;
  min-height: 100vh;
}

/* Control Panel */
.control-panel {
  background: var(--panel);
  box-shadow: var(--shadow-md);
  padding: 20px;
  z-index: 100;
  border-right: 1px solid var(--line);
}

.panel-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  margin-bottom: 16px;
  padding-bottom: 12px;
  border-bottom: 1px solid var(--line);
}
.panel-title {
  margin: 0; font-size: 20px; font-weight: 800; color: var(--ink);
  display: flex; align-items: center; gap: 10px;
}
.panel-title .dot {
  width: 12px; height: 12px; border-radius: 50%;
  background: linear-gradient(135deg, #6366f1, #a855f7);
}
.panel-sub { font-size: 12px; color: var(--muted); font-weight: 500; }

/* Navigation Tabs */
.tabs-nav {
  display: flex;
  gap: 6px;
  background: #f1f5f9;
  padding: 4px;
  border-radius: 10px;
  margin-bottom: 18px;
}
.tab-btn {
  flex: 1;
  padding: 8px 10px;
  border: none;
  background: transparent;
  color: var(--muted);
  font-size: 12px;
  font-weight: 700;
  border-radius: 7px;
  cursor: pointer;
  transition: all 0.2s ease;
  white-space: nowrap;
  text-align: center;
}
.tab-btn.active {
  background: #fff;
  color: var(--primary);
  box-shadow: var(--shadow-sm);
}

.tab-content { display: none; }
.tab-content.active { display: block; }

.section-label {
  font-size: 11px; font-weight: 800; letter-spacing: .08em; text-transform: uppercase;
  color: var(--muted); margin: 16px 0 10px;
  display: flex; align-items: center; gap: 8px;
}
.section-label::after { content:''; flex:1; height:1px; background:var(--line); }

.controls-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));
  gap: 12px; align-items: end;
}
.control-group { display: flex; flex-direction: column; gap: 5px; }
.control-group label { font-size: 12px; font-weight: 600; color: var(--muted); }
.control-group .val { color: var(--primary); font-weight: 700; }

input[type="text"], select {
  padding: 9px 12px; border: 1px solid var(--line); border-radius: 8px;
  font-size: 13px; outline: none; background: #fff;
  transition: all .2s; width: 100%;
}
input[type="text"]:focus, select:focus {
  border-color: var(--primary); box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.15);
}
optgroup { font-weight: 700; color: var(--primary); }
option { font-weight: 400; color: var(--ink); }

input[type="range"] { width: 100%; accent-color: var(--primary); }
input[type="range"]:disabled { opacity: 0.5; cursor: not-allowed; }
input[type="color"] {
  width: 100%; height: 38px; border: 1px solid var(--line); border-radius: 8px;
  background: #fff; cursor: pointer; padding: 3px;
}
input[type="color"]:disabled { opacity: 0.5; cursor: not-allowed; }
select:disabled { opacity: 0.5; cursor: not-allowed; background: #f1f5f9; }

.checkbox-row { display: flex; align-items: center; gap: 8px; min-height: 38px; }
.checkbox-row input { width: 16px; height: 16px; accent-color: var(--primary); cursor: pointer; }
.checkbox-row label { font-size: 13px; color: var(--ink); font-weight: 600; cursor: pointer; }

/* Page Block Editor */
.page-block {
  border: 1px solid var(--line); border-radius: 10px; padding: 12px;
  margin-bottom: 12px; background: #fff; box-shadow: var(--shadow-sm);
}
.page-row { display: flex; gap: 8px; align-items: center; }
.page-row .idx {
  min-width: 26px; height: 26px; border-radius: 6px; background: var(--primary);
  color: #fff; font-weight: 700; display: flex; align-items: center; justify-content: center;
  font-size: 12px; flex: none;
}
.icon-btn {
  flex: none; width: 32px; height: 32px; border-radius: 6px; border: 1px solid var(--line);
  cursor: pointer; font-size: 14px; display: flex; align-items: center; justify-content: center;
  background: #fff; color: var(--ink); transition: all .2s;
}
.icon-btn:hover { background: #f1f5f9; border-color: #cbd5e1; }
.icon-btn.danger { background: #fef2f2; color: #ef4444; border-color: #fca5a5; }
.icon-btn.danger:hover { background: #fee2e2; }

.add-btn {
  width: 100%; background: #e0e7ff; color: var(--primary); border: 1px dashed #a5b4fc;
  padding: 10px; border-radius: 8px; font-weight: 700; cursor: pointer; font-size: 13px;
  transition: all .2s; margin-top: 6px;
}
.add-btn:hover { background: #c7d2fe; }

/* Action Buttons */
.btn-container { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 10px; }
button.action {
  flex: 1; min-width: 140px; padding: 11px; color: #fff; border: none; border-radius: 8px;
  font-weight: 700; cursor: pointer; transition: all .2s; font-size: 13px;
  display: flex; align-items: center; justify-content: center; gap: 6px;
}
button.action:active { transform: scale(.98); }
.btn-jpg { background: #0284c7; }.btn-jpg:hover { background: #0369a1; }
.btn-all { background: #16a34a; }.btn-all:hover { background: #15803d; }
.btn-print { background: #9333ea; }.btn-print:hover { background: #7e22ce; }
.btn-save-json { background: #d97706; }.btn-save-json:hover { background: #b45309; }
.btn-load-json { background: #ea580c; }.btn-load-json:hover { background: #c2410c; }

/* Zoom Bar */
.zoom-bar {
  display: flex; align-items: center; justify-content: center; gap: 10px;
  background: #fff; padding: 6px 16px; border-radius: 30px;
  box-shadow: var(--shadow-sm); border: 1px solid var(--line);
  margin-bottom: 20px; font-size: 12px; font-weight: 600;
}
.zoom-btn {
  border: none; background: #f1f5f9; padding: 4px 10px; border-radius: 12px;
  font-size: 11px; font-weight: 700; cursor: pointer; color: var(--muted);
}
.zoom-btn.active { background: var(--primary); color: #fff; }

/* Preview Container */
.preview-container {
  display: flex; flex-direction: column; align-items: center; gap: 40px;
  padding: 20px 20px 60px; width: 100%; overflow-x: auto;
}
.page-caption { font-size: 13px; color: var(--muted); margin-bottom: -25px; font-weight: 600; flex-shrink: 0; }

.page-scale-wrapper {
  width: 707px; height: 500px; position: relative; flex-shrink: 0;
  transition: transform 0.2s ease, width 0.2s ease, height 0.2s ease;
}
.page {
  width: 1414px; height: 1000px; transform: scale(.5); transform-origin: top left;
  position: absolute; top: 0; left: 0;
  box-shadow: 0 20px 50px rgba(0,0,0,0.12); border-radius: 4px; box-sizing: border-box;
  display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center;
  padding: 80px; overflow: hidden; transition: background .3s;
}

/* Aspect Ratio Modifiers */
.page-scale-wrapper.aspect-a4-portrait { width: 500px; height: 707px; }
.page-scale-wrapper.aspect-a4-portrait .page { width: 1000px; height: 1414px; transform: scale(.5); }

.page-scale-wrapper.aspect-square { width: 500px; height: 500px; }
.page-scale-wrapper.aspect-square .page { width: 1000px; height: 1000px; transform: scale(.5); }

.page-scale-wrapper.aspect-story { width: 400px; height: 711px; }
.page-scale-wrapper.aspect-story .page { width: 1080px; height: 1920px; transform: scale(.3703); }

/* Decorative Border & Text Wrapper */
.deco-border {
  position: absolute; top: 40px; left: 40px; right: 40px; bottom: 40px;
  pointer-events: none; transition: all .3s; border-radius: 2px;
}
.text-wrapper {
  z-index: 10; max-width: 100%; max-height: 100%;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  padding: 20px; transition: all .2s;
}
.text-content {
  word-wrap: break-word; width: 100%; line-height: 1.15; transition: all .2s;
}
.subtitle-content {
  word-wrap: break-word; width: 100%; margin-top: 20px; font-weight: 500;
  opacity: 0.85; transition: all .2s;
}

/* Themes Definition */
.theme-blueprint{background:#f2f7fa;color:#1a5276;
  background-image:linear-gradient(rgba(52,152,219,.06) 2px,transparent 2px),
    linear-gradient(90deg,rgba(52,152,219,.06) 2px,transparent 2px);
  background-size:44px 44px;}
.theme-blueprint .deco-border{border:3px solid #2980b9;box-shadow:0 0 0 10px rgba(52,152,219,.05);}
.theme-blueprint .text-content{font-family:'Montserrat',sans-serif;font-weight:900;letter-spacing:2px;}

/* WordArt Effects */
.wa-rainbow{background:linear-gradient(90deg,#e74c3c,#e67e22,#f1c40f,#2ecc71,#3498db,#9b59b6);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;color:transparent;}
.wa-gold{background:linear-gradient(180deg,#fceabb 0%,#d4af37 45%,#b8860b 55%,#f9df85 100%);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;color:transparent;filter:drop-shadow(2px 3px 2px rgba(0,0,0,.25));}
.wa-chrome{background:linear-gradient(180deg,#eef2f5 0%,#9fb2c2 48%,#5f7488 52%,#dfe7ee 100%);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;color:transparent;filter:drop-shadow(1px 2px 2px rgba(0,0,0,.3));}
.wa-fire{background:linear-gradient(180deg,#fff2b2 0%,#ffb02e 35%,#ff5722 70%,#c0392b 100%);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;color:transparent;}
.wa-ocean{background:linear-gradient(180deg,#a1e9ff 0%,#3498db 50%,#1a5276 100%);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;color:transparent;}
.wa-sunset{background:linear-gradient(180deg,#ffd166 0%,#ff6b6b 55%,#a15ac9 100%);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;color:transparent;}

/* ИСПРАВЛЕННЫЙ КОНТУР: Виден абсолютно на любом фоне благодаря контрастному свечению! */
.wa-outline {
  -webkit-text-fill-color: transparent;
  -webkit-text-stroke: 4px currentColor;
  filter: drop-shadow(-2px -2px 0 #ffffff) drop-shadow(2px -2px 0 #ffffff) 
          drop-shadow(-2px 2px 0 #ffffff) drop-shadow(2px 2px 0 #ffffff) 
          drop-shadow(0 0 10px #000000) drop-shadow(0 4px 8px rgba(0,0,0,0.7));
}

.wa-3d{text-shadow:1px 1px 0 rgba(0,0,0,.18),2px 2px 0 rgba(0,0,0,.16),3px 3px 0 rgba(0,0,0,.14),4px 4px 0 rgba(0,0,0,.12),5px 5px 0 rgba(0,0,0,.10),6px 6px 8px rgba(0,0,0,.22);}
.wa-neon{text-shadow:0 0 6px currentColor,0 0 14px currentColor,0 0 26px currentColor;}
.wa-retro{text-shadow:5px 5px 0 rgba(0,0,0,.16),10px 10px 0 rgba(0,0,0,.08);}
.wa-sticker{text-shadow:-3px -3px 0 #fff,3px -3px 0 #fff,-3px 3px 0 #fff,3px 3px 0 #fff,0 -4px 0 #fff,0 4px 0 #fff,-4px 0 0 #fff,4px 0 0 #fff,6px 8px 10px rgba(0,0,0,.30);}
.wa-glitch { position: relative; text-shadow: 3px 0 #ff0055, -3px 0 #00f0ff; }
.wa-hologram { background: linear-gradient(135deg, #00f0ff, #ff007f, #e0a0ff, #00f0ff); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; filter: drop-shadow(0 0 8px rgba(0,240,255,0.6)); }
.wa-glow { text-shadow: 0 0 20px currentColor, 0 0 40px currentColor; }

/* НОВЫЕ WORDART ЭФФЕКТЫ */
.wa-diamond {
  background: linear-gradient(135deg, #ffffff 0%, #e0f7fa 25%, #80deea 50%, #b2ebf2 75%, #ffffff 100%);
  -webkit-background-clip: text; background-clip: text;
  -webkit-text-fill-color: transparent; color: transparent;
  filter: drop-shadow(0 0 6px rgba(0, 229, 255, 0.8)) drop-shadow(3px 5px 8px rgba(0, 0, 0, 0.6));
  -webkit-text-stroke: 1px rgba(255,255,255,0.9);
}

.wa-candy {
  background: linear-gradient(180deg, #ff9a9e 0%, #fecfef 50%, #fe5196 100%);
  -webkit-background-clip: text; background-clip: text;
  -webkit-text-fill-color: transparent; color: transparent;
  text-shadow: 2px 2px 0px #fff, 4px 4px 0px #d81b60, 6px 6px 10px rgba(0,0,0,0.25);
}

.wa-lava {
  background: linear-gradient(180deg, #ffe500 0%, #ff5500 50%, #990000 100%);
  -webkit-background-clip: text; background-clip: text;
  -webkit-text-fill-color: transparent; color: transparent;
  filter: drop-shadow(0 0 8px #ff3300) drop-shadow(0 0 16px #ff6600) drop-shadow(2px 4px 6px rgba(0,0,0,0.8));
}

.wa-emerald {
  background: linear-gradient(180deg, #a8ff78 0%, #78ffd6 50%, #11998e 100%);
  -webkit-background-clip: text; background-clip: text;
  -webkit-text-fill-color: transparent; color: transparent;
  filter: drop-shadow(2px 4px 6px rgba(0,0,0,0.5));
}

.wa-gothic {
  background: linear-gradient(180deg, #8a8a8a 0%, #3a3a3a 50%, #111111 100%);
  -webkit-background-clip: text; background-clip: text;
  -webkit-text-fill-color: transparent; color: transparent;
  -webkit-text-stroke: 1px #ffffff;
  filter: drop-shadow(0 0 6px rgba(255,255,255,0.4)) drop-shadow(4px 6px 10px rgba(0,0,0,0.9));
}

.wa-popart {
  color: #ffeb3b;
  -webkit-text-fill-color: #ffeb3b;
  -webkit-text-stroke: 3px #000000;
  text-shadow: 5px 5px 0 #00d2ff, 10px 10px 0 #000000;
}

.wa-glass {
  color: rgba(255, 255, 255, 0.4);
  -webkit-text-fill-color: rgba(255, 255, 255, 0.3);
  -webkit-text-stroke: 2px rgba(255, 255, 255, 0.95);
  filter: drop-shadow(0 8px 16px rgba(0, 0, 0, 0.4));
}

.wa-gold-3d {
  background: linear-gradient(180deg, #fff2a3 0%, #d4af37 40%, #aa7c11 70%, #593e00 100%);
  -webkit-background-clip: text; background-clip: text;
  -webkit-text-fill-color: transparent; color: transparent;
  filter: drop-shadow(1px 1px 0 #ffe082) drop-shadow(2px 2px 0 #b8860b) drop-shadow(3px 3px 0 #785400) drop-shadow(4px 4px 0 #3d2b00) drop-shadow(6px 8px 12px rgba(0,0,0,0.6));
}

/* Desktop Responsive Layout */
@media (min-width: 1024px) {
  .app-layout { flex-direction: row; align-items: flex-start; }
  .control-panel {
    width: 440px; flex-shrink: 0; position: sticky; top: 0;
    height: 100vh; overflow-y: auto; border-radius: 0;
  }
  .preview-container { flex-grow: 1; min-width: 0; height: 100vh; overflow-y: auto; }
}

@media (max-width: 1023px) {
  .control-panel { width: 100%; border-radius: 0 0 16px 16px; }
  .preview-container { padding: 20px 10px 40px; }
}

.control-panel::-webkit-scrollbar { width: 5px; }
.control-panel::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.15); border-radius: 10px; }

@media print {
  .app-layout { display: block !important; padding: 0 !important; margin: 0 !important; }
  body * { visibility: hidden; }
  .no-print { display: none !important; }
  .preview-container, .preview-container * { visibility: visible; }
  .page-caption { display: none !important; }
  .preview-container { padding: 0; margin: 0; gap: 0; overflow: visible !important; }
  .page-scale-wrapper { width: 100% !important; height: 100vh !important; page-break-after: always; margin: 0 !important; transform: none !important; }
  .page { width: 100% !important; height: 100% !important; transform: none !important; box-shadow: none !important; position: relative !important; }
  @page { size: auto; margin: 0; }
}
</style>
</head>

<script>
const defaultPages = [
  { text: "Гармония в простоте", subtitle: "Секрет идеального дизайна", bgImg: null, bgBlur: 0, bgBrightness: 100, fgImg: null, fgWidth: 50, fgHeight: 50, fgFit: "contain", fgX: 50, fgY: 50 },
  { text: "Мечты создают реальность", subtitle: "Вдохновение каждый день", bgImg: null, bgBlur: 0, bgBrightness: 100, fgImg: null, fgWidth: 50, fgHeight: 50, fgFit: "contain", fgX: 50, fgY: 50 }
];
let pages = [];
let currentZoom = 0.5;

const $ = id => document.getElementById(id);

function switchTab(tabId) {
  document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));
  
  event.target.classList.add('active');
  $(tabId).classList.add('active');
}

function setZoom(zoom) {
  currentZoom = zoom;
  document.querySelectorAll('.zoom-btn').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  
  document.querySelectorAll('.page-scale-wrapper').forEach(wrap => {
    const page = wrap.querySelector('.page');
    if (page) {
      page.style.transform = `scale(${zoom})`;
      const baseW = wrap.classList.contains('aspect-a4-portrait') ? 1000 : wrap.classList.contains('aspect-square') ? 1000 : wrap.classList.contains('aspect-story') ? 1080 : 1414;
      const baseH = wrap.classList.contains('aspect-a4-portrait') ? 1414 : wrap.classList.contains('aspect-square') ? 1000 : wrap.classList.contains('aspect-story') ? 1920 : 1000;
      wrap.style.width = (baseW * zoom) + 'px';
      wrap.style.height = (baseH * zoom) + 'px';
    }
  });
}

function migratePages(savedPages) {
  if (!Array.isArray(savedPages)) return JSON.parse(JSON.stringify(defaultPages));
  return savedPages.map(p => {
    if (typeof p === 'string') {
      return { text: p, subtitle: "", bgImg: null, bgBlur: 0, bgBrightness: 100, fgImg: null, fgWidth: 50, fgHeight: 50, fgFit: "contain", fgX: 50, fgY: 50 };
    }
    return {
      text: p.text || "",
      subtitle: p.subtitle || "",
      bgImg: p.bgImg || null,
      bgBlur: p.bgBlur || 0,
      bgBrightness: p.bgBrightness !== undefined ? p.bgBrightness : 100,
      fgImg: p.fgImg || null,
      fgWidth: p.fgWidth !== undefined ? p.fgWidth : 50,
      fgHeight: p.fgHeight !== undefined ? p.fgHeight : 50,
      fgFit: p.fgFit || "contain",
      fgX: p.fgX !== undefined ? p.fgX : 50,
      fgY: p.fgY !== undefined ? p.fgY : 50
    };
  });
}

function renderPages(){
  const preview=$('preview');
  const aspectClass = $('aspectRatioSelect').value;
  preview.innerHTML='';
  
  pages.forEach((pageData,i)=>{
    const cap=document.createElement('div');
    cap.className='page-caption no-print';
    cap.textContent='Лист '+(i+1);
    
    const wrap=document.createElement('div');
    wrap.className='page-scale-wrapper ' + aspectClass;
    
    const baseW = aspectClass === 'aspect-a4-portrait' ? 1000 : aspectClass === 'aspect-square' ? 1000 : aspectClass === 'aspect-story' ? 1080 : 1414;
    const baseH = aspectClass === 'aspect-a4-portrait' ? 1414 : aspectClass === 'aspect-square' ? 1000 : aspectClass === 'aspect-story' ? 1920 : 1000;
    
    wrap.style.width = (baseW * currentZoom) + 'px';
    wrap.style.height = (baseH * currentZoom) + 'px';

    wrap.innerHTML=
      '<div id="page'+i+'" class="page">' +
        '<div id="page-bg-'+i+'" class="page-bg" style="position:absolute; inset:0; z-index:1; background-size:cover; background-position:center; pointer-events:none;"></div>' +
        '<div class="deco-border" style="z-index:2;"></div>' +
        '<img id="fg-img-'+i+'" style="display:none; position:absolute; z-index:3; pointer-events:none;">' +
        '<div id="text-wrap-'+i+'" class="text-wrapper">' +
          '<div id="text'+i+'" class="text-content"></div>' +
          '<div id="subtext'+i+'" class="subtitle-content"></div>' +
        '</div>' +
      '</div>';
    
    preview.appendChild(cap);
    preview.appendChild(wrap);
    
    wrap.querySelector('#text'+i).textContent = pageData.text;
    wrap.querySelector('#subtext'+i).textContent = pageData.subtitle;
  });

  const ed=$('pagesEditor');
  ed.innerHTML='';
  pages.forEach((pageData,i)=>{
    const block=document.createElement('div');
    block.className='page-block';

    const row=document.createElement('div');
    row.className='page-row';
    row.innerHTML='<div class="idx">'+(i+1)+'</div>';

    const inputsCol = document.createElement('div');
    inputsCol.style.cssText = 'flex:1; display:flex; flex-direction:column; gap:6px; min-width:0;';

    const inp=document.createElement('input');
    inp.type='text'; inp.value=pageData.text; inp.placeholder='Основной текст (Заголовок)';
    inp.addEventListener('input',()=>{
      pages[i].text=inp.value; 
      const t=$('text'+i); if(t) t.textContent=inp.value;
      saveToLocalStorage();
    });

    const subInp=document.createElement('input');
    subInp.type='text'; subInp.value=pageData.subtitle; subInp.placeholder='Подзаголовок (опционально)';
    subInp.style.fontSize = '12px';
    subInp.addEventListener('input',()=>{
      pages[i].subtitle=subInp.value; 
      const st=$('subtext'+i); if(st) st.textContent=subInp.value;
      saveToLocalStorage();
    });

    inputsCol.appendChild(inp);
    inputsCol.appendChild(subInp);
    row.appendChild(inputsCol);

    const btnGroup = document.createElement('div');
    btnGroup.style.cssText = 'display:flex; gap:4px; flex-direction:column;';

    const upBtn = document.createElement('button');
    upBtn.className = 'icon-btn'; upBtn.innerHTML = '⬆️'; upBtn.title = 'Поднять вверх';
    upBtn.onclick = () => { if(i > 0) { movePage(i, i-1); } };

    const downBtn = document.createElement('button');
    downBtn.className = 'icon-btn'; downBtn.innerHTML = '⬇️'; downBtn.title = 'Опустить вниз';
    downBtn.onclick = () => { if(i < pages.length-1) { movePage(i, i+1); } };

    const cloneBtn = document.createElement('button');
    cloneBtn.className = 'icon-btn'; cloneBtn.innerHTML = '📋'; cloneBtn.title = 'Дублировать лист';
    cloneBtn.onclick = () => { duplicatePage(i); };

    const del=document.createElement('button');
    del.className='icon-btn danger'; del.title='Удалить лист'; del.textContent='✕';
    del.onclick=()=>{ 
      if(pages.length>1){ pages.splice(i,1); renderPages(); applyAll(); } 
    };

    btnGroup.appendChild(upBtn);
    btnGroup.appendChild(downBtn);
    btnGroup.appendChild(cloneBtn);
    btnGroup.appendChild(del);
    row.appendChild(btnGroup);
    block.appendChild(row);

    const mediaBtn=document.createElement('button');
    mediaBtn.className='add-btn'; mediaBtn.style.marginTop = '10px';
    mediaBtn.innerHTML='🖼️ Изображения листа';
    
    const mediaSettings=document.createElement('div');
    mediaSettings.style.cssText = 'display:none; margin-top:10px; padding:10px; border:1px solid var(--line); border-radius:8px; background:#f8fafc; flex-direction:column; gap:8px; font-size:12px;';

    mediaBtn.onclick=()=>{ mediaSettings.style.display = mediaSettings.style.display === 'none' ? 'flex' : 'none'; };
    
    const hasBg = !!pageData.bgImg;
    const hasFg = !!pageData.fgImg;

    mediaSettings.innerHTML=
      '<div style="display:flex; align-items:center; justify-content:space-between;">' +
        '<span style="font-weight:700; color:var(--muted);">Фон страницы</span>' +
        '<div style="display:flex; gap:4px;">' +
          '<input type="file" accept="image/*" id="bg-file-'+i+'" style="display:none;">' +
          '<button class="icon-btn" style="width:auto; padding:0 8px; font-size:11px;" onclick="$(\'bg-file-'+i+'\').click()">Выбрать</button>' +
          (hasBg ? '<button class="icon-btn danger" onclick="clearBgImg('+i+')">✕</button>' : '') +
        '</div>' +
      '</div>' +
      (hasBg ? 
        '<div style="display:flex; flex-direction:column; gap:4px;">' +
          '<label>Размытие фона: '+pageData.bgBlur+'px</label>' +
          '<input type="range" class="slider-bg-blur-'+i+'" min="0" max="20" value="'+pageData.bgBlur+'">' +
          '<label>Яркость фона: '+pageData.bgBrightness+'%</label>' +
          '<input type="range" class="slider-bg-bright-'+i+'" min="20" max="150" value="'+pageData.bgBrightness+'">' +
        '</div>' : '') +
      '<div style="display:flex; align-items:center; justify-content:space-between; border-top:1px dashed var(--line); padding-top:8px;">' +
        '<span style="font-weight:700; color:var(--muted);">Картинка поверх</span>' +
        '<div style="display:flex; gap:4px;">' +
          '<input type="file" accept="image/*" id="fg-file-'+i+'" style="display:none;">' +
          '<button class="icon-btn" style="width:auto; padding:0 8px; font-size:11px;" onclick="$(\'fg-file-'+i+'\').click()">Выбрать</button>' +
          (hasFg ? '<button class="icon-btn danger" onclick="clearFgImg('+i+')">✕</button>' : '') +
        '</div>' +
      '</div>';

    block.appendChild(mediaBtn);
    block.appendChild(mediaSettings);
    ed.appendChild(block);

    const bgFile = block.querySelector('#bg-file-'+i);
    bgFile.addEventListener('change', (e) => {
      const file = e.target.files[0];
      if (file) {
        pages[i].bgImg = URL.createObjectURL(file);
        renderPages(); applyAll();
      }
    });

    const fgFile = block.querySelector('#fg-file-'+i);
    fgFile.addEventListener('change', (e) => {
      const file = e.target.files[0];
      if (file) {
        pages[i].fgImg = URL.createObjectURL(file);
        renderPages(); applyAll();
      }
    });

    if (hasBg) {
      const sBlur = block.querySelector('.slider-bg-blur-'+i);
      sBlur.addEventListener('input', () => { pages[i].bgBlur = parseInt(sBlur.value); applyAll(); });
      const sBright = block.querySelector('.slider-bg-bright-'+i);
      sBright.addEventListener('input', () => { pages[i].bgBrightness = parseInt(sBright.value); applyAll(); });
    }
  });
}

function movePage(from, to) {
  const item = pages.splice(from, 1)[0];
  pages.splice(to, 0, item);
  renderPages(); applyAll();
}

function duplicatePage(i) {
  const clone = JSON.parse(JSON.stringify(pages[i]));
  pages.splice(i + 1, 0, clone);
  renderPages(); applyAll();
}

function clearBgImg(i) { pages[i].bgImg = null; renderPages(); applyAll(); }
function clearFgImg(i) { pages[i].fgImg = null; renderPages(); applyAll(); }
function addPage(){ pages.push({ text: 'Новый заголовок', subtitle: 'Подзаголовок', bgImg: null, bgBlur:0, bgBrightness:100, fgImg: null, fgWidth: 50, fgHeight: 50, fgFit: "contain", fgX: 50, fgY: 50 }); renderPages(); applyAll(); }

const gradientEffects=['wa-rainbow','wa-gold','wa-chrome','wa-fire','wa-ocean','wa-sunset','wa-hologram','wa-diamond','wa-candy','wa-lava','wa-emerald','wa-gothic','wa-gold-3d'];

function applyAll(){
  const theme=$('themeSelect').value;
  const font=$('fontSelect').value;
  const wa=$('waSelect').value;
  const size=$('fontSizeSlider').value+'px';
  const subSize=$('subFontSizeSlider').value+'px';
  const ls=$('letterSpacing').value+'px';
  const lh=($('lineHeight').value/100).toFixed(2);
  const rot=$('rotate').value;
  const sh=parseInt($('shadow').value,10);
  const tr=$('transformSelect').value;
  const align=$('textAlignSelect').value;

  pages.forEach((pageData,i)=>{
    const page=$('page'+i); const text=$('text'+i); const subtext=$('subtext'+i); const wrap=$('text-wrap-'+i);
    if(!page||!text) return;

    page.className='page '+theme;
    page.style.background = $('useThemeBg').checked ? '' : $('bgColor').value;
    if(!$('useThemeBg').checked) page.style.backgroundImage='none';

    // Decorative border
    const decoBorder = page.querySelector('.deco-border');
    if (decoBorder) {
      if ($('useThemeBorder').checked) {
        decoBorder.style.cssText = '';
      } else {
        decoBorder.style.border = `${$('borderWidth').value}px ${$('borderStyle').value} ${$('borderColor').value}`;
        decoBorder.style.top = $('borderInset').value + 'px';
        decoBorder.style.left = $('borderInset').value + 'px';
        decoBorder.style.right = $('borderInset').value + 'px';
        decoBorder.style.bottom = $('borderInset').value + 'px';
        decoBorder.style.borderRadius = $('borderRadius').value + 'px';
        decoBorder.style.boxShadow = 'none';
      }
    }

    // Page Background Image
    const pBg = $('page-bg-'+i);
    if (pBg) {
      if (pageData.bgImg) {
        pBg.style.backgroundImage = 'url('+pageData.bgImg+')';
        pBg.style.filter = `blur(${pageData.bgBlur}px) brightness(${pageData.bgBrightness}%)`;
        pBg.style.display = 'block';
      } else {
        pBg.style.backgroundImage = 'none';
        pBg.style.display = 'none';
      }
    }

    // Text Box Highlight
    if ($('enableTextBg').checked) {
      const hex = $('textBgColor').value;
      const opacity = $('textBgOpacity').value / 100;
      wrap.style.background = hexToRgba(hex, opacity);
      wrap.style.borderRadius = '16px';
    } else {
      wrap.style.background = 'transparent';
    }

    // Text Alignment & Styles
    wrap.style.textAlign = align;
    text.className='text-content'+(wa?(' '+wa):'');
    text.style.fontFamily = font || '';
    text.style.fontSize = size;
    text.style.letterSpacing = ls;
    text.style.lineHeight = lh;
    text.style.textTransform = tr;
    text.style.transform = 'rotate('+rot+'deg)';

    if (subtext) {
      subtext.style.fontFamily = font || '';
      subtext.style.fontSize = subSize;
      subtext.style.letterSpacing = ls;
      subtext.style.color = $('useThemeColor').checked ? '' : $('textColor').value;
    }

    // Спецобработка цвета для WordArt
    if (wa === 'wa-outline') {
      text.style.color = $('useThemeColor').checked ? '#111111' : $('textColor').value;
    } else if (gradientEffects.includes(wa)) {
      text.style.color = '';
    } else {
      text.style.color = $('useThemeColor').checked ? '' : $('textColor').value;
    }

    if(sh>0 && !wa){
      text.style.textShadow='0 '+Math.round(sh/3)+'px '+sh+'px rgba(0,0,0,'+Math.min(.06+sh/60,.55).toFixed(2)+')';
    }else if(!wa){
      text.style.textShadow='none';
    }
  });

  saveToLocalStorage();
}

function hexToRgba(hex, opacity) {
  let c = hex.replace('#', '');
  if (c.length === 3) c = c.split('').map(x => x + x).join('');
  const num = parseInt(c, 16);
  return `rgba(${(num >> 16) & 255}, ${(num >> 8) & 255}, ${num & 255}, ${opacity})`;
}

// Storage & Project State
function getProjectState() {
  return {
    aspect: $('aspectRatioSelect').value,
    pages: pages,
    theme: $('themeSelect').value,
    font: $('fontSelect').value,
    wa: $('waSelect').value,
    fontSize: $('fontSizeSlider').value,
    subFontSize: $('subFontSizeSlider').value,
    letterSpacing: $('letterSpacing').value,
    lineHeight: $('lineHeight').value,
    rotate: $('rotate').value,
    shadow: $('shadow').value,
    transform: $('transformSelect').value,
    textAlign: $('textAlignSelect').value,
    textColor: $('textColor').value,
    useThemeColor: $('useThemeColor').checked,
    bgColor: $('bgColor').value,
    useThemeBg: $('useThemeBg').checked,
    enableTextBg: $('enableTextBg').checked,
    textBgColor: $('textBgColor').value,
    textBgOpacity: $('textBgOpacity').value,
    useThemeBorder: $('useThemeBorder').checked,
    borderStyle: $('borderStyle').value,
    borderColor: $('borderColor').value,
    borderWidth: $('borderWidth').value,
    borderInset: $('borderInset').value,
    borderRadius: $('borderRadius').value
  };
}

let saveTimeout;
function saveToLocalStorage() {
  clearTimeout(saveTimeout);
  saveTimeout = setTimeout(() => {
    try {
      const state = getProjectState();
      localStorage.setItem('poster_project_pro', JSON.stringify(state));
    } catch (e) {}
  }, 600);
}

function loadProjectState(state) {
  if (!state) return;
  if (state.pages) pages = migratePages(state.pages);
  
  const setVal = (el, val) => { if (el && val !== undefined) el.value = val; };
  const setCheck = (el, val) => { if (el && val !== undefined) el.checked = val; };

  setVal($('aspectRatioSelect'), state.aspect);
  setVal($('themeSelect'), state.theme);
  setVal($('fontSelect'), state.font);
  setVal($('waSelect'), state.wa);
  setVal($('fontSizeSlider'), state.fontSize);
  setVal($('subFontSizeSlider'), state.subFontSize);
  setVal($('letterSpacing'), state.letterSpacing);
  setVal($('lineHeight'), state.lineHeight);
  setVal($('rotate'), state.rotate);
  setVal($('shadow'), state.shadow);
  setVal($('transformSelect'), state.transform);
  setVal($('textAlignSelect'), state.textAlign);
  setVal($('textColor'), state.textColor);
  setCheck($('useThemeColor'), state.useThemeColor);
  setVal($('bgColor'), state.bgColor);
  setCheck($('useThemeBg'), state.useThemeBg);
  setCheck($('enableTextBg'), state.enableTextBg);
  setVal($('textBgColor'), state.textBgColor);
  setVal($('textBgOpacity'), state.textBgOpacity);
  setCheck($('useThemeBorder'), state.useThemeBorder);
  setVal($('borderStyle'), state.borderStyle);
  setVal($('borderColor'), state.borderColor);
  setVal($('borderWidth'), state.borderWidth);
  setVal($('borderInset'), state.borderInset);
  setVal($('borderRadius'), state.borderRadius);

  renderPages(); applyAll();
}

// Global Event Listeners
document.querySelectorAll('input, select').forEach(el => {
  el.addEventListener('input', () => {
    if ($('fontSizeVal')) $('fontSizeVal').textContent = $('fontSizeSlider').value + 'px';
    if ($('subFontSizeVal')) $('subFontSizeVal').textContent = $('subFontSizeSlider').value + 'px';
    if ($('letterSpacingVal')) $('letterSpacingVal').textContent = $('letterSpacing').value + 'px';
    if ($('lineHeightVal')) $('lineHeightVal').textContent = ($('lineHeight').value/100).toFixed(2);
    if ($('rotateVal')) $('rotateVal').textContent = $('rotate').value + '°';
    if ($('shadowVal')) $('shadowVal').textContent = $('shadow').value;
    if ($('borderWidthVal')) $('borderWidthVal').textContent = $('borderWidth').value + 'px';
    if ($('borderInsetVal')) $('borderInsetVal').textContent = $('borderInset').value + 'px';
    if ($('borderRadiusVal')) $('borderRadiusVal').textContent = $('borderRadius').value + 'px';
    if ($('textBgOpacityVal')) $('textBgOpacityVal').textContent = $('textBgOpacity').value + '%';
    applyAll();
  });
});

$('aspectRatioSelect').addEventListener('change', () => { renderPages(); applyAll(); });

// Save/Load Project Files
async function saveProjectPkt() {
  const zip = new JSZip();
  const state = getProjectState();
  zip.file("project.json", JSON.stringify(state, null, 2));
  
  const content = await zip.generateAsync({ type: "blob" });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(content);
  a.download = "poster_project.pkt";
  a.click();
}

async function loadProjectPkt(input) {
  const file = input.files[0]; if (!file) return;
  try {
    const zip = await JSZip.loadAsync(file);
    const jsonFile = zip.file("project.json");
    if (jsonFile) {
      const state = JSON.parse(await jsonFile.async("string"));
      loadProjectState(state);
    }
  } catch (err) { alert("Ошибка файла проекта."); }
  input.value = '';
}

async function exportAll(btn){
  const original=btn.textContent; btn.disabled=true;
  try{
    for(let i=0;i<pages.length;i++){
      btn.textContent='Генерация листа '+(i+1)+'…';
      const target=$('page'+i);
      const fmt=$('formatSelect').value;
      const scale=parseInt($('scaleSelect').value,10);
      const canvas=await html2canvas(target,{scale:scale,useCORS:true,allowTaint:true,logging:false,backgroundColor:null});
      const mime = fmt==='png' ? 'image/png' : 'image/jpeg';
      const link=document.createElement('a');
      link.href=canvas.toDataURL(mime,0.95);
      link.download='Plakat_List_'+(i+1)+'.'+(fmt==='png'?'png':'jpg');
      link.click();
      await new Promise(r=>setTimeout(r,300));
    }
  }catch(e){ console.error(e); alert('Ошибка экспорта.'); }
  finally{ btn.textContent=original; btn.disabled=false; }
}

function init() {
  const saved = localStorage.getItem('poster_project_pro') || localStorage.getItem('poster_project');
  if (saved) {
    try { loadProjectState(JSON.parse(saved)); } 
    catch (e) { pages = migratePages(null); renderPages(); applyAll(); }
  } else {
    pages = migratePages(null); renderPages(); applyAll();
  }
}
init();
</script>
