<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>QR Generator (Light & CDN)</title>
<!-- Подключаем шрифты -->
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@400;500;600&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f4f4f0;
    --surface: #ffffff;
    --surface2: #f9f9f7;
    --border: #ddddd5;
    --accent: #6abf2e;
    --accent-hover: #5aa127;
    --text: #111111;
    --muted: #666666;
    --mono: 'Space Mono', monospace;
    --sans: 'DM Sans', sans-serif;
    --shadow: rgba(0,0,0,0.08);
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 2rem 1rem;
  }

  .card {
    width: 100%;
    max-width: 440px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 2.5rem 2rem;
    box-shadow: 0 10px 40px var(--shadow);
  }

  h1 {
    font-size: 28px;
    font-weight: 600;
    margin-bottom: 0.5rem;
    letter-spacing: -0.5px;
  }

  h1 span { color: var(--accent); }

  .desc {
    font-size: 15px;
    color: var(--muted);
    margin-bottom: 1.5rem;
  }

  .input-wrap {
    position: relative;
    margin-bottom: 16px;
  }

  #url {
    width: 100%;
    padding: 14px 16px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-size: 15px;
    outline: none;
    transition: border-color 0.2s;
  }

  #url::placeholder { color: #aaa; }
  #url:focus { border-color: var(--accent); }

  #gen {
    width: 100%;
    padding: 14px;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 10px;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.2s, transform 0.1s;
  }

  #gen:hover { background: var(--accent-hover); }
  #gen:active { transform: scale(0.98); }

  .qr-section {
    margin-top: 2rem;
    display: none; /* Скрыто до генерации */
    text-align: center;
  }

  .divider {
    height: 1px;
    background: var(--border);
    margin-bottom: 2rem;
  }

  .qr-frame {
    display: inline-flex;
    padding: 16px;
    background: #fff;
    border: 1px solid var(--border);
    border-radius: 12px;
    margin-bottom: 1rem;
  }

  #qr-canvas {
    display: block;
    border-radius: 4px;
  }

  .url-display {
    font-family: var(--mono);
    font-size: 13px;
    color: var(--muted);
    word-break: break-all;
    margin-bottom: 1rem;
    padding: 10px;
    background: var(--surface2);
    border-radius: 8px;
  }

  .actions button {
    width: 100%;
    padding: 12px;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    transition: background 0.15s;
  }

  .actions button:hover { background: var(--border); }
</style>

<!-- ПОДКЛЮЧАЕМ НАДЕЖНУЮ БИБЛИОТЕКУ ЧЕРЕЗ ССЫЛКУ -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcode/1.5.3/qrcode.min.js"></script>

</head>
<body>

<div class="card">
  <h1>Создать <span>QR-код</span></h1>
  <p class="desc">Вставьте любую ссылку ниже</p>

  <div class="input-wrap">
    <input type="text" id="url" placeholder="https://example.com" autocomplete="off"/>
  </div>

  <button id="gen" onclick="generate()">Сгенерировать</button>

  <div class="qr-section" id="qr-section">
    <div class="divider"></div>
    <div class="qr-frame">
      <canvas id="qr-canvas"></canvas>
    </div>
    <div class="url-display" id="url-display"></div>
    <div class="actions">
      <button onclick="download()">↓ Скачать картинку (PNG)</button>
    </div>
  </div>
</div>

<script>
// Поддержка нажатия Enter на клавиатуре
document.getElementById('url').addEventListener('keydown', e => {
  if (e.key === 'Enter') generate();
});

// Основная логика генерации через внешнюю библиотеку
function generate() {
  const input = document.getElementById('url');
  let val = input.value.trim();
  
  // Если пусто, выходим
  if (!val) { 
    console.warn("Поле ввода пустое. Генерация отменена.");
    input.focus(); 
    return; 
  }
  
  // Автоматически добавляем http:// если забыли
  if (!/^https?:\/\//i.test(val)) val = 'https://' + val;

  console.log("=== Старт генерации QR-кода ===");
  console.log("Введенный URL:", val);

  const canvas = document.getElementById('qr-canvas');

  // Вызов внешней библиотеки QRCode
  // Она автоматически подбирает нужный размер, матрицу и маски Галуа
  QRCode.toCanvas(canvas, val, {
    width: 256,         // Итоговый размер картинки (пиксели)
    margin: 2,          // Белая рамка вокруг кода (по стандарту нужна для сканирования)
    color: {
      dark: '#000000',  // Цвет самих квадратиков
      light: '#ffffff'  // Цвет фона
    }
  }, function (error) {
    if (error) {
      console.error("❌ Ошибка при создании QR-кода:", error);
      alert("Не удалось сгенерировать код. Возможно, ссылка слишком большая.");
    } else {
      console.log("✅ Успех: QR-код успешно отрисован на canvas!");
      
      // Показываем блок с результатом
      document.getElementById('url-display').textContent = val;
      document.getElementById('qr-section').style.display = 'block';
    }
  });
}

// Функция для скачивания PNG картинки
function download() {
  console.log("Подготовка к скачиванию файла...");
  const canvas = document.getElementById('qr-canvas');
  const a = document.createElement('a');
  
  // Конвертируем canvas в картинку
  a.href = canvas.toDataURL('image/png');
  
  // Генерируем адекватное имя файла из ссылки
  const name = document.getElementById('url-display').textContent
    .replace(/https?:\/\//,'')
    .replace(/[^a-z0-9]/gi,'-')
    .substring(0,30);
    
  a.download = 'qr-' + name + '.png';
  a.click();
  console.log(`Файл скачан: qr-${name}.png`);
}
</script>
</body>
</html>
