<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Тест: Границы ЗУ из НСПД</title>
    
    <!-- Подключаем API Яндекс.Карт v2.1 -->
    <script src="https://api-maps.yandex.ru/2.1/?apikey=dde71a0e-b612-44b7-b53b-82533420240f&lang=ru_RU" type="text/javascript"></script>
    
    <style>
        html, body, #map {
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
        }
        /* Небольшая плашка для информации */
        .info-panel {
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(255, 255, 255, 0.9);
            padding: 10px;
            border-radius: 5px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.3);
            z-index: 1000;
            font-family: sans-serif;
            font-size: 14px;
        }
    </style>
</head>
<body>

    <div id="map"></div>
    
    <div class="info-panel">
        <b>Тестовая карта</b><br>
        Подложка: Яндекс.Схема<br>
        Красные линии: Тайлы НСПД (WMTS)
    </div>

    <script>
        ymaps.ready(function () {
            // 1. Создаем базовую Яндекс.Карту
            var map = new ymaps.Map('map', {
                center:[55.751574, 37.573856], // Москва (можно поменять на свои координаты)
                zoom: 16,
                controls:['zoomControl', 'typeSelector'] // Оставляем зум и выбор "Схема/Спутник"
            });

            // 2. ФОРМИРУЕМ СЛОЙ НСПД (Земельные участки - ID 36048)
            // %z, %x, %y - это макросы, вместо которых Яндекс сам будет подставлять нужные цифры при движении карты
            var nspdUrlTemplate = 'https://nspd.gov.ru/api/aeggis/v4/36048/wmts/%z/%x/%y.png';

            var nspdParcelLayer = new ymaps.Layer(nspdUrlTemplate, {
                // КРИТИЧЕСКИ ВАЖНО: Указываем сферический меркатор, иначе линии съедут!
                projection: ymaps.projection.sphericalMercator,
                
                // Делаем слой прозрачным там, где нет красных линий
                transparent: true,
                
                // Ставим высокий zIndex, чтобы красные линии рисовались ПОВЕРХ домов и дорог Яндекса
                zIndex: 500
            });

            // 3. Добавляем созданный слой с красными линиями прямо поверх карты
            map.layers.add(nspdParcelLayer);
        });
    </script>

</body>
</html>
