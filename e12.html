<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Выгрузка DXF по кадастровому номеру | vsemap.ru</title>
    <!-- Иконки -->
    <link href="webfonts/all.min.css" rel="stylesheet">
    <!-- Скрипты проекции и базы данных с вашего сервера -->
    <script src="webfonts/proj4.js"></script>
    <script src="sk.js"></script>
    <script src="msk.js"></script>
    
    <style>
        :root {
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            --bg: #f1f5f9;
            --card-bg: #ffffff;
            --text-dark: #0f172a;
            --text-muted: #64748b;
            --border: #cbd5e1;
            --radius: 20px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg);
            color: var(--text-dark);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 16px;
        }

        .app-container {
            width: 100%;
            max-width: 420px;
            background: var(--card-bg);
            border-radius: var(--radius);
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.06);
            padding: 24px;
            border: 1px solid rgba(226, 232, 240, 0.8);
        }

        h1 {
            font-size: 1.4rem;
            font-weight: 800;
            text-align: center;
            margin-bottom: 4px;
            color: var(--text-dark);
            letter-spacing: -0.5px;
        }

        .subtitle {
            font-size: 0.85rem;
            color: var(--text-muted);
            text-align: center;
            margin-bottom: 20px;
        }

        .form-group {
            margin-bottom: 14px;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        label {
            font-size: 0.8rem;
            font-weight: 700;
            color: var(--text-dark);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        input, select {
            width: 100%;
            height: 48px;
            padding: 0 16px;
            font-size: 1rem;
            border: 1.5px solid var(--border);
            border-radius: 12px;
            outline: none;
            transition: border-color 0.2s, background-color 0.2s;
            text-align: center;
            background: #f8fafc;
        }

        input:focus, select:focus {
            border-color: var(--primary);
            background: #ffffff;
            box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.12);
        }

        input#cadastralInput {
            font-family: "SF Mono", "Courier New", monospace;
            font-weight: 600;
            letter-spacing: 1px;
        }

        /* Настройки в стиле iOS */
        .settings-card {
            border: 1px solid var(--border);
            border-radius: 14px;
            margin-bottom: 20px;
            background: #f8fafc;
            overflow: hidden;
        }

        .settings-header {
            padding: 12px 16px;
            font-weight: 700;
            font-size: 0.85rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            user-select: none;
            background: #f1f5f9;
        }

        .settings-content {
            padding: 16px;
            display: none;
            flex-direction: column;
            gap: 12px;
            border-top: 1px solid var(--border);
        }

        .settings-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .settings-row span {
            font-size: 0.9rem;
            font-weight: 600;
        }

        /* Ползунок-переключатель */
        .switch {
            position: relative;
            display: inline-block;
            width: 46px;
            height: 26px;
        }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider {
            position: absolute;
            cursor: pointer;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: #cbd5e1;
            transition: .3s;
            border-radius: 26px;
        }
        .slider:before {
            position: absolute;
            content: "";
            height: 20px; width: 18px;
            left: 3px; bottom: 3px;
            background-color: white;
            transition: .3s;
            border-radius: 50%;
        }
        input:checked + .slider { background-color: var(--primary); }
        input:checked + .slider:before { transform: translateX(20px); }

        /* Сетка для мелких экспортных кнопок */
        .export-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            margin-top: 6px;
        }

        .btn {
            width: 100%;
            height: 50px;
            font-size: 0.95rem;
            font-weight: 700;
            color: #ffffff;
            background-color: var(--primary);
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: background-color 0.2s, transform 0.1s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.2);
        }

        .btn:active { transform: scale(0.97); }

        .btn-secondary {
            background-color: #334155;
            box-shadow: 0 4px 12px rgba(51, 65, 85, 0.2);
        }

        .btn-sm {
            height: 38px;
            font-size: 0.8rem;
            border-radius: 8px;
            box-shadow: none;
        }

        .preview-box {
            margin-top: 24px;
            border: 1.5px solid #e2e8f0;
            border-radius: 14px;
            overflow: hidden;
            background-color: #f8fafc;
            display: none;
            flex-direction: column;
            animation: fadeIn 0.3s ease;
        }

        .canvas-container {
            width: 100%;
            aspect-ratio: 4 / 3;
            position: relative;
        }

        canvas {
            width: 100%;
            height: 100%;
            display: block;
            background-color: #ffffff;
        }

        .stats-panel {
            padding: 16px;
            border-top: 1px solid #e2e8f0;
            background-color: #ffffff;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .stats-row {
            display: flex;
            justify-content: space-around;
            width: 100%;
            border-bottom: 1px solid #e2e8f0;
            padding-bottom: 10px;
        }

        .stat-item {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .stat-item.full-width {
            width: 100%;
            text-align: center;
        }

        .stat-label {
            font-size: 0.72rem;
            color: var(--text-muted);
            text-transform: uppercase;
            font-weight: 700;
            letter-spacing: 0.5px;
        }

        .stat-val {
            font-size: 1.1rem;
            font-weight: 800;
            color: var(--text-dark);
        }

        .stat-val.address-text {
            font-size: 0.85rem;
            font-weight: 500;
            line-height: 1.4;
            color: var(--text-dark);
        }

        /* Таблица координат */
        .table-box {
            display: none;
            max-height: 200px;
            overflow-y: auto;
            border: 1.5px solid var(--border);
            border-radius: 10px;
            margin-top: 10px;
            background: #ffffff;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.82rem;
            text-align: center;
        }

        thead {
            background: #f1f5f9;
            position: sticky;
            top: 0;
            font-weight: bold;
            border-bottom: 1.5px solid var(--border);
        }

        th, td {
            padding: 6px;
            border: 1px solid var(--border);
        }

        /* Вспомогательные элементы */
        .toast {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            background: #0f172a;
            color: #ffffff;
            padding: 14px 28px;
            border-radius: 30px;
            font-size: 0.9rem;
            font-weight: 600;
            box-shadow: 0 6px 20px rgba(0,0,0,0.15);
            display: none;
            z-index: 1000;
            white-space: nowrap;
            animation: slideUp 0.3s ease;
        }

        .loader-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255,255,255,0.85);
            backdrop-filter: blur(5px);
            z-index: 999;
            display: none;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 16px;
        }

        .spinner {
            width: 44px;
            height: 44px;
            border: 4px solid #cbd5e1;
            border-top: 4px solid var(--primary);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @keyframes slideUp {
            from { bottom: 0; opacity: 0; }
            to { bottom: 24px; opacity: 1; }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="app-container">
        <h1>Схема в DXF</h1>
        <div class="subtitle">Сервис быстрой выгрузки чертежей с vsemap.ru</div>

        <!-- Поля ввода данных -->
        <div class="form-group">
            <label for="cadastralInput">Кадастровый номер</label>
            <input type="text" id="cadastralInput" placeholder="XX:XX:XXXXXXX:XX" autocomplete="off" inputmode="numeric">
        </div>

        <div class="form-group" style="margin-bottom: 16px;">
            <label for="emailInput">Электронная почта</label>
            <input type="email" id="emailInput" placeholder="recipient@mail.ru" autocomplete="off">
        </div>

        <!-- Разворачиваемая карта настроек и экспорта -->
        <div class="settings-card">
            <div class="settings-header" onclick="toggleSettings()">
                <span><i class="fas fa-sliders-h"></i> Опции и другие форматы</span>
                <i class="fas fa-chevron-down" id="settingsArrow" style="transition: transform 0.2s;"></i>
            </div>
            <div class="settings-content" id="settingsContent">
                <!-- Опция XY swap -->
                <div class="settings-row">
                    <span>Поменять местами X и Y</span>
                    <label class="switch">
                        <input type="checkbox" id="swapXyCheck" onchange="handleSwapToggle()">
                        <span class="slider"></span>
                    </label>
                </div>
                
                <!-- Формат DXF по умолчанию -->
                <div class="form-group" style="margin-top: 8px;">
                    <label style="font-size: 0.75rem;">Формат DXF по умолчанию</label>
                    <select id="dxfFormatSelect" onchange="saveSettings()">
                        <option value="ac1009">DXF AC1009 (Геометрия)</option>
                        <option value="min">DXF Минимальный</option>
                        <option value="plantracer">DXF PlanTracer</option>
                    </select>
                </div>

                <!-- Другие виды экспорта -->
                <div class="form-group" style="margin-top: 8px; margin-bottom: 0;">
                    <label style="font-size: 0.75rem; text-align: left;">Дополнительный экспорт</label>
                    <div class="export-grid">
                        <button class="btn btn-secondary btn-sm" onclick="exportToTxt()"><i class="fas fa-file-alt"></i> TXT</button>
                        <button class="btn btn-secondary btn-sm" onclick="exportToMif()"><i class="fas fa-map"></i> MIF</button>
                        <button class="btn btn-secondary btn-sm" onclick="exportToGeoJson()"><i class="fas fa-globe-americas"></i> JSON</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Кнопка загрузки схемы -->
        <button class="btn" id="loadContourBtn" onclick="handleLoadContour()">
            <i class="fas fa-eye"></i>Показать схему
        </button>

        <!-- Блок превью схемы (Canvas + Свойства) -->
        <div class="preview-box" id="previewBox">
            <div class="canvas-container">
                <canvas id="previewCanvas"></canvas>
            </div>
            <div class="stats-panel">
                <div class="stats-row">
                    <div class="stat-item">
                        <span class="stat-label">Площадь</span>
                        <span class="stat-val" id="statArea">—</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-label">Периметр</span>
                        <span class="stat-val" id="statPerimeter">—</span>
                    </div>
                </div>
                <div class="stat-item full-width">
                    <span class="stat-label">Адрес</span>
                    <span class="stat-val address-text" id="statAddress">—</span>
                </div>
                
                <!-- Таблица координат -->
                <button class="btn btn-secondary btn-sm" id="tableToggleBtn" onclick="toggleCoordinateTable()" style="background-color: #e2e8f0; color: var(--text-dark); box-shadow: none;">
                    <i class="fas fa-table"></i> Показать таблицу координат
                </button>
                <div class="table-box" id="coordinateTableBox">
                    <table>
                        <thead>
                            <tr>
                                <th>Точка</th>
                                <th>X (Север)</th>
                                <th>Y (Восток)</th>
                            </tr>
                        </thead>
                        <tbody id="coordinateTableBody"></tbody>
                    </table>
                </div>
            </div>
        </div>

        <!-- Кнопка отправки на почту (активируется после загрузки схемы) -->
        <button class="btn btn-secondary" id="sendEmailBtn" onclick="handleSendEmail()" style="margin-top: 18px; display: none;">
            <i class="fas fa-paper-plane"></i>Отправить на почту
        </button>
    </div>

    <!-- Вспомогательные оверлеи -->
    <div class="loader-overlay" id="loaderOverlay">
        <div class="spinner"></div>
        <span id="loaderText" style="font-weight: 700; font-size: 1rem; color: var(--text-dark);">Загрузка...</span>
    </div>

    <div class="toast" id="toastMessage"></div>

    <script>
        const sevenDigitsRegions = ['06', '07', '09', '10', '11', '12', '13', '14', '17', '23','24', '27', '31', '32', '35', '36', '41', '42', '47', '48','50', '52', '53', '56', '57', '58', '59', '60', '61', '62','63', '64', '65', '66', '67', '69', '70', '71', '72', '74','77', '78', '79', '91'];
        let loadedContours = null;
        let currentAddress = '';
        let currentAbortController = null; // Будет управлять отменой сетевых запросов

        document.addEventListener('DOMContentLoaded', () => {
            // Загрузка настроек из памяти
            const savedEmail = localStorage.getItem('vsemap_recipient_email');
            if (savedEmail) document.getElementById('emailInput').value = savedEmail;

            const savedSwap = localStorage.getItem('vsemap_swap_xy') === 'true';
            document.getElementById('swapXyCheck').checked = savedSwap;

            const savedDxfFormat = localStorage.getItem('vsemap_dxf_format') || 'ac1009';
            document.getElementById('dxfFormatSelect').value = savedDxfFormat;

            const cadInput = document.getElementById('cadastralInput');
            cadInput.addEventListener('input', () => formatCadastralNumberInput(cadInput));
            
            document.getElementById('emailInput').addEventListener('input', (e) => {
                localStorage.setItem('vsemap_recipient_email', e.target.value.trim());
            });
        });

        // Отмена запроса по нажатию клавиши ESC
        window.addEventListener('keydown', (e) => {
            if (e.key === 'Escape' && currentAbortController) {
                currentAbortController.abort();
                currentAbortController = null;
                toggleLoader(false);
                showToast('Запрос отменен пользователем');
            }
        });

        function formatCadastralNumberInput(input) {
            let value = input.value.replace(/[^\d]/g, '');
            let formatted = '';
            if (value.length > 0) {
                const region = value.substring(0, 2);
                formatted += region;
                if (value.length > 2) {
                    formatted += ':' + value.substring(2, 4);
                }
                if (value.length > 4) {
                    const quarterMaxLength = sevenDigitsRegions.includes(region) ? 7 : 6;
                    const quarterEndIndex = 4 + quarterMaxLength;
                    formatted += ':' + value.substring(4, quarterEndIndex);
                    if (value.length > quarterEndIndex) {
                        formatted += ':' + value.substring(quarterEndIndex);
                    }
                }
            }
            input.value = formatted;
        }

        function isValidCadastralNumber(text) {
            if (!text) return false;
            const firstTwoDigits = text.slice(0, 2);
            const digitsAfterSecondColon = sevenDigitsRegions.includes(firstTwoDigits) ? 7 : 6;
            const pattern = new RegExp(`^\\d{2}:\\d{2}:\\d{${digitsAfterSecondColon}}:\\d+$`);
            return pattern.test(text);
        }

        function showToast(message) {
            const toast = document.getElementById('toastMessage');
            toast.textContent = message;
            toast.style.display = 'block';
            setTimeout(() => {
                toast.style.display = 'none';
            }, 3000);
        }

        function toggleLoader(show, text = 'Загрузка...') {
            const loader = document.getElementById('loaderOverlay');
            document.getElementById('loaderText').textContent = text;
            loader.style.display = show ? 'flex' : 'none';
        }

        function toggleSettings() {
            const content = document.getElementById('settingsContent');
            const arrow = document.getElementById('settingsArrow');
            if (content.style.display === 'flex') {
                content.style.display = 'none';
                arrow.style.transform = 'rotate(0deg)';
            } else {
                content.style.display = 'flex';
                arrow.style.transform = 'rotate(180deg)';
            }
        }

        function saveSettings() {
            localStorage.setItem('vsemap_swap_xy', document.getElementById('swapXyCheck').checked);
            localStorage.setItem('vsemap_dxf_format', document.getElementById('dxfFormatSelect').value);
        }

        // Позволяет получить пересчитанные контуры с учетом опции Swap X/Y [1]
        function getProcessedContours() {
            if (!loadedContours) return null;
            const shouldSwap = document.getElementById('swapXyCheck').checked;
            if (!shouldSwap) return loadedContours;
            // Возвращаем копию со сменой X и Y
            return loadedContours.map(contour => 
                contour.map(p => ({ x: p.y, y: p.x }))
            );
        }

        // Обработчик тумблера смены координат X/Y [1]
        function handleSwapToggle() {
            saveSettings();
            if (loadedContours) {
                const processed = getProcessedContours();
                drawContourPreview(processed);
                calculateAndDisplayStats(processed, currentAddress);
                populateCoordinateTable(processed);
            }
        }

        async function handleLoadContour() {
            const cadastralNumber = document.getElementById('cadastralInput').value.trim();
            if (!isValidCadastralNumber(cadastralNumber)) {
                showToast('Введите корректный кадастровый номер');
                return;
            }

            if (currentAbortController) currentAbortController.abort();
            currentAbortController = new AbortController();

            toggleLoader(true, 'Получение геометрии ЕГРН... (Esc для отмены)');

            try {
                const url = `https://nspd.gov.ru/api/geoportal/v2/search/geoportal?thematicSearchId=1&query=${encodeURIComponent(cadastralNumber)}`;
                const response = await fetch(url, { signal: currentAbortController.signal });
                if (!response.ok) throw new Error('Ошибка сети при связи с ЕГРН');

                const resData = await response.json();
                if (!resData.data || !resData.data.features || resData.data.features.length === 0) {
                    throw new Error('Участок не найден в базе ЕГРН');
                }

                const feature = resData.data.features[0];
                if (!feature.geometry) {
                    throw new Error('Геометрия данного участка отсутствует');
                }

                loadedContours = autoDetectAndConvertEgrnCoords(feature.geometry, cadastralNumber);
                if (!loadedContours || loadedContours.length === 0) {
                    throw new Error('Не удалось преобразовать координаты в МСК');
                }

                currentAddress = feature.properties?.options?.readable_address || 'Адрес отсутствует в базе ЕГРН';

                // Сначала делаем блок видимым
                document.getElementById('previewBox').style.display = 'flex';
                document.getElementById('sendEmailBtn').style.display = 'flex';

                // Получаем и отрисовываем обработанные (с учетом Swap) данные
                const processed = getProcessedContours();
                drawContourPreview(processed);
                calculateAndDisplayStats(processed, currentAddress);
                populateCoordinateTable(processed);

                showToast('Схема успешно загружена!');

            } catch (error) {
                if (error.name === 'AbortError') return;
                console.error(error);
                showToast(error.message || 'Ошибка загрузки данных');
            } finally {
                currentAbortController = null;
                toggleLoader(false);
            }
        }

        async function handleSendEmail() {
            const email = document.getElementById('emailInput').value.trim();
            const cadastralNumber = document.getElementById('cadastralInput').value.trim();
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

            if (!email || !emailRegex.test(email)) {
                showToast('Укажите корректный email получателя');
                return;
            }

            if (!loadedContours || loadedContours.length === 0) {
                showToast('Сначала загрузите контур участка');
                return;
            }

            if (currentAbortController) currentAbortController.abort();
            currentAbortController = new AbortController();

            toggleLoader(true, 'Отправка чертежа... (Esc для отмены)');
            
            // Генерируем DXF с учетом текущих опций (Swap и формат)
            const processed = getProcessedContours();
            const dxfContent = generateDXFString(processed);

            try {
                // ПРИМЕЧАНИЕ: Обязательно укажите здесь полный URL вашего Vercel-приложения после развертывания бэкенда
                const response = await fetch('https://maildxf.vercel.app/api/send-email', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        email: email,
                        cadastralNumber: cadastralNumber,
                        dxfContent: dxfContent
                    }),
                    signal: currentAbortController.signal
                });

                const data = await response.json();

                if (response.ok) {
                    showToast('Чертеж успешно отправлен на вашу почту!');
                } else {
                    showToast(`Ошибка: ${data.error || 'Не удалось отправить'}`);
                }

            } catch (error) {
                if (error.name === 'AbortError') return;
                console.error(error);
                showToast('Ошибка соединения при отправке');
            } finally {
                currentAbortController = null;
                toggleLoader(false);
            }
        }

        function autoDetectAndConvertEgrnCoords(geometry, cadastralNumber) {
            if (typeof proj4 === 'undefined' || typeof COORDINATE_SYSTEMS === 'undefined' || typeof MskFinder === 'undefined') {
                throw new Error("Необходимые библиотеки координат не найдены");
            }

            const mskCode = MskFinder.findMskCode(cadastralNumber);
            if (!mskCode) throw new Error("Система координат МСК не определена для данного региона");

            const searchString = "МСК " + mskCode;
            const targetSystem = COORDINATE_SYSTEMS.find(s => s.text.startsWith(searchString));
            if (!targetSystem) throw new Error(`Параметры МСК ${mskCode} отсутствуют в базе`);

            proj4.defs(targetSystem.value, targetSystem.def);
            const { offsetX = 0, offsetY = 0 } = targetSystem;
            const convertedContours = [];

            const convertRing = ring => ring.map(coord => {
                const [lon, lat] = proj4('EPSG:3857', targetSystem.value, coord);
                const val1 = lat + offsetX;
                const val2 = lon + offsetY;
                return { x: Math.min(val1, val2), y: Math.max(val1, val2) };
            });

            if (geometry.type === 'Polygon') {
                geometry.coordinates.forEach(ring => {
                    if (ring.length > 0) convertedContours.push(convertRing(ring));
                });
            } else if (geometry.type === 'MultiPolygon') {
                geometry.coordinates.forEach(polygon => {
                    polygon.forEach(ring => {
                        if (ring.length > 0) convertedContours.push(convertRing(ring));
                    });
                });
            }
            return convertedContours;
        }

        // Вспомогательная функция скачивания файлов на устройство
        function downloadFile(content, fileName, contentType) {
            const blob = new Blob([content], { type: contentType });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = fileName;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }

        // Экспорт в форматы TXT, MIF, GeoJSON
        function exportToTxt() {
            if (!loadedContours) { showToast('Сначала загрузите контур'); return; }
            const processed = getProcessedContours();
            let txtContent = "";
            let idx = 1;
            processed.forEach(contour => {
                contour.forEach(p => {
                    txtContent += `${idx},${p.x.toFixed(2)},${p.y.toFixed(2)}\n`;
                    idx++;
                });
            });
            downloadFile(txtContent, 'points.txt', 'text/plain;charset=utf-8');
        }

        function exportToMif() {
            if (!loadedContours) { showToast('Сначала загрузите контур'); return; }
            const processed = getProcessedContours();
            let mifContent = `Version 300\nCharset "WindowsCyrillic"\nDelimiter ","\nCoordSys NonEarth Units "m" Bounds (0, 0) (10000000, 10000000)\nColumns 2\n  X Decimal(15, 2)\n  Y Decimal(15, 2)\nData\n\n`;
            mifContent += `Region ${processed.length}\n`;
            processed.forEach(contour => {
                mifContent += `${contour.length}\n`;
                contour.forEach(p => {
                    mifContent += `${p.y.toFixed(2)} ${p.x.toFixed(2)}\n`;
                });
            });
            downloadFile(mifContent, 'export.mif', 'text/plain;charset=utf-8');
        }

        function exportToGeoJson() {
            if (!loadedContours) { showToast('Сначала загрузите контур'); return; }
            const processed = getProcessedContours();
            const geojson = {
                type: "FeatureCollection",
                features: [
                    {
                        type: "Feature",
                        geometry: {
                            type: "MultiPolygon",
                            coordinates: processed.map(contour => [
                                contour.map(p => [p.y, p.x])
                            ])
                        },
                        properties: {}
                    }
                ]
            };
            downloadFile(JSON.stringify(geojson, null, 2), 'export.geojson', 'application/json;charset=utf-8');
        }

        // Генерация DXF-строки в соответствии с выбранным форматом
        function generateDXFString(contours) {
            const format = document.getElementById('dxfFormatSelect').value;
            
            if (format === 'min') {
                let dxfContent = `0\nSECTION\n2\nENTITIES\n`;
                contours.forEach(contour => {
                    if (contour.length === 0) return;
                    if (contour.length === 1) {
                        dxfContent += `0\nPOINT\n8\n0\n10\n${contour[0].y.toFixed(6)}\n20\n${contour[0].x.toFixed(6)}\n`;
                        return;
                    }
                    const isClosed = contour.length > 2 && Math.abs(contour[0].x - contour[contour.length-1].x) < 0.001 && Math.abs(contour[0].y - contour[contour.length-1].y) < 0.001;
                    dxfContent += `0\nLWPOLYLINE\n8\n0\n100\nAcDbEntity\n100\nAcDbPolyline\n90\n${contour.length}\n70\n${isClosed ? 1 : 0}\n`;
                    contour.forEach(p => {
                        dxfContent += `10\n${p.y.toFixed(6)}\n20\n${p.x.toFixed(6)}\n`;
                    });
                });
                dxfContent += `0\nENDSEC\n0\nEOF\n`;
                return dxfContent;
            }
            
            if (format === 'plantracer') {
                return generateDxfAC1009_Geometry(contours, true);
            }
            
            return generateDxfAC1009_Geometry(contours, false);
        }

        // Генератор DXF стандарта AC1009 (только геометрия)
        function generateDxfAC1009_Geometry(contours, forceSwapPlanTracer) {
            const mapX = (p) => forceSwapPlanTracer ? p.x : p.y;
            const mapY = (p) => forceSwapPlanTracer ? p.y : p.x;
            
            let entities = `  0\nSECTION\n  2\nENTITIES`;
            contours.forEach(points => {
                if (points.length === 1) {
                    entities += `\n  0\nPOINT\n  8\nt\n 10\n${mapX(points[0]).toFixed(6)}\n 20\n${mapY(points[0]).toFixed(6)}\n 30\n0.0`;
                } else if (points.length >= 2) {
                    const isClosed = points.length > 2 &&
                                     Math.abs(points[0].x - points[points.length - 1].x) < 0.001 &&
                                     Math.abs(points[0].y - points[points.length - 1].y) < 0.001;

                    entities += `\n  0\nPOLYLINE\n  8\nt\n  6\nCONTINUOUS\n 62\n   256`;
                    entities += `\n 70\n     ${isClosed ? 1 : 0}`;
                    entities += `\n 75\n     5\n 66\n     1`;

                    points.forEach(p => {
                        entities += `\n  0\nVERTEX\n  8\nt\n 10\n${mapX(p).toFixed(6)}\n 20\n${mapY(p).toFixed(6)}\n 30\n0.0`;
                    });
                    entities += `\n  0\nSEQEND`;
                }
            });
            entities += `\n  0\nENDSEC`;
            
            const allPoints = contours.flat();
            let minX = 0, maxX = 0, minY = 0, maxY = 0;
            if (allPoints.length > 0) {
                minX = Math.min(...allPoints.map(mapX));
                maxX = Math.max(...allPoints.map(mapX));
                minY = Math.min(...allPoints.map(mapY));
                maxY = Math.max(...allPoints.map(mapY));
            }
            
            const header = `  0\nSECTION\n  2\nHEADER\n  9\n$ACADVER\n  1\nAC1009\n  9\n$EXTMIN\n 10\n${minX.toFixed(2)}\n 20\n${minY.toFixed(2)}\n 30\n0.0\n  9\n$EXTMAX\n 10\n${maxX.toFixed(2)}\n 20\n${maxY.toFixed(2)}\n 30\n0.0\n  9\n$LIMMIN\n 10\n${minX.toFixed(2)}\n 20\n${minY.toFixed(2)}\n  9\n$LIMMAX\n 10\n${maxX.toFixed(2)}\n 20\n${maxY.toFixed(2)}\n  0\nENDSEC`;
            const tables = `  0\nSECTION\n  2\nTABLES\n  0\nTABLE\n  2\nLTYPE\n 70\n     1\n  0\nLTYPE\n  2\nCONTINUOUS\n 70\n     0\n  3\nSolid line\n 72\n    65\n 73\n     0\n 40\n0.0\n  0\nENDTAB\n  0\nTABLE\n  2\nLAYER\n 70\n     2\n  0\nLAYER\n  2\n0\n 70\n     0\n 62\n     7\n  6\nCONTINUOUS\n  0\nLAYER\n  2\nt\n 70\n     0\n 62\n     1\n  6\nCONTINUOUS\n  0\nENDTAB\n  0\nENDSEC`;
            const blocks = `  0\nSECTION\n  2\nBLOCKS\n  0\nENDSEC`;
            const eof = `  0\nEOF`;

            return [header, tables, blocks, entities, eof].join('\n');
        }

        function calculateAndDisplayStats(contours, address) {
            let totalArea = 0;
            let totalPerimeter = 0;

            contours.forEach(contour => {
                let perimeter = 0;
                for (let i = 0; i < contour.length - 1; i++) {
                    perimeter += Math.sqrt((contour[i+1].x - contour[i].x)**2 + (contour[i+1].y - contour[i].y)**2);
                }
                const isClosed = Math.abs(contour[0].x - contour[contour.length-1].x) < 0.001 && Math.abs(contour[0].y - contour[contour.length-1].y) < 0.001;
                if (!isClosed && contour.length > 1) {
                    perimeter += Math.sqrt((contour[0].x - contour[contour.length-1].x)**2 + (contour[0].y - contour[contour.length-1].y)**2);
                }

                let area = 0;
                const n = contour.length;
                for (let i = 0; i < n; i++) {
                    const p1 = contour[i];
                    const p2 = contour[(i + 1) % n];
                    area += p1.x * p2.y - p1.y * p2.x;
                }
                area = Math.abs(area) / 2;

                totalArea += area;
                totalPerimeter += perimeter;
            });

            document.getElementById('statArea').textContent = `${Math.round(totalArea)} кв.м`;
            document.getElementById('statPerimeter').textContent = `${totalPerimeter.toFixed(1)} м`;
            document.getElementById('statAddress').textContent = address;
        }

        // Заполнение таблицы координат
        function populateCoordinateTable(contours) {
            const tbody = document.getElementById('coordinateTableBody');
            tbody.innerHTML = '';
            let ptIndex = 1;

            contours.forEach((contour, contourIdx) => {
                const isClosed = contour.length > 2 && Math.abs(contour[0].x - contour[contour.length-1].x) < 0.001 && Math.abs(contour[0].y - contour[contour.length-1].y) < 0.001;
                
                contour.forEach((p, pIdx) => {
                    const tr = document.createElement('tr');
                    const ptLabel = isClosed && pIdx === contour.length - 1 ? `н${ptIndex - pIdx}` : `н${ptIndex}`;
                    
                    tr.innerHTML = `
                        <td style="font-weight:600;">${ptLabel} (К${contourIdx + 1})</td>
                        <td>${p.x.toFixed(2)}</td>
                        <td>${p.y.toFixed(2)}</td>
                    `;
                    tbody.appendChild(tr);
                    ptIndex++;
                });
            });
        }

        function toggleCoordinateTable() {
            const box = document.getElementById('coordinateTableBox');
            const btn = document.getElementById('tableToggleBtn');
            if (box.style.display === 'block') {
                box.style.display = 'none';
                btn.innerHTML = '<i class="fas fa-table"></i> Показать таблицу координат';
            } else {
                box.style.display = 'block';
                btn.innerHTML = '<i class="fas fa-table"></i> Скрыть таблицу координат';
            }
        }

        function drawContourPreview(contours) {
            const canvas = document.getElementById('previewCanvas');
            const container = canvas.parentElement;
            
            const width = container.offsetWidth;
            const height = container.offsetHeight;
            canvas.width = width * window.devicePixelRatio;
            canvas.height = height * window.devicePixelRatio;

            const ctx = canvas.getContext('2d');
            ctx.scale(window.devicePixelRatio, window.devicePixelRatio);
            ctx.clearRect(0, 0, width, height);

            const allPoints = contours.flat();
            if (allPoints.length === 0) return;

            const minX = Math.min(...allPoints.map(p => p.x));
            const minY = Math.min(...allPoints.map(p => p.y));
            const maxX = Math.max(...allPoints.map(p => p.x));
            const maxY = Math.max(...allPoints.map(p => p.y));

            const diffX = (maxX - minX) === 0 ? 100 : (maxX - minX);
            const diffY = (maxY - minY) === 0 ? 100 : (maxY - minY);

            const padding = 20;
            const scaleX = (width - padding * 2) / diffY;
            const scaleY = (height - padding * 2) / diffX;
            const scale = Math.min(scaleX, scaleY);

            const offsetX = padding + (width - padding * 2 - diffY * scale) / 2;
            const offsetY = padding + (height - padding * 2 - diffX * scale) / 2;

            ctx.beginPath();
            ctx.strokeStyle = '#2563eb';
            ctx.lineWidth = 2.5;
            ctx.fillStyle = 'rgba(37, 99, 235, 0.05)';

            contours.forEach(contour => {
                contour.forEach((p, index) => {
                    const canvasX = offsetX + (p.y - minY) * scale;
                    const canvasY = height - (offsetY + (p.x - minX) * scale);
                    if (index === 0) ctx.moveTo(canvasX, canvasY);
                    else ctx.lineTo(canvasX, canvasY);
                });
            });

            ctx.closePath();
            ctx.fill();
            ctx.stroke();

            ctx.fillStyle = '#ef4444';
            allPoints.forEach(p => {
                const canvasX = offsetX + (p.y - minY) * scale;
                const canvasY = height - (offsetY + (p.x - minX) * scale);
                ctx.beginPath();
                ctx.arc(canvasX, canvasY, 3.5, 0, 2 * Math.PI);
                ctx.fill();
            });
        }
    </script>
