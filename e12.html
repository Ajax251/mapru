<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Красивый Бесконечный 3D Кадастр</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Подключаем Three.js -->
    <script async src="https://unpkg.com/es-module-shims@1.8.0/dist/es-module-shims.js"></script>
    <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
          "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
      }
    </script>

    <style>
        body { margin: 0; overflow: hidden; background-color: #e0f2fe; font-family: 'Segoe UI', Tahoma, sans-serif; user-select: none; }
        
        #ui-panel {
            position: absolute; top: 20px; left: 20px; width: 260px;
            background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(12px);
            border: 1px solid rgba(0,0,0,0.1); padding: 20px;
            border-radius: 16px; color: #1e293b; box-shadow: 0 10px 40px rgba(0,0,0,0.15);
            z-index: 10;
        }

        h1 { margin: 0 0 5px 0; font-size: 18px; color: #3b82f6; display: flex; align-items: center; gap: 8px; }
        p { margin: 0 0 15px 0; font-size: 12px; color: #64748b; line-height: 1.4; border-bottom: 1px solid rgba(0,0,0,0.1); padding-bottom: 10px; }

        .layer-control { display: flex; align-items: center; margin-bottom: 10px; cursor: pointer; }
        .layer-control input { margin-right: 10px; cursor: pointer; width: 16px; height: 16px; accent-color: #3b82f6; }
        .layer-control label { cursor: pointer; font-size: 14px; font-weight: 600; display: flex; align-items: center; gap: 8px; width: 100%;}
        .color-box { width: 14px; height: 14px; border-radius: 3px; display: inline-block; border: 1px solid rgba(0,0,0,0.2);}

        .layer-select { width: 100%; margin-top: 5px; margin-bottom: 15px; padding: 8px; background: #f8fafc; color: #1e293b; border: 1px solid #cbd5e1; border-radius: 6px; outline: none; font-size: 13px; cursor: pointer; font-weight: 600;}
        .layer-select:focus { border-color: #3b82f6; box-shadow: 0 0 0 2px rgba(59,130,246,0.2); }

        #stats { margin-top: 5px; font-weight: bold; color: #10b981; font-size: 13px; text-align: center; background: #f1f5f9; padding: 8px; border-radius: 6px; }
        .loading-pulse { animation: pulse 1.5s infinite; color: #f59e0b !important; }
        @keyframes pulse { 0% { opacity: 0.5; } 50% { opacity: 1; } 100% { opacity: 0.5; } }

        /* Тултипы */
        #labels-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 5; }
        #hover-tooltip {
            position: absolute; pointer-events: none; opacity: 0; z-index: 100;
            background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(12px);
            border: 1px solid rgba(0,0,0,0.1); box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            padding: 14px 18px; border-radius: 12px; color: #475569; font-size: 13px;
            transform: translate(15px, 15px); transition: opacity 0.2s ease; max-width: 320px; line-height: 1.5;
        }
        .tt-title { display: block; font-size: 15px; font-weight: 800; color: #1e293b; margin-bottom: 4px; border-bottom: 1px solid #eee; padding-bottom: 4px; }
        .tt-id { display: block; font-family: monospace; color: #3b82f6; font-size: 12px; margin-bottom: 6px; }
        .tt-area { display: inline-block; margin-top: 6px; background: rgba(16, 185, 129, 0.15); color: #10b981; padding: 2px 8px; border-radius: 4px; font-weight: 700; font-size: 12px; }
    </style>
</head>
<body>

    <div id="ui-panel">
        <h1><i class="fas fa-city"></i> Кадастр 3D</h1>
        <p>ПКМ - вращение | ЛКМ - перемещение<br>Колесико - масштаб</p>
        
        <select id="layer-selector" class="layer-select">
            <option value="ghyb" selected>Карта: Google Гибрид</option>
            <option value="gsat">Карта: Google Спутник</option>
            <option value="osm">Карта: Схема OSM</option>
            <option value="solid">Карта: Отключена (Серый фон)</option>
        </select>

        <label class="layer-control">
            <input type="checkbox" id="cb-zu" value="zu" checked>
            <label for="cb-zu"><div class="color-box" style="background:rgba(16, 185, 129, 0.5);"></div> Участки (ЗУ)</label>
        </label>
        <label class="layer-control">
            <input type="checkbox" id="cb-oks" value="oks" checked>
            <label for="cb-oks"><div class="color-box" style="background:#3b82f6;"></div> Здания (ОКС)</label>
        </label>
        <label class="layer-control">
            <input type="checkbox" id="cb-str" value="str" checked>
            <label for="cb-str"><div class="color-box" style="background:#f59e0b;"></div> Сооружения</label>
        </label>
        <label class="layer-control">
            <input type="checkbox" id="cb-zones" value="zones">
            <label for="cb-zones"><div class="color-box" style="background:#8b5cf6;"></div> ЗОУИТ и Зоны</label>
        </label>

        <div id="stats">Инициализация...</div>
    </div>

    <div id="labels-layer"></div>
    <div id="hover-tooltip"></div>

    <script type="module">
        import * as THREE from "three";
        import { OrbitControls } from "three/addons/controls/OrbitControls.js";

        // ================= НАСТРОЙКИ =================
        const API_URL = 'https://mapruapp.ru/api/3d/objects'; 
        const START_LON = 50.7910; // Нурлат (поменяйте на свои, если нужно)
        const START_LAT = 54.8492;
        
        // УМНЫЙ КЭШ: Сюда будем складывать загруженные ID, чтобы не рисовать и не запрашивать их дважды
        const loadedFeatureIds = new Set();
        const activeTiles = new Map(); // Кэш плиток карты земли

        // ================= СЛОВАРИ СТИЛЕЙ =================
        const BUILDING_DICT = {
            education:{keys:["школ","детск","сад","учебн","институт"],wall:0xfce4c8,base:0x8b6f47,roof:0x5c4033,win:0x93c5fd,winType:"ribbon",parapet:true},
            medical:{keys:["больниц","поликлиник","мед","здрав","госпитал"],wall:0xf0f4f8,base:0x8294a8,roof:0x94a3b8,win:0x7dd3fc,winType:"standard",parapet:true},
            mkd:{keys:["многоквартирный","мкд","общежити","квартир"],wall:0xe2e8f0,base:0x64748b,roof:0x475569,win:0x7db8f0,winType:"dense",parapet:true},
            priv:{keys:["жилой дом","индивидуальн","частн","дачн"],wall:0xf0dcc8,base:0x7a6352,roof:0x8b4513,win:0x93c5fd,winType:"standard",parapet:false,hippedRoof:true},
            commercial:{keys:["магазин","торгов","офис","бизнес","тц"],wall:0xe0e7ff,base:0x4f46e5,roof:0x312e81,win:0x60a5fa,winType:"large",parapet:true},
            industrial:{keys:["склад","цех","завод","промышлен","гараж"],wall:0x94a3b8,base:0x475569,roof:0x334155,win:null,winType:"none",parapet:false},
            def:{wall:0xf8fafc,base:0x94a3b8,roof:0x64748b,win:0x93c5fd,winType:"standard",parapet:true}
        };

        const INFRA_COLORS = { gas: 0xf59e0b, water: 0x3b82f6, heat: 0xef4444, electric: 0xff0000, sewer: 0x6b7280, def: 0x8b5cf6 };

        // ================= ГЛОБАЛЬНЫЕ ПЕРЕМЕННЫЕ =================
        let scene, camera, renderer, controls;
        const sceneGroups = { zu: new THREE.Group(), oks: new THREE.Group(), str: new THREE.Group(), zones: new THREE.Group() };
        let mapTilesGroup, groundPlane;
        let currentGroundTex = 'ghyb';

        let isFetching = false;
        let fetchTimeout = null;
        let originMercator = [0,0];

        const interactables = [];
        const tooltip = document.getElementById("hover-tooltip");
        const textureLoader = new THREE.TextureLoader();
        textureLoader.setCrossOrigin('anonymous');

        // ================= МАТЕМАТИКА КООРДИНАТ =================
        function wgs84ToMercator(lon, lat) {
            const x = lon * 20037508.34 / 180;
            let y = Math.log(Math.tan((90 + lat) * Math.PI / 360)) / (Math.PI / 180);
            return [x, y * 20037508.34 / 180];
        }

        // ================= ИНИЦИАЛИЗАЦИЯ THREE.JS =================
        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0xe0f2fe);
            scene.fog = new THREE.Fog(0xe0f2fe, 500, 4000);

            camera = new THREE.PerspectiveCamera(45, window.innerWidth/window.innerHeight, 5, 20000);
            camera.position.set(200, 300, 300);

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            renderer.shadowMap.enabled = true;
            renderer.shadowMap.type = THREE.PCFSoftShadowMap;
            document.body.appendChild(renderer.domElement);

            controls = new OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true; 
            controls.maxPolarAngle = Math.PI/2 - 0.05; 
            controls.maxDistance = 3000; 

            // Освещение
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
            scene.add(ambientLight);
            
            const dirLight = new THREE.DirectionalLight(0xffffff, 1.5);
            dirLight.position.set(500, 1000, 500); 
            dirLight.castShadow = true;
            dirLight.shadow.camera.left = -1000; dirLight.shadow.camera.right = 1000;
            dirLight.shadow.camera.top = 1000; dirLight.shadow.camera.bottom = -1000;
            dirLight.shadow.bias = -0.001;
            scene.add(dirLight);

            // Группа для тайлов карты
            mapTilesGroup = new THREE.Group();
            mapTilesGroup.position.y = -0.2;
            scene.add(mapTilesGroup);

            // Твердая земля (если карты отключены)
            groundPlane = new THREE.Mesh(new THREE.PlaneGeometry(50000, 50000), new THREE.MeshStandardMaterial({color: 0xe2e8f0, roughness: 1}));
            groundPlane.rotation.x = -Math.PI / 2; 
            groundPlane.position.y = -0.3;
            groundPlane.receiveShadow = true;
            groundPlane.visible = false;
            scene.add(groundPlane);

            Object.values(sceneGroups).forEach(g => scene.add(g));

            // Установка "нуля" сцены
            originMercator = wgs84ToMercator(START_LON, START_LAT);
            controls.target.set(0, 0, 0);

            window.addEventListener('resize', onWindowResize);
            setupUI();
            setupInteractivity();

            animate();
            triggerFetch(); // Первый запрос

            controls.addEventListener('change', () => {
                updateMapTiles();
                clearTimeout(fetchTimeout);
                fetchTimeout = setTimeout(triggerFetch, 400); // Запрос данных при остановке камеры
            });
            updateMapTiles(); // Сразу грузим карту под ногами
        }

        // ================= ДИНАМИЧЕСКАЯ ЗАГРУЗКА КАРТЫ (ТАЙЛЫ) =================
        function updateMapTiles() {
            if (currentGroundTex === 'solid') {
                mapTilesGroup.visible = false;
                groundPlane.visible = true;
                return;
            }
            mapTilesGroup.visible = true;
            groundPlane.visible = false;

            const z = 18; 
            const E = 20037508.342789244; 
            const tileSize = (2 * E) / Math.pow(2, z);

            // Вычисляем, над каким тайлом сейчас центр камеры
            const targetX = controls.target.x;
            const targetZ = controls.target.z;

            const mercX = originMercator[0] + targetX;
            const mercY = originMercator[1] - targetZ;

            const tX = Math.floor((mercX + E) / tileSize);
            const tY = Math.floor((E - mercY) / tileSize);

            const newTiles = new Set();
            const radius = 3; // Сетка 7х7 тайлов (радиус 3)

            for (let i = -radius; i <= radius; i++) {
                for (let j = -radius; j <= radius; j++) {
                    const cx = tX + i;
                    const cy = tY + j;
                    const key = `${currentGroundTex}_${cx}_${cy}`;
                    newTiles.add(key);

                    if (!activeTiles.has(key)) {
                        const minX = -E + cx * tileSize;
                        const maxY = E - cy * tileSize;
                        
                        const posX = minX + tileSize/2 - originMercator[0];
                        const posZ = -(maxY - tileSize/2 - originMercator[1]);

                        const geo = new THREE.PlaneGeometry(tileSize, tileSize);
                        geo.rotateX(-Math.PI / 2);
                        const mat = new THREE.MeshStandardMaterial({ color: 0xffffff, roughness: 1 });
                        const mesh = new THREE.Mesh(geo, mat);
                        mesh.position.set(posX, 0, posZ);
                        mesh.receiveShadow = true;
                        
                        mapTilesGroup.add(mesh);
                        activeTiles.set(key, mesh);

                        let url = '';
                        if (currentGroundTex === 'osm') url = `https://tile.openstreetmap.org/${z}/${cx}/${cy}.png`;
                        if (currentGroundTex === 'gsat') url = `https://mt1.google.com/vt/lyrs=s&x=${cx}&y=${cy}&z=${z}`;
                        if (currentGroundTex === 'ghyb') url = `https://mt1.google.com/vt/lyrs=y&x=${cx}&y=${cy}&z=${z}`;

                        textureLoader.load(url, (tex) => {
                            tex.colorSpace = THREE.SRGBColorSpace;
                            mat.map = tex;
                            mat.needsUpdate = true;
                        });
                    }
                }
            }

            // Удаляем старые тайлы, которые вышли из зоны видимости
            for (const [key, mesh] of activeTiles.entries()) {
                if (!newTiles.has(key)) {
                    mapTilesGroup.remove(mesh);
                    if (mesh.material.map) mesh.material.map.dispose();
                    mesh.material.dispose();
                    mesh.geometry.dispose();
                    activeTiles.delete(key);
                }
            }
        }

        // ================= ЛОГИКА ФАСАДОВ И ОКОН =================
        const windowMaterialCache = {};
        function getWindowMaterial(style) {
            if (style.winType==="none"||!style.win) return new THREE.MeshStandardMaterial({color:style.wall,roughness:0.9});
            const ck = style.wall+"_"+style.winType;
            if (windowMaterialCache[ck]) return windowMaterialCache[ck];

            const cv = document.createElement("canvas"); cv.width=256; cv.height=256; 
            const ctx = cv.getContext("2d");
            ctx.fillStyle="#"+new THREE.Color(style.wall).getHexString(); ctx.fillRect(0,0,256,256);
            
            let wW=120, wH=160;
            if(style.winType==="dense"){wW=160;wH=180;}else if(style.winType==="ribbon"){wW=220;wH=100;}else if(style.winType==="large"){wW=180;wH=200;}
            
            const sX=(256-wW)/2, sY=(256-wH)/2;
            ctx.fillStyle="#"+new THREE.Color(style.win).getHexString(); ctx.fillRect(sX,sY,wW,wH);
            ctx.strokeStyle="#1e293b"; ctx.lineWidth=8; ctx.strokeRect(sX,sY,wW,wH);
            
            const tex = new THREE.CanvasTexture(cv);
            tex.colorSpace = THREE.SRGBColorSpace;
            tex.wrapS = THREE.RepeatWrapping; tex.wrapT = THREE.RepeatWrapping;
            
            const repeatX = style.winType==="dense"?3:(style.winType==="ribbon"?5:4);
            tex.repeat.set(1/repeatX, 1/3.5); 
            
            const mat = new THREE.MeshStandardMaterial({map:tex, roughness:0.2, metalness:0.6});
            windowMaterialCache[ck]=mat; return mat;
        }

        function createShape(coords) {
            const shape = new THREE.Shape();
            if(!coords || coords.length < 1 || coords[0].length < 3) return shape;
            
            const getLocal = (c) => ({ x: c[0] - originMercator[0], y: c[1] - originMercator[1] });
            
            const outer = coords[0];
            const start = getLocal(outer[0]);
            shape.moveTo(start.x, start.y);
            for(let i=1; i<outer.length; i++) {
                const pt = getLocal(outer[i]);
                shape.lineTo(pt.x, pt.y);
            }
            
            for(let i=1; i<coords.length; i++) {
                const holeRing = coords[i];
                if(holeRing.length < 3) continue;
                const hole = new THREE.Path();
                const hStart = getLocal(holeRing[0]);
                hole.moveTo(hStart.x, hStart.y);
                for(let j=1; j<holeRing.length; j++) {
                    const pt = getLocal(holeRing[j]);
                    hole.lineTo(pt.x, pt.y);
                }
                shape.holes.push(hole);
            }
            return shape;
        }

        // ================= ПОСТРОЕНИЕ ОБЪЕКТОВ =================
        function buildModel(feature, groupName) {
            const geom = feature.geometry;
            const props = feature.properties;
            const opts = props.options || {};
            
            const rawText = (props.descr + ' ' + (opts.purpose||'') + ' ' + (opts.name||'')).toLowerCase();
            
            let name = opts.name_by_doc || opts.building_name || opts.params_name || opts.purpose || props.descr || 'Объект';
            let cadNum = opts.cad_num || opts.cad_number || opts.reg_numb_border || feature.id || 'Без номера';
            
            const meta = {
                id: cadNum, name: name,
                address: opts.readable_address || opts.address_readable_address || '',
                area: opts.build_record_area || opts.specified_area || opts.declared_area || '',
                floors: opts.floors || '',
                year: opts.year_built || opts.params_year_built || '',
                ext: opts.params_extension || ''
            };

            const modelGroup = new THREE.Group();
            const ringsList = geom.type === 'MultiPolygon' ? geom.coordinates : [geom.coordinates];

            ringsList.forEach(coords => {
                const shape = createShape(coords);
                if(shape.getPoints().length < 3) return;

                let mesh;
                if (groupName === 'oks') {
                    const style = getBuildingStyle(rawText);
                    const floors = parseInt(opts.floors) || (rawText.includes('мкд') ? 9 : (rawText.includes('школ') ? 3 : 1));
                    const height = floors * 3.5;

                    const base = new THREE.Mesh(new THREE.ExtrudeGeometry(shape,{depth:0.5,bevelEnabled:false}), new THREE.MeshStandardMaterial({color: style.base}));
                    base.rotation.x = -Math.PI/2; base.position.y = 0.5; modelGroup.add(base);
                    
                    const walls = new THREE.Mesh(new THREE.ExtrudeGeometry(shape,{depth:height,bevelEnabled:false}), [new THREE.MeshStandardMaterial({color:style.roof}), getWindowMaterial(style)]);
                    walls.rotation.x = -Math.PI/2; walls.position.y = 1.0;
                    walls.castShadow = true; walls.receiveShadow = true; modelGroup.add(walls);

                    if (style.hippedRoof) {
                        const roof = new THREE.Mesh(new THREE.ExtrudeGeometry(shape,{depth:1.2,bevelEnabled:false}), new THREE.MeshStandardMaterial({color:style.roof}));
                        roof.rotation.x = -Math.PI/2; roof.position.y = 1.0 + height; roof.castShadow = true; modelGroup.add(roof);
                    } else if (style.parapet) {
                        const par = new THREE.Mesh(new THREE.ExtrudeGeometry(shape,{depth:0.8,bevelEnabled:true,bevelSize:0.2,bevelThickness:0.2}), new THREE.MeshStandardMaterial({color:style.roof}));
                        par.rotation.x = -Math.PI/2; par.position.y = 1.0 + height; modelGroup.add(par);
                    }

                } else if (groupName === 'zu') {
                    const mat = new THREE.MeshStandardMaterial({ color: 0x10b981, transparent: true, opacity: 0.3, depthWrite: false });
                    mesh = new THREE.Mesh(new THREE.ExtrudeGeometry(shape,{depth:0.1,bevelEnabled:false}), mat);
                    mesh.rotation.x = -Math.PI/2; mesh.position.y = 0.1;
                    mesh.add(new THREE.LineSegments(new THREE.EdgesGeometry(mesh.geometry), new THREE.LineBasicMaterial({color:0x047857})));
                    modelGroup.add(mesh);
                    
                } else if (groupName === 'zones') {
                    let color = 0x8b5cf6;
                    if(rawText.includes('газ')) color = 0xf59e0b;
                    if(rawText.includes('электр')||rawText.includes('лэп')) color = 0xef4444;
                    if(rawText.includes('водо')) color = 0x3b82f6;

                    const mat = new THREE.MeshStandardMaterial({ color: color, transparent: true, opacity: 0.4, depthWrite: false, side: THREE.DoubleSide });
                    mesh = new THREE.Mesh(new THREE.ExtrudeGeometry(shape,{depth:5,bevelEnabled:false}), mat);
                    mesh.rotation.x = -Math.PI/2; mesh.position.y = 0.5;
                    mesh.add(new THREE.LineSegments(new THREE.EdgesGeometry(mesh.geometry), new THREE.LineBasicMaterial({color:color})));
                    modelGroup.add(mesh);
                    
                } else if (groupName === 'str') {
                    const mat = new THREE.MeshStandardMaterial({ color: 0xf59e0b });
                    mesh = new THREE.Mesh(new THREE.ExtrudeGeometry(shape,{depth:1,bevelEnabled:false}), mat);
                    mesh.rotation.x = -Math.PI/2; mesh.position.y = 0.5; mesh.castShadow=true;
                    modelGroup.add(mesh);
                }
            });

            if (modelGroup.children.length > 0) {
                modelGroup.userData = { meta: meta, type: groupName };
                // Сохраняем оригинальный цвет для подсветки
                modelGroup.children.forEach(c => { 
                    c.userData.parentGroup = modelGroup; 
                    c.userData.origEmissive = 0x000000;
                    interactables.push(c); 
                });
                sceneGroups[groupName].add(modelGroup);
            }
        }

        function getBuildingStyle(rawText) {
            for (const key in BUILDING_DICT) {
                if (BUILDING_DICT[key].keys && BUILDING_DICT[key].keys.some(k => rawText.includes(k))) return BUILDING_DICT[key];
            }
            return BUILDING_DICT.def;
        }

        // ================= ЗАГРУЗКА ДАННЫХ =================
        async function triggerFetch() {
            const activeLayers = Array.from(document.querySelectorAll('.layer-control input')).filter(cb => cb.checked).map(cb => cb.value);
            if (activeLayers.length === 0) return;

            // Вычисляем область загрузки вокруг фокуса камеры (controls.target)
            const targetX = controls.target.x;
            const targetZ = controls.target.z;
            const dist = camera.position.distanceTo(controls.target);
            const radius = Math.min(dist * 1.5 + 500, 3000); // Радиус поиска зависит от отдаления камеры
            
            const minX = originMercator[0] + targetX - radius;
            const maxX = originMercator[0] + targetX + radius;
            const minY = originMercator[1] - targetZ - radius;
            const maxY = originMercator[1] - targetZ + radius;

            const url = `${API_URL}?min_x=${minX}&max_x=${maxX}&min_y=${minY}&max_y=${maxY}&layers=${activeLayers.join(',')}`;

            document.getElementById('stats').innerHTML = 'Скачивание... <i class="fas fa-spinner loading-pulse"></i>';
            isFetching = true;

            try {
                const response = await fetch(url);
                if(!response.ok) throw new Error('Network error');
                const data = await response.json();

                let addedCount = 0;
                data.features.forEach(f => {
                    // УМНЫЙ КЭШ: Если объект с таким ID уже загружен — пропускаем!
                    if (loadedFeatureIds.has(f.id)) return;
                    
                    loadedFeatureIds.add(f.id);
                    buildModel(f, f.properties._layer_type);
                    addedCount++;
                });

                document.getElementById('stats').innerText = `В памяти: ${loadedFeatureIds.size} объектов`;
            } catch (err) {
                console.error(err);
                document.getElementById('stats').innerText = 'Ошибка сервера';
            } finally {
                isFetching = false;
            }
        }

        // ================= ИНТЕРФЕЙС =================
        function setupUI() {
            // Селектор карт
            document.getElementById('layer-selector').addEventListener('change', (e) => {
                currentGroundTex = e.target.value;
                updateMapTiles();
            });

            // Чекбоксы объектов
            document.querySelectorAll('.layer-control input').forEach(cb => {
                cb.addEventListener('change', (e) => {
                    const group = sceneGroups[e.target.value];
                    if (group) group.visible = e.target.checked;
                    triggerFetch();
                });
            });
        }

        function setupInteractivity() {
            const raycaster = new THREE.Raycaster();
            const mouse = new THREE.Vector2();
            let hoveredObj = null;

            window.addEventListener('mousemove', (e) => {
                mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
                mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
                raycaster.setFromCamera(mouse, camera);

                // Ищем пересечения только с видимыми объектами
                const hits = raycaster.intersectObjects(interactables, false).filter(h => h.object.visible && h.object.parent.visible);

                if (hits.length > 0) {
                    let hitMesh = hits[0].object;
                    let parentGroup = hitMesh.userData.parentGroup;
                    
                    if (hoveredObj !== parentGroup) {
                        if (hoveredObj) setHighlight(hoveredObj, false);
                        hoveredObj = parentGroup;
                        setHighlight(hoveredObj, true);
                        document.body.style.cursor = 'pointer';
                        
                        // Обновляем тултип
                        const meta = hoveredObj.userData.meta;
                        const typeName = hoveredObj.userData.type === 'oks' ? 'Здание' : (hoveredObj.userData.type === 'zu' ? 'Земельный участок' : 'Объект');
                        
                        let html = `<span class="tt-title">${typeName}</span><span class="tt-id">${meta.id}</span>`;
                        if(meta.name && meta.name !== 'Объект') html += `<span class="tt-info"><b>Название:</b> ${meta.name}</span>`;
                        if(meta.address) html += `<span class="tt-info"><b>Адрес:</b> ${meta.address}</span>`;
                        if(meta.floors) html += `<span class="tt-info"><b>Этажность:</b> ${meta.floors}</span>`;
                        if(meta.year) html += `<span class="tt-info"><b>Год:</b> ${meta.year}</span>`;
                        if(meta.area) html += `<div class="tt-area">${meta.area.toLocaleString('ru-RU')} м²</div>`;

                        tooltip.innerHTML = html;
                        tooltip.style.opacity = "1";
                    }
                    tooltip.style.left = (e.clientX + 15) + "px";
                    tooltip.style.top = (e.clientY + 15) + "px";
                } else {
                    if (hoveredObj) {
                        setHighlight(hoveredObj, false);
                        hoveredObj = null;
                        document.body.style.cursor = 'default';
                        tooltip.style.opacity = "0";
                    }
                }
            });
        }

        function setHighlight(group, isActive) {
            group.children.forEach(mesh => {
                if (mesh.material) {
                    const highlightColor = new THREE.Color(0x333333);
                    const black = new THREE.Color(0x000000);
                    const applyEmi = (m) => { if(m.emissive) m.emissive.copy(isActive ? highlightColor : black); };
                    
                    if (Array.isArray(mesh.material)) mesh.material.forEach(applyEmi);
                    else applyEmi(mesh.material);
                }
            });
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }

        // Запуск!
        init();

    </script>
</body>
</html>
