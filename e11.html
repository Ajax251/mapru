<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Экспорт DXF по кадастровому номеру | vsemap.ru</title>
    <!-- Иконки -->
    <link href="webfonts/all.min.css" rel="stylesheet">
    <!-- Скрипты проекции и базы данных с вашего сервера -->
    <script src="webfonts/proj4.js"></script>
    <script src="sk.js"></script>
    <script src="msk.js"></script>
    
    <style>
        :root {
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            --bg: #f1f5f9;
            --card-bg: #ffffff;
            --text-dark: #0f172a;
            --text-muted: #64748b;
            --border: #cbd5e1;
            --radius: 20px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg);
            color: var(--text-dark);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 16px;
        }

        .app-container {
            width: 100%;
            max-width: 420px;
            background: var(--card-bg);
            border-radius: var(--radius);
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.06);
            padding: 24px;
            border: 1px solid rgba(226, 232, 240, 0.8);
        }

        h1 {
            font-size: 1.4rem;
            font-weight: 800;
            text-align: center;
            margin-bottom: 4px;
            color: var(--text-dark);
            letter-spacing: -0.5px;
        }

        .subtitle {
            font-size: 0.85rem;
            color: var(--text-muted);
            text-align: center;
            margin-bottom: 24px;
        }

        .form-group {
            margin-bottom: 18px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        label {
            font-size: 0.85rem;
            font-weight: 700;
            color: var(--text-dark);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        input {
            width: 100%;
            height: 52px;
            padding: 0 16px;
            font-size: 1.05rem;
            border: 1.5px solid var(--border);
            border-radius: 12px;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
            text-align: center;
            background: #f8fafc;
        }

        input:focus {
            border-color: var(--primary);
            background: #ffffff;
            box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.12);
        }

        input#cadastralInput {
            font-family: "SF Mono", "Courier New", monospace;
            font-weight: 600;
            letter-spacing: 1px;
        }

        .btn {
            width: 100%;
            height: 52px;
            font-size: 1rem;
            font-weight: 700;
            color: #ffffff;
            background-color: var(--primary);
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: background-color 0.2s, transform 0.1s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.2);
        }

        .btn:active {
            transform: scale(0.97);
        }

        .btn-secondary {
            background-color: #334155;
            box-shadow: 0 4px 12px rgba(51, 65, 85, 0.2);
        }

        .preview-box {
            margin-top: 24px;
            border: 1.5px solid #e2e8f0;
            border-radius: 14px;
            overflow: hidden;
            background-color: #f8fafc;
            display: none;
            flex-direction: column;
            animation: fadeIn 0.3s ease;
        }

        .canvas-container {
            width: 100%;
            aspect-ratio: 4 / 3;
            position: relative;
        }

        canvas {
            width: 100%;
            height: 100%;
            display: block;
            background-color: #ffffff;
        }

        .stats-panel {
            padding: 16px;
            border-top: 1px solid #e2e8f0;
            background-color: #ffffff;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .stats-row {
            display: flex;
            justify-content: space-around;
            width: 100%;
            border-bottom: 1px solid #e2e8f0;
            padding-bottom: 10px;
        }

        .stat-item {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .stat-item.full-width {
            width: 100%;
            text-align: center;
        }

        .stat-label {
            font-size: 0.75rem;
            color: var(--text-muted);
            text-transform: uppercase;
            font-weight: 700;
            letter-spacing: 0.5px;
        }

        .stat-val {
            font-size: 1.1rem;
            font-weight: 800;
            color: var(--text-dark);
        }

        .stat-val.address-text {
            font-size: 0.85rem;
            font-weight: 500;
            line-height: 1.4;
            color: var(--text-dark);
        }

        .toast {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            background: #0f172a;
            color: #ffffff;
            padding: 14px 28px;
            border-radius: 30px;
            font-size: 0.9rem;
            font-weight: 600;
            box-shadow: 0 6px 20px rgba(0,0,0,0.15);
            display: none;
            z-index: 1000;
            white-space: nowrap;
            animation: slideUp 0.3s ease;
        }

        .loader-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255,255,255,0.85);
            backdrop-filter: blur(5px);
            z-index: 999;
            display: none;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 16px;
        }

        .spinner {
            width: 44px;
            height: 44px;
            border: 4px solid #cbd5e1;
            border-top: 4px solid var(--primary);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @keyframes slideUp {
            from { bottom: 0; opacity: 0; }
            to { bottom: 24px; opacity: 1; }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="app-container">
        <h1>Схема в DXF</h1>
        <div class="subtitle">Сервис быстрой выгрузки чертежей с vsemap.ru</div>

        <div class="form-group">
            <label for="cadastralInput">Кадастровый номер</label>
            <input type="text" id="cadastralInput" placeholder="XX:XX:XXXXXXX:XX" autocomplete="off" inputmode="numeric">
        </div>

        <div class="form-group" style="margin-bottom: 24px;">
            <label for="emailInput">Электронная почта</label>
            <input type="email" id="emailInput" placeholder="recipient@mail.ru" autocomplete="off">
        </div>

        <button class="btn" id="loadContourBtn" onclick="handleLoadContour()">
            <i class="fas fa-eye"></i>Показать схему
        </button>

        <!-- Блок превью схемы (Canvas + Свойства + Адрес) -->
        <div class="preview-box" id="previewBox">
            <div class="canvas-container">
                <canvas id="previewCanvas"></canvas>
            </div>
            <div class="stats-panel">
                <div class="stats-row">
                    <div class="stat-item">
                        <span class="stat-label">Площадь</span>
                        <span class="stat-val" id="statArea">—</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-label">Периметр</span>
                        <span class="stat-val" id="statPerimeter">—</span>
                    </div>
                </div>
                <div class="stat-item full-width">
                    <span class="stat-label">Адрес</span>
                    <span class="stat-val address-text" id="statAddress">—</span>
                </div>
            </div>
        </div>

        <!-- Кнопка отправки на почту -->
        <button class="btn btn-secondary" id="sendEmailBtn" onclick="handleSendEmail()" style="margin-top: 18px; display: none;">
            <i class="fas fa-paper-plane"></i>Отправить на почту
        </button>
    </div>

    <div class="loader-overlay" id="loaderOverlay">
        <div class="spinner"></div>
        <span id="loaderText" style="font-weight: 700; font-size: 1rem; color: var(--text-dark);">Загрузка...</span>
    </div>

    <div class="toast" id="toastMessage"></div>

    <script>
        const sevenDigitsRegions = ['06', '07', '09', '10', '11', '12', '13', '14', '17', '23','24', '27', '31', '32', '35', '36', '41', '42', '47', '48','50', '52', '53', '56', '57', '58', '59', '60', '61', '62','63', '64', '65', '66', '67', '69', '70', '71', '72', '74','77', '78', '79', '91'];
        let loadedContours = null;

        document.addEventListener('DOMContentLoaded', () => {
            const savedEmail = localStorage.getItem('vsemap_recipient_email');
            if (savedEmail) {
                document.getElementById('emailInput').value = savedEmail;
            }

            const cadInput = document.getElementById('cadastralInput');
            cadInput.addEventListener('input', () => formatCadastralNumberInput(cadInput));
            
            document.getElementById('emailInput').addEventListener('input', (e) => {
                localStorage.setItem('vsemap_recipient_email', e.target.value.trim());
            });
        });

        function formatCadastralNumberInput(input) {
            let value = input.value.replace(/[^\d]/g, '');
            let formatted = '';
            if (value.length > 0) {
                const region = value.substring(0, 2);
                formatted += region;
                if (value.length > 2) {
                    formatted += ':' + value.substring(2, 4);
                }
                if (value.length > 4) {
                    const quarterMaxLength = sevenDigitsRegions.includes(region) ? 7 : 6;
                    const quarterEndIndex = 4 + quarterMaxLength;
                    formatted += ':' + value.substring(4, quarterEndIndex);
                    if (value.length > quarterEndIndex) {
                        formatted += ':' + value.substring(quarterEndIndex);
                    }
                }
            }
            input.value = formatted;
        }

        function isValidCadastralNumber(text) {
            if (!text) return false;
            const firstTwoDigits = text.slice(0, 2);
            const digitsAfterSecondColon = sevenDigitsRegions.includes(firstTwoDigits) ? 7 : 6;
            const pattern = new RegExp(`^\\d{2}:\\d{2}:\\d{${digitsAfterSecondColon}}:\\d+$`);
            return pattern.test(text);
        }

        function showToast(message) {
            const toast = document.getElementById('toastMessage');
            toast.textContent = message;
            toast.style.display = 'block';
            setTimeout(() => {
                toast.style.display = 'none';
            }, 3000);
        }

        function toggleLoader(show, text = 'Загрузка...') {
            const loader = document.getElementById('loaderOverlay');
            document.getElementById('loaderText').textContent = text;
            loader.style.display = show ? 'flex' : 'none';
        }

        async function handleLoadContour() {
            const cadastralNumber = document.getElementById('cadastralInput').value.trim();
            if (!isValidCadastralNumber(cadastralNumber)) {
                showToast('Введите корректный кадастровый номер');
                return;
            }

            toggleLoader(true, 'Получение геометрии ЕГРН...');

            try {
                const url = `https://nspd.gov.ru/api/geoportal/v2/search/geoportal?thematicSearchId=1&query=${encodeURIComponent(cadastralNumber)}`;
                const response = await fetch(url);
                if (!response.ok) throw new Error('Ошибка сети при связи с ЕГРН');

                const resData = await response.json();
                if (!resData.data || !resData.data.features || resData.data.features.length === 0) {
                    throw new Error('Участок не найден в базе ЕГРН');
                }

                const feature = resData.data.features[0];
                if (!feature.geometry) {
                    throw new Error('Геометрия данного участка отсутствует');
                }

                loadedContours = autoDetectAndConvertEgrnCoords(feature.geometry, cadastralNumber);
                if (!loadedContours || loadedContours.length === 0) {
                    throw new Error('Не удалось преобразовать координаты в МСК');
                }

                // 1. Сначала делаем контейнер схемы видимым, чтобы Canvas получил свои физические размеры
                document.getElementById('previewBox').style.display = 'flex';
                document.getElementById('sendEmailBtn').style.display = 'flex';

                // 2. Теперь рисуем схему и выводим информацию, когда элементы уже спозиционированы на странице
                drawContourPreview(loadedContours);
                
                const address = feature.properties?.options?.readable_address || 'Адрес отсутствует в базе ЕГРН';
                calculateAndDisplayStats(loadedContours, address);

                showToast('Схема успешно загружена!');

            } catch (error) {
                console.error(error);
                showToast(error.message || 'Ошибка загрузки данных');
            } finally {
                toggleLoader(false);
            }
        }

        async function handleSendEmail() {
            const email = document.getElementById('emailInput').value.trim();
            const cadastralNumber = document.getElementById('cadastralInput').value.trim();
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

            if (!email || !emailRegex.test(email)) {
                showToast('Укажите корректный email получателя');
                return;
            }

            if (!loadedContours || loadedContours.length === 0) {
                showToast('Сначала загрузите контур участка');
                return;
            }

            toggleLoader(true, 'Генерация и отправка чертежа...');
            const dxfContent = generateDXFString(loadedContours);

            try {
                 const response = await fetch('https://maildxf.vercel.app/api/send-email', {

                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        email: email,
                        cadastralNumber: cadastralNumber,
                        dxfContent: dxfContent
                    })
                });

                const data = await response.json();

                if (response.ok) {
                    showToast('Чертеж успешно отправлен на вашу почту!');
                } else {
                    showToast(`Ошибка: ${data.error || 'Не удалось отправить'}`);
                }

            } catch (error) {
                console.error(error);
                showToast('Ошибка соединения при отправке');
            } finally {
                toggleLoader(false);
            }
        }

        function autoDetectAndConvertEgrnCoords(geometry, cadastralNumber) {
            if (typeof proj4 === 'undefined' || typeof COORDINATE_SYSTEMS === 'undefined' || typeof MskFinder === 'undefined') {
                throw new Error("Необходимые библиотеки координат не найдены");
            }

            const mskCode = MskFinder.findMskCode(cadastralNumber);
            if (!mskCode) throw new Error("Система координат МСК не определена для данного региона");

            const searchString = "МСК " + mskCode;
            const targetSystem = COORDINATE_SYSTEMS.find(s => s.text.startsWith(searchString));
            if (!targetSystem) throw new Error(`Параметры МСК ${mskCode} отсутствуют в базе`);

            proj4.defs(targetSystem.value, targetSystem.def);
            const { offsetX = 0, offsetY = 0 } = targetSystem;
            const convertedContours = [];

            const convertRing = ring => ring.map(coord => {
                const [lon, lat] = proj4('EPSG:3857', targetSystem.value, coord);
                const val1 = lat + offsetX;
                const val2 = lon + offsetY;
                return { x: Math.min(val1, val2), y: Math.max(val1, val2) };
            });

            if (geometry.type === 'Polygon') {
                geometry.coordinates.forEach(ring => {
                    if (ring.length > 0) convertedContours.push(convertRing(ring));
                });
            } else if (geometry.type === 'MultiPolygon') {
                geometry.coordinates.forEach(polygon => {
                    polygon.forEach(ring => {
                        if (ring.length > 0) convertedContours.push(convertRing(ring));
                    });
                });
            }
            return convertedContours;
        }

        function generateDXFString(contours) {
            let dxfContent = '0\nSECTION\n2\nHEADER\n9\n$ACADVER\n1\nAC1015\n0\nENDSEC\n0\nSECTION\n2\nENTITIES\n';
            let handleCounter = 100;

            contours.forEach(contour => {
                if (contour.length === 0) return;
                
                const first = contour[0];
                const last = contour[contour.length - 1];
                const isClosed = contour.length > 2 && Math.abs(first.x - last.x) < 0.001 && Math.abs(first.y - last.y) < 0.001;

                dxfContent += `0\nLWPOLYLINE\n5\n${handleCounter.toString(16).toUpperCase()}\n330\n1F\n100\nAcDbEntity\n8\n0\n100\nAcDbPolyline\n90\n${contour.length}\n70\n${isClosed ? 1 : 0}\n43\n0.0\n`;
                
                contour.forEach(p => {
                    dxfContent += `10\n${p.y.toFixed(6)}\n20\n${p.x.toFixed(6)}\n`;
                });
                handleCounter++;
            });

            dxfContent += '0\nENDSEC\n0\nEOF\n';
            return dxfContent;
        }

        function calculateAndDisplayStats(contours, address) {
            let totalArea = 0;
            let totalPerimeter = 0;

            contours.forEach(contour => {
                let perimeter = 0;
                for (let i = 0; i < contour.length - 1; i++) {
                    perimeter += Math.sqrt((contour[i+1].x - contour[i].x)**2 + (contour[i+1].y - contour[i].y)**2);
                }
                const isClosed = Math.abs(contour[0].x - contour[contour.length-1].x) < 0.001 && Math.abs(contour[0].y - contour[contour.length-1].y) < 0.001;
                if (!isClosed && contour.length > 1) {
                    perimeter += Math.sqrt((contour[0].x - contour[contour.length-1].x)**2 + (contour[0].y - contour[contour.length-1].y)**2);
                }

                let area = 0;
                const n = contour.length;
                for (let i = 0; i < n; i++) {
                    const p1 = contour[i];
                    const p2 = contour[(i + 1) % n];
                    area += p1.x * p2.y - p1.y * p2.x;
                }
                area = Math.abs(area) / 2;

                totalArea += area;
                totalPerimeter += perimeter;
            });

            document.getElementById('statArea').textContent = `${Math.round(totalArea)} кв.м`;
            document.getElementById('statPerimeter').textContent = `${totalPerimeter.toFixed(1)} м`;
            document.getElementById('statAddress').textContent = address;
        }

        function drawContourPreview(contours) {
            const canvas = document.getElementById('previewCanvas');
            const container = canvas.parentElement;
            
            const width = container.offsetWidth;
            const height = container.offsetHeight;
            canvas.width = width * window.devicePixelRatio;
            canvas.height = height * window.devicePixelRatio;

            const ctx = canvas.getContext('2d');
            ctx.scale(window.devicePixelRatio, window.devicePixelRatio);
            ctx.clearRect(0, 0, width, height);

            const allPoints = contours.flat();
            if (allPoints.length === 0) return;

            const minX = Math.min(...allPoints.map(p => p.x));
            const minY = Math.min(...allPoints.map(p => p.y));
            const maxX = Math.max(...allPoints.map(p => p.x));
            const maxY = Math.max(...allPoints.map(p => p.y));

            const diffX = (maxX - minX) === 0 ? 100 : (maxX - minX);
            const diffY = (maxY - minY) === 0 ? 100 : (maxY - minY);

            const padding = 20;
            const scaleX = (width - padding * 2) / diffY;
            const scaleY = (height - padding * 2) / diffX;
            const scale = Math.min(scaleX, scaleY);

            const offsetX = padding + (width - padding * 2 - diffY * scale) / 2;
            const offsetY = padding + (height - padding * 2 - diffX * scale) / 2;

            ctx.beginPath();
            ctx.strokeStyle = '#2563eb';
            ctx.lineWidth = 2.5;
            ctx.fillStyle = 'rgba(37, 99, 235, 0.05)';

            contours.forEach(contour => {
                contour.forEach((p, index) => {
                    const canvasX = offsetX + (p.y - minY) * scale;
                    const canvasY = height - (offsetY + (p.x - minX) * scale);
                    if (index === 0) ctx.moveTo(canvasX, canvasY);
                    else ctx.lineTo(canvasX, canvasY);
                });
            });

            ctx.closePath();
            ctx.fill();
            ctx.stroke();

            ctx.fillStyle = '#ef4444';
            allPoints.forEach(p => {
                const canvasX = offsetX + (p.y - minY) * scale;
                const canvasY = height - (offsetY + (p.x - minX) * scale);
                ctx.beginPath();
                ctx.arc(canvasX, canvasY, 3.5, 0, 2 * Math.PI);
                ctx.fill();
            });
        }
    </script>
</body>
</html>
