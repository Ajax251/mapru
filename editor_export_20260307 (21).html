<html lang="ru" data-theme="light"><head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Сравнение (Pro)</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root[data-theme="light"] {
            --bg: #f8fafc;
            --panel-bg: rgba(255, 255, 255, 0.85);
            --text: #1e293b;
            --text-muted: #64748b;
            --border: rgba(0, 0, 0, 0.1);
            --accent: #3b82f6;
            --accent-hover: #2563eb;
            --input-bg: rgba(241, 245, 249, 0.9);
            --item-bg: #ffffff;
            --shadow: rgba(0, 0, 0, 0.08);
            --tooltip-bg: rgba(255, 255, 255, 0.95);
        }

        :root[data-theme="dark"] {
            --bg: #0f172a;
            --panel-bg: rgba(30, 41, 59, 0.85);
            --text: #f8fafc;
            --text-muted: #94a3b8;
            --border: rgba(255, 255, 255, 0.1);
            --accent: #3b82f6;
            --accent-hover: #60a5fa;
            --input-bg: rgba(15, 23, 42, 0.6);
            --item-bg: rgba(30, 41, 59, 0.6);
            --shadow: rgba(0, 0, 0, 0.5);
            --tooltip-bg: rgba(15, 23, 42, 0.95);
        }

        body { margin: 0; overflow: hidden; font-family: 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: var(--text); transition: background 0.3s; }
        canvas { display: block; outline: none; }

        /* UI Panel */
        #ui-panel {
            position: absolute; top: 0; left: 0; width: 380px; height: 100vh;
            background: var(--panel-bg); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            border-right: 1px solid var(--border); display: flex; flex-direction: column;
            box-shadow: 5px 0 30px var(--shadow); z-index: 10; transition: transform 0.3s ease;
        }
        
        /* Кнопка скрытия панели для мобильных */
        #toggle-panel { display: none; } 

        .panel-header { padding: 15px 20px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        .panel-header h2 { margin: 0; font-size: 18px; display: flex; align-items: center; gap: 10px; }
        
        .header-actions { display: flex; gap: 10px; }
        .icon-btn { background: transparent; border: none; color: var(--text); font-size: 16px; cursor: pointer; padding: 5px; transition: 0.2s; border-radius: 4px; }
        .icon-btn:hover { color: var(--accent); background: var(--input-bg); }

        .panel-content { padding: 20px; overflow-y: auto; flex-grow: 1; }
        .panel-content::-webkit-scrollbar { width: 6px; }
        .panel-content::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

        /* Form */
        .form-group { margin-bottom: 15px; }
        .form-label { display: block; font-size: 12px; font-weight: 700; text-transform: uppercase; margin-bottom: 6px; color: var(--text-muted); letter-spacing: 0.5px; }
        
        select, textarea {
            width: 100%; background: var(--input-bg); border: 1px solid var(--border);
            border-radius: 8px; color: var(--text); padding: 10px; font-family: inherit; font-size: 13px;
            box-sizing: border-box; outline: none; transition: 0.2s;
        }
        textarea { height: 80px; resize: vertical; }
        select:focus, textarea:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15); }

        .btn-group { display: flex; gap: 10px; margin-bottom: 10px; }
        button.primary-btn {
            flex: 1; background: var(--accent); color: #fff; border: none; padding: 12px;
            border-radius: 8px; font-weight: 600; cursor: pointer; transition: all 0.2s;
            display: flex; align-items: center; justify-content: center; gap: 8px; font-size: 14px;
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3);
        }
        button.primary-btn:hover { background: var(--accent-hover); transform: translateY(-1px); }
        button.secondary-btn {
            background: var(--input-bg); border: 1px solid var(--border); color: var(--text);
            padding: 10px 15px; border-radius: 8px; cursor: pointer; transition: 0.2s; font-weight: 600;
        }
        button.secondary-btn:hover { border-color: var(--accent); color: var(--accent); }

        /* Mode Switch */
        .mode-switch {
            display: flex; background: var(--input-bg); border-radius: 8px; margin: 20px 0;
            padding: 4px; border: 1px solid var(--border);
        }
        .mode-btn {
            flex: 1; background: transparent; border: none; color: var(--text-muted); padding: 8px;
            border-radius: 6px; cursor: pointer; font-weight: 600; transition: all 0.2s; font-size: 13px;
        }
        .mode-btn.active { background: var(--panel-bg); color: var(--text); box-shadow: 0 2px 8px var(--shadow); }

        /* List */
        .fridge-item {
            background: var(--item-bg); border: 1px solid var(--border); box-shadow: 0 2px 5px var(--shadow);
            border-radius: 10px; padding: 12px; margin-bottom: 10px; display: flex; align-items: center; gap: 12px;
            transition: all 0.2s; position: relative; overflow: hidden;
        }
        .fridge-item.hidden-obj { opacity: 0.6; background: var(--input-bg); border-style: dashed; }
        .fridge-item:hover { border-color: var(--accent); }
        
        .color-dot { width: 12px; height: 12px; border-radius: 50%; border: 2px solid var(--border); flex-shrink: 0; }
        .item-content { flex-grow: 1; min-width: 0; }
        .item-title { font-weight: 600; font-size: 14px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .item-desc { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
        
        .item-actions { display: flex; gap: 5px; }
        .action-btn { 
            background: transparent; border: none; cursor: pointer; width: 28px; height: 28px; 
            border-radius: 4px; display: flex; align-items: center; justify-content: center; 
            transition: 0.2s; color: var(--text-muted);
        }
        .action-btn:hover { background: var(--border); color: var(--text); }
        .btn-delete:hover { color: #ef4444; background: rgba(239, 68, 68, 0.1); }

        /* Tooltip */
        #tooltip {
            position: absolute; background: var(--tooltip-bg); border: 1px solid var(--border);
            padding: 15px; border-radius: 10px; pointer-events: none; opacity: 0; z-index: 100;
            box-shadow: 0 10px 40px var(--shadow); backdrop-filter: blur(8px);
            transform: translate(15px, 15px); transition: opacity 0.2s ease; min-width: 200px;
        }
        .tt-row { display: flex; justify-content: space-between; font-size: 12px; margin-bottom: 4px; }
        .tt-val { font-weight: 700; }

        .helper-text { font-size: 11px; color: var(--text-muted); text-align: center; margin-top: 5px; }
    </style>

    <!-- Three.js Import -->
    <script async="" src="https://unpkg.com/es-module-shims@1.8.0/dist/es-module-shims.js"></script>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"

    </script>
</head>
<body>

        <div class="panel-header">
            <h2><i class="fas fa-cubes" style="color: var(--accent);"></i> 3D Сравнение</h2>
            <div class="header-actions">
                <button id="export-btn" class="icon-btn" title="Скачать как HTML файл"><i class="fas fa-download"></i></button>
                <button id="theme-toggle" class="icon-btn" title="Сменить тему"><i class="fas fa-moon"></i></button>

        </div>
        <div class="panel-content">
            
            <div class="form-group">
                <label class="form-label">Тип объекта</label>

                    <option value="fridge">🧊 Холодильник</option>

            <div id="objects-list"><div class="fridge-item ">

                        <div class="item-title"><i class="fas fa-snowflake"></i> Холодильник 1</div>

                </div><div class="fridge-item ">
                    <div class="color-dot" style="background:#ef4444; border-color:#ef4444"></div>
                    <div class="item-content">
                        <div class="item-title"><i class="fas fa-snowflake"></i> Холодильник 2</div>
                        <div class="item-desc">60 × 167 × 64 cm | Холодильник</div>
                    </div>
                    <div class="item-actions">
                        <button class="action-btn btn-vis" title="Скрыть/Показать">
                            <i class="fas fa-eye"></i>
                        </button>
                        <button class="action-btn btn-delete" title="Удалить">
                            <i class="fas fa-trash"></i>
                        </button>
                    </div>
                </div></div>
        </div>
    </div>

    <div id="tooltip" style="opacity: 0; left: 623px; top: 312px;">
        <h3 id="tt-name" style="margin:0 0 10px 0; font-size:14px; border-bottom:1px solid var(--border); padding-bottom:5px;"><i class="fas fa-snowflake" style="color:#3b82f6"></i> Холодильник 1</h3>
        <div id="tt-content">
                    <div class="tt-row"><span>Габариты:</span> <span class="tt-val">60 x 185 x 64</span></div>
                    <div class="tt-row"><span>Тип:</span> <span class="tt-val">Холодильник</span></div>
                </div>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        // --- СОСТОЯНИЕ ПРИЛОЖЕНИЯ ---
        // Пытаемся загрузить данные, если это экспортированный файл (window.EXPORTED_DATA)
        // Иначе читаем из LocalStorage
        let appState = {
            objects: [],
            theme: 'light',
            mode: 'side'
        };

        // --- КОНФИГ ---
        const colors = [0x3b82f6, 0xef4444, 0x10b981, 0xf59e0b, 0x8b5cf6, 0xec4899, 0x06b6d4, 0x6366f1];
        const icons = {
            fridge: 'fa-snowflake', tv: 'fa-tv', washer: 'fa-circle-notch', 
            cabinet: 'fa-door-closed', sofa: 'fa-couch', car: 'fa-car', house: 'fa-home'
        };
        const typeNames = {
            fridge: 'Холодильник', tv: 'Экран', washer: 'Стир. машина', 
            cabinet: 'Шкаф', sofa: 'Диван', car: 'Автомобиль', house: 'Дом'
        };

        let objectMeshes = [];
        let scene, camera, renderer, controls, floor, grid;
        let ambientLight, dirLight;

        // --- ИНИЦИАЛИЗАЦИЯ ---
        function init() {
            loadState(); // Загрузка сохраненных данных

            // Setup Render
            const canvas = document.createElement('canvas');
            document.body.appendChild(canvas);
            renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.toneMapping = THREE.ACESFilmicToneMapping;
            renderer.shadowMap.enabled = true;
            renderer.shadowMap.type = THREE.PCFSoftShadowMap;

            scene = new THREE.Scene();

            // Camera
            camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 1, 10000);
            camera.position.set(300, 250, 400);

            controls = new OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.dampingFactor = 0.05;
            controls.maxPolarAngle = Math.PI / 2 - 0.02;

            // Lights
            ambientLight = new THREE.AmbientLight(0xffffff, 1);
            scene.add(ambientLight);

            dirLight = new THREE.DirectionalLight(0xffffff, 2);
            dirLight.position.set(200, 400, 200);
            dirLight.castShadow = true;
            dirLight.shadow.mapSize.set(2048, 2048);
            dirLight.shadow.bias = -0.0005;
            // Увеличиваем область тени для больших объектов (дома, авто)
            const d = 1000;
            dirLight.shadow.camera.left = -d; dirLight.shadow.camera.right = d;
            dirLight.shadow.camera.top = d; dirLight.shadow.camera.bottom = -d;
            scene.add(dirLight);

            scene.add(new THREE.DirectionalLight(0xaabbff, 0.5).translateY(100).translateX(-100));

            // Floor (Shadow catcher)
            const floorGeo = new THREE.PlaneGeometry(5000, 5000);
            const floorMat = new THREE.ShadowMaterial({ opacity: 0.2 });
            floor = new THREE.Mesh(floorGeo, floorMat);
            floor.rotation.x = -Math.PI / 2;
            floor.receiveShadow = true;
            scene.add(floor);

            // Events
            window.addEventListener('resize', onResize);
            document.getElementById('add-btn').onclick = addObject;
            document.getElementById('theme-toggle').onclick = toggleTheme;
            document.getElementById('export-btn').onclick = exportToHTML;
            
            // Mode buttons
            document.querySelectorAll('.mode-btn').forEach(btn => {
                btn.onclick = (e) => {
                    appState.mode = e.target.dataset.mode;
                    updateUIState();
                    updateScene();
                    saveState();
                };
            });

            // Initial Apply
            applyTheme();
            updateUIState();
            updateListUI();
            updateScene();
            animate();
        }

        // --- ЛОГИКА СОХРАНЕНИЯ (LocalStorage & Export) ---
        function loadState() {
            // 1. Проверяем, есть ли "вшитые" данные (если открыли сохраненный HTML)
            if (window.EXPORTED_DATA) {
                appState = window.EXPORTED_DATA;
                console.log("Загружено из файла");
                return;
            }

            // 2. Иначе читаем LocalStorage
            const stored = localStorage.getItem('fridge_app_data');
            if (stored) {
                try {
                    const parsed = JSON.parse(stored);
                    appState = { ...appState, ...parsed };
                } catch (e) { console.error("Ошибка чтения сохранения", e); }
            }
        }

        function saveState() {
            // Сохраняем только если мы НЕ в режиме просмотра экспортированного файла (чтобы не перезатереть свои данные данными друга)
            if (!window.EXPORTED_DATA) {
                localStorage.setItem('fridge_app_data', JSON.stringify(appState));
            }
        }

        function exportToHTML() {
            // Берем текущий HTML страницы
            let htmlContent = document.documentElement.outerHTML;
            
            // 1. Удаляем предыдущий блок с данными, если он уже есть (чтобы не дублировать при повторном сохранении)
            htmlContent = htmlContent.replace(/<script>window\.EXPORTED_DATA = .*?<\/script>/, '');
            
            // 2. Формируем скрипт с текущими данными
            const dataScript = `<script>window.EXPORTED_DATA = ${JSON.stringify(appState)};<\/script>`;
            
            // 3. Вставляем скрипт строго перед закрывающим тегом body
            const newHtml = htmlContent.replace('</body>', `${dataScript}</body>`);

            const blob = new Blob([newHtml], { type: 'text/html' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `3d-scene-${new Date().toISOString().slice(0,10)}.html`;
            a.click();
            URL.revokeObjectURL(url);
        }

        // --- ГРАФИКА И ОБЪЕКТЫ ---

        function getMaterial(color, isGhost) {
            // isGhost = режим наложения/голограммы
            
            if (!isGhost) {
                // Обычный режим (Реалистичный)
                return new THREE.MeshPhysicalMaterial({
                    color: color,
                    roughness: 0.3,
                    metalness: 0.1,
                    clearcoat: 0.1
                });
            } else {
                // Голограмма / Сравнение
                if (appState.theme === 'light') {
                    // Светлая тема: Эффект стекла (чтобы было видно)
                    return new THREE.MeshPhysicalMaterial({
                        color: color,
                        transparent: true,
                        opacity: 0.3,
                        roughness: 0.1,
                        metalness: 0.1,
                        transmission: 0.6, // Преломление
                        thickness: 20,
                        depthWrite: false, // Чтобы видеть внутренности
                        side: THREE.DoubleSide
                    });
                } else {
                    // Темная тема: Светящийся wireframe стиль
                    return new THREE.MeshStandardMaterial({
                        color: color,
                        transparent: true,
                        opacity: 0.25,
                        blending: THREE.AdditiveBlending,
                        depthWrite: false,
                        side: THREE.DoubleSide
                    });
                }
            }
        }

        function createObject3D(spec) {
            const group = new THREE.Group();
            const color = spec.color;
            const isGhost = (appState.mode === 'hologram');
            
            const mainMat = getMaterial(color, isGhost);
            const accentMat = getMaterial(0x333333, isGhost); // Для деталей

            // Helper для добавления обводки
            const addEdges = (mesh) => {
                const edgeColor = (appState.theme === 'light' && isGhost) ? color : 
                                  (appState.theme === 'light') ? 0xffffff : 
                                  (isGhost ? color : 0xaaaaaa);
                
                const opacity = isGhost ? (appState.theme === 'light' ? 0.8 : 0.6) : 0.3;

                const edges = new THREE.LineSegments(
                    new THREE.EdgesGeometry(mesh.geometry),
                    new THREE.LineBasicMaterial({ color: edgeColor, transparent: true, opacity: opacity })
                );
                mesh.add(edges);
            };

            // --- ГЕНЕРАЦИЯ ГЕОМЕТРИИ ---
            
            if (spec.type === 'car') {
                // Авто: Кузов + Кабина + Колеса
                const bodyH = spec.h * 0.4;
                const cabinH = spec.h * 0.6;
                const bodyY = spec.h * 0.2; // Приподнять над землей (клиренс)

                // Нижняя часть
                const body = new THREE.Mesh(new THREE.BoxGeometry(spec.w, bodyH, spec.d), mainMat);
                body.position.y = bodyY + bodyH / 2;
                body.castShadow = !isGhost; body.receiveShadow = !isGhost;
                addEdges(body);
                group.add(body);

                // Кабина (чуть уже и короче)
                const cabin = new THREE.Mesh(new THREE.BoxGeometry(spec.w * 0.85, cabinH, spec.d * 0.6), mainMat);
                cabin.position.y = bodyY + bodyH + cabinH / 2;
                cabin.castShadow = !isGhost; cabin.receiveShadow = !isGhost;
                addEdges(cabin);
                group.add(cabin);

                // Колеса (цилиндры)
                if (!isGhost) {
                    const wheelR = spec.h * 0.2;
                    const wheelGeo = new THREE.CylinderGeometry(wheelR, wheelR, spec.w * 0.1, 16);
                    wheelGeo.rotateZ(Math.PI / 2);
                    
                    const positions = [
                        [spec.w/2, wheelR, spec.d*0.3], [spec.w/2, wheelR, -spec.d*0.3],
                        [-spec.w/2, wheelR, spec.d*0.3], [-spec.w/2, wheelR, -spec.d*0.3]
                    ];
                    
                    positions.forEach(pos => {
                        const wheel = new THREE.Mesh(wheelGeo, accentMat);
                        wheel.position.set(...pos);
                        group.add(wheel);
                    });
                }

            } else if (spec.type === 'house') {
                // Дом: Основание + Крыша
                const baseH = spec.h * 0.7;
                const roofH = spec.h * 0.3;

                // Стены
                const base = new THREE.Mesh(new THREE.BoxGeometry(spec.w, baseH, spec.d), mainMat);
                base.position.y = baseH / 2;
                base.castShadow = !isGhost; base.receiveShadow = !isGhost;
                addEdges(base);
                group.add(base);

                // Крыша (Пирамида/Конус 4 грани)
                // Для красивой крыши используем ConeGeometry с 4 сегментами и поворотом
                const roofGeo = new THREE.ConeGeometry(Math.max(spec.w, spec.d) * 0.8, roofH, 4);
                const roof = new THREE.Mesh(roofGeo, mainMat);
                roof.position.y = baseH + roofH / 2;
                roof.rotation.y = Math.PI / 4; // Развернуть грани по осям
                
                // Растягиваем конус под габариты
                const scaleRatio = spec.w / spec.d;
                if (scaleRatio > 1) roof.scale.set(1, 1, 1/scaleRatio);
                else roof.scale.set(scaleRatio, 1, 1);

                roof.castShadow = !isGhost; roof.receiveShadow = !isGhost;
                addEdges(roof);
                group.add(roof);

            } else if (spec.type === 'tv') {
                const standH = spec.h * 0.15;
                const screenH = spec.h - standH;
                const screen = new THREE.Mesh(new THREE.BoxGeometry(spec.w, screenH, Math.min(spec.d, 5)), mainMat);
                screen.position.y = standH + screenH/2;
                screen.castShadow = !isGhost; 
                addEdges(screen);
                group.add(screen);

                if (!isGhost) {
                    const stand = new THREE.Mesh(new THREE.BoxGeometry(spec.w*0.3, standH, spec.d*0.6), accentMat);
                    stand.position.y = standH/2;
                    group.add(stand);
                }
            } else if (spec.type === 'sofa') {
                 // Упрощенный диван
                 const seatH = spec.h * 0.4;
                 const base = new THREE.Mesh(new THREE.BoxGeometry(spec.w, seatH, spec.d), mainMat);
                 base.position.y = seatH/2;
                 base.castShadow=!isGhost; base.receiveShadow=!isGhost;
                 addEdges(base);
                 
                 const backD = spec.d * 0.2;
                 const back = new THREE.Mesh(new THREE.BoxGeometry(spec.w, spec.h - seatH, backD), mainMat);
                 back.position.set(0, seatH + (spec.h-seatH)/2, -spec.d/2 + backD/2);
                 back.castShadow=!isGhost;
                 addEdges(back);
                 
                 group.add(base, back);
            }
            else {
                // Стандарт (Холодильник, Шкаф, Стиралка)
                const mesh = new THREE.Mesh(new THREE.BoxGeometry(spec.w, spec.h, spec.d), mainMat);
                mesh.position.y = spec.h / 2;
                mesh.castShadow = !isGhost;
                mesh.receiveShadow = !isGhost;
                addEdges(mesh);
                group.add(mesh);
            }

            // Hitbox
            const hitbox = new THREE.Mesh(new THREE.BoxGeometry(spec.w, spec.h, spec.d), new THREE.MeshBasicMaterial({visible:false}));
            hitbox.position.y = spec.h/2;
            hitbox.userData = { isObject: true, spec: spec };
            group.add(hitbox);

            return group;
        }

        function updateScene() {
            // Удаляем старое
            objectMeshes.forEach(m => scene.remove(m));
            objectMeshes = [];

            // Фильтруем скрытые объекты
            const visibleObjects = appState.objects.filter(o => o.visible !== false);

            if (visibleObjects.length === 0) return;

            const gap = 50;
            let totalWidth = 0;
            if (appState.mode === 'side') {
                totalWidth = visibleObjects.reduce((acc, obj) => acc + obj.w, 0) + gap * (visibleObjects.length - 1);
            }

            let currentX = (appState.mode === 'side') ? -totalWidth / 2 : 0;

            visibleObjects.forEach(obj => {
                const mesh = createObject3D(obj);
                
                if (appState.mode === 'side') {
                    mesh.position.x = currentX + obj.w / 2;
                    currentX += obj.w + gap;
                    mesh.rotation.y = 0;
                } else {
                    mesh.position.x = 0;
                    mesh.position.z = 0;
                }
                
                scene.add(mesh);
                objectMeshes.push(mesh);
            });
        }

        // --- UI ФУНКЦИИ ---

        function toggleTheme() {
            appState.theme = (appState.theme === 'light') ? 'dark' : 'light';
            applyTheme();
            updateScene(); // Пересоздать материалы
            saveState();
        }

        function applyTheme() {
            const isLight = appState.theme === 'light';
            document.documentElement.setAttribute('data-theme', appState.theme);
            
            scene.background = new THREE.Color(isLight ? 0xf8fafc : 0x0f172a);
            scene.fog = new THREE.FogExp2(isLight ? 0xf8fafc : 0x0f172a, 0.001); // Туман чуть дальше
            
            floor.material.opacity = isLight ? 0.2 : 0.5; // Тени темнее в темной теме
            ambientLight.intensity = isLight ? 1.0 : 0.6;
            
            if (grid) scene.remove(grid);
            grid = new THREE.GridHelper(5000, 100, isLight ? 0x94a3b8 : 0x475569, isLight ? 0xe2e8f0 : 0x1e293b);
            grid.position.y = 0.5;
            scene.add(grid);

            const icon = document.querySelector('#theme-toggle i');
            icon.className = isLight ? 'fas fa-moon' : 'fas fa-sun';
        }

        function updateUIState() {
            document.querySelectorAll('.mode-btn').forEach(b => {
                b.classList.toggle('active', b.dataset.mode === appState.mode);
            });
        }

        function addObject() {
            const text = document.getElementById('input-data').value.trim();
            const type = document.getElementById('object-type').value;

            if (!text) return alert("Введите габариты!");

            // Строгий парсинг: W H D
            const regex = /(\d+(?:[.,]\d+)?)[^\d]+(\d+(?:[.,]\d+)?)[^\d]+(\d+(?:[.,]\d+)?)/;
            const match = text.match(regex);
            
            if (!match) return alert("Не удалось найти 3 числа (Ширина, Высота, Глубина)");

            const w = parseFloat(match[1].replace(',','.'));
            const h = parseFloat(match[2].replace(',','.'));
            const d = parseFloat(match[3].replace(',','.'));

            // Ищем доп параметры для описания
            let extra = {};
            const vol = text.match(/(\d+)\s*л/i); if(vol) extra['Объем'] = vol[1] + ' л';
            const diag = text.match(/(\d+)"/); if(diag) extra['Диагональ'] = diag[1] + '"';

            const newItem = {
                id: Date.now(),
                type, w, h, d, extra,
                name: `${typeNames[type]} ${appState.objects.length + 1}`,
                color: colors[appState.objects.length % colors.length],
                visible: true
            };

            appState.objects.push(newItem);
            saveState();
            updateListUI();
            updateScene();
            document.getElementById('input-data').value = '';
        }

        function updateListUI() {
            const list = document.getElementById('objects-list');
            list.innerHTML = '';

            appState.objects.forEach(obj => {
                const el = document.createElement('div');
                el.className = `fridge-item ${obj.visible ? '' : 'hidden-obj'}`;
                
                const hex = '#' + obj.color.toString(16).padStart(6,'0');
                
                let dims = `${obj.w} &times; ${obj.h} &times; ${obj.d}`;
                let desc = Object.values(obj.extra).join(', ');
                if (!desc) desc = typeNames[obj.type];

                el.innerHTML = `
                    <div class="color-dot" style="background:${hex}; border-color:${hex}"></div>
                    <div class="item-content">
                        <div class="item-title"><i class="fas ${icons[obj.type]}"></i> ${obj.name}</div>
                        <div class="item-desc">${dims} cm ${desc ? '| ' + desc : ''}</div>
                    </div>
                    <div class="item-actions">
                        <button class="action-btn btn-vis" title="Скрыть/Показать">
                            <i class="fas ${obj.visible ? 'fa-eye' : 'fa-eye-slash'}"></i>
                        </button>
                        <button class="action-btn btn-delete" title="Удалить">
                            <i class="fas fa-trash"></i>
                        </button>
                    </div>
                `;

                // Обработчики
                el.querySelector('.btn-delete').onclick = () => {
                    if(confirm('Удалить объект?')) {
                        appState.objects = appState.objects.filter(o => o.id !== obj.id);
                        saveState(); updateListUI(); updateScene();
                    }
                };

                el.querySelector('.btn-vis').onclick = () => {
                    obj.visible = !obj.visible;
                    saveState(); updateListUI(); updateScene();
                };

                list.appendChild(el);
            });
        }

        // --- АНИМАЦИЯ И Raycaster ---
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();
        const tooltip = document.getElementById('tooltip');

        window.addEventListener('mousemove', (e) => {
            if (e.clientX < 380) { tooltip.style.opacity = 0; return; }

            mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;

            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(scene.children, true);
            
            const hit = intersects.find(i => i.object.userData.isObject);

            if (hit) {
                const spec = hit.object.userData.spec;
                const tt = document.getElementById('tooltip');
                const col = '#' + spec.color.toString(16).padStart(6,'0');
                
                document.getElementById('tt-name').innerHTML = `<i class="fas ${icons[spec.type]}" style="color:${col}"></i> ${spec.name}`;
                
                let html = `
                    <div class="tt-row"><span>Габариты:</span> <span class="tt-val">${spec.w} x ${spec.h} x ${spec.d}</span></div>
                    <div class="tt-row"><span>Тип:</span> <span class="tt-val">${typeNames[spec.type]}</span></div>
                `;
                for(let k in spec.extra) {
                    html += `<div class="tt-row"><span>${k}:</span> <span class="tt-val">${spec.extra[k]}</span></div>`;
                }

                document.getElementById('tt-content').innerHTML = html;
                tt.style.left = (e.clientX + 15) + 'px';
                tt.style.top = (e.clientY + 15) + 'px';
                tt.style.opacity = 1;
            } else {
                tooltip.style.opacity = 0;
            }
        });

        function onResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            
            // Легкое вращение в режиме голограммы
            if (appState.mode === 'hologram' && objectMeshes.length > 0 && !controls.state) {
                objectMeshes.forEach(m => m.rotation.y += 0.002);
            }

            renderer.render(scene, camera);
        }

        init();
    </script>
