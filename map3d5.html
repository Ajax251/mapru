                const objHits = raycaster.intersectObjects(interactables, false).filter(h => h.object.visible && h.object.parent.visible);

        function flyToMesh(targetGroup) {
            const box = new THREE.Box3().setFromObject(targetGroup);
            if (box.isEmpty()) return;
            
            const center = new THREE.Vector3(); 
            box.getCenter(center);
            const size = new THREE.Vector3(); 
            box.getSize(size);
            
            const maxDim = Math.max(size.x, size.z, 50); 
            
            const dir = new THREE.Vector3().subVectors(camera.position, center).normalize();
            if (dir.lengthSq() === 0) dir.set(0, 0.5, 1).normalize();
            
            const endCam = center.clone().add(dir.multiplyScalar(maxDim * 2.5)); 
            endCam.y = Math.max(endCam.y, maxDim * 1.5);
            
            controls.target.copy(center);
            camera.position.copy(endCam);
            controls.update();
        }

        function updateDynamicFogAndTiles() {
            const alt = camera.position.y;
            
            // –Ф–Є–љ–∞–Љ–Є—З–µ—Б–Ї–Є–є —В—Г–Љ–∞–љ
            scene.fog.near = Math.max(1000, alt * 2);
            scene.fog.far = Math.max(4000, alt * 8);

            if (currentGroundTex === 'solid') {
                mapTilesGroup.visible = false;
                groundPlane.visible = true;
                gridHelper.visible = true;
                return;
            }
            mapTilesGroup.visible = true;
            groundPlane.visible = false;
            gridHelper.visible = false;

            let z = 18; let radius = 3; 
            if (alt > 8000) { z = 13; radius = 6; }
            else if (alt > 4000) { z = 14; radius = 6; }
            else if (alt > 2000) { z = 15; radius = 5; }
            else if (alt > 800) { z = 16; radius = 5; }
            else if (alt > 300) { z = 17; radius = 4; }
            else { z = 18; radius = 4; } 

            const E = 20037508.342789244; 
            const tileSize = (2 * E) / Math.pow(2, z);

            const mercX = originMercator[0] + controls.target.x;
            const mercY = originMercator[1] - controls.target.z;

            const tX = Math.floor((mercX + E) / tileSize);
            const tY = Math.floor((E - mercY) / tileSize);

            const newTiles = new Set();

            for (let i = -radius; i <= radius; i++) {
                for (let j = -radius; j <= radius; j++) {
                    const cx = tX + i;
                    const cy = tY + j;
                    const key = `${currentGroundTex}_${z}_${cx}_${cy}`;
                    newTiles.add(key);

                    if (!activeTiles.has(key)) {
                        const minX = -E + cx * tileSize;
                        const maxY = E - cy * tileSize;
                        
                        const posX = minX + tileSize/2 - originMercator[0];
                        const posZ = -(maxY - tileSize/2 - originMercator[1]);

                        const geo = new THREE.PlaneGeometry(tileSize + 2, tileSize + 2); 
                        geo.rotateX(-Math.PI / 2);
                        const mat = new THREE.MeshStandardMaterial({ color: 0xffffff, roughness: 1 });
                        const mesh = new THREE.Mesh(geo, mat);
                        mesh.position.set(posX, 0, posZ);
                        mesh.receiveShadow = true;
                        
                        mapTilesGroup.add(mesh);
                        activeTiles.set(key, mesh);

                      let url = '';
                        const svSuffix = window.isStreetViewActive ? ',svv' : '';
                        
                        if (currentGroundTex === 'osm') url = `https://tile.openstreetmap.org/${z}/${cx}/${cy}.png`;
                  if (currentGroundTex === 'gmap') url = `https://mt1.google.com/vt/lyrs=m${svSuffix}&x=${cx}&y=${cy}&z=${z}&hl=ru`;
if (currentGroundTex === 'gsat') url = `https://mt1.google.com/vt/lyrs=s${svSuffix}&x=${cx}&y=${cy}&z=${z}&hl=ru`;
if (currentGroundTex === 'ghyb') url = `https://mt1.google.com/vt/lyrs=y${svSuffix}&x=${cx}&y=${cy}&z=${z}&hl=ru`;

                        textureLoader.load(url, (tex) => {
                            tex.colorSpace = THREE.SRGBColorSpace;
                            mat.map = tex; mat.needsUpdate = true;
                        });
                    }
                }
            }

               if (!window.tileCache) window.tileCache = new Map();

            // 1. –£–±–Є—А–∞–µ–Љ –Є–Ј —Б—Ж–µ–љ—Л —В–∞–є–ї—Л, –Ї–Њ—В–Њ—А—Л–µ –±–Њ–ї—М—И–µ –љ–µ –љ—Г–ґ–љ—Л (–љ–Њ –Э–Х —Г–і–∞–ї—П–µ–Љ –Є—Е –Є–Ј –њ–∞–Љ—П—В–Є)
            for (const [key, mesh] of activeTiles.entries()) {

                    mapTilesGroup.remove(mesh); // –Я—А–Њ—Б—В–Њ —Г–±–Є—А–∞–µ–Љ –Є–Ј –≥—А—Г–њ–њ—Л —А–µ–љ–і–µ—А–Є–љ–≥–∞
                    activeTiles.delete(key);
                    
                    // –Ф–Њ–±–∞–≤–ї—П–µ–Љ –≤ –Ї—Н—И. Map –≤ JS —Б–Њ—Е—А–∞–љ—П–µ—В –њ–Њ—А—П–і–Њ–Ї –≤—Б—В–∞–≤–Ї–Є, –њ–Њ—Н—В–Њ–Љ—Г "—Б–≤–µ–ґ–Є–µ" –≤—Б–µ–≥–і–∞ –≤ –Ї–Њ–љ—Ж–µ
                    window.tileCache.delete(key); // –£–і–∞–ї—П–µ–Љ, –µ—Б–ї–Є –±—Л–ї (—З—В–Њ–±—Л –Њ–±–љ–Њ–≤–Є—В—М –њ–Њ–Ј–Є—Ж–Є—О)
                    window.tileCache.set(key, mesh);
                }
            }

            // 2. –Ю—З–Є—Б—В–Ї–∞ —Б—В–∞—А—Л—Е —В–∞–є–ї–Њ–≤, –µ—Б–ї–Є –Ї—Н—И –њ–µ—А–µ–њ–Њ–ї–љ–µ–љ
            if (window.tileCache.size > MAX_CACHE_SIZE) {
                // –Я–Њ–ї—Г—З–∞–µ–Љ –Ї–ї—О—З–Є —Б–∞–Љ—Л—Е —Б—В–∞—А—Л—Е —Н–ї–µ–Љ–µ–љ—В–Њ–≤ (—Б –љ–∞—З–∞–ї–∞ Map)
                const keysToDelete = Array.from(window.tileCache.keys()).slice(0, window.tileCache.size - MAX_CACHE_SIZE);
                
                for (const oldKey of keysToDelete) {
                    const oldMesh = window.tileCache.get(oldKey);
                    // –Я–Њ–ї–љ–Њ—Б—В—М—О –Њ—Б–≤–Њ–±–Њ–ґ–і–∞–µ–Љ –њ–∞–Љ—П—В—М –≤–Є–і–µ–Њ–Ї–∞—А—В—Л
                    if (oldMesh.material.map) oldMesh.material.map.dispose();
                    oldMesh.material.dispose();
                    oldMesh.geometry.dispose();
                    
                    window.tileCache.delete(oldKey);
                }
            }
        }

        function setupSearch() {

                if (this.value.includes('.') || this.value.includes(',') || this.value.includes('-')) return;
                let value = this.value;
                if (/^\d/.test(value)) {
                    value = value.replace(/\D/g, '');
                    const firstTwo = value.slice(0, 2);
                    const isSeven = sevenDigitsRegions.includes(firstTwo);
                    const thirdLen = isSeven ? 7 : 6;
                    let formatted = '';
                    if (value.length > 0) formatted += value.slice(0, 2);
                    if (value.length > 2) formatted += ':' + value.slice(2, 4);
                    if (value.length > 4) {
                        const rem = value.slice(4);
                        if (rem.length <= thirdLen) formatted += ':' + rem;
                        else formatted += ':' + rem.slice(0, thirdLen) + ':' + rem.slice(thirdLen);
                    }
                    this.value = formatted;
                }

        const windowMaterialCache = {};
        function getWindowMaterial(style) {
            if (style.winType==="none"||!style.win) return new THREE.MeshStandardMaterial({color:style.wall,roughness:0.9});
            const ck = style.wall+"_"+style.winType;
            if (windowMaterialCache[ck]) return windowMaterialCache[ck];

            const cv = document.createElement("canvas"); cv.width=256; cv.height=256; 
            const ctx = cv.getContext("2d");
            ctx.fillStyle="#"+new THREE.Color(style.wall).getHexString(); ctx.fillRect(0,0,256,256);
            
            let wW=120, wH=160;
            if(style.winType==="dense"){wW=160;wH=180;}else if(style.winType==="ribbon"){wW=220;wH=100;}else if(style.winType==="large"){wW=180;wH=200;}
            
            const sX=(256-wW)/2, sY=(256-wH)/2;
            ctx.fillStyle="#"+new THREE.Color(style.win).getHexString(); ctx.fillRect(sX,sY,wW,wH);
            ctx.strokeStyle="#1e293b"; ctx.lineWidth=8; ctx.strokeRect(sX,sY,wW,wH);
            
            const tex = new THREE.CanvasTexture(cv);
            tex.colorSpace = THREE.SRGBColorSpace;
            tex.wrapS = THREE.RepeatWrapping; tex.wrapT = THREE.RepeatWrapping;
            
            const repeatX = style.winType==="dense"?3:(style.winType==="ribbon"?5:4);
            tex.repeat.set(1/repeatX, 1/3.5); 
            
            const mat = new THREE.MeshStandardMaterial({map:tex, roughness:0.2, metalness:0.6});
            windowMaterialCache[ck]=mat; return mat;
        }

        function createShape(coords) {
            const shape = new THREE.Shape();
            if(!coords || coords.length < 1 || coords[0].length < 3) return shape;
            
            const getLocal = (c) => ({ x: c[0] - originMercator[0], y: c[1] - originMercator[1] });
            
            const outer = coords[0];
            const start = getLocal(outer[0]);
            shape.moveTo(start.x, start.y);
            for(let i=1; i<outer.length; i++) { shape.lineTo(getLocal(outer[i]).x, getLocal(outer[i]).y); }
            
            for(let i=1; i<coords.length; i++) {
                const holeRing = coords[i];
                if(holeRing.length < 3) continue;
                const hole = new THREE.Path();
                hole.moveTo(getLocal(holeRing[0]).x, getLocal(holeRing[0]).y);
                for(let j=1; j<holeRing.length; j++) hole.lineTo(getLocal(holeRing[j]).x, getLocal(holeRing[j]).y);
                shape.holes.push(hole);
            }
            return shape;
        }




function getNetworkColor(text) {
    if (!text) return 0x8b5cf6; // –Я–Њ —Г–Љ–Њ–ї—З–∞–љ–Є—О —Д–Є–Њ–ї–µ—В–Њ–≤—Л–є
    text = text.toLowerCase();
    
    // –≠–ї–µ–Ї—В—А–Є—З–µ—Б—В–≤–Њ - –Ъ—А–∞—Б–љ—Л–µ
    if (text.includes('—Н–ї–µ–Ї—В—А–Њ') || text.includes('—Н–ї–µ–Ї—В—А') || text.includes('–ї—Н–њ') || text.includes('–ї–њ ') || text.includes('–≤–ї ') || text.includes('–≤–Ї–ї') || text.includes('–≤–Њ–Ј–і—Г—И–љ')) return 0xFF0000; 
    
    // –У–∞–Ј - –Ц–µ–ї—В—Л–є
    if (text.includes('–≥–∞–Ј')) return 0xFFBF00; 
    
    // –Ъ–∞–љ–∞–ї–Є–Ј–∞—Ж–Є—П/–°—В–Њ–Ї–Є - –°–µ—А—Л–є
    if (text.includes('–Ї–∞–љ–∞–ї–Є–Ј') || text.includes('–Ї–∞–љ–∞–ї') || text.includes('—Б—В–Њ–Ї')) return 0x94a3b8; 
    
    // –Т–Њ–і–∞ - –°–Є–љ–Є–є
    if (text.includes('–≤–Њ–і–Њ') || text.includes('–≤–Њ–і')) return 0x3b82f6; 
    
    // –Ґ–µ–њ–ї–Њ - –Ґ–µ–Љ–љ–Њ-–Ї—А–∞—Б–љ—Л–є/–С–Њ—А–і–Њ–≤—Л–є
    if (text.includes('—В–µ–њ–ї–Њ')) return 0xdc2626; 
    
    // –Ю—Б—В–∞–ї—М–љ—Л–µ –Ч–Ю–£–Ш–Ґ - –§–Є–Њ–ї–µ—В–Њ–≤—Л–є
    return 0x8b5cf6; 
}

            const rawText = (props.descr + ' ' + name + ' ' + (opts.purpose||'') + ' ' + (opts.type_zone||'')).toLowerCase();

            if (groupName === 'zones' || groupName === 'str') {

            // –Ш–°–Я–†–Р–Т–Ы–Х–Э–Ш–Х: –Я–Ю–Ф–Ф–Х–†–Ц–Ъ–Р –Ы–Ш–Э–Ш–Щ (–Ґ–†–£–С)
            if (geom.type.includes('Line')) {
                const lines = geom.type === 'LineString' ? [geom.coordinates] : geom.coordinates;
                lines.forEach(line => {
                    const pts = line.map(c => {
                        const local = getLocal(c);
                        return new THREE.Vector3(local.x, 1, -local.y); 
                    });
                    if (pts.length < 2) return;

                  const curve = new THREE.CatmullRomCurve3(pts, false, 'chordal');
                    let color = getNetworkColor(rawText); 

                    const tube = new THREE.Mesh(
                        new THREE.TubeGeometry(curve, pts.length * 4, 0.8, 8, false),
                        new THREE.MeshStandardMaterial({color: color, roughness: 0.5})
                    );
                    tube.castShadow = true;

            } else {
                // –Я–Ю–Ы–Ш–У–Ю–Э–Ђ
                const ringsList = geom.type === 'MultiPolygon' ? geom.coordinates : [geom.coordinates];

                ringsList.forEach(coords => {
                    const shape = new THREE.Shape();
                    if(!coords || coords.length < 1 || coords[0].length < 3) return;
                    
                    const outer = coords[0];
                    const start = getLocal(outer[0]);
                    shape.moveTo(start.x, start.y);
                    for(let i=1; i<outer.length; i++) { shape.lineTo(getLocal(outer[i]).x, getLocal(outer[i]).y); }
                    
                    for(let i=1; i<coords.length; i++) {
                        const holeRing = coords[i];
                        if(holeRing.length < 3) continue;
                        const hole = new THREE.Path();
                        hole.moveTo(getLocal(holeRing[0]).x, getLocal(holeRing[0]).y);
                        for(let j=1; j<holeRing.length; j++) hole.lineTo(getLocal(holeRing[j]).x, getLocal(holeRing[j]).y);

                        else if (rawText.includes('–ґ–Є–ї–Њ') || rawText.includes('–і–Њ–Љ')) defaultFloors = 2;

                        const walls = new THREE.Mesh(new THREE.ExtrudeGeometry(shape,{depth:height,bevelEnabled:false}), [new THREE.MeshStandardMaterial({color:style.roof}), getWindowMaterial(style)]);

                        walls.castShadow = true; walls.receiveShadow = true; modelGroup.add(walls);

                            roof.rotation.x = -Math.PI/2; roof.position.y = 1.0 + height; roof.castShadow = true; modelGroup.add(roof);
                        } else if (style.parapet) {
                            const par = new THREE.Mesh(new THREE.ExtrudeGeometry(shape,{depth:0.8,bevelEnabled:true,bevelSize:0.2,bevelThickness:0.2}), new THREE.MeshStandardMaterial({color:style.roof}));
                            par.rotation.x = -Math.PI/2; par.position.y = 1.0 + height; modelGroup.add(par);
                        }

                    } else if (groupName === 'zu') {
                        const mat = new THREE.MeshStandardMaterial({ color: 0x10b981, transparent: true, opacity: 0.3, depthWrite: false });
                        mesh = new THREE.Mesh(new THREE.ExtrudeGeometry(shape,{depth:0.1,bevelEnabled:false}), mat);
                        mesh.rotation.x = -Math.PI/2; mesh.position.y = 0.1;
                        mesh.add(new THREE.LineSegments(new THREE.EdgesGeometry(mesh.geometry), new THREE.LineBasicMaterial({color:0x047857})));
                        modelGroup.add(mesh);
                        
                    } else if (groupName === 'zones') {
                    let color = getNetworkColor(rawText);
                    
                    // –Я–Њ–і–Ј–µ–Љ–љ—Л–µ –Ї–Њ–Љ–Љ—Г–љ–Є–Ї–∞—Ж–Є–Є –і–µ–ї–∞–µ–Љ —В–µ–Љ–љ–µ–µ –љ–∞ 40%
                    const isUnderground = rawText.includes('–њ–Њ–і–Ј–µ–Љ') || (!rawText.includes('–љ–∞–і–Ј–µ–Љ') && (rawText.includes('–≤–Њ–і–Њ') || rawText.includes('–Ї–∞–љ–∞–ї') || rawText.includes('—Б—В–Њ–Ї')));
                    if (isUnderground) {
                        color = new THREE.Color(color).multiplyScalar(0.6).getHex();
                    }
                    
                    const mat = new THREE.MeshStandardMaterial({ 
                        color: color, 
                        transparent: true,
        opacity: 0.5, 
        depthWrite: false, 
        side: THREE.DoubleSide 
    });
    
    mesh = new THREE.Mesh(new THREE.ExtrudeGeometry(shape,{depth:5,bevelEnabled:false}), mat);
    mesh.rotation.x = -Math.PI/2;

    mesh.add(new THREE.LineSegments(new THREE.EdgesGeometry(mesh.geometry),

} else if (groupName === 'str') {

    const isUnderground = rawText.includes('–њ–Њ–і–Ј–µ–Љ');

                });

        // ================= –Ч–Р–У–†–£–Ч–Ъ–Р =================
let currentFetchController = null; // –Ъ–Њ–љ—В—А–Њ–ї–ї–µ—А –і–ї—П –Њ—В–Љ–µ–љ—Л —Б—В–∞—А—Л—Е –Ј–∞–њ—А–Њ—Б–Њ–≤

        async function triggerFetch() {
            if (window.EMBEDDED_FEATURES) return; 

            const activeLayers = Array.from(document.querySelectorAll('.layer-control input')).filter(cb => cb.checked).map(cb => cb.value);
            if (activeLayers.length === 0) return;

            const targetX = controls.target.x;
            const targetZ = controls.target.z;
            const dist = camera.position.distanceTo(controls.target);
            
            // –Ш–°–Я–†–Р–Т–Ы–Х–Э–Ш–Х 1: –£–Љ–µ–љ—М—И–∞–µ–Љ –Љ–∞–Ї—Б. —А–∞–і–Є—Г—Б –і–Њ 1500–Љ, —З—В–Њ–±—Л –љ–µ —Г–њ–Є—А–∞—В—М—Б—П –≤ –ї–Є–Љ–Є—В –С–Ф (3000 –Њ–±—К–µ–Ї—В–Њ–≤) –Є –≥—А—Г–Ј–Є—В—М —В–Њ—З–љ–Њ –њ–Њ —Ж–µ–љ—В—А—Г —Н–Ї—А–∞–љ–∞
            const radius = Math.min(dist * 1.0 + 200, 1500); 
            
            const minX = originMercator[0] + targetX - radius;
            const maxX = originMercator[0] + targetX + radius;
            const minY = originMercator[1] - targetZ - radius;
            const maxY = originMercator[1] - targetZ + radius;

          const url = `${API_URL_READ}?min_x=${minX}&max_x=${maxX}&min_y=${minY}&max_y=${maxY}&layers=${activeLayers.join(',')}`;

            document.getElementById('stats').innerHTML = '–°–Є–љ—Е—А–Њ–љ–Є–Ј–∞—Ж–Є—П... <i class="fas fa-spinner loading-pulse"></i>';
            isFetching = true;

            // –Ш–°–Я–†–Р–Т–Ы–Х–Э–Ш–Х 2: –Ю—В–Љ–µ–љ—П–µ–Љ –њ—А–µ–і—Л–і—Г—Й–Є–є –Ј–∞–њ—А–Њ—Б, –µ—Б–ї–Є –Љ—Л –±—Л—Б—В—А–Њ —Б–і–≤–Є–љ—Г–ї–Є –Ї–∞—А—В—Г
            if (currentFetchController) {
                currentFetchController.abort();
            }
            currentFetchController = new AbortController();

            try {
                // –Я–µ—А–µ–і–∞–µ–Љ —Б–Є–≥–љ–∞–ї –њ—А–µ—А—Л–≤–∞–љ–Є—П –≤ fetch
                const response = await fetch(url, { signal: currentFetchController.signal });
                if(!response.ok) throw new Error('Network error');
                const data = await response.json();

                let addedCount = 0;
                data.features.forEach(f => {
                    if (loadedFeatureIds.has(f.id)) return;
                    loadedFeatureIds.add(f.id);
                    
                    let layerType = f.properties._layer_type;
                    if (layerType === 'structure') layerType = 'str';
                    if (layerType === 'zouit') layerType = 'zones';
                    
                    if (layerType) {
                        if (!allLoadedFeatures[layerType]) allLoadedFeatures[layerType] = [];
                        allLoadedFeatures[layerType].push(f);
                        buildModel(f, layerType);
                        addedCount++;
                    }
                });

                document.getElementById('stats').innerText = `–Ъ—Н—И —Б–µ—Б—Б–Є–Є: ${loadedFeatureIds.size} –Њ–±—К–µ–Ї—В–Њ–≤`;
                
                if (pendingHighlightId) {
                    let targetMesh = null;
                    interactables.forEach(m => {
                        if (m.userData.parentGroup.userData.meta.id === pendingHighlightId) targetMesh = m.userData.parentGroup;
                    });
                    if (targetMesh) {
                        setHighlight(targetMesh, true);
                        hoveredObj = targetMesh;
                        showTooltipFromMeta(targetMesh.userData.meta, targetMesh.userData.type);
                    }
                    pendingHighlightId = null;
                }

            } catch (err) {
                // –Ш–≥–љ–Њ—А–Є—А—Г–µ–Љ –Њ—И–Є–±–Ї–Є "–њ—А–µ—А—Л–≤–∞–љ–Є—П" –Ј–∞–њ—А–Њ—Б–∞ (—Н—В–Њ –љ–Њ—А–Љ–∞–ї—М–љ–Њ –њ—А–Є —Б–Ї—А–Њ–ї–ї–µ)
                if (err.name === 'AbortError') return; 
                console.error(err);
                document.getElementById('stats').innerText = '–Э–µ—В —Б–≤—П–Ј–Є';
            } finally {
                // –°–љ–Є–Љ–∞–µ–Љ —Д–ї–∞–≥ –Ј–∞–≥—А—Г–Ј–Ї–Є, —В–Њ–ї—М–Ї–Њ –µ—Б–ї–Є –Ј–∞–њ—А–Њ—Б –љ–µ –±—Л–ї –њ—А–µ—А–≤–∞–љ –љ–Њ–≤—Л–Љ
                if (currentFetchController && !currentFetchController.signal.aborted) {
                    isFetching = false;
                }
            }
        }

        // ================= –Ш–Э–Ґ–Х–†–§–Х–Щ–° –Ш –Т–Ч–Р–Ш–Ь–Ю–Ф–Х–Щ–°–Ґ–Т–Ш–Х =================
   function setupUI() {

            const uiPanel = document.getElementById('ui-panel');

            if (window.innerWidth <= 768) {

            // --- –Ъ–Ю–Э–Х–¶: –Ы–Њ–≥–Є–Ї–∞ —Б–Ї—А—Л—В–Є—П/–њ–Њ–Ї–∞–Ј–∞ –њ–∞–љ–µ–ї–Є ---

    const updateLoadBtnState = () => {
                const btn = document.getElementById('load-db-btn');
                if (!btn) return;
                
                // –Я—А–Њ–≤–µ—А—П–µ–Љ, –≤—Л–±—А–∞–љ–∞ –ї–Є —Е–Њ—В—М –Њ–і–љ–∞ –≥–∞–ї–Њ—З–Ї–∞ –Њ—Б–љ–Њ–≤–љ—Л—Е —Б–ї–Њ–µ–≤
                const hasActiveLayers = Array.from(document.querySelectorAll('.layer-control input'))

            updateLoadBtnState(); // –£—Б—В–∞–љ–∞–≤–ї–Є–≤–∞–µ–Љ —Б—В–∞—В—Г—Б –њ—А–Є –Ј–∞–њ—Г—Б–Ї–µ

            const exportBtn = document.getElementById('export-html-btn');
            if (exportBtn) exportBtn.onclick = exportToStandaloneHTML;
            
            const loadDbBtn = document.getElementById('load-db-btn');

        // --- –Ы–Ю–У–Ш–Ъ–Р –Ъ–Э–Ю–Я–Ъ–Ш –Я–Р–Э–Ю–†–Р–Ь GOOGLE (Street View) ---
            const savedSvState = localStorage.getItem('isStreetViewActive');
            window.isStreetViewActive = savedSvState === null ? true : savedSvState === 'true';
            
            const svBtn = document.getElementById('google-sv-btn');
            if (window.isStreetViewActive) svBtn.classList.add('active');

            let isDraggingPegman = false;
            let pegmanClone = null;
            let dragStartX = 0, dragStartY = 0;

            const startDrag = (e) => {
                if (e.type === 'mousedown' && e.button !== 0) return; 
                e.preventDefault(); 
                
                const clientX = e.touches ? e.touches[0].clientX : e.clientX;
                const clientY = e.touches ? e.touches[0].clientY : e.clientY;

                isDraggingPegman = true;
                dragStartX = clientX;
                dragStartY = clientY;

                pegmanClone = document.createElement('i');
                pegmanClone.className = 'fas fa-street-view pegman-dragging';
                pegmanClone.style.left = clientX + 'px';
                pegmanClone.style.top = clientY + 'px';
                document.body.appendChild(pegmanClone);
                svBtn.style.opacity = '0.4';
            };

            const moveDrag = (e) => {
                if (!isDraggingPegman || !pegmanClone) return;
                const clientX = e.touches ? e.touches[0].clientX : e.clientX;
                const clientY = e.touches ? e.touches[0].clientY : e.clientY;
                pegmanClone.style.left = clientX + 'px';
                pegmanClone.style.top = clientY + 'px';
            };

            const endDrag = (e) => {
                if (!isDraggingPegman) return;
                isDraggingPegman = false;
                svBtn.style.opacity = '1';

                const clientX = e.changedTouches ? e.changedTouches[0].clientX : e.clientX;
                const clientY = e.changedTouches ? e.changedTouches[0].clientY : e.clientY;

                if (pegmanClone) {
                    pegmanClone.remove();
                    pegmanClone = null;
                }

                // –Х—Б–ї–Є –њ—А–Њ—Б—В–Њ –Ї–ї–Є–Ї–љ—Г–ї–Є (–њ–Њ—З—В–Є –љ–µ —Б–і–≤–Є–љ—Г–ї–Є –Љ—Л—И—М)
                if (Math.hypot(clientX - dragStartX, clientY - dragStartY) < 5) {
                    window.isStreetViewActive = !window.isStreetViewActive;
                    localStorage.setItem('isStreetViewActive', window.isStreetViewActive);
                    svBtn.classList.toggle('active', window.isStreetViewActive);
                    
                    // –Я–µ—А–µ—А–Є—Б–Њ–≤—Л–≤–∞–µ–Љ —В–∞–є–ї—Л –і–ї—П –≤–Ї–ї—О—З–µ–љ–Є—П/–Њ—В–Ї–ї—О—З–µ–љ–Є—П —Б–Є–љ–Є—Е –ї–Є–љ–Є–є
                    mapTilesGroup.clear();

                // –Ы–Њ–≥–Є–Ї–∞ –±—А–Њ—Б–Ї–∞ (–Њ—В–Ї—А—Л—В–Є–µ –њ–∞–љ–Њ—А–∞–Љ—Л)
                mouse.x = (clientX / window.innerWidth) * 2 - 1;
                mouse.y = -(clientY / window.innerHeight) * 2 + 1;
                raycaster.setFromCamera(mouse, camera);

                const hits = raycaster.intersectObjects([groundPlane, mapTilesGroup], true);
                if (hits.length > 0) {
                    const hitPoint = hits[0].point;
                    const mercX = originMercator[0] + hitPoint.x;
                    const mercY = originMercator[1] - hitPoint.z;
                    
                    const wgsCoords = proj4("EPSG:3857", "EPSG:4326", [mercX, mercY]);
                    const svUrl = `https://www.google.com/maps/@?api=1&map_action=pano&viewpoint=${wgsCoords[1]},${wgsCoords[0]}`;
                    
                    window.open(svUrl, '_blank');
                }
            };

            svBtn.addEventListener('mousedown', startDrag);
            svBtn.addEventListener('touchstart', startDrag, { passive: false });
            document.addEventListener('mousemove', moveDrag);
            document.addEventListener('touchmove', moveDrag, { passive: false });
            document.addEventListener('mouseup', endDrag);
            document.addEventListener('touchend', endDrag);
            // --- –Ъ–Ю–Э–Х–¶ –Ы–Ю–У–Ш–Ъ–Ш –Ъ–Э–Ю–Я–Ъ–Ш –Я–Р–Э–Ю–†–Р–Ь ---
   }
        
        
           function loadFromEmbeddedData() {
            if (!window.EMBEDDED_FEATURES) return;

            // –Ю—В–Ї–ї—О—З–∞–µ–Љ –Ї–љ–Њ–њ–Ї–Є, —Б–≤—П–Ј–∞–љ–љ—Л–µ —Б —Б–µ—А–≤–µ—А–Њ–Љ
            const downloadBtn = document.getElementById('download-btn');
            if(downloadBtn) downloadBtn.style.display = 'none';

            let totalCount = 0;
            Object.entries(window.EMBEDDED_FEATURES).forEach(([layerType, features]) => {
                if(features && Array.isArray(features)) {
                    totalCount += features.length;
                    features.forEach(f => {
                        if (!loadedFeatureIds.has(f.id)) {
                            loadedFeatureIds.add(f.id);
                            // –Ш—Б–њ–Њ–ї—М–Ј—Г–µ–Љ layer_type –Є–Ј –≤—Б—В—А–Њ–µ–љ–љ—Л—Е –і–∞–љ–љ—Л—Е
                            buildModel(f, f.properties._layer_type || layerType);
                        }
                    });
                }
            });
            document.getElementById('stats').innerText = `–Ъ—Н—И —Б–µ—Б—Б–Є–Є: ${totalCount} –Њ–±—К–µ–Ї—В–Њ–≤ (–Њ—Д–ї–∞–є–љ)`;
        }

           function exportToStandaloneHTML() {
            // 1. –°–Њ–Ј–і–∞–µ–Љ –≤—А–µ–Љ–µ–љ–љ—Л–є DOM-–Њ–±—К–µ–Ї—В –Є–Ј —В–µ–Ї—Г—Й–µ–є —Б—В—А–∞–љ–Є—Ж—Л, —З—В–Њ–±—Л –±–µ–Ј–Њ–њ–∞—Б–љ–Њ –µ–≥–Њ –Є–Ј–Љ–µ–љ—П—В—М
            const docClone = document.documentElement.cloneNode(true);

            // –Ю–І–Ш–°–Ґ–Ъ–Р –Ь–Х–†–Ґ–Т–Ю–У–Ю –•–Ю–Ы–°–Ґ–Р –Ш –Ґ–£–Ы–Ґ–Ш–Я–Ю–Т (–Ш–°–Я–†–Р–Т–Ы–Х–Э–Ш–Х –°–Ш–Э–Х–У–Ю –≠–Ъ–†–Р–Э–Р)
            const deadCanvases = docClone.querySelectorAll('canvas');
            deadCanvases.forEach(c => c.remove());
            
         const clonedTooltip = docClone.querySelector('#hover-tooltip');
            if (clonedTooltip) {
                clonedTooltip.innerHTML = '';
                clonedTooltip.style.display = 'none';
                clonedTooltip.style.opacity = '1';   
            }

            // 2. –Т—Л—А–µ–Ј–∞–µ–Љ –љ–µ–љ—Г–ґ–љ—Л–µ —Н–ї–µ–Љ–µ–љ—В—Л –њ–Њ –Є—Е ID –Є–ї–Є –Ї–ї–∞—Б—Б–∞–Љ
         // –Я–Њ–ї–љ–Њ—Б—В—М—О —Г–і–∞–ї—П–µ–Љ –≤–µ—Б—М —А—П–і —Б –Ї–љ–Њ–њ–Ї–∞–Љ–Є
            const actionRow = docClone.querySelector('#action-buttons-row');
            if(actionRow) actionRow.remove();
            
            const downloadModal = docClone.querySelector('#download-modal');
            if(downloadModal) downloadModal.remove();

            // 3. –Я–Њ–і–≥–Њ—В–∞–≤–ї–Є–≤–∞–µ–Љ –і–∞–љ–љ—Л–µ
            const dataString = JSON.stringify(allLoadedFeatures)
                                    .replace(/</g, '\\u003c')
                                    .replace(/>/g, '\\u003e');

            // –Т—Л—З–Є—Б–ї—П–µ–Љ –∞–±—Б–Њ–ї—О—В–љ—Л–µ –Ї–Њ–Њ—А–і–Є–љ–∞—В—Л —Ж–µ–љ—В—А–∞ —В–Њ–≥–Њ, –Ї—Г–і–∞ –≤—Л —Б–µ–є—З–∞—Б —Б–Љ–Њ—В—А–Є—В–µ
            const centerWgs = proj4("EPSG:3857", "EPSG:4326", [
                originMercator[0] + controls.target.x,
                originMercator[1] - controls.target.z
            ]);

            // –°–Њ—Е—А–∞–љ—П–µ–Љ –њ–Њ–Ј–Є—Ж–Є—О –Ї–∞–Љ–µ—А—Л –Њ—В–љ–Њ—Б–Є—В–µ–ї—М–љ–Њ —Ж–µ–љ—В—А–∞
         const mapState = {
                lon: centerWgs[0],
                lat: centerWgs[1],
                camDx: camera.position.x - controls.target.x,
                camDy: camera.position.y,
                camDz: camera.position.z - controls.target.z,
                mapType: currentGroundTex 
            };

            const dataScript = document.createElement('script'); 
            dataScript.textContent = `window.EMBEDDED_FEATURES = ${dataString};\nwindow.EMBEDDED_STATE = ${JSON.stringify(mapState)};`;
            
            // 4. –Т—Б—В–∞–≤–ї—П–µ–Љ —Б–Ї—А–Є–њ—В —Б –і–∞–љ–љ—Л–Љ–Є –≤ <head>
            docClone.querySelector('head').appendChild(dataScript);

            // 5. –Э–∞—Е–Њ–і–Є–Љ —Б–Ї—А–Є–њ—В –Є –Ј–∞–Љ–µ–љ—П–µ–Љ –≤—Л–Ј–Њ–≤ triggerFetch() –љ–∞ loadFromEmbeddedData()
            const mainScript = docClone.querySelector('script[type="module"]');
            if (mainScript) {
                mainScript.textContent = mainScript.textContent.replace(
                    /if \(window\.EMBEDDED_FEATURES\) {[^}]+} else {[^}]+}/,
                    `if (window.EMBEDDED_FEATURES) {
                        loadFromEmbeddedData();
                    } else {
                        // –≠—В–∞ –≤–µ—В–Ї–∞ –љ–Є–Ї–Њ–≥–і–∞ –љ–µ –≤—Л–њ–Њ–ї–љ–Є—В—Б—П –≤ —Б–Њ—Е—А–∞–љ–µ–љ–љ–Њ–Љ —Д–∞–є–ї–µ
                        console.log("Embedded data not found, server fetch would be here.");
                    }`
                );
            }

            // 6. –Я–Њ–ї—Г—З–∞–µ–Љ —Д–Є–љ–∞–ї—М–љ—Л–є HTML-–Ї–Њ–і –Є —Б–Ї–∞—З–Є–≤–∞–µ–Љ
            let htmlString = "<!DOCTYPE html>\n" + docClone.outerHTML;

            const blob = new Blob([htmlString], { type: 'text/html;charset=utf-8' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            const dateStr = new Date().toISOString().slice(0, 10);
            a.download = `3D_–Ъ–∞—А—В–∞_${dateStr}.html`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }

function showTooltipFromMeta(meta, type) {
            const typeName = type === 'oks' ? '–Ч–і–∞–љ–Є–µ' : (type === 'zu' ? '–Ч–µ–Љ–µ–ї—М–љ—Л–є —Г—З–∞—Б—В–Њ–Ї' : (type === 'str' ? '–°–Њ–Њ—А—Г–ґ–µ–љ–Є–µ' : '–Ч–Њ–љ–∞ / –Ч–Ю–£–Ш–Ґ'));
            const isMobile = window.innerWidth <= 768;
            
            let html = `
                <button class="tt-mobile-close" id="mobile-tt-close" style="display: ${isMobile ? 'flex' : 'none'};">&times;</button>
                <div class="tt-title" style="${isMobile ? 'padding-right: 35px;' : ''}">${typeName}</div>
                <div class="tt-id">${meta.id}</div>
            `;
            if(meta.name && meta.name !== '–Ю–±—К–µ–Ї—В') html += `<div class="tt-info"><b>–Э–∞–Ј–≤–∞–љ–Є–µ:</b> ${meta.name}</div>`;
            if(meta.address) html += `<div class="tt-info"><b>–Р–і—А–µ—Б:</b> ${meta.address}</div>`;
            if(meta.floors) html += `<div class="tt-info"><b>–≠—В–∞–ґ–љ–Њ—Б—В—М:</b> ${meta.floors}</div>`;
            if(meta.year) html += `<div class="tt-info"><b>–У–Њ–і:</b> ${meta.year}</div>`;
            if(meta.ext) html += `<div class="tt-info"><b>–Я—А–Њ—В—П–ґ–µ–љ–љ–Њ—Б—В—М:</b> ${meta.ext} –Љ</div>`;
            if(meta.area && !isNaN(meta.area)) html += `<div class="tt-area">${meta.area.toLocaleString('ru-RU')} –Љ¬≤</div>`;

tooltip.innerHTML = html;
tooltip.style.display = "block";
tooltip.style.opacity = "1"; 
            
            if (isMobile) {
                document.getElementById('mobile-tt-close').onclick = () => { tooltip.style.display = "none"; };
            } else {
                tooltip.style.left = (window.innerWidth / 2) + "px";
                tooltip.style.top = (window.innerHeight / 2) + "px";
            }
        }

function setupInteractivity() {
            // –Х–і–Є–љ–∞—П —Д—Г–љ–Ї—Ж–Є—П –Њ–±—А–∞–±–Њ—В–Ї–Є –ї—Г—З–∞
            function processRaycast(clientX, clientY, isHoverEvent) {
                mouse.x = (clientX / window.innerWidth) * 2 - 1;
                mouse.y = -(clientY / window.innerHeight) * 2 + 1;
                raycaster.setFromCamera(mouse, camera);

                const hits = raycaster.intersectObjects(interactables, false).filter(h => h.object.visible && h.object.parent.visible);

                if (hits.length > 0) {
                    let hitMesh = hits[0].object;
                    let parentGroup = hitMesh.userData.parentGroup;
                    
                    if (hoveredObj !== parentGroup) {
                        if (hoveredObj) setHighlight(hoveredObj, false);
                        hoveredObj = parentGroup;
                        setHighlight(hoveredObj, true);
                        document.body.style.cursor = 'pointer';
                        
                        const meta = hoveredObj.userData.meta;
                        const type = hoveredObj.userData.type;
                        const typeName = type === 'oks' ? '–Ч–і–∞–љ–Є–µ' : (type === 'zu' ? '–Ч–µ–Љ–µ–ї—М–љ—Л–є —Г—З–∞—Б—В–Њ–Ї' : (type === 'str' ? '–°–Њ–Њ—А—Г–ґ–µ–љ–Є–µ' : '–Ч–Њ–љ–∞ / –Ч–Ю–£–Ш–Ґ'));
                        
                        let html = `
                            <button class="tt-mobile-close" id="mobile-tt-close" style="display: ${isHoverEvent ? 'none' : 'flex'};">&times;</button>
                            <div class="tt-title" style="${isHoverEvent ? '' : 'padding-right: 35px;'}">${typeName}</div>
                            <div class="tt-id">${meta.id}</div>
                        `;
                        
                        if(meta.name && meta.name !== '–Ю–±—К–µ–Ї—В') html += `<div class="tt-info"><b>–Э–∞–Ј–≤–∞–љ–Є–µ:</b> ${meta.name}</div>`;
                        if(meta.address) html += `<div class="tt-info"><b>–Р–і—А–µ—Б:</b> ${meta.address}</div>`;
                        if(meta.floors) html += `<div class="tt-info"><b>–≠—В–∞–ґ–љ–Њ—Б—В—М:</b> ${meta.floors}</div>`;
                        if(meta.year) html += `<div class="tt-info"><b>–У–Њ–і:</b> ${meta.year}</div>`;
                        if(meta.ext) html += `<div class="tt-info"><b>–Я—А–Њ—В—П–ґ–µ–љ–љ–Њ—Б—В—М:</b> ${meta.ext} –Љ</div>`;
                        if(meta.area && !isNaN(meta.area)) html += `<div class="tt-area">${meta.area.toLocaleString('ru-RU')} –Љ¬≤</div>`;

                        tooltip.innerHTML = html;
                        tooltip.style.display = "block";
                        
                        // –Х—Б–ї–Є —Н—В–Њ –Љ–Њ–±–Є–ї—М–љ—Л–є —В–∞–њ - –≤–µ—И–∞–µ–Љ —Б–Њ–±—Л—В–Є–µ –љ–∞ –Ї—А–µ—Б—В–Є–Ї
                        if (!isHoverEvent) {
                            document.getElementById('mobile-tt-close').onclick = (e) => {
                                e.stopPropagation();
                                tooltip.style.display = "none";
                                setHighlight(hoveredObj, false);
                                hoveredObj = null;
                            };
                        }
                    }

                    // –Я–Њ–Ј–Є—Ж–Є–Њ–љ–Є—А—Г–µ–Љ –Ј–∞ –Ї—Г—А—Б–Њ—А–Њ–Љ —В–Њ–ї—М–Ї–Њ –љ–∞ –Я–Ъ (–љ–∞ –Љ–Њ–±–Є–ї–Ї–∞—Е CSS –њ—А–Є–ґ–Љ–µ—В –±–ї–Њ–Ї –≤–љ–Є–Ј)
                    if (isHoverEvent) {
                        tooltip.style.left = (clientX + 15) + "px";
                        tooltip.style.top = (clientY + 15) + "px";
                    }
                } else {
                    // –Х—Б–ї–Є –Ї–ї–Є–Ї–љ—Г–ї–Є/–љ–∞–≤–µ–ї–Є –љ–∞ –њ—Г—Б—В–Њ—В—Г
                    if (hoveredObj) {
                        setHighlight(hoveredObj, false);
                        hoveredObj = null;
                        document.body.style.cursor = 'default';
                        tooltip.style.display = "none";
                    }
                }
            }

            // –Ф–ї—П –і–µ—Б–Ї—В–Њ–њ–Њ–≤: –Э–∞–≤–µ–і–µ–љ–Є–µ –Љ—Л—И–Є
            window.addEventListener('mousemove', (e) => {
                if (window.innerWidth <= 768) return; // –Э–∞ —Б–Љ–∞—А—В—Д–Њ–љ–∞—Е –Њ—В–Ї–ї—О—З–∞–µ–Љ
                processRaycast(e.clientX, e.clientY, true);
            });

            // –Ф–ї—П –Љ–Њ–±–Є–ї—М–љ—Л—Е: –Ґ–∞–њ (–Ї–ї–Є–Ї) –њ–Њ —Н–Ї—А–∞–љ—Г
            window.addEventListener('click', (e) => {
                if (window.innerWidth > 768) return; // –Э–∞ –Я–Ъ —А–∞–±–Њ—В–∞–µ—В mousemove
                if (e.target !== renderer.domElement) return; // –Ш–≥–љ–Њ—А–Є—А—Г–µ–Љ –Ї–ї–Є–Ї–Є –њ–Њ –Љ–µ–љ—О –Є–љ—В–µ—А—Д–µ–є—Б–∞
                processRaycast(e.clientX, e.clientY, false);
            });
        }

        function setHighlight(group, isActive) {
            group.children.forEach(mesh => {
                if (mesh.material) {
                    const highlightColor = new THREE.Color(0x333333);
                    const black = new THREE.Color(0x000000);
                    const applyEmi = (m) => { if(m.emissive) m.emissive.copy(isActive ? highlightColor : black); };
                    
                    if (Array.isArray(mesh.material)) mesh.material.forEach(applyEmi);
                    else applyEmi(mesh.material);
                }
            });
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

       function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }

        init();

    </script>
