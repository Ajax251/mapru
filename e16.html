            #hover-tooltip { max-width: 250px; font-size: 12px; }

   <button class="download-btn" id="download-btn" title="Получить свежие данные для видимой области"><i class="fas fa-sync-alt"></i> Актуализировать данные</button>

    <script type="module">
        import * as THREE from "three";
       
        import { OrbitControls } from "three/addons/controls/OrbitControls.js";
         const allLoadedFeatures = { zu: [], oks: [], str: [], zones: [] };

        // ================= НАСТРОЙКИ СЕРВЕРА =================
        const API_URL_READ = 'https://mapruapp.ru/api/3d/objects'; 
        const API_URL_SAVE = 'https://mapruapp.ru/api/3d/save_json'; 
        
        proj4.defs("EPSG:3857", "+proj=merc +a=6378137 +b=6378137 +lat_ts=0.0 +lon_0=0.0 +x_0=0.0 +y_0=0 +k=1.0 +units=m +nadgrids=@null +wktext +no_defs");
        proj4.defs("EPSG:4326", "+proj=longlat +datum=WGS84 +no_defs");

    const DEFAULT_LON = 37.6173; 
        const DEFAULT_LAT = 55.7558;
        const sevenDigitsRegions = ['06','07','09','10','11','12','13','14','17','23','24','27','31','32','35','36','41','42','47','48','50','52','53','56','57','58','59','60','61','62','63','65','66','67','69','70','71','72','74','77','78','79'];
        
        const loadedFeatureIds = new Set();
        const activeTiles = new Map(); 

        const BUILDING_DICT = {
            education:{keys:["школ","детск","сад","учебн","институт"],wall:0xfce4c8,base:0x8b6f47,roof:0xd97706,win:0x93c5fd,winType:"ribbon",parapet:true},
            medical:{keys:["больниц","поликлиник","мед","здрав","госпитал"],wall:0xf0f4f8,base:0x8294a8,roof:0xf87171,win:0x7dd3fc,winType:"standard",parapet:true},
            mkd:{keys:["многоквартирный","мкд","общежити","квартир"],wall:0xe2e8f0,base:0x64748b,roof:0xef4444,win:0x7db8f0,winType:"dense",parapet:true},
            priv:{keys:["жилой дом","индивидуальн","частн","дачн"],wall:0xf0dcc8,base:0x7a6352,roof:0xb91c1c,win:0x93c5fd,winType:"standard",parapet:false,hippedRoof:true},
            commercial:{keys:["магазин","торгов","офис","бизнес","тц"],wall:0xe0e7ff,base:0x4f46e5,roof:0xc2410c,win:0x60a5fa,winType:"large",parapet:true},
            industrial:{keys:["склад","цех","завод","промышлен","гараж"],wall:0x94a3b8,base:0x475569,roof:0x475569,win:null,winType:"none",parapet:false},
            def:{wall:0xf8fafc,base:0x94a3b8,roof:0xef4444,win:0x93c5fd,winType:"standard",parapet:true}
        };

        let scene, camera, renderer, controls;
        const sceneGroups = { zu: new THREE.Group(), oks: new THREE.Group(), str: new THREE.Group(), zones: new THREE.Group() };
        let mapTilesGroup, groundPlane, gridHelper;
        let currentGroundTex = 'ghyb';

        let isFetching = false;
        let fetchTimeout = null;
        let stateSaveTimeout = null;
        let flyAnimation = null;
        let pendingHighlightId = null;
        
    let originMercator = [0,0]; 
        let currentWgs84Center = [DEFAULT_LON, DEFAULT_LAT];

        const interactables = [];
        let hoveredObj = null;
        const tooltip = document.getElementById("hover-tooltip");
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();
        const textureLoader = new THREE.TextureLoader();
        textureLoader.setCrossOrigin('anonymous');

        function wgs84ToMercator(lon, lat) {
            const p = proj4("EPSG:4326", "EPSG:3857", [lon, lat]);
            return [p[0], p[1]];
        }

        // ================= ИНИЦИАЛИЗАЦИЯ =================
        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0xe0f2fe);
            
            // ИСПРАВЛЕНИЕ: Меньше тумана, больше обзор
            scene.fog = new THREE.Fog(0xe0f2fe, 1000, 8000); 

            camera = new THREE.PerspectiveCamera(45, window.innerWidth/window.innerHeight, 5, 50000);
            
            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            renderer.shadowMap.enabled = true;
            renderer.shadowMap.type = THREE.PCFSoftShadowMap;
            document.body.appendChild(renderer.domElement);

controls = new OrbitControls(camera, renderer.domElement);

// Ключевая настройка: перемещение строго параллельно земле!
controls.screenSpacePanning = false; 

controls.mouseButtons = {
    LEFT: THREE.MOUSE.PAN,
    MIDDLE: THREE.MOUSE.DOLLY,
    RIGHT: THREE.MOUSE.ROTATE
};

controls.enableDamping = true; 
controls.dampingFactor = 0.05;
controls.maxPolarAngle = Math.PI/2 - 0.05; 
controls.maxDistance = 15000; 

// Отключаем встроенный зум, так как у нас ниже написана своя плавная логарифмическая логика на колесико
controls.enableZoom = false;

// Плавный логарифмический зум колесиком
// Плавный логарифмический зум колесиком
            renderer.domElement.addEventListener('wheel', (e) => {
                e.preventDefault();
                
                const scale = e.deltaY > 0 ? 1.1 : 0.9;
                const dir = camera.position.clone().sub(controls.target);
                const newPos = controls.target.clone().add(dir.multiplyScalar(scale));
                
                // Ограничения по высоте
                if (newPos.y < 5) newPos.y = 5;
                if (newPos.y > 15000) newPos.y = 15000;
                
                camera.position.copy(newPos);
                controls.update();
            }, { passive: false });

            // --- НАЧАЛО ДОБАВЛЕНИЯ: Плавный зум щипком (Pinch-to-zoom) для телефонов ---
            let pinchStartDistance = null;

            renderer.domElement.addEventListener('touchstart', (e) => {
                if (e.touches.length === 2) {
                    const dx = e.touches[0].clientX - e.touches[1].clientX;
                    const dy = e.touches[0].clientY - e.touches[1].clientY;
                    pinchStartDistance = Math.hypot(dx, dy);
                }
            }, { passive: false });

            renderer.domElement.addEventListener('touchmove', (e) => {
                if (e.touches.length === 2 && pinchStartDistance) {
                    e.preventDefault(); // Запрещаем стандартный скролл страницы
                    
                    const dx = e.touches[0].clientX - e.touches[1].clientX;
                    const dy = e.touches[0].clientY - e.touches[1].clientY;
                    const currentDistance = Math.hypot(dx, dy);
                    
                    if (currentDistance === 0) return;

                    // Вычисляем масштаб: если пальцы раздвигаются, scale < 1 (приближение)
                    const scale = pinchStartDistance / currentDistance;
                    pinchStartDistance = currentDistance; // Обновляем для следующего кадра

                    const dir = camera.position.clone().sub(controls.target);
                    const newPos = controls.target.clone().add(dir.multiplyScalar(scale));
                    
                    if (newPos.y < 5) newPos.y = 5;
                    if (newPos.y > 15000) newPos.y = 15000;
                    
                    camera.position.copy(newPos);
                    controls.update();
                }
            }, { passive: false });

            renderer.domElement.addEventListener('touchend', (e) => {
                if (e.touches.length < 2) {
                    pinchStartDistance = null;
                }
            });
            // --- КОНЕЦ ДОБАВЛЕНИЯ ---

            const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
            scene.add(ambientLight);
            
            const dirLight = new THREE.DirectionalLight(0xffffff, 1.5);
            dirLight.position.set(1000, 2000, 1000); 
            dirLight.castShadow = true;
            dirLight.shadow.camera.left = -2000; dirLight.shadow.camera.right = 2000;
            dirLight.shadow.camera.top = 2000; dirLight.shadow.camera.bottom = -2000;
            dirLight.shadow.bias = -0.001;
            scene.add(dirLight);

            mapTilesGroup = new THREE.Group();
            mapTilesGroup.position.y = -0.2;
            scene.add(mapTilesGroup);

            groundPlane = new THREE.Mesh(new THREE.PlaneGeometry(200000, 200000), new THREE.MeshStandardMaterial({color: 0xf8fafc, roughness: 1}));
            groundPlane.rotation.x = -Math.PI / 2; 
            groundPlane.position.y = -0.3; 
            groundPlane.receiveShadow = true;
            groundPlane.visible = false;
            scene.add(groundPlane);

            gridHelper = new THREE.GridHelper(20000, 1000, 0x94a3b8, 0xcbd5e1);
            gridHelper.position.y = -0.2;
            gridHelper.visible = false;
            scene.add(gridHelper);

            Object.values(sceneGroups).forEach(g => scene.add(g));

     if (window.EMBEDDED_STATE) {
                // ОФЛАЙН РЕЖИМ: Ставим центр мира ровно туда, куда вы смотрели при сохранении
                currentWgs84Center = [window.EMBEDDED_STATE.lon, window.EMBEDDED_STATE.lat];
                originMercator = wgs84ToMercator(currentWgs84Center[0], currentWgs84Center[1]);
                
                controls.target.set(0, 0, 0); // Смотрим ровно в центр
                camera.position.set(window.EMBEDDED_STATE.camDx, window.EMBEDDED_STATE.camDy, window.EMBEDDED_STATE.camDz);
                controls.update();
            } else {
                // ОНЛАЙН РЕЖИМ: Обычная логика
                const savedState = JSON.parse(localStorage.getItem('cadaster_3d_state'));
                if (savedState && savedState.lon && savedState.lat) {
                    currentWgs84Center = [savedState.lon, savedState.lat];
                    originMercator = wgs84ToMercator(currentWgs84Center[0], currentWgs84Center[1]);
                    camera.position.set(savedState.camX, savedState.camY, savedState.camZ);
                    controls.target.set(savedState.tarX, savedState.tarY, savedState.tarZ);
                } else {
                    currentWgs84Center = [DEFAULT_LON, DEFAULT_LAT];
                    originMercator = wgs84ToMercator(DEFAULT_LON, DEFAULT_LAT);
                    camera.position.set(200, 500, 500);
                    controls.target.set(0, 0, 0);
                    
                    if (navigator.geolocation) {
                        navigator.geolocation.getCurrentPosition(
                            (pos) => flyToCoordinate(pos.coords.longitude, pos.coords.latitude, 500, 500),
                            (err) => console.log("Геолокация недоступна", err.message),
                            { timeout: 10000 } 
                        );
                    }
                }
            }
            window.addEventListener('resize', onWindowResize);
         
            window.addEventListener('beforeunload', saveLocationState);
            
            setupUI();
            setupInteractivity();
            setupSearch();
            setupDownloadSystem();

            animate();
            
            
            if (window.EMBEDDED_FEATURES) {
                loadFromEmbeddedData();
            } else {
                triggerFetch();

        function flyToMesh(targetGroup) {
            const box = new THREE.Box3().setFromObject(targetGroup);
            if (box.isEmpty()) return;
            
            const center = new THREE.Vector3(); 
            box.getCenter(center);
            const size = new THREE.Vector3(); 
            box.getSize(size);
            
            const maxDim = Math.max(size.x, size.z, 50); 
            
            const startTarget = controls.target.clone();
            const startCam = camera.position.clone();
            
            const dir = new THREE.Vector3().subVectors(startCam, center).normalize();
            if (dir.lengthSq() === 0) dir.set(0, 0.5, 1).normalize();
            
            const endCam = center.clone().add(dir.multiplyScalar(maxDim * 2.5)); 
            endCam.y = Math.max(endCam.y, maxDim * 1.5);
            
            const startTime = performance.now();
            const duration = 1000;

            flyAnimation = function() {
                let t = Math.min((performance.now() - startTime) / duration, 1);
                let ease = 1 - Math.pow(1 - t, 3); // Кубическое замедление
                controls.target.lerpVectors(startTarget, center, ease);
                camera.position.lerpVectors(startCam, endCam, ease);
                if (t < 1) requestAnimationFrame(flyAnimation); 
                else flyAnimation = null;
            };
            flyAnimation();
        }

        // ================= УМНАЯ ЗАГРУЗКА ТАЙЛОВ И ТУМАНА =================
        function updateDynamicFogAndTiles() {
            const alt = camera.position.y;
            
            // Динамический туман
            scene.fog.near = Math.max(1000, alt * 2);
            scene.fog.far = Math.max(4000, alt * 8);

            if (currentGroundTex === 'solid') {
                mapTilesGroup.visible = false;
                groundPlane.visible = true;
                gridHelper.visible = true;
                return;
            }
            mapTilesGroup.visible = true;
            groundPlane.visible = false;
            gridHelper.visible = false;

            let z = 18; let radius = 3; 
            if (alt > 8000) { z = 13; radius = 6; }
            else if (alt > 4000) { z = 14; radius = 6; }
            else if (alt > 2000) { z = 15; radius = 5; }
            else if (alt > 800) { z = 16; radius = 5; }
            else if (alt > 300) { z = 17; radius = 4; }
            else { z = 18; radius = 4; } 

            const E = 20037508.342789244; 
            const tileSize = (2 * E) / Math.pow(2, z);

            const mercX = originMercator[0] + controls.target.x;
            const mercY = originMercator[1] - controls.target.z;

            const tX = Math.floor((mercX + E) / tileSize);
            const tY = Math.floor((E - mercY) / tileSize);

            const newTiles = new Set();

            for (let i = -radius; i <= radius; i++) {
                for (let j = -radius; j <= radius; j++) {
                    const cx = tX + i;
                    const cy = tY + j;
                    const key = `${currentGroundTex}_${z}_${cx}_${cy}`;
                    newTiles.add(key);

                    if (!activeTiles.has(key)) {
                        const minX = -E + cx * tileSize;
                        const maxY = E - cy * tileSize;
                        
                        const posX = minX + tileSize/2 - originMercator[0];
                        const posZ = -(maxY - tileSize/2 - originMercator[1]);

                        const geo = new THREE.PlaneGeometry(tileSize + 2, tileSize + 2); 
                        geo.rotateX(-Math.PI / 2);
                        const mat = new THREE.MeshStandardMaterial({ color: 0xffffff, roughness: 1 });
                        const mesh = new THREE.Mesh(geo, mat);
                        mesh.position.set(posX, 0, posZ);
                        mesh.receiveShadow = true;
                        
                        mapTilesGroup.add(mesh);
                        activeTiles.set(key, mesh);

                        let url = '';
                        if (currentGroundTex === 'osm') url = `https://tile.openstreetmap.org/${z}/${cx}/${cy}.png`;
                        if (currentGroundTex === 'gsat') url = `https://mt1.google.com/vt/lyrs=s&x=${cx}&y=${cy}&z=${z}`;
                        if (currentGroundTex === 'ghyb') url = `https://mt1.google.com/vt/lyrs=y&x=${cx}&y=${cy}&z=${z}`;

                        textureLoader.load(url, (tex) => {
                            tex.colorSpace = THREE.SRGBColorSpace;
                            mat.map = tex; mat.needsUpdate = true;
                        });
                    }
                }
            }

               if (!window.tileCache) window.tileCache = new Map();
            const MAX_CACHE_SIZE = 150; // Максимальное количество тайлов в кэше (отрегулируйте по потребности, 150 - хороший баланс памяти)

            // 1. Убираем из сцены тайлы, которые больше не нужны (но НЕ удаляем их из памяти)
            for (const [key, mesh] of activeTiles.entries()) {
                if (!newTiles.has(key)) {
                    mapTilesGroup.remove(mesh); // Просто убираем из группы рендеринга
                    activeTiles.delete(key);
                    
                    // Добавляем в кэш. Map в JS сохраняет порядок вставки, поэтому "свежие" всегда в конце
                    window.tileCache.delete(key); // Удаляем, если был (чтобы обновить позицию)
                    window.tileCache.set(key, mesh);
                }
            }

            // 2. Очистка старых тайлов, если кэш переполнен
            if (window.tileCache.size > MAX_CACHE_SIZE) {
                // Получаем ключи самых старых элементов (с начала Map)
                const keysToDelete = Array.from(window.tileCache.keys()).slice(0, window.tileCache.size - MAX_CACHE_SIZE);
                
                for (const oldKey of keysToDelete) {
                    const oldMesh = window.tileCache.get(oldKey);
                    // Полностью освобождаем память видеокарты
                    if (oldMesh.material.map) oldMesh.material.map.dispose();
                    oldMesh.material.dispose();
                    oldMesh.geometry.dispose();
                    
                    window.tileCache.delete(oldKey);
                }
            }
        }

        function setupSearch() {
            const input = document.getElementById('search-input');
            const btn = document.getElementById('search-btn');

            input.addEventListener('input', function() {
                if (this.value.includes('.') || this.value.includes(',') || this.value.includes('-')) return;
                let value = this.value;
                if (/^\d/.test(value)) {
                    value = value.replace(/\D/g, '');
                    const firstTwo = value.slice(0, 2);
                    const isSeven = sevenDigitsRegions.includes(firstTwo);
                    const thirdLen = isSeven ? 7 : 6;
                    let formatted = '';
                    if (value.length > 0) formatted += value.slice(0, 2);
                    if (value.length > 2) formatted += ':' + value.slice(2, 4);
                    if (value.length > 4) {
                        const rem = value.slice(4);
                        if (rem.length <= thirdLen) formatted += ':' + rem;
                        else formatted += ':' + rem.slice(0, thirdLen) + ':' + rem.slice(thirdLen);
                    }
                    this.value = formatted;
                }
            });

            const doSearch = async () => {
                const query = input.value.trim();
                if (!query) return;

                const stats = document.getElementById('stats');
                stats.innerText = 'Поиск...';
                stats.classList.add('loading-pulse');

                if (/^\d{2}:\d{2}:\d{6,7}(:\d+)?$/.test(query)) {
                    try {
                        const res = await fetch(`https://nspd.gov.ru/api/geoportal/v2/search/geoportal?thematicSearchId=1&query=${encodeURIComponent(query)}`);
                        const data = await res.json();
                        if(data?.data?.features?.length > 0) {
                            const feature = data.data.features[0];
                            
                            let pt;
                            const geomType = feature.geometry.type;
                            const coords = feature.geometry.coordinates;
                            if (geomType === 'Polygon') pt = coords[0][0];
                            else if (geomType === 'MultiPolygon') pt = coords[0][0][0];
                            else if (geomType === 'Point') pt = coords;
                            else pt = coords[0]; 

                            const wgsPoint = proj4("EPSG:3857", "EPSG:4326", pt);
                            
                            pendingHighlightId = feature.properties?.options?.cad_num || feature.properties?.descr;
                            
                            // Подлетаем близко! Высота 200, отдаление 300
                            flyToCoordinate(wgsPoint[0], wgsPoint[1], 200, 300);
                            stats.classList.remove('loading-pulse');
                            
                            // Автосохранение в БД
                            fetch(API_URL_SAVE, {
                                method: 'POST', headers: { 'Content-Type': 'application/json' },
                                body: JSON.stringify({ features: [feature] })
                            });
                            return;
                        } else {
                            stats.innerText = 'Ничего не найдено';
                            stats.classList.remove('loading-pulse');
                            return;
                        }
                    } catch(e) { console.error(e); }
                }

                ymaps.ready(() => {
                    ymaps.geocode(query, {results: 1}).then(res => {
                        const obj = res.geoObjects.get(0);
                        if(obj) {
                            const coords = obj.geometry.getCoordinates(); 
                            flyToCoordinate(coords[1], coords[0], 500, 500); 
                            stats.classList.remove('loading-pulse');
                            input.value = obj.getAddressLine();
                        } else {
                            stats.innerText = 'Ничего не найдено';
                            stats.classList.remove('loading-pulse');
                        }
                    });
                });
            };

            btn.onclick = doSearch;
            input.onkeydown = (e) => { if(e.key === 'Enter') doSearch(); };

            document.getElementById('home-btn').onclick = () => {
                if (navigator.geolocation) {
                    navigator.geolocation.getCurrentPosition(pos => {
                        flyToCoordinate(pos.coords.longitude, pos.coords.latitude, 500, 500);
                    });
                }
            };
        }

        const windowMaterialCache = {};
        function getWindowMaterial(style) {
            if (style.winType==="none"||!style.win) return new THREE.MeshStandardMaterial({color:style.wall,roughness:0.9});
            const ck = style.wall+"_"+style.winType;
            if (windowMaterialCache[ck]) return windowMaterialCache[ck];

            const cv = document.createElement("canvas"); cv.width=256; cv.height=256; 
            const ctx = cv.getContext("2d");
            ctx.fillStyle="#"+new THREE.Color(style.wall).getHexString(); ctx.fillRect(0,0,256,256);
            
            let wW=120, wH=160;
            if(style.winType==="dense"){wW=160;wH=180;}else if(style.winType==="ribbon"){wW=220;wH=100;}else if(style.winType==="large"){wW=180;wH=200;}
            
            const sX=(256-wW)/2, sY=(256-wH)/2;
            ctx.fillStyle="#"+new THREE.Color(style.win).getHexString(); ctx.fillRect(sX,sY,wW,wH);
            ctx.strokeStyle="#1e293b"; ctx.lineWidth=8; ctx.strokeRect(sX,sY,wW,wH);
            
            const tex = new THREE.CanvasTexture(cv);
            tex.colorSpace = THREE.SRGBColorSpace;
            tex.wrapS = THREE.RepeatWrapping; tex.wrapT = THREE.RepeatWrapping;
            
            const repeatX = style.winType==="dense"?3:(style.winType==="ribbon"?5:4);
            tex.repeat.set(1/repeatX, 1/3.5); 
            
            const mat = new THREE.MeshStandardMaterial({map:tex, roughness:0.2, metalness:0.6});
            windowMaterialCache[ck]=mat; return mat;
        }

        function createShape(coords) {
            const shape = new THREE.Shape();
            if(!coords || coords.length < 1 || coords[0].length < 3) return shape;
            
            const getLocal = (c) => ({ x: c[0] - originMercator[0], y: c[1] - originMercator[1] });
            
            const outer = coords[0];
            const start = getLocal(outer[0]);
            shape.moveTo(start.x, start.y);
            for(let i=1; i<outer.length; i++) { shape.lineTo(getLocal(outer[i]).x, getLocal(outer[i]).y); }
            
            for(let i=1; i<coords.length; i++) {
                const holeRing = coords[i];
                if(holeRing.length < 3) continue;
                const hole = new THREE.Path();
                hole.moveTo(getLocal(holeRing[0]).x, getLocal(holeRing[0]).y);
                for(let j=1; j<holeRing.length; j++) hole.lineTo(getLocal(holeRing[j]).x, getLocal(holeRing[j]).y);
                shape.holes.push(hole);
            }
            return shape;
        }




function getNetworkColor(text) {
    if (!text) return 0x8b5cf6; // По умолчанию фиолетовый
    text = text.toLowerCase();
    
    // Электричество - Красные
    if (text.includes('электро') || text.includes('электр') || text.includes('лэп') || text.includes('лп ') || text.includes('вл ') || text.includes('вкл') || text.includes('воздушн')) return 0xFF0000; 
    
    // Газ - Желтый
    if (text.includes('газ')) return 0xFFBF00; 
    
    // Канализация/Стоки - Серый
    if (text.includes('канализ') || text.includes('канал') || text.includes('сток')) return 0x94a3b8; 
    
    // Вода - Синий
    if (text.includes('водо') || text.includes('вод')) return 0x3b82f6; 
    
    // Тепло - Темно-красный/Бордовый
    if (text.includes('тепло')) return 0xdc2626; 
    
    // Остальные ЗОУИТ - Фиолетовый
    return 0x8b5cf6; 
}

   function buildModel(feature, groupName) {
            if (groupName === 'structure') groupName = 'str';
            if (groupName === 'zouit') groupName = 'zones';

            const geom = feature.geometry;
            const props = feature.properties;
            const opts = props.options || {};
            
            // 1. Сначала собираем правильное ИМЯ из всех возможных полей API
            let name = opts.name_by_doc || opts.building_name || opts.params_name || opts.purpose || props.descr || 'Объект';
            let cadNum = opts.cad_num || opts.cad_number || opts.reg_numb_border || feature.id || 'Без номера';
            
            // 2. Теперь формируем строку для поиска ключевых слов, ОБЯЗАТЕЛЬНО включая найденное имя!
            const rawText = (props.descr + ' ' + name + ' ' + (opts.purpose||'') + ' ' + (opts.type_zone||'')).toLowerCase();
            
            // ЛОГ ДЛЯ ОТЛАДКИ (откройте F12 -> Консоль, чтобы проверить, если что-то не покрасится)
            if (groupName === 'zones' || groupName === 'str') {
                console.log(`[Анализ Цвета] Тип: ${groupName} | Имя: "${name}" | Итоговая строка для поиска: "${rawText}"`);
            }
            
            const meta = {
                id: cadNum, name: name,
                address: opts.readable_address || opts.address_readable_address || '',
                area: opts.build_record_area || opts.specified_area || opts.declared_area || '',
                floors: opts.floors || '',
                year: opts.year_built || opts.params_year_built || '',
                ext: opts.params_extension || ''
            };

            const modelGroup = new THREE.Group();
            const getLocal = (c) => ({ x: c[0] - originMercator[0], y: c[1] - originMercator[1] });

            // ИСПРАВЛЕНИЕ: ПОДДЕРЖКА ЛИНИЙ (ТРУБ)
            if (geom.type.includes('Line')) {
                const lines = geom.type === 'LineString' ? [geom.coordinates] : geom.coordinates;
                lines.forEach(line => {
                    const pts = line.map(c => {
                        const local = getLocal(c);
                        return new THREE.Vector3(local.x, 1, -local.y); 
                    });
                    if (pts.length < 2) return;

                  const curve = new THREE.CatmullRomCurve3(pts, false, 'chordal');
                    let color = getNetworkColor(rawText); 

                    const tube = new THREE.Mesh(
                        new THREE.TubeGeometry(curve, pts.length * 4, 0.8, 8, false),
                        new THREE.MeshStandardMaterial({color: color, roughness: 0.5})
                    );
                    tube.castShadow = true;
                    modelGroup.add(tube);
                });
            } else {
                // ПОЛИГОНЫ
                const ringsList = geom.type === 'MultiPolygon' ? geom.coordinates : [geom.coordinates];

                ringsList.forEach(coords => {
                    const shape = new THREE.Shape();
                    if(!coords || coords.length < 1 || coords[0].length < 3) return;
                    
                    const outer = coords[0];
                    const start = getLocal(outer[0]);
                    shape.moveTo(start.x, start.y);
                    for(let i=1; i<outer.length; i++) { shape.lineTo(getLocal(outer[i]).x, getLocal(outer[i]).y); }
                    
                    for(let i=1; i<coords.length; i++) {
                        const holeRing = coords[i];
                        if(holeRing.length < 3) continue;
                        const hole = new THREE.Path();
                        hole.moveTo(getLocal(holeRing[0]).x, getLocal(holeRing[0]).y);
                        for(let j=1; j<holeRing.length; j++) hole.lineTo(getLocal(holeRing[j]).x, getLocal(holeRing[j]).y);
                        shape.holes.push(hole);
                    }

                    let mesh;
                    if (groupName === 'oks') {
                        let style = BUILDING_DICT.def;
                        for (const key in BUILDING_DICT) { if (BUILDING_DICT[key].keys && BUILDING_DICT[key].keys.some(k => rawText.includes(k))) { style = BUILDING_DICT[key]; break; } }

                        let defaultFloors = 1;
                        if (rawText.includes('многоквартир') || rawText.includes('мкд')) defaultFloors = 9;
                        else if (rawText.includes('жило') || rawText.includes('дом')) defaultFloors = 2;
                        else if (rawText.includes('школ') || rawText.includes('больниц')) defaultFloors = 3;
                        
                        const floors = parseInt(opts.floors) || defaultFloors;
                        const height = floors * 3.5;
                        meta.floors = floors; 

                        const base = new THREE.Mesh(new THREE.ExtrudeGeometry(shape,{depth:0.5,bevelEnabled:false}), new THREE.MeshStandardMaterial({color: style.base}));
                        base.rotation.x = -Math.PI/2; base.position.y = 0.5; modelGroup.add(base);
                        
                        const walls = new THREE.Mesh(new THREE.ExtrudeGeometry(shape,{depth:height,bevelEnabled:false}), [new THREE.MeshStandardMaterial({color:style.roof}), getWindowMaterial(style)]);
                        walls.rotation.x = -Math.PI/2; walls.position.y = 1.0;
                        walls.castShadow = true; walls.receiveShadow = true; modelGroup.add(walls);

                        if (style.hippedRoof) {
                            const roof = new THREE.Mesh(new THREE.ExtrudeGeometry(shape,{depth:1.2,bevelEnabled:false}), new THREE.MeshStandardMaterial({color:style.roof}));
                            roof.rotation.x = -Math.PI/2; roof.position.y = 1.0 + height; roof.castShadow = true; modelGroup.add(roof);
                        } else if (style.parapet) {
                            const par = new THREE.Mesh(new THREE.ExtrudeGeometry(shape,{depth:0.8,bevelEnabled:true,bevelSize:0.2,bevelThickness:0.2}), new THREE.MeshStandardMaterial({color:style.roof}));
                            par.rotation.x = -Math.PI/2; par.position.y = 1.0 + height; modelGroup.add(par);
                        }

                    } else if (groupName === 'zu') {
                        const mat = new THREE.MeshStandardMaterial({ color: 0x10b981, transparent: true, opacity: 0.3, depthWrite: false });
                        mesh = new THREE.Mesh(new THREE.ExtrudeGeometry(shape,{depth:0.1,bevelEnabled:false}), mat);
                        mesh.rotation.x = -Math.PI/2; mesh.position.y = 0.1;
                        mesh.add(new THREE.LineSegments(new THREE.EdgesGeometry(mesh.geometry), new THREE.LineBasicMaterial({color:0x047857})));
                        modelGroup.add(mesh);
                        
                    } else if (groupName === 'zones') {
                    let color = getNetworkColor(rawText);
                    
                    // Подземные коммуникации делаем темнее на 40%
                    const isUnderground = rawText.includes('подзем') || (!rawText.includes('надзем') && (rawText.includes('водо') || rawText.includes('канал') || rawText.includes('сток')));
                    if (isUnderground) {
                        color = new THREE.Color(color).multiplyScalar(0.6).getHex();
                    }
                    
                    const mat = new THREE.MeshStandardMaterial({ 
                        color: color, 
                        transparent: true,
        opacity: 0.5, 
        depthWrite: false, 
        side: THREE.DoubleSide 
    });
    
    mesh = new THREE.Mesh(new THREE.ExtrudeGeometry(shape,{depth:5,bevelEnabled:false}), mat);
    mesh.rotation.x = -Math.PI/2; 
    mesh.position.y = 0.5;
    mesh.add(new THREE.LineSegments(new THREE.EdgesGeometry(mesh.geometry), 
        new THREE.LineBasicMaterial({color:color, transparent: true, opacity: 0.8})));
    modelGroup.add(mesh);
} else if (groupName === 'str') {
    let color = getNetworkColor(rawText);
    
    // Подземные сооружения делаем немного темнее
    const isUnderground = rawText.includes('подзем');
    if (isUnderground) {
        color = new THREE.Color(color).multiplyScalar(0.7).getHex();
    }
    
    const mat = new THREE.MeshStandardMaterial({ color: color });
    mesh = new THREE.Mesh(new THREE.ExtrudeGeometry(shape,{depth:1,bevelEnabled:false}), mat);
    mesh.rotation.x = -Math.PI/2; 
    mesh.position.y = 0.5; 
    mesh.castShadow = true;
    modelGroup.add(mesh);
}
                });
            }

            if (modelGroup.children.length > 0) {
                modelGroup.userData = { meta: meta, type: groupName };
                modelGroup.children.forEach(c => { 
                    c.userData.parentGroup = modelGroup; 
                    c.userData.origEmissive = 0x000000;
                    interactables.push(c); 
                });
                sceneGroups[groupName].add(modelGroup);
            }
        }

        // ================= ЗАГРУЗКА ИЗ БД =================
        async function triggerFetch() {
            const activeLayers = Array.from(document.querySelectorAll('.layer-control input')).filter(cb => cb.checked).map(cb => cb.value);
            if (activeLayers.length === 0) return;

            const targetX = controls.target.x;
            const targetZ = controls.target.z;
            const dist = camera.position.distanceTo(controls.target);
            const radius = Math.min(dist * 1.5 + 500, 3000); 
            
            const minX = originMercator[0] + targetX - radius;
            const maxX = originMercator[0] + targetX + radius;
            const minY = originMercator[1] - targetZ - radius;
            const maxY = originMercator[1] - targetZ + radius;

            const url = `${API_URL_READ}?min_x=${minX}&max_x=${maxX}&min_y=${minY}&max_y=${maxY}&layers=${activeLayers.join(',')}`;

            document.getElementById('stats').innerHTML = 'Синхронизация с БД... <i class="fas fa-spinner loading-pulse"></i>';
            isFetching = true;

            try {
                const response = await fetch(url);
                if(!response.ok) throw new Error('Network error');
                const data = await response.json();

                let addedCount = 0;
             data.features.forEach(f => {
                    if (loadedFeatureIds.has(f.id)) return;
                    loadedFeatureIds.add(f.id);
                    
                
                    if(f.properties._layer_type) allLoadedFeatures[f.properties._layer_type].push(f);
                    
                    buildModel(f, f.properties._layer_type);
                    addedCount++;
                });

                document.getElementById('stats').innerText = `Кэш сессии: ${loadedFeatureIds.size} объектов`;
                
                // Подсветка после поиска
                if (pendingHighlightId) {
                    let targetMesh = null;
                    interactables.forEach(m => {
                        if (m.userData.parentGroup.userData.meta.id === pendingHighlightId) {
                            targetMesh = m.userData.parentGroup;
                        }
                    });
                    if (targetMesh) {
                        setHighlight(targetMesh, true);
                        hoveredObj = targetMesh;
                        showTooltipFromMeta(targetMesh.userData.meta, targetMesh.userData.type);
                    }
                    pendingHighlightId = null;
                }

            } catch (err) {
                console.error(err);
                document.getElementById('stats').innerText = 'Нет связи';
            } finally {
                isFetching = false;
            }
        }

        // ================= ИНТЕРФЕЙС И ВЗАИМОДЕЙСТВИЕ =================

                      const exportBtn = document.getElementById('export-html-btn');
if (exportBtn) exportBtn.onclick = exportToStandaloneHTML;

           function loadFromEmbeddedData() {
            if (!window.EMBEDDED_FEATURES) return;

            // Отключаем кнопки, связанные с сервером
            const downloadBtn = document.getElementById('download-btn');
            if(downloadBtn) downloadBtn.style.display = 'none';

            let totalCount = 0;
            Object.entries(window.EMBEDDED_FEATURES).forEach(([layerType, features]) => {
                if(features && Array.isArray(features)) {
                    totalCount += features.length;
                    features.forEach(f => {
                        if (!loadedFeatureIds.has(f.id)) {
                            loadedFeatureIds.add(f.id);
                            // Используем layer_type из встроенных данных
                            buildModel(f, f.properties._layer_type || layerType);
                        }
                    });
                }
            });
            document.getElementById('stats').innerText = `Кэш сессии: ${totalCount} объектов (офлайн)`;
        }

           function exportToStandaloneHTML() {
            // 1. Создаем временный DOM-объект из текущей страницы, чтобы безопасно его изменять
            const docClone = document.documentElement.cloneNode(true);

            // ОЧИСТКА МЕРТВОГО ХОЛСТА И ТУЛТИПОВ (ИСПРАВЛЕНИЕ СИНЕГО ЭКРАНА)
            const deadCanvases = docClone.querySelectorAll('canvas');
            deadCanvases.forEach(c => c.remove());
            
            const clonedTooltip = docClone.querySelector('#hover-tooltip');
            if (clonedTooltip) {
                clonedTooltip.innerHTML = '';
                clonedTooltip.style.opacity = '0';
            }

            // 2. Вырезаем ненужные элементы по их ID или классам
            const exportBtn = docClone.querySelector('#export-html-btn');
            if(exportBtn) exportBtn.remove();

            const downloadBtn = docClone.querySelector('#download-btn');
            if(downloadBtn) downloadBtn.remove();
            
            const downloadModal = docClone.querySelector('#download-modal');
            if(downloadModal) downloadModal.remove();

            // 3. Подготавливаем данные
            const dataString = JSON.stringify(allLoadedFeatures)
                                    .replace(/</g, '\\u003c')
                                    .replace(/>/g, '\\u003e');

            // Вычисляем абсолютные координаты центра того, куда вы сейчас смотрите
            const centerWgs = proj4("EPSG:3857", "EPSG:4326", [
                originMercator[0] + controls.target.x,
                originMercator[1] - controls.target.z
            ]);

            // Сохраняем позицию камеры относительно центра
            const mapState = {
                lon: centerWgs[0],
                lat: centerWgs[1],
                camDx: camera.position.x - controls.target.x,
                camDy: camera.position.y,
                camDz: camera.position.z - controls.target.z
            };

            const dataScript = document.createElement('script'); 
            dataScript.textContent = `window.EMBEDDED_FEATURES = ${dataString};\nwindow.EMBEDDED_STATE = ${JSON.stringify(mapState)};`;
            
            // 4. Вставляем скрипт с данными в <head>
            docClone.querySelector('head').appendChild(dataScript);

            // 5. Находим скрипт и заменяем вызов triggerFetch() на loadFromEmbeddedData()
            const mainScript = docClone.querySelector('script[type="module"]');
            if (mainScript) {
                mainScript.textContent = mainScript.textContent.replace(
                    /if \(window\.EMBEDDED_FEATURES\) {[^}]+} else {[^}]+}/,
                    `if (window.EMBEDDED_FEATURES) {
                        loadFromEmbeddedData();
                    } else {
                        // Эта ветка никогда не выполнится в сохраненном файле
                        console.log("Embedded data not found, server fetch would be here.");
                    }`
                );
            }

            // 6. Получаем финальный HTML-код и скачиваем
            let htmlString = "<!DOCTYPE html>\n" + docClone.outerHTML;

            const blob = new Blob([htmlString], { type: 'text/html;charset=utf-8' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            const dateStr = new Date().toISOString().slice(0, 10);
            a.download = `3D_Карта_${dateStr}.html`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }

        function showTooltipFromMeta(meta, type) {
            const typeName = type === 'oks' ? 'Здание' : (type === 'zu' ? 'Земельный участок' : (type === 'str' ? 'Сооружение' : 'Зона / ЗОУИТ'));
            
            // ИСПРАВЛЕНИЕ: Красивый блочный тултип
            let html = `<div class="tt-title">${typeName}</div><div class="tt-id">${meta.id}</div>`;
            if(meta.name && meta.name !== 'Объект') html += `<div class="tt-info"><b>Название:</b> ${meta.name}</div>`;
            if(meta.address) html += `<div class="tt-info"><b>Адрес:</b> ${meta.address}</div>`;
            if(meta.floors) html += `<div class="tt-info"><b>Этажность:</b> ${meta.floors}</div>`;
            if(meta.year) html += `<div class="tt-info"><b>Год:</b> ${meta.year}</div>`;
            if(meta.ext) html += `<div class="tt-info"><b>Протяженность:</b> ${meta.ext} м</div>`;
            if(meta.area && !isNaN(meta.area)) html += `<div class="tt-area">${meta.area.toLocaleString('ru-RU')} м²</div>`;

            tooltip.innerHTML = html;
            tooltip.style.opacity = "1";
            tooltip.style.left = (window.innerWidth / 2) + "px";
            tooltip.style.top = (window.innerHeight / 2) + "px";
        }

        function setupInteractivity() {
            window.addEventListener('mousemove', (e) => {
                mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
                mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
                raycaster.setFromCamera(mouse, camera);

                const hits = raycaster.intersectObjects(interactables, false).filter(h => h.object.visible && h.object.parent.visible);

                if (hits.length > 0) {
                    let hitMesh = hits[0].object;
                    let parentGroup = hitMesh.userData.parentGroup;
                    
                    if (hoveredObj !== parentGroup) {
                        if (hoveredObj) setHighlight(hoveredObj, false);
                        hoveredObj = parentGroup;
                        setHighlight(hoveredObj, true);
                        document.body.style.cursor = 'pointer';
                        
                        const meta = hoveredObj.userData.meta;
                        const type = hoveredObj.userData.type;
                        const typeName = type === 'oks' ? 'Здание' : (type === 'zu' ? 'Земельный участок' : (type === 'str' ? 'Сооружение' : 'Зона / ЗОУИТ'));
                        
                        let html = `<div class="tt-title">${typeName}</div><div class="tt-id">${meta.id}</div>`;
                        if(meta.name && meta.name !== 'Объект') html += `<div class="tt-info"><b>Название:</b> ${meta.name}</div>`;
                        if(meta.address) html += `<div class="tt-info"><b>Адрес:</b> ${meta.address}</div>`;
                        if(meta.floors) html += `<div class="tt-info"><b>Этажность:</b> ${meta.floors}</div>`;
                        if(meta.year) html += `<div class="tt-info"><b>Год:</b> ${meta.year}</div>`;
                        if(meta.ext) html += `<div class="tt-info"><b>Протяженность:</b> ${meta.ext} м</div>`;
                        if(meta.area && !isNaN(meta.area)) html += `<div class="tt-area">${meta.area.toLocaleString('ru-RU')} м²</div>`;

                        tooltip.innerHTML = html;
                        tooltip.style.opacity = "1";
                    }
                    tooltip.style.left = (e.clientX + 15) + "px";
                    tooltip.style.top = (e.clientY + 15) + "px";
                } else {
                    if (hoveredObj) {
                        setHighlight(hoveredObj, false);
                        hoveredObj = null;
                        document.body.style.cursor = 'default';
                        tooltip.style.opacity = "0";
                    }
                }
            });
            
            
                 window.addEventListener('touchstart', (e) => {
                if (e.touches.length > 0) {
                    mouse.x = (e.touches[0].clientX / window.innerWidth) * 2 - 1;
                    mouse.y = -(e.touches[0].clientY / window.innerHeight) * 2 + 1;
                    raycaster.setFromCamera(mouse, camera);

                    const hits = raycaster.intersectObjects(interactables, false).filter(h => h.object.visible && h.object.parent.visible);

                    if (hits.length > 0) {
                        let hitMesh = hits[0].object;
                        let parentGroup = hitMesh.userData.parentGroup;
                        
                        if (hoveredObj !== parentGroup) {
                            if (hoveredObj) setHighlight(hoveredObj, false);
                            hoveredObj = parentGroup;
                            setHighlight(hoveredObj, true);
                            
                            const meta = hoveredObj.userData.meta;
                            const type = hoveredObj.userData.type;
                            const typeName = type === 'oks' ? 'Здание' : (type === 'zu' ? 'Земельный участок' : (type === 'str' ? 'Сооружение' : 'Зона / ЗОУИТ'));
                            
                            let html = `<div class="tt-title">${typeName}</div><div class="tt-id">${meta.id}</div>`;
                            if(meta.name && meta.name !== 'Объект') html += `<div class="tt-info"><b>Название:</b> ${meta.name}</div>`;
                            if(meta.address) html += `<div class="tt-info"><b>Адрес:</b> ${meta.address}</div>`;
                            if(meta.area && !isNaN(meta.area)) html += `<div class="tt-area">${meta.area.toLocaleString('ru-RU')} м²</div>`;

                            tooltip.innerHTML = html;
                            tooltip.style.opacity = "1";
                        }
                        tooltip.style.left = (e.touches[0].clientX + 15) + "px";
                        tooltip.style.top = (e.touches[0].clientY + 15) + "px";
                    } else {
                        if (hoveredObj) {
                            setHighlight(hoveredObj, false);
                            hoveredObj = null;
                            tooltip.style.opacity = "0";
                        }
                    }
                }
            }, { passive: true });
            
            
        }

        function setHighlight(group, isActive) {
            group.children.forEach(mesh => {
                if (mesh.material) {
                    const highlightColor = new THREE.Color(0x333333);
                    const black = new THREE.Color(0x000000);
                    const applyEmi = (m) => { if(m.emissive) m.emissive.copy(isActive ? highlightColor : black); };
                    
                    if (Array.isArray(mesh.material)) mesh.material.forEach(applyEmi);
                    else applyEmi(mesh.material);
                }
            });
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            if (flyAnimation) flyAnimation(); // Плавный полет
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }

        init();
