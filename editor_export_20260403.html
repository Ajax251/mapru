<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<link id="favicon" rel="icon" href="img/qrcode.png" type="image/png">
<title>QR Генератор и Сканер</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>


<script>
  pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
</script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@400;500;600&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f4f4f0;
    --surface: #ffffff;
    --surface2: #f9f9f7;
    --border: #ddddd5;
    --accent: #6abf2e;
    --accent-hover: #5aa127;
    --text: #111111;
    --muted: #666666;
    --mono: 'Space Mono', monospace;
    --sans: 'DM Sans', sans-serif;
    --shadow: rgba(0,0,0,0.08);
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 2rem 1rem;
  }

  .card {
    width: 100%;
    max-width: 440px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 2.5rem 2rem;
    box-shadow: 0 10px 40px var(--shadow);
  }

  .header-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 0.5rem;
  }

  h1 { font-size: 28px; font-weight: 600; letter-spacing: -0.5px; }
  h1 span { color: var(--accent); }

  .print-btn {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 6px 12px; background: var(--surface2);
    border: 1px solid var(--border); border-radius: 8px;
    color: var(--text); text-decoration: none; font-size: 14px; font-weight: 500;
    transition: background 0.2s, border-color 0.2s;
  }
  .print-btn:hover { background: #f0f0eb; border-color: #ccc; }
  .print-btn img { width: 16px; height: 16px; object-fit: contain; }

  .desc { font-size: 15px; color: var(--muted); margin-bottom: 1.5rem; }

  .input-wrap { display: flex; gap: 8px; margin-bottom: 12px; }
  
  #url, #logo-url {
    width: 100%; padding: 14px 16px; background: var(--surface2);
    border: 1px solid var(--border); border-radius: 10px;
    color: var(--text); font-size: 15px; outline: none; transition: border-color 0.2s;
  }
  #url { flex: 1; }
  #url::placeholder, #logo-url::placeholder { color: #aaa; }
  #url:focus, #logo-url:focus { border-color: var(--accent); }

  /* Общие стили для кнопок-иконок (Сканер и Ссылка) */
  .icon-btn {
    display: flex; align-items: center; justify-content: center;
    padding: 0 14px; background: var(--surface2); border: 1px solid var(--border);
    border-radius: 10px; cursor: pointer; transition: 0.2s; color: var(--text);
  }
  .icon-btn svg { transition: stroke 0.2s; width: 22px; height: 22px; }
  .icon-btn:hover { border-color: var(--accent); }
  .icon-btn:hover svg { stroke: var(--accent); }

  .settings-wrap {
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 10px; padding: 16px; margin-bottom: 16px;
    display: flex; flex-direction: column; gap: 16px;
  }
  .setting-row { display: flex; flex-direction: column; gap: 10px; }
  .setting-header { display: flex; justify-content: space-between; align-items: center; font-size: 14px; font-weight: 500; }
  
  .size-val { font-family: var(--mono); color: var(--muted); font-size: 13px; }

  input[type="range"] { -webkit-appearance: none; width: 100%; background: transparent; }
  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none; height: 18px; width: 18px; border-radius: 50%;
    background: var(--accent); cursor: pointer; margin-top: -6px; box-shadow: 0 2px 6px rgba(0,0,0,0.2);
  }
  input[type="range"]::-webkit-slider-runnable-track {
    width: 100%; height: 6px; cursor: pointer; background: var(--border); border-radius: 3px;
  }

  .color-picker-wrap { display: flex; align-items: center; gap: 10px; }
  .color-hex { font-family: var(--mono); font-size: 13px; color: var(--text); text-transform: uppercase; }
  input[type="color"] {
    -webkit-appearance: none; border: none; width: 36px; height: 36px; border-radius: 8px;
    cursor: pointer; padding: 0; background: transparent;
  }
  input[type="color"]::-webkit-color-swatch-wrapper { padding: 0; }
  input[type="color"]::-webkit-color-swatch { border: 1px solid var(--border); border-radius: 8px; }

  .preset-btn {
    padding: 6px 10px; background: white; border: 1px solid var(--border);
    border-radius: 6px; font-size: 12px; cursor: pointer; transition: 0.2s;
  }
  .preset-btn:hover { border-color: var(--accent); color: var(--accent); }

  #gen {
    width: 100%; padding: 14px; background: var(--accent); color: #fff;
    border: none; border-radius: 10px; font-size: 16px; font-weight: 600;
    cursor: pointer; transition: background 0.2s, transform 0.1s;
  }
  #gen:hover { background: var(--accent-hover); }
  #gen:active { transform: scale(0.98); }

  .qr-section { margin-top: 2rem; display: none; text-align: center; }
  .divider { height: 1px; background: var(--border); margin-bottom: 2rem; }
  .qr-frame {
    display: inline-flex; padding: 16px; background: #fff;
    border: 1px solid var(--border); border-radius: 12px; margin-bottom: 1rem; max-width: 100%; position: relative;
  }
  #qr-container img, #qr-container canvas { display: block; margin: 0 auto; border-radius: 4px; max-width: 100% !important; height: auto !important; }
  .url-display { font-family: var(--mono); font-size: 13px; color: var(--muted); word-break: break-all; margin-bottom: 1.5rem; padding: 10px; background: var(--surface2); border-radius: 8px; }
  .actions { display: flex; flex-direction: column; gap: 10px; }
  .actions button { width: 100%; padding: 14px; border-radius: 8px; font-size: 14px; font-weight: 500; cursor: pointer; transition: background 0.15s; }
  .act-primary { background: var(--accent); color: #fff; border: none; }
  .act-primary:hover { background: var(--accent-hover); }
  .act-secondary { background: transparent; border: 1px solid var(--border); color: var(--text); }
  .act-secondary:hover { background: var(--surface2); }

  /* Стили модального окна */
  .modal {
    display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.6); z-index: 1000; align-items: center; justify-content: center;
    padding: 1rem; backdrop-filter: blur(4px);
  }
  .modal-content {
    background: var(--surface); width: 100%; max-width: 440px; border-radius: 16px;
    padding: 24px; box-shadow: 0 10px 40px rgba(0,0,0,0.2); position: relative;
  }
  .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
  .modal-header h3 { font-size: 18px; font-weight: 600; }
  .close-btn {
    background: none; border: none; font-size: 24px; line-height: 1; cursor: pointer;
    color: var(--muted); padding: 0 4px; transition: color 0.2s;
  }
  .close-btn:hover { color: var(--text); }
  
  /* Кастомизация сканера CSS */
  #reader { border: none !important; }
  #reader button { 
    padding: 10px 16px; background: var(--surface2); border: 1px solid var(--border); 
    border-radius: 8px; cursor: pointer; margin: 4px; font-family: var(--sans); font-size: 14px;
    font-weight: 500; transition: 0.2s; color: var(--text);
  }
  #reader button:hover { border-color: var(--accent); }
  #reader select { padding: 8px; border-radius: 8px; border: 1px solid var(--border); margin-bottom: 12px; font-family: var(--sans); }
  #reader a { color: var(--accent); text-decoration: none; font-weight: 500; display: inline-block; margin-top: 10px; cursor: pointer; }
  #reader a:hover { text-decoration: underline; }
  #reader a[href^="https://scanapp.org"], #reader img[alt="Info icon"] { display: none !important; }
  
  #reader input[type="file"]::-webkit-file-upload-button {
    background: var(--surface2); border: 1px solid var(--border); 
    border-radius: 6px; padding: 6px 12px; font-family: var(--sans); font-size: 13px; cursor: pointer; margin-right: 10px;
  }
  
  
  .actions button {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
}
/* Скрываем встроенный в библиотеку загрузчик файлов */
#reader #html5-qrcode-button-file-selection {
  display: none !important;
}
.result-table {
  width: 100%;
  border-collapse: collapse;
}
.result-table td {
  padding: 4px 0;
  vertical-align: top;
}
.result-table td:first-child {
  width: 1%;
  white-space: nowrap;
  padding-right: 10px;
  color: var(--muted);
  font-weight: 500;
}

.preset-btn.active { background: var(--accent); color: white; border-color: var(--accent); }

</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script src="https://unpkg.com/html5-qrcode"></script>
</head>
<body>

<div class="card">
  <div class="header-row">
    <h1>Создать <span>QR-код</span></h1>
    <a href="qrp.html" class="print-btn"><img src="img/print.png" alt="QR">Печать</a>
  </div>


<p class="desc">Выберите тип и введите данные</p>

  <!-- Переключатель типов QR -->
<div style="display: flex; gap: 8px; margin-bottom: 12px; flex-wrap: wrap;">
    <button class="preset-btn active" id="btn-url" onclick="setMode('url')">Ссылка</button>
    <button class="preset-btn" id="btn-contact" onclick="setMode('contact')">Контакт</button>
    <button class="preset-btn" id="btn-wa" onclick="setMode('wa')">WhatsApp</button>
    <button class="preset-btn" id="btn-tg" onclick="setMode('tg')">Telegram</button>
    <!-- Заменили кнопку -->
    <button class="preset-btn" id="btn-max" onclick="setMode('max')">Max</button>
  </div>

  <!-- Поле для имени (показывается только для контакта) -->
  <div id="contact-fields" style="display: none; margin-bottom: 8px;">
    <input type="text" id="contact-name" placeholder="Имя (для сохранения контакта)" style="width: 100%; padding: 14px 16px; background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; font-size: 15px; outline: none;">
  </div>

  <div class="input-wrap">
    <input type="text" id="url" placeholder="https://example.com" autocomplete="off"/>
    
    <!-- Кнопка "Перейти по ссылке" -->
    <button class="icon-btn" onclick="openLink()" title="Перейти по ссылке">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"></path><polyline points="15 3 21 3 21 9"></polyline><line x1="10" y1="14" x2="21" y2="3"></line>
      </svg>
    </button>
    <!-- Кнопка "Сканировать QR-код" -->
    <button class="icon-btn" onclick="openScanner()" title="Сканировать QR-код">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M14.5 4h-5L7 7H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-3l-2.5-3z"></path><circle cx="12" cy="13" r="3"></circle>
      </svg>
    </button>
  </div>
  

  <div class="settings-wrap">
    <div class="setting-row">
      <div class="setting-header">
        <label>Логотип по центру</label>
      </div>
      <div style="display: flex; gap: 6px; flex-wrap: wrap;">
        <button class="preset-btn" onclick="setLogo('https://upload.wikimedia.org/wikipedia/commons/5/58/Yandex_icon.svg')">Яндекс</button>
        <button class="preset-btn" onclick="setLogo('https://d-assets.2gis.ru/favicon.png')">2GIS</button>
        <button class="preset-btn" onclick="setLogo('https://upload.wikimedia.org/wikipedia/commons/c/c1/Google_%22G%22_logo.svg')">Google</button>
        <button class="preset-btn" onclick="document.getElementById('logo-file').click()">Файл...</button>
        <button class="preset-btn" onclick="setLogo('')" style="color: #dc2626;" title="Удалить">✕</button>
      </div>
      <input type="text" id="logo-url" placeholder="URL картинки логотипа" style="padding: 10px; font-size: 13px;">
      <input type="file" id="logo-file" accept="image/*" style="display: none;" onchange="uploadLogo(this)">
    </div>

    <div class="setting-row">
      <div class="setting-header">
        <label for="size-slider">Размер</label>
        <span class="size-val" id="size-val">512x512 px</span>
      </div>
      <input type="range" id="size-slider" min="1" max="5" value="2">
    </div>

    <div class="setting-row">
      <div class="setting-header"><label for="qr-color">Цвет</label></div>
      <div class="color-picker-wrap">
        <input type="color" id="qr-color" value="#000000">
        <span class="color-hex" id="color-hex">#000000</span>
      </div>
    </div>
  </div>

  <button id="gen" onclick="generate()">Сгенерировать</button>

  <div class="qr-section" id="qr-section">
    <div class="divider"></div>
    <div class="qr-frame" id="qr-container"></div>
    <div class="url-display" id="url-display"></div>
    
    <div class="actions">
      <button class="act-primary" onclick="downloadPNG('white')">Скачать PNG</button>
      <button class="act-secondary" onclick="downloadPNG('transparent')">Скачать PNG (прозрачный)</button>
    </div>
  </div>
</div>

<!-- Окно Сканера -->
<div class="modal" id="scan-modal">
  <div class="modal-content">
    <div class="modal-header">
      <h3>Сканировать QR-код</h3>
      <button class="close-btn" onclick="closeScanner()">✕</button>
    </div>
    
    <div id="scan-options">

          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-right: 8px;"><path d="M14.5 4h-5L7 7H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-3l-2.5-3z"></path><circle cx="12" cy="13" r="3"></circle></svg>

        </button>
<button class="act-secondary" onclick="document.getElementById('custom-file-input').click()">
   <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-right: 8px;"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg>
  Загрузить файл (PNG, PDF, HTML, ZIP)
</button>
<input type="file" id="custom-file-input" accept="image/*,.pdf,.html,.htm,.txt,.zip" style="display:none;" onchange="handleCustomFile(this)">
        <button class="act-secondary" onclick="pasteFromClipboard()">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-right: 8px;"><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"></path><rect x="8" y="2" width="8" height="4" rx="1" ry="1"></rect></svg>
          Вставить из буфера (Ctrl+V)
        </button>
      </div>

    <div id="reader" style="display: none;"></div>
  </div>
</div>

<div class="modal" id="result-modal">
  <div class="modal-content">
    <div class="modal-header">
      <h3>Результат сканирования</h3>
      <button class="close-btn" onclick="document.getElementById('result-modal').style.display='none'">✕</button>
    </div>
    <div id="scan-result-text" style="font-family: var(--sans); font-size: 14px; color: var(--text); background: var(--surface2); padding: 12px; border-radius: 8px; margin-bottom: 20px; word-break: break-all; max-height: 300px; overflow-y: auto; text-align: left;"></div>
    <div class="actions" style="gap: 12px;">
      <button id="btn-open-app" class="act-primary" style="display: none; font-size: 16px;"></button>
      <button class="act-secondary" onclick="copyScanResult()">Скопировать исходный текст</button>
      <button class="act-secondary" id="btn-generate-clean" onclick="useAsGenerator()">Сгенерировать чистый QR</button>
    </div>
  </div>
</div>

<script>
// --- ФУНКЦИЯ ДЛЯ ОТКРЫТИЯ ССЫЛКИ ---
function openLink() {
  let val = document.getElementById('url').value.trim();
  if (!val) return; // Если пусто, ничего не делаем
  
  // Добавляем https:// если это домен, но без протокола (как в генераторе)
  if (!/^https?:\/\//i.test(val) && val.includes('.')) {
    val = 'https://' + val;
  }
  
  // Открываем в новой вкладке
  window.open(val, '_blank');
}

// --- ГЕНЕРАТОР ---
const sizeMap = { 1: 256, 2: 512, 3: 1024, 4: 2048, 5: 4096 };

function saveSettings() {
  try {
    localStorage.setItem('qr_url', document.getElementById('url').value);
    localStorage.setItem('qr_size', document.getElementById('size-slider').value);
    localStorage.setItem('qr_color', document.getElementById('qr-color').value);
    localStorage.setItem('qr_logo', document.getElementById('logo-url').value);
  } catch (e) {}
}

function loadSettings() {
  try {
    const sUrl = localStorage.getItem('qr_url'), sSize = localStorage.getItem('qr_size'), 
          sCol = localStorage.getItem('qr_color'), sLogo = localStorage.getItem('qr_logo');
    if (sUrl) document.getElementById('url').value = sUrl;
    if (sSize) document.getElementById('size-slider').value = sSize;
    if (sCol) document.getElementById('qr-color').value = sCol;
    if (sLogo) document.getElementById('logo-url').value = sLogo;
  } catch (e) {}
}

function updateUI() {
  const val = document.getElementById('size-slider').value;
  document.getElementById('size-val').textContent = `${sizeMap[val]}x${sizeMap[val]} px`;
  document.getElementById('color-hex').textContent = document.getElementById('qr-color').value;
}

function setLogo(url) {
  document.getElementById('logo-url').value = url;
  saveSettings();
  if(document.getElementById('url').value) generate();
}

function uploadLogo(input) {
  const f = input.files[0];
  if (!f) return;
  const r = new FileReader();
  r.onload = e => setLogo(e.target.result);
  r.readAsDataURL(f);
  input.value = '';
}

document.getElementById('url').addEventListener('input', saveSettings);
document.getElementById('url').addEventListener('keydown', e => { if (e.key === 'Enter') generate(); });
document.getElementById('logo-url').addEventListener('input', saveSettings);
document.getElementById('size-slider').addEventListener('input', () => { updateUI(); saveSettings(); });
document.getElementById('qr-color').addEventListener('input', () => { updateUI(); saveSettings(); });

window.addEventListener('DOMContentLoaded', () => {
  loadSettings(); updateUI();
  if (document.getElementById('url').value.trim()) generate();
});

et qrMode = 'url'; 

function setMode(mode) {
  qrMode = mode;
  // Заменили 'sms' на 'max' в массиве кнопок
  ['url', 'contact', 'wa', 'tg', 'max'].forEach(m => document.getElementById('btn-' + m).classList.remove('active'));
  document.getElementById('btn-' + mode).classList.add('active');

  const input = document.getElementById('url');
  const nameField = document.getElementById('contact-fields');

  if (mode === 'url') {
    input.placeholder = "https://example.com";
    nameField.style.display = 'none';
  } else {
    input.placeholder = "Номер телефона (например: +79991234567)";
    nameField.style.display = mode === 'contact' ? 'block' : 'none';
  }
  
  if (input.value) generate();
}

// Слушатель для поля имени
document.getElementById('contact-name').addEventListener('input', () => {
  if (document.getElementById('url').value) generate();
});

function generate() {
  let val = document.getElementById('url').value.trim();
  if (!val) { document.getElementById('url').focus(); return; }
  
  let finalQrText = val;

  if (qrMode === 'url') {
    if (!/^https?:\/\//i.test(val) && val.includes('.')) { val = 'https://' + val; finalQrText = val; }
    document.getElementById('url').value = val;
  } 
  else if (qrMode === 'wa') {
    let phone = val.replace(/[^0-9]/g, ''); 
    finalQrText = `https://wa.me/${phone}`;
  } 
  else if (qrMode === 'tg') {
    let phone = val.replace(/[^0-9+]/g, ''); 
    if (!phone.startsWith('+')) phone = '+' + phone;
    finalQrText = `https://t.me/${phone}`;
  } 
  else if (qrMode === 'max') { // <-- Обработка для мессенджера Max
    let phone = val.replace(/[^0-9+]/g, ''); // Оставляем цифры и плюс
    if (!phone.startsWith('+')) phone = '+' + phone;
    finalQrText = `https://max.ru/${phone}`; // Если у Max другой формат, измените эту строку
  } 
  else if (qrMode === 'contact') {
    let phone = val.replace(/[^0-9+]/g, '');
    let name = document.getElementById('contact-name').value.trim() || "Новый контакт";
    finalQrText = `BEGIN:VCARD\nVERSION:3.0\nFN:${name}\nTEL:${phone}\nEND:VCARD`;
  }

  saveSettings();

  const px = sizeMap[document.getElementById('size-slider').value];
  const qrColor = document.getElementById('qr-color').value;
  const logoUrl = document.getElementById('logo-url').value.trim();
  const container = document.getElementById('qr-container');
  container.innerHTML = ''; 

  const correctLvl = logoUrl ? QRCode.CorrectLevel.H : QRCode.CorrectLevel.M;

  try {
    // В QRCode передаем finalQrText, а не val !
    new QRCode(container, {
      text: finalQrText, 
      width: px,
      height: px,
      colorDark : qrColor,
      colorLight : "rgba(255,255,255,0)", 
      correctLevel : correctLvl
    });


    let displayTxt = finalQrText;
    if (qrMode === 'contact') displayTxt = `Визитка: ${document.getElementById('contact-name').value.trim()} (${val})`;
    document.getElementById('url-display').textContent = displayTxt;
    
    document.getElementById('qr-section').style.display = 'block';

    if (logoUrl) {
      const img = new Image();
      img.crossOrigin = 'Anonymous'; 
      img.onload = () => {
        const canvas = container.querySelector('canvas');
        if (!canvas) return;
        const ctx = canvas.getContext('2d');
        const logoSize = px * 0.22;
        const xy = (px - logoSize) / 2;
        
        ctx.fillStyle = '#ffffff';
        ctx.fillRect(xy - 6, xy - 6, logoSize + 12, logoSize + 12);
        ctx.drawImage(img, xy, xy, logoSize, logoSize);
        
        const qrImg = container.querySelector('img');
        if (qrImg) qrImg.src = canvas.toDataURL('image/png');
      };
      img.src = logoUrl;
    }
  } catch (error) {
    alert("Не удалось сгенерировать код.");
  }
}

function downloadPNG(type) {
  const canvas = document.querySelector('#qr-container canvas');
  if (!canvas) return alert("Изображение не найдено.");

  let exportCanvas = canvas;
  if (type === 'white') {
    exportCanvas = document.createElement('canvas');
    const padding = Math.round(canvas.width * 0.06);
    exportCanvas.width = canvas.width + padding * 2;
    exportCanvas.height = canvas.height + padding * 2;
    const ctx = exportCanvas.getContext('2d');
    ctx.fillStyle = '#ffffff';
    ctx.fillRect(0, 0, exportCanvas.width, exportCanvas.height);
    ctx.drawImage(canvas, padding, padding);
  }

  const a = document.createElement('a');
  a.href = exportCanvas.toDataURL('image/png');
  const name = document.getElementById('url-display').textContent.replace(/https?:\/\//,'').replace(/[^a-z0-9]/gi,'-').substring(0,30) || 'code';
  a.download = `qr-${name}${type==='white'?'-white':'-transparent'}.png`;
  a.click();
}


// --- СКАНЕР С ПЕРЕВОДОМ ---
let html5QrcodeScanner;
let observer;
let lastScannedSource = { type: 'text', content: '', uin: '' };

const translateDict = {
  "Request Camera Permissions": "Разрешить доступ к камере", "Scan using camera directly": "Включить камеру", "Stop Scanning": "Остановить камерu", "Start Scanning": "Запустить камеру", "NotFoundError: Requested device not found": "Камера не найдена", "NotAllowedError: Request is not allowed": "Нет доступа к камере", "Camera access is only supported in secure context": "Только по HTTPS"
};

const gostKeyMap = { "Name": "Получатель", "PersonalAcc": "Счет", "BankName": "Банк", "BIC": "БИК", "CorrespAcc": "Корр. счет", "Sum": "Сумма", "Purpose": "Назначение", "PayeeINN": "ИНН", "KPP": "КПП", "CBC": "КБК", "OKTMO": "ОКТМО", "UIN": "УИН", "lastName": "ФИО", "firstName": "", "middleName": "", "PayerAddress": "Адрес", "PensAcc": "СНИЛС" };

function translateScannerUI() {
  const reader = document.getElementById('reader'); if (!reader) return;
  const walker = document.createTreeWalker(reader, NodeFilter.SHOW_TEXT, null, false); let node;
  while ((node = walker.nextNode())) {
    let text = node.nodeValue; let originalText = text;
    for (const [en, ru] of Object.entries(translateDict)) { if (text.includes(en)) text = text.replace(en, ru); }
    if (text !== originalText) node.nodeValue = text;
  }
}

function openScanner() {
  document.getElementById('scan-modal').style.display = 'flex';
}

function startCameraScan() {
    document.getElementById('scan-options').style.display = 'none';
    document.getElementById('reader').style.display = 'block';
    if (!html5QrcodeScanner) {
        html5QrcodeScanner = new Html5QrcodeScanner("reader", { fps: 10, qrbox: { width: 250, height: 250 } }, false);
        html5QrcodeScanner.render(onScanSuccess, () => {});
        const targetNode = document.getElementById('reader');
        observer = new MutationObserver(translateScannerUI);
        observer.observe(targetNode, { childList: true, subtree: true, characterData: true });
        setTimeout(translateScannerUI, 100);
    }
}

function closeScanner() {
  document.getElementById('scan-modal').style.display = 'none';
  document.getElementById('scan-options').style.display = 'block';
  document.getElementById('reader').style.display = 'none';
  if (html5QrcodeScanner && html5QrcodeScanner.isScanning) {
    html5QrcodeScanner.stop().catch(() => {});
  }
}

function onScanSuccess(decodedText) {
  closeScanner();
  const resultModal = document.getElementById('result-modal');
  const resultTextDiv = document.getElementById('scan-result-text');
  const btnOpenApp = document.getElementById('btn-open-app');
  const btnGenerate = document.getElementById('btn-generate-clean');

  lastScannedSource.content = decodedText;
  const isLink = /^[a-zA-Z]+:\/\//i.test(decodedText);
  const isGost = /^ST0001[12]\|/i.test(decodedText);
  
 btnGenerate.textContent = "Сгенерировать чистый QR";
  if (lastScannedSource.type === 'html' || lastScannedSource.type === 'pdf') {
      btnGenerate.textContent = "Скачать исходный (PNG)";
  }

  if (isLink) {
    resultTextDiv.innerHTML = `<strong>🌐 Ссылка:</strong><br><br><span style="font-family: var(--mono);">${decodedText}</span>`;
    btnOpenApp.style.display = 'block';
    btnOpenApp.innerHTML = '🚀 Открыть ссылку / Оплатить';
    btnOpenApp.onclick = () => window.open(decodedText, '_blank');
  } else if (isGost) {
    const data = decodedText.split('|').slice(1).reduce((acc, p) => { const [k, v] = p.split('='); if(k && v) acc[k] = v; return acc; }, {});
    lastScannedSource.uin = data['UIN'] || data['Uin'] || "";
    
    let html = `<strong style="color: var(--accent); font-size: 16px; display: block; margin-bottom: 12px;">🧾 Платежная квитанция (ГОСТ)</strong><table class="result-table">`;
    for(const key in data) {
        let value = data[key];
        let label = gostKeyMap[key] || key;
        if (key === 'Sum') value = (parseInt(value) / 100).toFixed(2) + ' руб.';
        if (gostKeyMap[key] !== "") html += `<tr><td>${label}:</td><td><b>${value}</b></td></tr>`;
    }
    if(data['lastName'] || data['firstName'] || data['middleName']) {
        const fio = `${data['lastName'] || ''} ${data['firstName'] || ''} ${data['middleName'] || ''}`.trim();
        html += `<tr><td>ФИО:</td><td><b>${fio}</b></td></tr>`;
    }
    html += '</table>';
    resultTextDiv.innerHTML = html;
    
    if (lastScannedSource.uin) {
      btnOpenApp.style.display = 'block';
      btnOpenApp.innerHTML = '📋 Скопировать УИН для оплаты';
      btnOpenApp.onclick = () => navigator.clipboard.writeText(lastScannedSource.uin).then(() => alert(`УИН скопирован!\nВставьте его в приложении банка в поиске или разделе "Оплата по УИН".`));
    } else { btnOpenApp.style.display = 'none'; }
  } else {
    resultTextDiv.innerHTML = `<strong>📝 Текст:</strong><br><br><span style="font-family: var(--mono);">${decodedText}</span>`;
    btnOpenApp.style.display = 'none';
  }
  resultModal.style.display = 'flex';
}

function copyScanResult() {
  navigator.clipboard.writeText(lastScannedSource.content).then(() => alert("Исходный текст скопирован!")).catch(() => alert("Ошибка копирования"));
}

function useAsGenerator() {
    document.getElementById('result-modal').style.display = 'none';
    if ((lastScannedSource.type === 'html' || lastScannedSource.type === 'pdf') && lastScannedSource.base64) {
        const a = document.createElement('a');
        a.href = lastScannedSource.base64;
        a.download = lastScannedSource.type === 'pdf' ? 'pdf-page-with-qr.png' : 'original-qr-code.png';
        a.click();
    } else {
        document.getElementById('url').value = lastScannedSource.content;
        saveSettings();
        generate();
    }
}

async function base64ToFile(base64Str, filename="extracted.png") {
  const res = await fetch(base64Str); const blob = await res.blob();
  return new File([blob], filename, { type: blob.type });
}


async function scanImageFile(file) {
  let tempDiv = document.getElementById('temp-qr-reader');
  if (!tempDiv) { tempDiv = document.createElement('div'); tempDiv.id = 'temp-qr-reader'; tempDiv.style.display = 'none'; document.body.appendChild(tempDiv); }
  const tempScanner = new Html5Qrcode("temp-qr-reader");
  try {
    const result = await tempScanner.scanFile(file, false);
    return result;
  } catch (err) {
    return null;
  }
}

async function processPDF(file) {
    document.body.style.cursor = 'wait';
    const reader = new FileReader();
    reader.onload = async (e) => {
        try {
            const pdfDoc = await pdfjsLib.getDocument({ data: e.target.result }).promise;
            for (let i = 1; i <= pdfDoc.numPages; i++) {
                const page = await pdfDoc.getPage(i);
                const viewport = page.getViewport({ scale: 2.0 });
                const canvas = document.createElement('canvas');
                const ctx = canvas.getContext('2d');
                canvas.height = viewport.height;
                canvas.width = viewport.width;
                await page.render({ canvasContext: ctx, viewport: viewport }).promise;
                
                const blob = await new Promise(resolve => canvas.toBlob(resolve, 'image/png'));
                const imageFile = new File([blob], `page_${i}.png`, { type: 'image/png' });
                
                const decodedText = await scanImageFile(imageFile);
                if (decodedText) {
                    lastScannedSource.type = 'pdf';
                    lastScannedSource.base64 = canvas.toDataURL('image/png');
                    onScanSuccess(decodedText);
                    return; 
                }
            }
            alert("QR-код не найден в PDF-файле.");
        } catch (error) {
            alert("Ошибка при обработке PDF-файла.");
        } finally {
            document.body.style.cursor = 'default';
        }
    };
    reader.readAsArrayBuffer(file);
}

async function processFile(file) {
  const result = await scanImageFile(file);
  if (result) {
    onScanSuccess(result);
  } else {
    alert("QR-код на изображении не найден.");
  }
}

async function handleCustomFile(input) {
  if (!input.files || input.files.length === 0) return;
  const file = input.files[0];
  lastScannedSource = { type: 'text', content: '', base64: null };

  if (file.name.endsWith(".pdf") || file.type === "application/pdf") {
    await processPDF(file);
  } else if (file.name.endsWith(".zip")) {
    try {
        const jszip = new JSZip();
        const zip = await jszip.loadAsync(file);
        let htmlFile = zip.file(/\.html?$/i)[0];
        if (htmlFile) {
            const text = await htmlFile.async("string");
            await handleHtmlText(text);
        } else { alert("В ZIP-архиве не найден HTML файл."); }
    } catch(e) { alert("Не удалось обработать ZIP-архив."); }
  } else if (file.type.includes("html") || file.name.endsWith(".html")) {
    const text = await file.text();
    await handleHtmlText(text);
  } else {
    lastScannedSource.type = 'image';
    await processFile(file);
  }
  input.value = '';
}

async function handleHtmlText(text) {
    const b64 = text.match(/data:image\/[a-zA-Z]*;base64,([a-zA-Z0-9+/=]+)/);
    if (b64 && b64[0]) {
        lastScannedSource.type = 'html';
        lastScannedSource.base64 = b64[0];
        const imgFile = await base64ToFile(b64[0]);
        await processFile(imgFile);
    } else { alert("QR-код не найден в HTML файле."); }
}

async function pasteFromClipboard() {
  try {
    const items = await navigator.clipboard.read();
    for (let item of items) {
      if (item.types.some(t => t.startsWith('image/'))) {
        const blob = await item.getType(item.types.find(t => t.startsWith('image/')));
        const file = new File([blob], "clipboard.png", { type: blob.type });
        lastScannedSource = { type: 'image', content: '', base64: null };
        await processFile(file); return;
      }
      if (item.types.includes('text/html')) {
        const blob = await item.getType('text/html'); const text = await blob.text();
        handleHtmlText(text); return;
      }
    }
  } catch (e) {}
  try {
    const text = await navigator.clipboard.readText();
    if(text) onScanSuccess(text);
  } catch(e) { alert("Не удалось прочитать буфер обмена."); }
}

window.addEventListener('paste', async e => {
  if (document.getElementById('scan-modal').style.display === 'flex') {
    const items = e.clipboardData.items;
    for (let item of items) { if (item.type.includes('image/')) { lastScannedSource = {type: 'image'}; processFile(item.getAsFile()); return; } }
    const html = e.clipboardData.getData('text/html'); if(html) { handleHtmlText(html); return; }
    const text = e.clipboardData.getData('text/plain'); if(text) { onScanSuccess(text); }
  }
});

document.getElementById('scan-modal').addEventListener('click', function(e) { if (e.target === this) closeScanner(); });
document.getElementById('result-modal').addEventListener('click', function(e) { if (e.target === this) this.style.display = 'none'; });
