<!DOCTYPE html>
<html lang="ru" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Сравнение Габаритов Pro</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* CSS Переменные */
        :root[data-theme="light"] {
            --bg: #f8fafc; --panel-bg: rgba(255, 255, 255, 0.95); --text: #0f172a; --text-muted: #64748b;
            --border: rgba(0, 0, 0, 0.15); --accent: #3b82f6; --accent-hover: #2563eb;
            --input-bg: rgba(241, 245, 249, 0.8); --item-bg: #ffffff;
            --shadow: rgba(0, 0, 0, 0.12); --danger: #ef4444; --tooltip-bg: #ffffff;
        }

        :root[data-theme="dark"] {
            --bg: #0f172a; --panel-bg: rgba(15, 23, 42, 0.95); --text: #f1f5f9; --text-muted: #94a3b8;
            --border: rgba(255, 255, 255, 0.1); --accent: #3b82f6; --accent-hover: #60a5fa;
            --input-bg: rgba(30, 41, 59, 0.8); --item-bg: #1e293b;
            --shadow: rgba(0, 0, 0, 0.4); --danger: #f87171; --tooltip-bg: rgba(15, 23, 42, 0.95);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { overflow: hidden; font-family: 'Inter', 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: var(--text); transition: background 0.3s ease; }
        canvas { display: block; outline: none; }

        /* UI Panel */
        #ui-panel { position: absolute; top: 0; left: 0; width: 380px; height: 100vh; background: var(--panel-bg); backdrop-filter: blur(12px); border-right: 1px solid var(--border); display: flex; flex-direction: column; box-shadow: 4px 0 24px var(--shadow); z-index: 10; }
        .panel-header { padding: 20px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        .panel-header h2 { font-size: 18px; display: flex; align-items: center; gap: 8px; font-weight: 700; }
        .header-actions { display: flex; gap: 6px; }
        .icon-btn { background: transparent; border: 1px solid transparent; color: var(--text-muted); font-size: 15px; cursor: pointer; border-radius: 8px; width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; transition: all 0.2s; }
        .icon-btn:hover { color: var(--accent); background: var(--input-bg); border-color: var(--border); }
        .panel-content { padding: 20px; overflow-y: auto; flex-grow: 1; }
        .panel-content::-webkit-scrollbar { width: 6px; }
        .panel-content::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

        /* Forms */
        .form-group { margin-bottom: 16px; }
        .form-row { display: flex; gap: 10px; margin-bottom: 16px; }
        .form-col { flex: 1; }
        
        .form-label { display: block; font-size: 11px; font-weight: 700; text-transform: uppercase; margin-bottom: 8px; color: var(--text-muted); letter-spacing: 0.5px; }
        select, textarea, input[type="text"], input[type="number"] { width: 100%; background: var(--input-bg); border: 1px solid var(--border); border-radius: 8px; color: var(--text); padding: 12px; font-family: inherit; font-size: 14px; outline: none; transition: all 0.2s; }
        
        input[type="color"] { -webkit-appearance: none; border: none; width: 100%; height: 42px; padding: 0; background: none; cursor: pointer; }
        input[type="color"]::-webkit-color-swatch-wrapper { padding: 0; }
        input[type="color"]::-webkit-color-swatch { border: 1px solid var(--border); border-radius: 8px; }

        .checkbox-wrapper { display: flex; align-items: center; gap: 10px; background: var(--input-bg); padding: 10px; border-radius: 8px; border: 1px solid var(--border); cursor: pointer; }
        .checkbox-wrapper input { width: 18px; height: 18px; cursor: pointer; accent-color: var(--accent); }
        .checkbox-label { font-size: 13px; font-weight: 600; cursor: pointer; user-select: none; }

        textarea { height: 70px; resize: none; line-height: 1.4; }
        select:focus, textarea:focus, input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15); }
        
        .primary-btn { width: 100%; background: var(--accent); color: #fff; border: none; padding: 12px; border-radius: 8px; font-weight: 600; cursor: pointer; transition: all 0.2s; display: flex; align-items: center; justify-content: center; gap: 8px; font-size: 14px; box-shadow: 0 4px 12px rgba(59, 130, 246, 0.25); margin-bottom: 8px; }
        .primary-btn:hover { background: var(--accent-hover); transform: translateY(-1px); box-shadow: 0 6px 16px rgba(59, 130, 246, 0.3); }

        /* Switches & List */
        .mode-switch { display: flex; background: var(--input-bg); border-radius: 8px; margin: 24px 0; padding: 4px; border: 1px solid var(--border); }
        .mode-btn { flex: 1; background: transparent; border: none; color: var(--text-muted); padding: 10px; border-radius: 6px; cursor: pointer; font-weight: 600; transition: all 0.2s; font-size: 13px; }
        .mode-btn.active { background: var(--panel-bg); color: var(--text); box-shadow: 0 2px 8px var(--shadow); }
        .object-list { display: flex; flex-direction: column; gap: 10px; }
        .list-item { background: var(--item-bg); border: 1px solid var(--border); box-shadow: 0 2px 8px var(--shadow); border-radius: 10px; padding: 12px 16px; display: flex; align-items: center; gap: 12px; transition: all 0.2s; }
        .list-item.hidden-obj { opacity: 0.5; background: var(--input-bg); }
        .list-item:hover { border-color: var(--accent); transform: translateX(2px); }
        .color-dot { width: 14px; height: 14px; border-radius: 50%; border: 2px solid var(--border); flex-shrink: 0; box-shadow: inset 0 0 0 1px rgba(0,0,0,0.1); }
        .item-content { flex-grow: 1; min-width: 0; }
        .item-title { font-weight: 600; font-size: 14px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; display: flex; align-items: center; gap: 6px; }
        .item-desc { font-size: 12px; color: var(--text-muted); margin-top: 4px; }
        .item-actions { display: flex; gap: 4px; }
        .action-btn { background: transparent; border: none; cursor: pointer; width: 28px; height: 28px; border-radius: 6px; display: flex; align-items: center; justify-content: center; transition: 0.2s; color: var(--text-muted); font-size: 13px; }
        .action-btn:hover { background: var(--input-bg); color: var(--text); }
        .btn-delete:hover { color: var(--danger); background: rgba(239, 68, 68, 0.1); }

        /* Tooltip & Toasts */
        #tooltip { position: absolute; background: var(--tooltip-bg); border: 1px solid var(--border); padding: 16px; border-radius: 12px; pointer-events: none; opacity: 0; z-index: 100; box-shadow: 0 10px 40px var(--shadow); transform: translate(15px, 15px); transition: opacity 0.2s ease; min-width: 220px; }
        .tt-title { margin: 0 0 12px 0; font-size: 14px; border-bottom: 1px solid var(--border); padding-bottom: 8px; display: flex; align-items: center; gap: 8px; }
        .tt-row { display: flex; justify-content: space-between; font-size: 13px; margin-bottom: 6px; color: var(--text-muted); }
        .tt-val { font-weight: 600; color: var(--text); }
        #toast { position: fixed; bottom: 20px; right: 20px; background: var(--text); color: var(--bg); padding: 12px 24px; border-radius: 8px; font-size: 14px; font-weight: 600; box-shadow: 0 10px 30px rgba(0,0,0,0.2); opacity: 0; transform: translateY(20px); transition: all 0.3s ease; z-index: 1000; pointer-events: none; }
        #toast.show { opacity: 1; transform: translateY(0); }
        #file-input { display: none; }

        /* Loader Overlay */
        #loader-overlay {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(0, 0, 0, 0.4); backdrop-filter: blur(4px);
            display: flex; justify-content: center; align-items: center;
            z-index: 9999; opacity: 0; pointer-events: none; transition: opacity 0.3s;
        }
        #loader-overlay.active { opacity: 1; pointer-events: all; }
        .spinner {
            width: 60px; height: 60px; border: 6px solid rgba(255,255,255,0.3);
            border-top: 6px solid var(--accent); border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>

    <!-- Импорты THREE.JS и GLTFLoader -->
    <script async src="https://unpkg.com/es-module-shims@1.8.0/dist/es-module-shims.js"></script>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>

    <div id="loader-overlay"><div class="spinner"></div></div>

    <div id="ui-panel">
        <div class="panel-header">
            <h2><i class="fas fa-cubes" style="color: var(--accent);"></i> 3D Сравнение</h2>
            <div class="header-actions">
                <button id="btn-import-json" class="icon-btn" title="Загрузить JSON"><i class="fas fa-folder-open"></i></button>
                <button id="btn-export-json" class="icon-btn" title="Сохранить JSON"><i class="fas fa-save"></i></button>
                <button id="btn-theme" class="icon-btn" title="Сменить тему"><i class="fas fa-moon"></i></button>
            </div>
        </div>
        
        <div class="panel-content">
            <div class="form-group">
                <label class="form-label">Тип объекта</label>
                <select id="obj-type">
                    <option value="fridge">🧊 Холодильник</option>
                    <option value="washer">🌀 Стиральная машина</option>
                    <option value="cabinet">🚪 Шкаф / Коробка</option>
                    <option value="tv">📺 ТВ / Монитор</option>
                    <option value="sofa">🛋️ Диван</option>
                    <option value="car">🚗 Автомобиль</option>
                    <option value="house">🏠 Дом</option>
                </select>
            </div>

            <div class="form-row">
                <div class="form-col">
                    <label class="form-label">Цвет</label>
                    <input type="color" id="obj-color" value="#3b82f6">
                </div>
                <div class="form-col" style="flex: 2;">
                    <label class="form-label">Опции</label>
                    <label class="checkbox-wrapper">
                        <input type="checkbox" id="obj-use-model">
                        <span class="checkbox-label">3D Модель (GLTF)</span>
                    </label>
                </div>
            </div>

            <div class="form-group">
                <label class="form-label">Габариты (Ш х В х Г) в см</label>
                <textarea id="obj-dims" placeholder="Пример: 60 185 64"></textarea>
            </div>

            <button id="btn-add" class="primary-btn"><i class="fas fa-plus"></i> Добавить объект</button>

            <div class="mode-switch">
                <button class="mode-btn active" data-mode="side">В ряд</button>
                <button class="mode-btn" data-mode="hologram">Наложение</button>
            </div>

            <div id="object-list" class="object-list"></div>
        </div>
    </div>

    <div id="tooltip">
        <h3 id="tt-title" class="tt-title"></h3>
        <div id="tt-content"></div>
    </div>
    <div id="toast">Действие выполнено</div>
    <input type="file" id="file-input" accept=".json">

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        // Глобальные данные
        let appState = { objects: [], theme: 'light', mode: 'side' };
        
        // Карта путей
        const TYPE_MAP = {
            fridge:  { name: 'Холодильник', icon: 'fa-snowflake', path: './models/fridge/scene.gltf' },
            washer:  { name: 'Стир. машина', icon: 'fa-circle-notch', path: './models/wash/scene.gltf' },
            cabinet: { name: 'Шкаф', icon: 'fa-door-closed', path: './models/closet/scene.gltf' },
            tv:      { name: 'Экран', icon: 'fa-tv', path: './models/monitor/scene.gltf' },
            sofa:    { name: 'Диван', icon: 'fa-couch', path: './models/sofa/scene.gltf' },
            car:     { name: 'Автомобиль', icon: 'fa-car', path: './models/auto/scene.gltf' },
            house:   { name: 'Дом', icon: 'fa-home', path: './models/house/scene.gltf' }
        };

        let scene, camera, renderer, controls, floor, grid;
        let hemiLight, dirLight, fillLight;
        let objectMeshes = [];
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();

        const gltfLoader = new GLTFLoader();
        const modelCache = {};

        function init() {
            document.querySelectorAll('canvas').forEach(c => c.remove());
            const canvas = document.createElement('canvas');
            document.body.appendChild(canvas);
            
            renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true;
            renderer.shadowMap.type = THREE.PCFSoftShadowMap;
            renderer.toneMapping = THREE.ACESFilmicToneMapping;

            scene = new THREE.Scene();

            camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 1, 50000);
            camera.position.set(400, 300, 500);

            controls = new OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.dampingFactor = 0.05;
            controls.maxPolarAngle = Math.PI / 2 - 0.01;

            hemiLight = new THREE.HemisphereLight(0xffffff, 0x444444, 0.8);
            scene.add(hemiLight);

            dirLight = new THREE.DirectionalLight(0xffffff, 1.0);
            dirLight.position.set(300, 500, 300);
            dirLight.castShadow = true;
            dirLight.shadow.mapSize.set(2048, 2048);
            scene.add(dirLight);

            fillLight = new THREE.DirectionalLight(0xaabbff, 0.5);
            fillLight.position.set(-300, 200, -300);
            scene.add(fillLight);

            const floorGeo = new THREE.PlaneGeometry(20000, 20000);
            const floorMat = new THREE.ShadowMaterial({ opacity: 0.15 });
            floor = new THREE.Mesh(floorGeo, floorMat);
            floor.rotation.x = -Math.PI / 2;
            floor.receiveShadow = true;
            scene.add(floor);

            bindEvents();
            applyTheme();
            updateUIState();
            renderList();
            rebuildScene();

            window.addEventListener('resize', onWindowResize);
            animate();
        }

        // Загрузка модели с Loader'ом
        function loadModel(url, callback) {
            const loaderOverlay = document.getElementById('loader-overlay');
            
            if (modelCache[url]) {
                callback(modelCache[url].clone());
            } else {
                loaderOverlay.classList.add('active'); // Показываем лоадер
                
                gltfLoader.load(url, (gltf) => {
                    modelCache[url] = gltf.scene;
                    loaderOverlay.classList.remove('active'); // Скрываем лоадер
                    callback(gltf.scene.clone());
                }, undefined, (error) => {
                    console.error("Не удалось загрузить модель:", url, error);
                    loaderOverlay.classList.remove('active'); // Скрываем лоадер
                    showToast("Ошибка: Модель не найдена!");
                });
            }
        }

        function buildGeometry(obj) {
            const group = new THREE.Group();
            const isGhost = appState.mode === 'hologram';
            const isLight = appState.theme === 'light';

            // Хитбокс
            const hitboxGeo = new THREE.BoxGeometry(obj.w, obj.h, obj.d);
            const hitbox = new THREE.Mesh(hitboxGeo, new THREE.MeshBasicMaterial({ visible: false }));
            hitbox.position.y = obj.h / 2; 
            hitbox.userData = { isHitbox: true, ref: obj };
            group.add(hitbox);

            if (obj.useModel && TYPE_MAP[obj.type].path) {
                // --- GLTF Модель ---
                loadModel(TYPE_MAP[obj.type].path, (model) => {
                    const box = new THREE.Box3().setFromObject(model);
                    const size = new THREE.Vector3();
                    box.getSize(size);

                    if (size.x > 0 && size.y > 0 && size.z > 0) {
                        const scaleX = obj.w / size.x;
                        const scaleY = obj.h / size.y;
                        const scaleZ = obj.d / size.z;
                        model.scale.set(scaleX, scaleY, scaleZ);
                    }

                    const newBox = new THREE.Box3().setFromObject(model);
                    const center = new THREE.Vector3();
                    newBox.getCenter(center);
                    
                    model.position.x = -center.x;
                    model.position.z = -center.z;
                    model.position.y = -newBox.min.y;

                    // ПОЛНАЯ ЗАМЕНА МАТЕРИАЛА (Решает проблему с черным домом и цветом)
                    model.traverse((child) => {
                        if (child.isMesh) {
                            child.castShadow = !isGhost;
                            child.receiveShadow = !isGhost;
                            
                            // Создаем полностью новый чистый материал
                            const cleanMaterial = new THREE.MeshStandardMaterial({
                                color: obj.color,
                                roughness: 0.5,
                                metalness: 0.1,
                                transparent: isGhost,
                                opacity: isGhost ? (isLight ? 0.35 : 0.45) : 1,
                                depthWrite: !isGhost
                            });
                            
                            child.material = cleanMaterial;
                        }
                    });

                    group.add(model);
                    
                    // Перерисовываем сцену после асинхронной загрузки
                    renderer.render(scene, camera);
                });
            } else {
                // --- Обычный Куб ---
                const mat = new THREE.MeshStandardMaterial({
                    color: obj.color, 
                    transparent: isGhost, 
                    opacity: isGhost ? (isLight ? 0.35 : 0.45) : 1,
                    depthWrite: !isGhost,
                    roughness: 0.5,
                    metalness: 0.1
                });
                
                const mesh = new THREE.Mesh(new THREE.BoxGeometry(obj.w, obj.h, obj.d), mat);
                mesh.position.y = obj.h / 2; 
                mesh.castShadow = !isGhost;
                group.add(mesh);
                
                const edges = new THREE.LineSegments(
                    new THREE.EdgesGeometry(mesh.geometry),
                    new THREE.LineBasicMaterial({ 
                        color: isLight ? (isGhost ? obj.color : 0xffffff) : (isGhost ? obj.color : 0xaaaaaa), 
                        transparent: true, 
                        opacity: 0.5 
                    })
                );
                mesh.add(edges);
            }

            return group;
        }

        function rebuildScene() {
            objectMeshes.forEach(m => scene.remove(m));
            objectMeshes = [];

            const visible = appState.objects.filter(o => o.visible);
            if (visible.length === 0) return;

            const gap = 50;
            let totalWidth = 0, maxHeight = 0, maxDepth = 0;

            if (appState.mode === 'side') {
                totalWidth = visible.reduce((sum, obj) => sum + obj.w, 0) + gap * (visible.length - 1);
            }

            let currentX = appState.mode === 'side' ? -totalWidth / 2 : 0;

            visible.forEach(obj => {
                const group = buildGeometry(obj);
                if (appState.mode === 'side') {
                    group.position.x = currentX + obj.w / 2;
                    currentX += obj.w + gap;
                } else {
                    group.position.set(0,0,0);
                }
                scene.add(group);
                objectMeshes.push(group);

                if (obj.h > maxHeight) maxHeight = obj.h;
                if (obj.d > maxDepth) maxDepth = obj.d;
            });

            controls.target.set(0, maxHeight / 2, 0);
            controls.update(); 
        }

        function bindEvents() {
            document.getElementById('btn-add').onclick = addNewObject;
            document.getElementById('btn-theme').onclick = toggleTheme;
            document.getElementById('btn-export-json').onclick = exportJSON;
            
            const fileInput = document.getElementById('file-input');
            fileInput.addEventListener('change', importJSON);
            document.getElementById('btn-import-json').onclick = () => fileInput.click();

            document.querySelectorAll('.mode-btn').forEach(btn => {
                btn.onclick = (e) => {
                    appState.mode = e.target.dataset.mode;
                    updateUIState(); rebuildScene();
                };
            });

            const tooltip = document.getElementById('tooltip');
            window.addEventListener('mousemove', (e) => {
                if (e.clientX < 380) { tooltip.style.opacity = 0; return; }
                mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
                mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;

                raycaster.setFromCamera(mouse, camera);
                const intersects = raycaster.intersectObjects(scene.children, true);
                const hit = intersects.find(i => i.object.userData && i.object.userData.isHitbox);

                if (hit) {
                    const obj = hit.object.userData.ref;
                    const hexColor = '#' + obj.color.toString(16).padStart(6, '0');
                    const info = TYPE_MAP[obj.type];

                    document.getElementById('tt-title').innerHTML = `<i class="fas ${info.icon}" style="color: ${hexColor}"></i> ${obj.name}`;
                    let content = `<div class="tt-row"><span>Габариты:</span> <span class="tt-val">${obj.w} &times; ${obj.h} &times; ${obj.d} см</span></div>
                                   <div class="tt-row"><span>Тип:</span> <span class="tt-val">${info.name}</span></div>
                                   <div class="tt-row"><span>Вид:</span> <span class="tt-val">${obj.useModel ? '3D Модель' : 'Геометрия'}</span></div>`;
                    document.getElementById('tt-content').innerHTML = content;
                    tooltip.style.left = (e.clientX + 20) + 'px';
                    tooltip.style.top = (e.clientY + 20) + 'px';
                    tooltip.style.opacity = 1;
                } else tooltip.style.opacity = 0;
            });
        }

        function toggleTheme() {
            appState.theme = appState.theme === 'light' ? 'dark' : 'light';
            applyTheme(); rebuildScene();
        }

        function applyTheme() {
            const isLight = appState.theme === 'light';
            document.documentElement.setAttribute('data-theme', appState.theme);
            scene.background = new THREE.Color(isLight ? 0xf8fafc : 0x0f172a);
            hemiLight.intensity = isLight ? 0.8 : 1.0;
            hemiLight.groundColor.setHex(isLight ? 0x444444 : 0x222233);
            dirLight.intensity = isLight ? 1.0 : 0.8;
            fillLight.intensity = isLight ? 0.5 : 0.7;
            floor.material.opacity = isLight ? 0.15 : 0.4;

            if (grid) scene.remove(grid);
            grid = new THREE.GridHelper(10000, 200, isLight ? 0x94a3b8 : 0x475569, isLight ? 0xe2e8f0 : 0x1e293b);
            grid.position.y = 0.1;
            scene.add(grid);
            document.querySelector('#btn-theme i').className = isLight ? 'fas fa-moon' : 'fas fa-sun';
        }

        function updateUIState() {
            document.querySelectorAll('.mode-btn').forEach(b => b.classList.toggle('active', b.dataset.mode === appState.mode));
        }

        function addNewObject() {
            const type = document.getElementById('obj-type').value;
            const text = document.getElementById('obj-dims').value.trim();
            const colorInput = document.getElementById('obj-color').value;
            const useModel = document.getElementById('obj-use-model').checked;

            if (!text) return showToast('Введите габариты!');

            const regex = /(\d+(?:[.,]\d+)?)[^\d]+(\d+(?:[.,]\d+)?)[^\d]+(\d+(?:[.,]\d+)?)/;
            const match = text.match(regex);
            if (!match) return alert('Не удалось найти 3 числа (Ширина, Высота, Глубина)');

            const w = parseFloat(match[1].replace(',','.'));
            const h = parseFloat(match[2].replace(',','.'));
            const d = parseFloat(match[3].replace(',','.'));
            
            const colorInt = parseInt(colorInput.replace('#', '0x'), 16);

            appState.objects.push({
                id: Date.now(), 
                type: type,
                name: `${TYPE_MAP[type].name} ${appState.objects.length + 1}`,
                w: w, h: h, d: d,
                color: colorInt, 
                visible: true,
                useModel: useModel
            });

            // Строчка удалена: document.getElementById('obj-dims').value = '';
            
            renderList(); rebuildScene();
        }

        function renderList() {
            const list = document.getElementById('object-list');
            list.innerHTML = '';
            appState.objects.forEach(obj => {
                const hex = '#' + obj.color.toString(16).padStart(6,'0');
                const modelBadge = obj.useModel ? '<i class="fas fa-cube" title="GLTF модель"></i>' : '';
                
                const el = document.createElement('div');
                el.className = `list-item ${obj.visible ? '' : 'hidden-obj'}`;
                el.innerHTML = `
                    <div class="color-dot" style="background: ${hex}"></div>
                    <div class="item-content">
                        <div class="item-title">
                            <i class="fas ${TYPE_MAP[obj.type].icon}"></i> ${obj.name}
                            <span style="font-size:10px; opacity:0.6; margin-left:4px;">${modelBadge}</span>
                        </div>
                        <div class="item-desc">${obj.w} &times; ${obj.h} &times; ${obj.d} см</div>
                    </div>
                    <div class="item-actions">
                        <button class="action-btn btn-vis"><i class="fas ${obj.visible ? 'fa-eye' : 'fa-eye-slash'}"></i></button>
                        <button class="action-btn btn-del"><i class="fas fa-trash"></i></button>
                    </div>
                `;
                el.querySelector('.btn-vis').onclick = () => { obj.visible = !obj.visible; renderList(); rebuildScene(); };
                el.querySelector('.btn-del').onclick = () => {
                    if (confirm('Удалить?')) { appState.objects = appState.objects.filter(o => o.id !== obj.id); renderList(); rebuildScene(); }
                };
                list.appendChild(el);
            });
        }

        function exportJSON() {
            const blob = new Blob([JSON.stringify(appState, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a'); a.href = url; a.download = `3d-data.json`; a.click();
        }

        function importJSON(e) {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (e) => {
                appState = JSON.parse(e.target.result);
                applyTheme(); updateUIState(); renderList(); rebuildScene();
            };
            reader.readAsText(file);
        }

        function showToast(msg) {
            const t = document.getElementById('toast');
            t.textContent = msg; t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 3000);
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            if (appState.mode === 'hologram' && !controls.state && objectMeshes.length > 0) {
                objectMeshes.forEach(m => m.rotation.y += 0.002);
            } else if (appState.mode === 'side') {
                objectMeshes.forEach(m => m.rotation.y = 0);
            }
            renderer.render(scene, camera);
        }

        init();
    </script>
</body>
</html>
