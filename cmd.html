<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ассистент Кадастра — Command Center</title>
    <!-- Шрифты и иконки -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Оригинальные библиотеки -->
    <link id="favicon" rel="icon" href="https://vsemap.ru/favicon.svg" type="image/x-icon">
    <script src="webfonts/proj4.js"></script>

    <style>
        /* ЦВЕТОВЫЕ ТЕМЫ */
        body.theme-midnight {
            --bg-grad-1: #0b0c10; --bg-grad-2: #050608;
            --panel-bg: rgba(15, 18, 28, 0.45);
            --text-primary: #f3f4f6; --text-secondary: rgba(243, 244, 246, 0.5);
            --accent-color: #3b82f6; --accent-glow: rgba(59, 130, 246, 0.3);
            --border-color: rgba(255, 255, 255, 0.08);
            --input-bg: rgba(255, 255, 255, 0.03);
            --card-shadow: 0 30px 100px rgba(0, 0, 0, 0.8);
        }

        body.theme-frost {
            --bg-grad-1: #111827; --bg-grad-2: #030712;
            --panel-bg: rgba(31, 41, 55, 0.45);
            --text-primary: #e2e8f0; --text-secondary: #94a3b8;
            --accent-color: #06b6d4; --accent-glow: rgba(6, 182, 212, 0.3);
            --border-color: rgba(255, 255, 255, 0.06);
            --input-bg: rgba(255, 255, 255, 0.02);
            --card-shadow: 0 30px 100px rgba(0, 0, 0, 0.9);
        }

        body.theme-matrix {
            --bg-grad-1: #020502; --bg-grad-2: #000000;
            --panel-bg: rgba(5, 15, 5, 0.7);
            --text-primary: #39ff14; --text-secondary: rgba(57, 255, 20, 0.5);
            --accent-color: #00ff00; --accent-glow: rgba(0, 255, 0, 0.2);
            --border-color: rgba(57, 255, 20, 0.15);
            --input-bg: rgba(0, 15, 0, 0.2);
            --card-shadow: 0 20px 80px rgba(0, 50, 0, 0.5);
            --font-family-mono: 'JetBrains Mono', monospace;
        }

        body.theme-sunset {
            --bg-grad-1: #150b18; --bg-grad-2: #070308;
            --panel-bg: rgba(28, 14, 34, 0.5);
            --text-primary: #fdf6fd; --text-secondary: rgba(253, 246, 253, 0.5);
            --accent-color: #f97316; --accent-glow: rgba(249, 115, 22, 0.3);
            --border-color: rgba(253, 246, 253, 0.06);
            --input-bg: rgba(255, 255, 255, 0.02);
            --card-shadow: 0 30px 100px rgba(0, 0, 0, 0.85);
        }

        body.theme-glass-light {
            --bg-grad-1: #f3f4f6; --bg-grad-2: #e5e7eb;
            --panel-bg: rgba(255, 255, 255, 0.45);
            --text-primary: #111827; --text-secondary: #4b5563;
            --accent-color: #2563eb; --accent-glow: rgba(37, 99, 235, 0.15);
            --border-color: rgba(0, 0, 0, 0.08);
            --input-bg: rgba(0, 0, 0, 0.02);
            --card-shadow: 0 30px 100px rgba(0, 0, 0, 0.15);
        }

        /* БАЗОВЫЕ НАСТРОЙКИ СТИЛЕЙ */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: var(--font-family-mono, 'Plus Jakarta Sans', sans-serif);
            background: radial-gradient(circle at 50% 50%, var(--bg-grad-1) 0%, var(--bg-grad-2) 100%);
            color: var(--text-primary);
            min-height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: background 1s ease;
        }

        /* Интерактивный генеративный фон */
        .ambient-glow {
            position: fixed;
            width: 500px;
            height: 500px;
            background: var(--accent-color);
            border-radius: 50%;
            filter: blur(140px);
            opacity: 0.1;
            pointer-events: none;
            z-index: -1;
            transition: all 1s ease;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        /* ЦЕНТРАЛЬНЫЙ ТЕРМИНАЛ */
        .terminal-container {
            width: 100%;
            max-width: 720px;
            padding: 24px;
            z-index: 10;
        }

        .command-card {
            background: var(--panel-bg);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border: 1.5px solid var(--border-color);
            border-radius: 24px;
            padding: 32px;
            box-shadow: var(--card-shadow);
            transition: var(--border-color) 0.5s ease;
        }

        /* Статус-бар режима */
        .status-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
        }

        .status-badge {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            padding: 6px 14px;
            border-radius: 30px;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid var(--border-color);
            transition: all 0.3s ease;
        }

        .status-badge i {
            font-size: 12px;
        }

        .status-badge.mode-cadastral {
            color: #10b981;
            background: rgba(16, 185, 129, 0.06);
            border-color: rgba(16, 185, 129, 0.2);
        }

        .status-badge.mode-address {
            color: #3b82f6;
            background: rgba(59, 130, 246, 0.06);
            border-color: rgba(59, 130, 246, 0.2);
        }

        .status-badge.mode-ai {
            color: #f97316;
            background: rgba(249, 115, 22, 0.06);
            border-color: rgba(249, 115, 22, 0.2);
        }

        /* Индикатор выбора тем */
        .theme-selector {
            display: flex;
            gap: 6px;
        }

        .theme-dot {
            width: 14px;
            height: 14px;
            border-radius: 50%;
            cursor: pointer;
            border: 1.5px solid transparent;
            transition: all 0.3s ease;
        }

        .theme-dot:hover {
            transform: scale(1.2);
        }

        .theme-dot.active {
            border-color: var(--text-primary);
        }

        /* СТРОКА ВВОДА */
        .command-input-container {
            position: relative;
            background: var(--input-bg);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            display: flex;
            align-items: center;
            padding: 4px;
            transition: all 0.3s ease;
        }

        .command-input-container:focus-within {
            border-color: var(--accent-color);
            box-shadow: 0 0 20px var(--accent-glow);
        }

        .input-icon {
            padding: 0 16px;
            color: var(--text-secondary);
            font-size: 18px;
        }

        .main-input {
            flex-grow: 1;
            background: transparent;
            border: none;
            outline: none;
            color: var(--text-primary);
            font-size: 16px;
            padding: 16px 0;
            font-family: inherit;
        }

        .main-input::placeholder {
            color: var(--text-secondary);
            opacity: 0.5;
        }

        /* Блок динамических контекстных кнопок */
        .context-suggestions {
            margin-top: 20px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            max-height: 280px;
            overflow-y: auto;
        }

        /* Навигационная панель Навигатора */
        .navigator-expand-panel {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 12px;
            margin-top: 6px;
            display: none;
        }

        .navigator-expand-panel.active {
            display: block;
        }

        .nav-expand-input {
            width: 100%;
            background: var(--input-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 10px 14px;
            color: var(--text-primary);
            outline: none;
            font-size: 13px;
            font-family: inherit;
        }

        /* Контекстная кнопка действия */
        .suggestion-btn {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--border-color);
            padding: 14px 20px;
            border-radius: 12px;
            color: var(--text-primary);
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .suggestion-btn:hover {
            background: rgba(255, 255, 255, 0.06);
            transform: translateY(-2px);
            border-color: var(--accent-color);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }

        .suggestion-label {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .suggestion-label i {
            font-size: 16px;
            width: 20px;
            text-align: center;
        }

        .suggestion-badge {
            font-size: 10px;
            opacity: 0.5;
            background: rgba(255, 255, 255, 0.05);
            padding: 2px 6px;
            border-radius: 4px;
        }

        /* Подсказка быстрого поиска */
        .bottom-hint {
            margin-top: 24px;
            font-size: 12px;
            color: var(--text-secondary);
            display: flex;
            justify-content: space-between;
            align-items: center;
            opacity: 0.8;
        }

        .hint-btn {
            background: none;
            border: none;
            color: var(--accent-color);
            cursor: pointer;
            font-weight: 600;
            font-family: inherit;
        }

        .kbd-style {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid var(--border-color);
            border-radius: 4px;
            padding: 2px 6px;
            font-size: 10px;
            font-family: inherit;
        }

        /* ======================================================== */
        /* COMMAND PALETTE OVERLAY                                  */
        /* ======================================================== */
        .palette-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.65);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            z-index: 10000;
            display: none;
            align-items: flex-start;
            justify-content: center;
            padding-top: 8vh;
        }

        .palette-overlay.active {
            display: flex;
        }

        .palette-modal {
            width: 100%;
            max-width: 680px;
            background: var(--panel-bg);
            border: 1.5px solid var(--border-color);
            border-radius: 20px;
            box-shadow: 0 40px 120px rgba(0, 0, 0, 0.8);
            overflow: hidden;
            animation: modalAppear 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes modalAppear {
            from { opacity: 0; transform: scale(0.96) translateY(-15px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

        .palette-search-box {
            display: flex;
            align-items: center;
            border-bottom: 1px solid var(--border-color);
            padding: 4px;
        }

        .palette-search-input {
            flex-grow: 1;
            background: transparent;
            border: none;
            outline: none;
            color: var(--text-primary);
            font-size: 16px;
            padding: 16px;
            font-family: inherit;
        }

        .palette-results {
            max-height: 480px;
            overflow-y: auto;
            padding: 12px;
        }

        /* Стилизация заголовков категорий */
        .category-group {
            margin-bottom: 16px;
        }

        .category-header {
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            color: var(--text-secondary);
            padding: 8px 12px;
            opacity: 0.6;
        }

        .palette-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 11px 16px;
            border-radius: 10px;
            color: var(--text-primary);
            text-decoration: none;
            cursor: pointer;
            transition: all 0.2s ease;
            font-size: 14px;
        }

        .palette-item:hover {
            background: rgba(255, 255, 255, 0.05);
            color: var(--accent-color);
        }

        .palette-item-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .palette-item-left i {
            font-size: 14px;
            width: 18px;
            text-align: center;
            opacity: 0.7;
        }

        .palette-item-category {
            font-size: 10px;
            opacity: 0.5;
            background: rgba(255, 255, 255, 0.04);
            padding: 2px 6px;
            border-radius: 4px;
        }

        /* ВИДЖЕТ ПОГОДЫ */
        .weather-widget {
            position: fixed;
            bottom: 24px;
            left: 24px;
            background: var(--panel-bg);
            border: 1px solid var(--border-color);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 16px;
            padding: 10px 14px;
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            font-size: 12px;
            transition: all 0.3s ease;
            z-index: 100;
        }

        .weather-widget:hover {
            border-color: var(--accent-color);
            transform: translateY(-2px);
        }

        .weather-icon {
            font-size: 18px;
        }

        .weather-details {
            display: flex;
            flex-direction: column;
        }

        .weather-temp {
            font-weight: 600;
        }

        .weather-city {
            font-size: 10px;
            opacity: 0.6;
        }

        /* ПОЧТА */
        .gmail-icon {
            position: fixed;
            bottom: 24px;
            right: 24px;
            background: var(--panel-bg);
            border: 1px solid var(--border-color);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            width: 44px;
            height: 44px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            transition: all 0.3s ease;
            z-index: 100;
        }

        .gmail-icon:hover {
            border-color: var(--accent-color);
            transform: scale(1.1);
        }

        .gmail-icon img {
            width: 20px;
            height: 20px;
        }

        /* КАНВАС ДЛЯ СНЕГА */
        #snowCanvas {
            position: fixed;
            top: 0; left: 0;
            pointer-events: none;
            z-index: 5;
        }

        /* МОДАЛЬНЫЕ ОКНА И ДИАЛОГИ ПОГОДЫ */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 100000;
        }

        .modal-overlay.show {
            display: flex;
        }

        .modal-box {
            background: var(--panel-bg);
            border: 1.5px solid var(--border-color);
            border-radius: 20px;
            padding: 24px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 30px 100px rgba(0, 0, 0, 0.8);
            text-align: center;
        }

        .modal-box h3 {
            margin-bottom: 16px;
            font-size: 16px;
        }

        .modal-box input {
            width: 100%;
            background: var(--input-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 12px 16px;
            color: var(--text-primary);
            outline: none;
            font-size: 14px;
            margin-bottom: 16px;
            font-family: inherit;
        }

        .modal-box input:focus {
            border-color: var(--accent-color);
        }

        .modal-buttons {
            display: flex;
            gap: 10px;
        }

        .modal-btn {
            flex-grow: 1;
            padding: 10px 16px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            font-weight: 500;
            font-family: inherit;
            transition: all 0.2s ease;
        }

        .modal-btn.save {
            background: var(--accent-color);
            color: #ffffff;
        }

        .modal-btn.cancel {
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-primary);
        }

        /* Инструкции буфера обмена */
        .info-modal-box {
            max-width: 500px;
            text-align: left;
        }

        .info-modal-box h2 {
            font-size: 18px;
            margin-bottom: 14px;
        }

        .browser-instructions {
            background: rgba(255, 255, 255, 0.03);
            border-left: 4px solid var(--accent-color);
            padding: 12px;
            border-radius: 4px;
            margin-top: 12px;
            font-size: 13px;
            line-height: 1.5;
        }

        .browser-instructions ol {
            padding-left: 20px;
        }
    </style>
</head>
<body class="theme-midnight">

    <div class="ambient-glow" id="ambientGlow"></div>
    <canvas id="snowCanvas"></canvas>

    <!-- ОСНОВНОЙ КОНТЕНТ ТЕРМИНАЛА -->
    <div class="terminal-container">
        <div class="command-card">
            
            <!-- Секция статуса и выбора темы -->
            <div class="status-header">
                <div class="status-badge mode-cadastral" id="currentModeBadge">
                    <i class="fa-solid fa-server"></i> <span id="modeText">Кадастровый номер</span>
                </div>
                
                <div class="theme-selector">
                    <div class="theme-dot active" style="background: #3b82f6;" onclick="setTheme('midnight')" title="Midnight Glow"></div>
                    <div class="theme-dot" style="background: #06b6d4;" onclick="setTheme('frost')" title="Nordic Frost"></div>
                    <div class="theme-dot" style="background: #39ff14;" onclick="setTheme('matrix')" title="Matrix Hacker"></div>
                    <div class="theme-dot" style="background: #f97316;" onclick="setTheme('sunset')" title="Sunset Mirage"></div>
                    <div class="theme-dot" style="background: #e5e7eb;" onclick="setTheme('glass-light')" title="Clean Light Glass"></div>
                </div>
            </div>

            <!-- Строка ввода -->
            <div class="command-input-container">
                <div class="input-icon"><i class="fa-solid fa-chevron-right"></i></div>
                <input type="text" class="main-input" id="commandInput" placeholder="Введите кадастровый номер..." autocomplete="off">
            </div>

            <!-- Контекстные ссылки -->
            <div class="context-suggestions" id="suggestionsContainer">
                <!-- Заполняются через JS на основе типа ввода и истории -->
            </div>

            <!-- Дополнительная панель для навигатора (скрытая по умолчанию) -->
            <div class="navigator-expand-panel" id="navigatorPanel">
                <input type="text" class="nav-expand-input" id="navigatorDestination" placeholder="Введите конечный пункт (Enter - Яндекс / Ctrl+Enter - Google)">
            </div>

            <!-- Подсказки кнопок снизу -->
            <div class="bottom-hint">
                <div>
                    Нажмите <kbd class="kbd-style">/</kbd> или <button class="hint-btn" onclick="openCommandPalette()">кликните сюда</button> для поиска по всем 80+ функциям
                </div>
                <div id="f9ModeIndicator" style="display:none; color: #f97316;">
                    <i class="fa-solid fa-robot"></i> AI Режим активен
                </div>
            </div>

        </div>
    </div>

    <!-- ПОГОДНЫЙ ВИДЖЕТ -->
    <div class="weather-widget" id="weatherWidget">
        <div class="weather-icon" id="weatherIcon">⛅</div>
        <div class="weather-details">
            <div class="weather-temp" id="weatherTemp">--°C</div>
            <div class="weather-city" id="weatherCity">Погода не настроена</div>
        </div>
    </div>

    <!-- КОПИРОВАНИЕ ПОЧТЫ -->
    <div class="gmail-icon" id="copyEmailIcon" title="Скопировать почту: mapruapp@gmail.com">
        <img src="img/gmail.png" alt="Email" id="emailImg">
    </div>

    <!-- ДИАЛОГ ПОГОДЫ -->
    <div class="modal-overlay" id="weatherModal">
        <div class="modal-box">
            <h3>Укажите город</h3>
            <input type="text" id="weatherCityInput" placeholder="Например: Казань">
            <div class="modal-buttons">
                <button class="modal-btn cancel" onclick="closeWeatherModal()">Отмена</button>
                <button class="modal-btn save" onclick="saveWeatherCity()">Сохранить</button>
            </div>
        </div>
    </div>

    <!-- ОВЕРЛЕЙ ИНФОРМАЦИОННОГО ОКНА (БУФЕР ОБМЕНА) -->
    <div class="modal-overlay" id="infoModalOverlay">
        <div class="modal-box info-modal-box">
            <h2 id="infoModalTitle">Статус доступа</h2>
            <div id="infoModalBody"></div>
            <div style="margin-top:20px; display:flex; justify-content:flex-end;">
                <button class="modal-btn cancel" onclick="closeInfoModal()" style="max-width:100px;">ОК</button>
            </div>
        </div>
    </div>

    <!-- СИСТЕМНАЯ КАТЕГОРИЗИРОВАННАЯ ПАЛИТРА КОМАНД -->
    <div class="palette-overlay" id="paletteOverlay" onclick="closeCommandPalette(event)">
        <div class="palette-modal">
            <div class="palette-search-box">
                <div class="input-icon"><i class="fa-solid fa-search"></i></div>
                <input type="text" class="palette-search-input" id="paletteSearch" placeholder="Начните вводить название утилиты или функцию..." autocomplete="off">
            </div>
            <div class="palette-results" id="paletteResults">
                <!-- Категории и ссылки -->
            </div>
        </div>
    </div>

    <script>
        const EPSG3857 = '+proj=merc +a=6378137 +b=6378137 +lat_ts=0.0 +lon_0=0.0 +x_0=0.0 +y_0=0 +k=1.0 +units=m +nadgrids=@null +wktext +no_defs';

        // КОПИРОВАНИЕ В КЛИПБОРД
        async function copyToClipboard(text, callback) {
            if (!text || text.length < 3) {
                if (callback) callback();
                return;
            }
            if (!navigator.clipboard) {
                if (callback) callback();
                return;
            }
            try {
                await navigator.clipboard.writeText(text);
                if (callback) callback();
            } catch (err) {
                showClipboardInstructionModal();
            }
        }

        // ПЕРЕВОД РАСКЛАДКИ
        function replaceEnglishWithRussian(text) {
            const map = {'q':'й','w':'ц','e':'у','r':'к','t':'е','y':'н','u':'г','i':'ш','o':'щ','p':'з','[':'х',']':'ъ','a':'ф','s':'ы','d':'в','f':'а','g':'п','h':'р','j':'о','k':'л','l':'д',';':'ж','\'':'э','z':'я','x':'ч','c':'с','v':'м','b':'и','n':'т','m':'ь',',':'б','.':'ю','/':'.','Q':'Й','W':'Ц','E':'У','R':'К','T':'Е','Y':'Н','U':'Г','I':'Ш','O':'Щ','P':'З','{':'Х','}':'Ъ','A':'Ф','S':'Ы','D':'В','F':'А','G':'П','H':'Р','J':'О','K':'Л','L':'Д',':':'Ж','"':'Э','Z':'Я','X':'Ч','C':'С','V':'М','B':'И','N':'Т','M':'Ь','<':'Б','>':'Ю','?':','};
            return text.split('').map(char => map[char] || char).join('');
        }

        // АВТОДВОЕТОЧИЕ ДЛЯ КАДАСТРОВЫХ НОМЕРОВ
        function formatCadastralNumber(text) {
            text = text.replace(/[^\d]/g, '');
            const firstTwoDigits = text.slice(0, 2);
            const isSevenDigits = sevenDigitsRegions.includes(firstTwoDigits);
            const thirdBlockLength = isSevenDigits ? 7 : 6;
            let formattedText = '';
            if (text.length > 0) formattedText += text.slice(0, 2);
            if (text.length > 2) formattedText += ':' + text.slice(2, 4);
            if (text.length > 4) {
                const remainingDigits = text.slice(4);
                if (remainingDigits.length <= thirdBlockLength) {
                    formattedText += ':' + remainingDigits;
                } else {
                    formattedText += ':' + remainingDigits.slice(0, thirdBlockLength) + ':' + remainingDigits.slice(thirdBlockLength);
                }
            }
            return formattedText;
        }

        function isValidCadastralNumber(text) {
            const firstTwoDigits = text.slice(0, 2);
            const isSevenDigits = sevenDigitsRegions.includes(firstTwoDigits);
            const digitsAfterSecondColon = isSevenDigits ? 7 : 6;
            const pattern = new RegExp(`^\\d{2}:\\d{2}:\\d{${digitsAfterSecondColon}}:\\d+$`);
            return pattern.test(text);
        }

        // КОНВЕРТАЦИЯ КООРДИНАТ
        function convertCoordinates(x, y) {
            if (typeof proj4 === 'undefined') return { lat: y, lon: x };
            const p = proj4(EPSG3857, EPSG4326, [x, y]);
            const rawLat = p[1];
            const rawLon = p[0];
            const finalLat = rawLat - (MAP_OFFSET_Y * MULTIPLIER);
            const finalLon = rawLon - (MAP_OFFSET_X * MULTIPLIER);
            return { lat: finalLat, lon: finalLon };
        }

        function calculatePolygonCenter(coordinates) {
            let sumX = 0, sumY = 0, count = 0;
            const ring = coordinates[0];
            for (let i = 0; i < ring.length; i++) {
                sumX += ring[i][0];
                sumY += ring[i][1];
                count++;
            }
            return { x: sumX / count, y: sumY / count };
        }

        async function getCoordinatesFromNSPD(cadastralNumber, returnAllCoords = false) {
            try {
                const apiUrl = `https://nspd.gov.ru/api/geoportal/v2/search/geoportal?thematicSearchId=1&query=${cadastralNumber}`;
                const response = await fetch(apiUrl);
                const data = await response.json();
                
                if (data.code === 204 || !data.data?.features?.length) return null;
                
                const feature = data.data.features[0];
                const geometry = feature.geometry;
                const address = feature.properties?.options?.readable_address || null;
                
                if (returnAllCoords) {
                    let allCoords = [];
                    if (geometry.type === 'Polygon') {
                        const ring = geometry.coordinates[0];
                        for (let i = 0; i < ring.length - 1; i++) {
                            const coord = ring[i];
                            if (!coord[0].toString().includes("5632576")) {
                                allCoords.push(convertCoordinates(coord[0], coord[1]));
                            }
                        }
                    } else if (geometry.type === 'Point') {
                        if (!geometry.coordinates[0].toString().includes("5632576")) {
                            allCoords.push(convertCoordinates(geometry.coordinates[0], geometry.coordinates[1]));
                        }
                    }
                    return { coords: allCoords, address };
                }
                
                let x, y;
                if (geometry.type === 'Polygon') {
                    const center = calculatePolygonCenter(geometry.coordinates);
                    x = center.x; y = center.y;
                } else if (geometry.type === 'Point') {
                    x = geometry.coordinates[0];
                    y = geometry.coordinates[1];
                } else {
                    return null;
                }
                
                const coords = convertCoordinates(x, y);
                return { lat: coords.lat, lon: coords.lon, address };
            } catch (error) {
                return null;
            }
        }

        function openYandexMapsMultiple(coords) {
            const markers = coords.map((c, i) => `${c.lon},${c.lat},pm2rdl`).join('~');
            const centerLat = coords.reduce((sum, c) => sum + c.lat, 0) / coords.length;
            const centerLon = coords.reduce((sum, c) => sum + c.lon, 0) / coords.length;
            window.open(`https://yandex.ru/maps/?pt=${markers}&ll=${centerLon},${centerLat}&z=17&l=sat,skl`, '_blank', 'noopener,noreferrer');
        }

        // ХРАНЕНИЕ И СОРТИРОВКА ИСТОРИИ (НЕДАВНИЕ КОМАНДЫ)
        function saveToRecent(toolName) {
            let recents = JSON.parse(localStorage.getItem('recentCommands') || '[]');
            const tool = toolsDatabase.find(t => t.name === toolName);
            if (!tool) return;
            
            recents = recents.filter(r => r.name !== toolName);
            recents.unshift(tool);
            
            if (recents.length > 5) recents.pop();
            
            localStorage.setItem('recentCommands', JSON.stringify(recents));
            if (commandInput.value.trim() === '') {
                renderDefaultSuggestions();
            }
        }

            const text = commandInput.value.trim();
            saveToRecent('Публичная Карта');
            if (!isValidCadastralNumber(text)) {
                copyToClipboard(text, () => window.open('https://nspd.gov.ru/map', '_blank', 'noopener,noreferrer'));
                return;
            }
            try {
                const res = await getCoordinatesFromNSPD(text);
                if (res && res.lat) {
                    const mapUrl = `https://nspd.gov.ru/map?query=${encodeURIComponent(text)}&zoom=20&coordinate_x=${res.lon}&coordinate_y=${res.lat}&theme_id=1&is_copy_url=true&active_layers=${layers}`;

                } else {
                    copyToClipboard(text, () => window.open('https://nspd.gov.ru/map', '_blank', 'noopener,noreferrer'));

                copyToClipboard(text, () => window.open('https://nspd.gov.ru/map', '_blank', 'noopener,noreferrer'));
            }
        }

        // ОБРАБОТЧИК ВВОДА СТРОКИ
        commandInput.addEventListener('input', () => {
            let value = commandInput.value;
            
            // Если введен '/' прямо в поле ввода, мгновенно открывается палитра
            if (value === '/') {
                commandInput.value = '';
                openCommandPalette();
                return;
            }

            value = replaceEnglishWithRussian(value);
            const firstChar = value.trim().charAt(0);
            const isRussianText = /[А-Яа-я]/.test(firstChar);

            if (isF9Mode) {
                currentModeBadge.className = "status-badge mode-ai";

                commandInput.value = value;
                currentModeBadge.className = "status-badge mode-address";
                modeText.textContent = "Адресный поиск";
            } else {
                const formatted = formatCadastralNumber(value);
                commandInput.value = formatted;
                currentModeBadge.className = "status-badge mode-cadastral";
                modeText.textContent = "Кадастровый поиск";
            }

            updateSuggestions(value, isRussianText);

        // Развертывание панели Яндекс.Навигатора
        function toggleNavigatorPanel() {
            navigatorPanel.classList.toggle('active');
            if (navigatorPanel.classList.contains('active')) {
                navigatorDestination.focus();
            }
        }

        navigatorDestination.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                e.preventDefault();
                const startPoint = commandInput.value.trim();
                const endPoint = navigatorDestination.value.trim();
                let url;
                if (e.ctrlKey) {
                    url = `https://www.google.com/maps/dir/?api=1&origin=${encodeURIComponent(startPoint)}&destination=${encodeURIComponent(endPoint)}`;
                } else {
                    url = `https://yandex.ru/maps/?rtext=${encodeURIComponent(startPoint)}~${encodeURIComponent(endPoint)}&rtt=auto`;
                }
                window.open(url, '_blank', 'noopener,noreferrer');
                navigatorPanel.classList.remove('active');
                navigatorDestination.value = '';
            }
        });

        // СИСТЕМНАЯ КАТЕГОРИЗИРОВАННАЯ ПАЛИТРА КОМАНД
        function openCommandPalette() {
            paletteOverlay.classList.add('active');
            paletteSearch.focus();
            renderPaletteResults();
        }

        function closeCommandPalette(e) {
            if (!e || e.target === paletteOverlay) {
                paletteOverlay.classList.remove('active');
            }
        }

        function renderPaletteResults() {
            const query = paletteSearch.value.trim().toLowerCase();
            paletteResults.innerHTML = '';

            const categoriesMap = {};
            toolsDatabase.forEach(tool => {
                // Исключаем внутренние технические дубликаты алиасов из общего поиска
                if (tool.name === "Заказать выписку ЕГРН" || tool.name === "Локальная Карта") return;
                
                if (query === '' || tool.name.toLowerCase().includes(query) || tool.category.toLowerCase().includes(query)) {
                    if (!categoriesMap[tool.category]) {
                        categoriesMap[tool.category] = [];
                    }
                    categoriesMap[tool.category].push(tool);
                }
            });

            const categories = Object.keys(categoriesMap);
            if (categories.length === 0) {
                paletteResults.innerHTML = `<div style="text-align:center; padding: 40px; opacity: 0.5;">Ничего не найдено</div>`;
                return;
            }

            categories.forEach(cat => {
                const groupDiv = document.createElement('div');
                groupDiv.className = 'category-group';
                
                const header = document.createElement('div');
                header.className = 'category-header';
                header.textContent = cat;
                groupDiv.appendChild(header);

                categoriesMap[cat].forEach(tool => {
                    const item = document.createElement('a');
                    item.className = 'palette-item';
                    item.href = '#';
                    item.onclick = (e) => {
                        e.preventDefault();
                        const currentInputValue = commandInput.value.trim();
                        saveToRecent(tool.name);
                        
                        if (currentInputValue.length > 2) {
                            copyToClipboard(currentInputValue, () => {
                                window.open(tool.url, '_blank', 'noopener,noreferrer');
                            });
                        } else {
                            window.open(tool.url, '_blank', 'noopener,noreferrer');
                        }
                        closeCommandPalette();
                    };

                    item.innerHTML = `
                        <div class="palette-item-left">
                            <i class="fa-solid ${tool.icon}"></i>
                            <span>${tool.name}</span>
                        </div>
                        <span class="palette-item-category">${tool.category}</span>
                    `;
                    groupDiv.appendChild(item);
                });

                paletteResults.appendChild(groupDiv);
            });
        }

        paletteSearch.addEventListener('input', renderPaletteResults);

        // КЛИПБОРД ПРОВЕРКА (F6)
        async function checkAndShowClipboardInstructions() {
            if (!navigator.permissions || !navigator.clipboard) {
                showInfoModal('Проверка невозможна', '<p>Браузер не поддерживает автоматическую проверку API.</p>');
                return;
            }
            let readStatusHtml = '';
            let writeStatusHtml = '';
            try {
                const readPermission = await navigator.permissions.query({ name: 'clipboard-read', allowWithoutGesture: false });
                let statusText = '';
                switch (readPermission.state) {
                    case 'granted': statusText = '<strong style="color: green;">РАЗРЕШЕНО</strong>'; break;
                    case 'denied': statusText = '<strong style="color: red;">ЗАБЛОКИРОВАНО</strong>'; break;
                    case 'prompt': statusText = '<strong style="color: orange;">СПРАШИВАТЬ</strong>'; break;
                }
                readStatusHtml = `<p>Чтение буфера обмена: ${statusText}</p>`;
            } catch (e) {
                readStatusHtml = '<p>Чтение буфера обмена: <span style="color: red;">Ошибка проверки</span></p>';
            }
            try {
                await navigator.clipboard.writeText(' ');
                writeStatusHtml = '<p>Запись в буфер обмена: <strong style="color: green;">РАЗРЕШЕНО</strong></p>';
            } catch (err) {
                writeStatusHtml = '<p>Запись в буфер обмена: <strong style="color: red;">ЗАБЛОКИРОВАНО</strong></p>';
            }
            showInfoModal('Статус доступа к буферу обмена', `<div>${readStatusHtml}${writeStatusHtml}</div>`);
        }

        function getWeatherIcon(condition) {
            for (const key in weatherIcons) {
                if (condition.toLowerCase().includes(key.toLowerCase())) return weatherIcons[key];
            }
            return '🌡️';
        }

        async function fetchWeather(city) {
            try {
                const response = await fetch(`${PROXY_BASE_URL}/api/weather-forecast?city=${encodeURIComponent(city)}`);
                const data = await response.json();
                if (data.cod !== "200") throw new Error('City not found');
                
                const current = data.list[0];
                const temp = Math.round(current.main.temp);
                const desc = current.weather[0].description;
                const condition = current.weather[0].main;
                const cityName = data.city.name;
                
                localStorage.setItem('weatherCity', city);
                localStorage.setItem('weatherLat', data.city.coord.lat);
                localStorage.setItem('weatherLon', data.city.coord.lon);
                
                document.getElementById('weatherIcon').textContent = getWeatherIcon(condition);
                document.getElementById('weatherTemp').textContent = `${temp}°C`;
                document.getElementById('weatherCity').textContent = cityName;
            } catch (e) {
                document.getElementById('weatherCity').textContent = "Ошибка загрузки";
            }
        }

        function openWeatherModal() {
            weatherCityInput.value = localStorage.getItem('weatherCity') || '';
            weatherModal.classList.add('show');
            setTimeout(() => weatherCityInput.focus(), 100);
        }

        function closeWeatherModal() {
            weatherModal.classList.remove('show');
        }

        function saveWeatherCity() {
            const city = weatherCityInput.value.trim();
            if (city) {
                fetchWeather(city);
                closeWeatherModal();
            }
        }

        weatherWidget.addEventListener('click', () => {
            if (weatherClickTimer) {
                clearTimeout(weatherClickTimer);
                weatherClickTimer = null;
                return;
            }
            weatherClickTimer = setTimeout(() => {
                weatherClickTimer = null;
                const lat = localStorage.getItem('weatherLat');
                const lon = localStorage.getItem('weatherLon');
                if (lat && lon) {
                    window.open(`https://yandex.ru/pogoda/ru?lat=${lat}&lon=${lon}`, '_blank', 'noopener,noreferrer');
                } else {
                    openWeatherModal();
                }
            }, 250);
        });

        weatherWidget.addEventListener('dblclick', (e) => {
            e.stopPropagation();
            if (weatherClickTimer) {
                clearTimeout(weatherClickTimer);
                weatherClickTimer = null;
            }
            openWeatherModal();
        });

        // КОПИРОВАНИЕ GMAIL С feedback-анимацией
        const copyEmailIcon = document.getElementById('copyEmailIcon');
        copyEmailIcon.addEventListener('click', (e) => {
            e.preventDefault();
            copyToClipboard('mapruapp@gmail.com', () => {
                const img = document.getElementById('emailImg');
                img.src = 'img/check-mark.png';
                copyEmailIcon.style.borderColor = '#10b981';
                setTimeout(() => {
                    img.src = 'img/gmail.png';
                    copyEmailIcon.style.borderColor = 'var(--border-color)';
                }, 2000);
            });
        });

        // ГОРЯЧИЕ КЛАВИШИ В СТИЛЕ КОНСОЛИ
        document.addEventListener('keydown', (e) => {
            // F9 - переключение AI-режима поиска
            if (e.key === 'F9') {
                e.preventDefault();
                isF9Mode = !isF9Mode;
                const badge = document.getElementById('currentModeBadge');
                const ind = document.getElementById('f9ModeIndicator');
                if (isF9Mode) {
                    badge.className = "status-badge mode-ai";
                    modeText.textContent = "AI Интеллект";
                    ind.style.display = "block";
                    renderAISuggestions();
                } else {
                    commandInput.dispatchEvent(new Event('input'));
                    ind.style.display = "none";
                }
            }

            // F8 - переключение цветовых тем по кругу
            if (e.key === 'F8') {
                e.preventDefault();
                const themes = ['midnight', 'frost', 'matrix', 'sunset', 'glass-light'];
                let nextIdx = (themes.indexOf(activeTheme) + 1) % themes.length;
                setTheme(themes[nextIdx]);
            }

            // Клавиша "/" для вызова палитры (срабатывает на физическую клавишу Slash во всех раскладках)
            if (document.activeElement.tagName !== 'INPUT' && document.activeElement.tagName !== 'TEXTAREA') {
                if (e.code === 'Slash' || e.key === '/' || e.key === '.' || e.key === ',') {
                    e.preventDefault();
                    openCommandPalette();
                }
            }

            // Esc для закрытия всех оверлеев
            if (e.key === 'Escape') {
                closeCommandPalette();
                closeWeatherModal();
                closeInfoModal();
            }

            // F6 - проверка клипборда
            if (e.key === 'F6') {
                e.preventDefault();
                checkAndShowClipboardInstructions();
            }

            // F4 - серверная заглушка
            if (e.key === 'F4') {
                e.preventDefault();
                window.open('193.124.64.31:8000', '_blank', 'noopener,noreferrer');
            }
        });

        // АНИМАЦИЯ СНЕГА
        const canvas = document.getElementById('snowCanvas');
        const ctx = canvas.getContext('2d');
        let snowflakes = [];
        const numSnowflakes = 25;

        function initCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }

        function createSnowflake() {
            return {
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height,
                size: Math.random() * 2 + 1,
                speedY: Math.random() * 0.8 + 0.3,
                speedX: Math.random() * 0.4 - 0.2,
                opacity: Math.random() * 0.5 + 0.1
            };
        }

        function updateAndDrawSnow() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            snowflakes.forEach(f => {
                f.y += f.speedY;
                f.x += f.speedX;
                if (f.y > canvas.height) {
                    f.y = 0;
                    f.x = Math.random() * canvas.width;
                }
                ctx.beginPath();
                ctx.arc(f.x, f.y, f.size, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(255, 255, 255, ${f.opacity})`;
                ctx.fill();
            });
            requestAnimationFrame(updateAndDrawSnow);
        }

        // Инициализация
        window.addEventListener('resize', initCanvas);
        window.onload = () => {
            initCanvas();
            for (let i = 0; i < numSnowflakes; i++) {
                snowflakes.push(createSnowflake());
            }
            updateAndDrawSnow();

            // Загрузка сохраненной темы
            const savedTheme = localStorage.getItem('assistantTheme2026') || 'midnight';
            setTheme(savedTheme);

            // Инициализация дефолтных или недавних команд
            renderDefaultSuggestions();

            // Инициализация погоды
            const savedCity = localStorage.getItem('weatherCity') || 'Москва';
            fetchWeather(savedCity);
        };
    </script>
</body>
</html>
