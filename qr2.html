<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>QR Generator</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0d0d0d;
    --surface: #161616;
    --surface2: #1e1e1e;
    --border: #2a2a2a;
    --accent: #c8f135;
    --accent-dim: #a8d120;
    --text: #f0f0f0;
    --muted: #666;
    --mono: 'Space Mono', monospace;
    --sans: 'DM Sans', sans-serif;
    --shadow: rgba(0,0,0,0.4);
  }

  [data-theme="light"] {
    --bg: #f4f4f0;
    --surface: #ffffff;
    --surface2: #f0f0ea;
    --border: #ddddd5;
    --accent: #6abf2e;
    --accent-dim: #55a020;
    --text: #111111;
    --muted: #999;
    --shadow: rgba(0,0,0,0.1);
  }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    transition: background 0.3s, color 0.3s;
  }

  body {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 2rem 1rem;
  }

  .card {
    width: 100%;
    max-width: 440px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 2.5rem 2rem;
    position: relative;
    overflow: hidden;
    box-shadow: 0 4px 32px var(--shadow);
    transition: background 0.3s, border-color 0.3s, box-shadow 0.3s;
  }

  .card::before {
    content: '';
    position: absolute;
    top: -60px; right: -60px;
    width: 160px; height: 160px;
    background: radial-gradient(circle, rgba(200,241,53,0.10) 0%, transparent 70%);
    pointer-events: none;
  }

  [data-theme="light"] .card::before {
    background: radial-gradient(circle, rgba(106,191,46,0.10) 0%, transparent 70%);
  }

  /* Theme toggle */
  .theme-toggle {
    position: absolute;
    top: 1.25rem;
    right: 1.25rem;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 50px;
    padding: 5px 12px;
    cursor: pointer;
    font-size: 12px;
    font-family: var(--mono);
    color: var(--muted);
    display: flex;
    align-items: center;
    gap: 6px;
    transition: all 0.2s;
    z-index: 10;
  }
  .theme-toggle:hover { color: var(--text); border-color: var(--accent); }
  .theme-icon { font-size: 14px; line-height: 1; }

  .label-tag {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-family: var(--mono);
    font-size: 11px;
    color: var(--accent);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 1rem;
  }

  .label-tag::before {
    content: '';
    display: inline-block;
    width: 6px; height: 6px;
    background: var(--accent);
    border-radius: 50%;
  }

  h1 {
    font-size: 32px;
    font-weight: 600;
    line-height: 1.1;
    margin-bottom: 0.4rem;
    letter-spacing: -0.5px;
  }

  h1 span { color: var(--accent); }

  .desc {
    font-size: 14px;
    color: var(--muted);
    margin-bottom: 2rem;
    font-weight: 300;
  }

  .input-wrap {
    position: relative;
    margin-bottom: 12px;
  }

  #url {
    width: 100%;
    padding: 14px 16px;
    padding-right: 48px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-size: 14px;
    font-family: var(--mono);
    outline: none;
    transition: border-color 0.2s, background 0.3s;
  }

  #url::placeholder { color: var(--muted); }
  #url:focus { border-color: var(--accent); }

  /* URL validation states */
  #url.invalid { border-color: #ff4d4d !important; }
  #url.valid { border-color: var(--accent); }

  .url-hint {
    font-size: 12px;
    font-family: var(--mono);
    color: #ff6b6b;
    margin-top: 6px;
    margin-bottom: 6px;
    min-height: 18px;
    display: none;
  }

  .url-hint.visible { display: block; }

  .clear-btn {
    position: absolute;
    right: 14px; top: 50%;
    transform: translateY(-50%);
    background: none; border: none;
    color: var(--muted); cursor: pointer;
    font-size: 18px; line-height: 1;
    display: none;
    padding: 2px;
    transition: color 0.15s;
  }

  .clear-btn:hover { color: var(--text); }

  #gen {
    width: 100%;
    padding: 14px;
    background: var(--accent);
    color: #0d0d0d;
    border: none;
    border-radius: 10px;
    font-size: 15px;
    font-weight: 600;
    font-family: var(--sans);
    cursor: pointer;
    transition: background 0.15s, transform 0.1s, opacity 0.2s;
    letter-spacing: 0.01em;
  }

  #gen:hover { background: var(--accent-dim); }
  #gen:active { transform: scale(0.98); }

  .qr-section {
    margin-top: 2rem;
    display: none;
    animation: fadeUp 0.35s ease;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .divider {
    height: 1px;
    background: var(--border);
    margin-bottom: 2rem;
  }

  .qr-wrap {
    display: flex;
    justify-content: center;
    margin-bottom: 1.25rem;
  }

  .qr-frame {
    background: #fff;
    padding: 16px;
    border-radius: 12px;
    display: inline-flex;
    box-shadow: 0 0 0 1px rgba(0,0,0,0.08);
  }

  #qr-canvas { display: block; border-radius: 4px; }

  .url-chip {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 14px;
    font-family: var(--mono);
    font-size: 12px;
    color: var(--muted);
    word-break: break-all;
    margin-bottom: 1.25rem;
    line-height: 1.6;
    transition: background 0.3s, border-color 0.3s;
  }

  .url-chip strong {
    color: var(--accent);
    font-weight: 400;
    display: block;
    font-size: 10px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-bottom: 4px;
  }

  .actions {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
  }

  .act {
    padding: 11px;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 500;
    font-family: var(--sans);
    cursor: pointer;
    transition: background 0.12s, transform 0.1s;
    border: none;
    text-align: center;
  }

  .act:active { transform: scale(0.97); }

  .act-dl {
    background: var(--accent);
    color: #0d0d0d;
  }

  .act-dl:hover { background: var(--accent-dim); }

  .act-copy {
    background: var(--surface2);
    color: var(--text);
    border: 1px solid var(--border);
  }

  .act-copy:hover { background: var(--border); }

  .toast {
    position: fixed;
    bottom: 24px; left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--accent);
    color: #0d0d0d;
    font-size: 13px;
    font-weight: 600;
    padding: 10px 20px;
    border-radius: 30px;
    opacity: 0;
    transition: opacity 0.2s, transform 0.2s;
    pointer-events: none;
    white-space: nowrap;
    font-family: var(--sans);
  }

  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  .toast.error {
    background: #ff4d4d;
    color: #fff;
  }

  .footer {
    margin-top: 1.5rem;
    text-align: center;
    font-size: 11px;
    color: var(--border);
    font-family: var(--mono);
    transition: color 0.3s;
  }

  [data-theme="light"] .footer { color: #bbb; }
</style>
</head>
<body>
<div class="card">
  <button class="theme-toggle" onclick="toggleTheme()" id="theme-btn">
    <span class="theme-icon" id="theme-icon">☀️</span>
    <span id="theme-label">Светлая</span>
  </button>

  <div class="label-tag">QR Code Generator</div>
  <h1>Ссылка в<br><span>QR-код</span></h1>
  <p class="desc">Введите URL — отсканируйте камерой телефона</p>

  <div class="input-wrap">
    <input type="text" id="url" placeholder="https://example.com" autocomplete="off" spellcheck="false"/>
    <button class="clear-btn" id="clear-btn" onclick="clearInput()">×</button>
  </div>
  <div class="url-hint" id="url-hint"></div>

  <button id="gen" onclick="generate()">Создать QR-код</button>

  <div class="qr-section" id="qr-section">
    <div class="divider"></div>
    <div class="qr-wrap">
      <div class="qr-frame">
        <canvas id="qr-canvas"></canvas>
      </div>
    </div>
    <div class="url-chip">
      <strong>ссылка</strong>
      <span id="url-display"></span>
    </div>
    <div class="actions">
      <button class="act act-dl" onclick="download()">↓ Скачать PNG</button>
      <button class="act act-copy" onclick="copyImg()">Копировать</button>
    </div>
  </div>

  <div class="footer">работает офлайн · без серверов · всё в браузере</div>
</div>

<div class="toast" id="toast"></div>

// ── Theme ──────────────────────────────────────────────
let isDark = true;
function toggleTheme() {
  isDark = !isDark;
  document.documentElement.setAttribute('data-theme', isDark ? 'dark' : 'light');
  document.getElementById('theme-icon').textContent = isDark ? '☀️' : '🌙';
  document.getElementById('theme-label').textContent = isDark ? 'Светлая' : 'Тёмная';
}

// ── URL validation ──────────────────────────────────────
function normalizeUrl(val) {
  val = val.trim();
  if (!val) return null;
  // Already has protocol
  if (/^https?:\/\//i.test(val)) return val;
  // Has protocol-relative or other scheme
  if (/^[a-z][a-z\d+\-.]*:\/\//i.test(val)) return val;
  // Looks like a domain — prepend https://
  if (/^[\w\-]+(\.[\w\-]+)+(\/.*)?$/.test(val) || /^localhost/.test(val)) {
    return 'https://' + val;
  }
  return null;
}

function showHint(msg) {
  const hint = document.getElementById('url-hint');
  hint.textContent = msg;
  hint.classList.toggle('visible', !!msg);
  document.getElementById('url').classList.toggle('invalid', !!msg);
}

// ── Generate ───────────────────────────────────────────
function generate() {
  const input = document.getElementById('url');
  const raw = input.value.trim();

  if (!raw) {
    input.focus();
    showHint('Введите ссылку');
    return;
  }

  const val = normalizeUrl(raw);
  if (!val) {
    showHint('Некорректный URL — проверьте ссылку');
    input.classList.add('invalid');
    return;
  }

  showHint('');
  input.classList.remove('invalid');

  try {
    // typeNumber = -1 triggers auto-detect in the patched library
    const qr = qrcode(-1, 'M');
    qr.addData(val);
    qr.make();

    const canvas = document.getElementById('qr-canvas');
    const size = 256;
    const count = qr.getModuleCount();
    const cell = Math.floor(size / count);
    const offset = Math.floor((size - cell * count) / 2);

    canvas.width = size;
    canvas.height = size;
    const ctx = canvas.getContext('2d');
    ctx.fillStyle = '#ffffff';
    ctx.fillRect(0, 0, size, size);
    ctx.fillStyle = '#111111';

    for (let r = 0; r < count; r++) {
      for (let c = 0; c < count; c++) {
        if (qr.isDark(r, c)) {
          ctx.fillRect(offset + c * cell, offset + r * cell, cell, cell);
        }
      }
    }

    document.getElementById('url-display').textContent = val;
    const sec = document.getElementById('qr-section');
    sec.style.display = 'block';
    // re-trigger animation
    sec.style.animation = 'none';
    sec.offsetHeight; // reflow
    sec.style.animation = '';

  } catch(e) {
    showHint('Не удалось создать QR — слишком длинная ссылка?');
  }
}

function download() {
  const canvas = document.getElementById('qr-canvas');
  const a = document.createElement('a');
  a.href = canvas.toDataURL('image/png');
  const name = document.getElementById('url-display').textContent
    .replace(/https?:\/\//,'').replace(/[^a-z0-9]/gi,'-').substring(0,30);
  a.download = 'qr-' + name + '.png';
  a.click();
}

function copyImg() {
  const canvas = document.getElementById('qr-canvas');
  canvas.toBlob(blob => {
    navigator.clipboard.write([new ClipboardItem({'image/png': blob})])
      .then(() => showToast('Скопировано!', false))
      .catch(() => showToast('Скопируйте изображение вручную', true));
  });
}

function clearInput() {
  document.getElementById('url').value = '';
  document.getElementById('qr-section').style.display = 'none';
  document.getElementById('clear-btn').style.display = 'none';
  document.getElementById('url').classList.remove('invalid', 'valid');
  showHint('');
  document.getElementById('url').focus();
}

function showToast(msg, isError = false) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.toggle('error', isError);
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

document.getElementById('url').addEventListener('keydown', e => {
  if (e.key === 'Enter') generate();
});

document.getElementById('url').addEventListener('input', function() {
  document.getElementById('clear-btn').style.display = this.value ? 'block' : 'none';
  if (this.classList.contains('invalid')) showHint('');
  this.classList.remove('invalid');
});
</script>
