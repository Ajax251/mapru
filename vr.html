<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>AR Куб</title>
    <!-- Подключаем библиотеку A-Frame для 3D и AR -->
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <style>
        /* Стили для интерфейса поверх камеры */
        #ui-container {
            position: absolute;
            z-index: 999; /* Поверх 3D сцены */
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255, 255, 255, 0.9);
            padding: 15px;
            border-radius: 10px;
            text-align: center;
            font-family: Arial, sans-serif;
            width: 80%;
            max-width: 300px;
        }
        input {
            width: 80px;
            padding: 5px;
            margin-bottom: 10px;
        }
        button {
            padding: 10px 20px;
            background: #007BFF;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
        }
    </style>
</head>
<body>

    <!-- Пользовательский интерфейс (HTML) -->
    <div id="ui-container">
        <label for="sizeInput">Размер куба (в метрах):</label><br>
        <input type="number" id="sizeInput" value="1" step="0.1" min="0.1"><br>
        <button onclick="updateCube()">Применить</button>
    </div>

    <!-- AR Сцена (A-Frame) -->
    <!-- cursor="rayOrigin: mouse" позволяет взаимодействовать с экраном пальцем -->
    <a-scene xr-mode-ui="enabled: true" webxr="optionalFeatures: dom-overlay; overlayElement: #ui-container">
        
        <!-- Камера сцены -->
        <a-camera position="0 1.6 0"></a-camera>

        <!-- Наш куб. По умолчанию ширина, высота и глубина = 1 (то есть 1 метр) -->
        <!-- position="0 0.5 -3" означает: по центру (0), на высоте 0.5м от пола, в 3 метрах перед пользователем (-3) -->
        <a-box id="myCube" 
               position="0 0.5 -3" 
               rotation="0 45 0" 
               color="#4CC3D9" 
               width="1" height="1" depth="1">
        </a-box>

        <!-- Простой свет, чтобы куб выглядел объемным -->
        <a-light type="ambient" color="#fff"></a-light>
        <a-light type="directional" position="-1 2 1" intensity="0.5"></a-light>
    </a-scene>

    <script>
        // Функция, которая меняет размер куба по введенному значению
        function updateCube() {
            // Получаем значение из поля ввода
            const size = document.getElementById('sizeInput').value;
            
            // Находим куб в HTML
            const cube = document.getElementById('myCube');
            
            // Меняем его параметры (1 в A-Frame = 1 метр в реальности)
            cube.setAttribute('width', size);
            cube.setAttribute('height', size);
            cube.setAttribute('depth', size);

            // Поднимаем куб, чтобы он не проваливался под виртуальный "пол"
            // (его центр должен быть на высоте size / 2)
            cube.setAttribute('position', `0 ${size / 2} -3`);
        }
    </script>
</body>
</html>
