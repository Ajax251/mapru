<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>AR Куб</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>

    <style>
        body { font-family: sans-serif; margin: 0; overflow: hidden; background: #111; }

        #start-ar-btn {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: #28a745;
            color: white;
            border: none;
            border-radius: 15px;
            padding: 25px 30px;
            font-size: 24px;
            font-weight: bold;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
            z-index: 9999;
            cursor: pointer;
            text-align: center;
            width: 85%;
            max-width: 400px;
        }
        #start-ar-btn:active { background: #1e7e34; }
        #start-ar-btn:disabled { background: #888; cursor: default; }

        #status-msg {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.7);
            color: #fff;
            padding: 10px 20px;
            border-radius: 10px;
            font-size: 15px;
            z-index: 9999;
            display: none;
            text-align: center;
            width: 80%;
            max-width: 360px;
        }

        #ar-ui {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255,255,255,0.95);
            padding: 20px;
            border-radius: 15px;
            text-align: center;
            width: 85%;
            max-width: 350px;
            z-index: 9999;
            display: none;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }
        #ar-ui label { font-size: 18px; font-weight: bold; color: #333; }
        #sizeInput { width: 100px; padding: 15px; font-size: 20px; margin: 15px 0; text-align: center; border: 2px solid #ccc; border-radius: 8px; }
        .apply-btn { padding: 15px; background: #007BFF; color: white; border: none; border-radius: 8px; font-size: 20px; width: 100%; font-weight: bold; cursor: pointer; }
        .exit-btn { margin-top: 10px; padding: 10px; background: #dc3545; color: white; border: none; border-radius: 8px; font-size: 16px; width: 100%; cursor: pointer; }
    </style>
</head>
<body>

    <button id="start-ar-btn">📸 ОТКРЫТЬ AR КАМЕРУ</button>
    <div id="status-msg"></div>

    <div id="ar-ui">
        <label>Размер куба (в метрах):</label><br>
        <input type="number" id="sizeInput" value="1" step="0.1" min="0.1"><br>
        <button class="apply-btn" onclick="updateCube()">✅ Применить</button>
        <button class="exit-btn" onclick="exitAR()">✖ Выйти из AR</button>
    </div>

    <!-- Отключаем встроенный UI A-Frame полностью -->
    <a-scene
        vr-mode-ui="enabled: false"
        xr-mode-ui="enabled: false"
        renderer="antialias: true; alpha: true"
        style="display:none">

        <a-camera position="0 1.6 0"></a-camera>

        <a-box id="myCube" position="0 0.5 -3" rotation="0 45 0"
               color="#4CC3D9" width="1" height="1" depth="1"
               shadow="cast: true"></a-box>

        <a-light type="ambient" color="#fff" intensity="0.8"></a-light>
        <a-light type="directional" position="-1 2 1" intensity="0.6"></a-light>
    </a-scene>

    <script>
        const startBtn   = document.getElementById('start-ar-btn');
        const arUi       = document.getElementById('ar-ui');
        const statusMsg  = document.getElementById('status-msg');
        const scene      = document.querySelector('a-scene');

        function showStatus(msg, autoHide = false) {
            statusMsg.textContent = msg;
            statusMsg.style.display = 'block';
            if (autoHide) setTimeout(() => statusMsg.style.display = 'none', 3000);
        }

        startBtn.addEventListener('click', async () => {
            startBtn.disabled = true;
            showStatus('⏳ Проверяем поддержку AR...');

            // 1. Проверяем поддержку WebXR AR
            if (!navigator.xr) {
                showStatus('❌ WebXR не поддерживается этим браузером. Используйте Chrome на Android.');
                startBtn.disabled = false;
                return;
            }

            const supported = await navigator.xr.isSessionSupported('immersive-ar').catch(() => false);
            if (!supported) {
                showStatus('❌ AR не поддерживается на этом устройстве. Убедитесь, что установлен ARCore (Google Play Services for AR).');
                startBtn.disabled = false;
                return;
            }

            // 2. Показываем A-Frame сцену
            scene.style.display = 'block';

            // 3. Ждём готовности сцены, потом запускаем AR
            const launchAR = () => {
                showStatus('📷 Запускаем камеру...', true);
                scene.enterAR().then(() => {
                    startBtn.style.display = 'none';
                    statusMsg.style.display = 'none';
                    arUi.style.display = 'block';
                }).catch(err => {
                    showStatus('❌ Ошибка запуска AR: ' + err.message);
                    startBtn.disabled = false;
                    scene.style.display = 'none';
                });
            };

            if (scene.hasLoaded) {
                launchAR();
            } else {
                scene.addEventListener('loaded', launchAR, { once: true });
            }
        });

        // Выход из AR
        function exitAR() {
            scene.exitVR();
        }

        scene.addEventListener('exit-vr', () => {
            startBtn.style.display = 'block';
            startBtn.disabled = false;
            arUi.style.display = 'none';
            statusMsg.style.display = 'none';
            scene.style.display = 'none';
        });

        // Изменение размера куба
        function updateCube() {
            const size = parseFloat(document.getElementById('sizeInput').value) || 1;
            const cube = document.getElementById('myCube');
            cube.setAttribute('width',  size);
            cube.setAttribute('height', size);
            cube.setAttribute('depth',  size);
            cube.setAttribute('position', `0 ${size / 2} -3`);
        }
    </script>
</body>
</html>
