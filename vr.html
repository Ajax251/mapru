<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>AR Куб</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <!-- Подключаем A-Frame -->
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    
    <style>
        body { font-family: sans-serif; margin: 0; overflow: hidden; }
        
        /* ЗЕЛЕНАЯ КНОПКА ЗАПУСКА AR */
        #start-ar-btn {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: #28a745;
            color: white;
            border: none;
            border-radius: 15px;
            padding: 25px 30px;
            font-size: 24px;
            font-weight: bold;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
            z-index: 9999;
            cursor: pointer;
            text-align: center;
            width: 85%;
            max-width: 400px;
        }
        #start-ar-btn:active { background: #1e7e34; box-shadow: 0 5px 10px rgba(0,0,0,0.5); }

        /* ПАНЕЛЬ НАСТРОЕК КУБА (Скрыта до старта) */
        #ar-ui {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255, 255, 255, 0.95);
            padding: 20px;
            border-radius: 15px;
            text-align: center;
            width: 85%;
            max-width: 350px;
            z-index: 9999;
            display: none;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }
        #ar-ui label { font-size: 18px; font-weight: bold; color: #333; }
        #sizeInput { width: 100px; padding: 15px; font-size: 20px; margin: 15px 0; text-align: center; border: 2px solid #ccc; border-radius: 8px; }
        .apply-btn { padding: 15px; background: #007BFF; color: white; border: none; border-radius: 8px; font-size: 20px; width: 100%; font-weight: bold; }
    </style>
</head>
<body>

    <!-- 1. Наша огромная кнопка -->
    <button id="start-ar-btn">📸 ОТКРЫТЬ AR КАМЕРУ</button>

    <!-- 2. HTML интерфейс поверх камеры -->
    <div id="ar-ui">
        <label>Размер куба (в метрах):</label><br>
        <input type="number" id="sizeInput" value="1" step="0.1" min="0.1"><br>
        <button class="apply-btn" onclick="updateCube()">Применить</button>
    </div>

    <!-- 3. AR Сцена (A-Frame) -->
    <!-- 
        Магия здесь: xr-mode-ui="enterARButton: #start-ar-btn"
        Это жестко связывает библиотеку с нашей зеленой кнопкой без лишнего кода!
    -->
    <a-scene 
        xr-mode-ui="enterARButton: #start-ar-btn; enterVREnabled: false;" 
        webxr="optionalFeatures: dom-overlay; overlayElement: #ar-ui">
        
        <a-sky color="#222222"></a-sky>
        
        <a-camera position="0 1.6 0"></a-camera>
        
        <!-- Наш 3D куб -->
        <a-box id="myCube" position="0 0.5 -3" rotation="0 45 0" color="#4CC3D9" width="1" height="1" depth="1"></a-box>

        <!-- Освещение -->
        <a-light type="ambient" color="#fff"></a-light>
        <a-light type="directional" position="-1 2 1" intensity="0.5"></a-light>
    </a-scene>

    <script>
        const scene = document.querySelector('a-scene');
        const startBtn = document.getElementById('start-ar-btn');
        const arUi = document.getElementById('ar-ui');

        // Когда камера успешно включилась
        scene.addEventListener('enter-vr', function () {
            if (scene.is('ar-mode')) {
                startBtn.style.display = 'none'; // Прячем стартовую кнопку
                arUi.style.display = 'block';    // Показываем настройки куба
            }
        });

        // Когда мы вышли из камеры
        scene.addEventListener('exit-vr', function () {
            startBtn.style.display = 'block'; // Возвращаем зеленую кнопку
            arUi.style.display = 'none';      // Прячем меню куба
        });

        // Функция изменения размера куба (изменяет реальные метры)
        function updateCube() {
            const size = parseFloat(document.getElementById('sizeInput').value);
            const cube = document.getElementById('myCube');
            
            // 1 единица в A-Frame = 1 реальный метр
            cube.setAttribute('width', size);
            cube.setAttribute('height', size);
            cube.setAttribute('depth', size);
            
            // Поднимаем куб, чтобы его дно стояло на "полу", а не проваливалось
            cube.setAttribute('position', `0 ${size / 2} -3`);
        }
    </script>
</body>
</html>
