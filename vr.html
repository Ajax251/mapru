<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>AR Куб</title>
    <!-- Мета-тег для правильного масштаба на телефонах -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <!-- Библиотека A-Frame -->
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    
    <style>
        body { font-family: sans-serif; margin: 0; overflow: hidden; }
        
        /* ГИГАНТСКАЯ КНОПКА ЗАПУСКА AR */
        #start-ar-btn {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: #28a745;
            color: white;
            border: none;
            border-radius: 15px;
            padding: 25px 30px;
            font-size: 24px;
            font-weight: bold;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
            z-index: 9999;
            cursor: pointer;
            text-align: center;
            width: 85%;
            max-width: 400px;
            display: none; /* Изначально скрыта, пока не проверим поддержку AR */
        }
        #start-ar-btn:active { background: #1e7e34; box-shadow: 0 5px 10px rgba(0,0,0,0.5); }

        /* ОКНО С ОШИБКОЙ (Если телефон блокирует AR) */
        #error-msg {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: #ff3b30;
            color: white;
            padding: 25px;
            border-radius: 15px;
            z-index: 9999;
            width: 85%;
            max-width: 400px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
            display: none; /* Скрыто по умолчанию */
        }
        #error-msg h2 { margin-top: 0; text-align: center; }
        #error-msg p { font-size: 18px; line-height: 1.5; }

        /* ПАНЕЛЬ НАСТРОЕК КУБА (Появится поверх включенной камеры) */
        #ar-ui {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255, 255, 255, 0.95);
            padding: 20px;
            border-radius: 15px;
            text-align: center;
            width: 85%;
            max-width: 350px;
            z-index: 9999;
            display: none; /* Скрыта до запуска камеры */
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }
        #ar-ui label { font-size: 18px; font-weight: bold; color: #333; }
        #sizeInput { width: 100px; padding: 15px; font-size: 20px; margin: 15px 0; text-align: center; border: 2px solid #ccc; border-radius: 8px; }
        .apply-btn { padding: 15px; background: #007BFF; color: white; border: none; border-radius: 8px; font-size: 20px; width: 100%; font-weight: bold; }
    </style>
</head>
<body>

    <!-- 1. ТАБЛИЧКА С ОШИБКОЙ (Покажется, если нет HTTPS или открыто в мессенджере) -->
    <div id="error-msg">
        <h2>🚨 AR заблокирован!</h2>
        <p>
            <b>Браузер телефона не разрешает включить камеру. Причины:</b><br><br>
            1. Нет <b>HTTPS://</b> (сайт открыт локально).<br>
            2. Вы открыли ссылку <b>внутри мессенджера</b> (нужно нажать "Открыть в Chrome").<br>
            3. Если у вас iPhone, стандартный Safari может не поддерживать это (используйте приложение WebXR Viewer).
        </p>
    </div>

    <!-- 2. ОГРОМНАЯ КНОПКА ЗАПУСКА -->
    <button id="start-ar-btn">📸 ОТКРЫТЬ AR КАМЕРУ</button>

    <!-- 3. ПАНЕЛЬ ВВОДА РАЗМЕРА (HTML интерфейс поверх камеры) -->
    <div id="ar-ui">
        <label>Размер куба (в метрах):</label><br>
        <input type="number" id="sizeInput" value="1" step="0.1" min="0.1"><br>
        <button class="apply-btn" onclick="updateCube()">Применить</button>
    </div>

    <!-- 4. AR СЦЕНА (A-Frame) -->
    <!-- vr-mode-ui="enabled: false" отключает стандартную мелкую кнопку A-Frame в углу -->
    <a-scene 
        vr-mode-ui="enabled: false"
        webxr="optionalFeatures: dom-overlay; overlayElement: #ar-ui">
        
        <!-- Темно-серый фон (чтобы вы не видели пустой белый экран до включения камеры) -->
        <a-sky color="#222222"></a-sky>

        <a-camera position="0 1.6 0"></a-camera>

        <!-- Куб -->
        <a-box id="myCube" position="0 0.5 -3" rotation="0 45 0" color="#4CC3D9" width="1" height="1" depth="1"></a-box>

        <!-- Свет -->
        <a-light type="ambient" color="#fff"></a-light>
        <a-light type="directional" position="-1 2 1" intensity="0.5"></a-light>
    </a-scene>

    <script>
        const startBtn = document.getElementById('start-ar-btn');
        const errorMsg = document.getElementById('error-msg');
        const arUi = document.getElementById('ar-ui');
        const scene = document.querySelector('a-scene');

        // --- ШАГ 1: ПРОВЕРКА ПОДДЕРЖКИ AR В БРАУЗЕРЕ ---
        if (navigator.xr) {
            // Спрашиваем браузер телефона, разрешает ли он запустить AR
            navigator.xr.isSessionSupported('immersive-ar').then((supported) => {
                if (supported) {
                    // Все отлично -> показываем ОГРОМНУЮ кнопку
                    startBtn.style.display = 'block';
                } else {
                    // AR заблокирован браузером -> показываем красную ошибку
                    errorMsg.style.display = 'block';
                }
            }).catch(() => {
                errorMsg.style.display = 'block';
            });
        } else {
            // WebXR API вообще нет (открыто без HTTPS или в старом браузере)
            errorMsg.style.display = 'block';
        }

        // --- ШАГ 2: КЛИК ПО ОГРОМНОЙ КНОПКЕ ---
        startBtn.addEventListener('click', function () {
            // Принудительно запускаем AR режим 
            scene.enterAR();
        });

        // --- ШАГ 3: ЧТО ПРОИСХОДИТ, КОГДА КАМЕРА ВКЛЮЧИЛАСЬ ---
        scene.addEventListener('enter-vr', function () {
            if (scene.is('ar-mode')) {
                startBtn.style.display = 'none'; // Убираем гигантскую кнопку запуска
                arUi.style.display = 'block';    // Показываем панель для ввода размера поверх камеры
            }
        });

        // --- ШАГ 4: ЧТО ПРОИСХОДИТ, ЕСЛИ ВЫЙТИ ИЗ AR ---
        scene.addEventListener('exit-vr', function () {
            startBtn.style.display = 'block'; // Возвращаем зеленую кнопку
            arUi.style.display = 'none';      // Прячем панель ввода
        });

        // --- ФУНКЦИЯ: ИЗМЕНЕНИЕ РАЗМЕРА КУБА ---
        function updateCube() {
            const size = parseFloat(document.getElementById('sizeInput').value);
            const cube = document.getElementById('myCube');
            
            // Меняем ширину, высоту и глубину (в WebXR 1 единица = 1 метру в реальности)
            cube.setAttribute('width', size);
            cube.setAttribute('height', size);
            cube.setAttribute('depth', size);

            // Поднимаем куб по оси Y (центр куба должен быть на высоте size/2, чтобы он стоял на полу)
            cube.setAttribute('position', `0 ${size / 2} -3`);
        }
    </script>
</body>
</html>
