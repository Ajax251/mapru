<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>AERO 3D TRACKER</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=Share+Tech+Mono&family=Rajdhani:wght@400;500;600;700&display=swap');
:root {
    --accent: #00d2ff;
    --accent-dim: rgba(0, 210, 255, 0.15);
    --accent-border: rgba(0, 210, 255, 0.4);
    --bg-panel: rgba(10, 14, 20, 0.75);
    --border-panel: rgba(255, 255, 255, 0.1);
    --red: #ff4757;
    --amber: #ffa502;
    --text-main: #f1f2f6;
    --text-dim: rgba(255, 255, 255, 0.6);
    --font-mono: 'Share Tech Mono', monospace;
    --font-hud: 'Orbitron', monospace;
    --font-body: 'Rajdhani', sans-serif;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body, html { width:100%; height:100%; overflow:hidden; background:#000208; font-family:var(--font-body); color:var(--text-main); user-select:none; }
canvas { display:block; width:100%; height:100%; outline:none; }
#global-loader {
    position: fixed; top:0; left:0; width:100%; height:100%;
    background: #000208; z-index: 99999;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    transition: opacity 0.8s ease, visibility 0.8s;
}
.core-loader { position: relative; width: 120px; height: 120px; display: flex; align-items: center; justify-content: center; }
.core-loader svg { width: 100%; height: 100%; animation: rotLoader 8s linear infinite; }
.core-loader circle { fill: none; stroke: var(--accent); stroke-width: 1; stroke-dasharray: 20 10; opacity: 0.7; }
.core-loader .c2 { stroke: var(--amber); stroke-dasharray: 40 20; animation: rotLoader 4s linear infinite reverse; transform-origin: 50% 50%; }
.core-loader .c3 { stroke: #fff; stroke-width: 0.5; stroke-dasharray: 100; opacity: 0.3; }
@keyframes rotLoader { 100% { transform: rotate(360deg); } }
.loader-text { font-family: var(--font-hud); font-size: 14px; letter-spacing: 6px; color: var(--accent); margin-top: 30px; text-shadow: 0 0 10px var(--accent); animation: pulseText 1.5s alternate infinite; }
@keyframes pulseText { 0% { opacity: 0.5; } 100% { opacity: 1; } }
#ui-layer {
    position:absolute; top:0; left:0; width:100%; height:100%;
    pointer-events:none; z-index:10;
    display:flex; flex-direction:column; justify-content:space-between; padding:20px;
}
.panel {
    background: var(--bg-panel); backdrop-filter: blur(20px) saturate(1.2);
    border: 1px solid var(--border-panel); border-radius: 12px; pointer-events: auto;
    box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5), inset 0 1px 0 rgba(255, 255, 255, 0.05);
    transition: transform 0.4s, opacity 0.4s;
}
/* ДОБАВЛЕНА СТРОКА НИЖЕ: */
.top-container { display: flex; justify-content: space-between; align-items: flex-start; pointer-events: none; }

#hud-left { padding:20px 24px; min-width:320px; max-width:400px; pointer-events: auto; }


.brand { display:flex; align-items:center; gap:12px; margin-bottom:20px; }
.brand-dot { width:8px; height:8px; background:var(--accent); border-radius:50%; box-shadow:0 0 10px var(--accent); animation:dotP 2s infinite; }
@keyframes dotP { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.4;transform:scale(.6)} }
.brand-title { font-family:var(--font-hud); font-size:18px; font-weight:700; color:var(--accent); letter-spacing:3px; }
.brand-sub { font-size:10px; color:var(--text-dim); letter-spacing:2px; font-family:var(--font-mono); margin-top:4px; }
.tel-grid { display:grid; grid-template-columns:1fr 1fr; gap:12px 20px; }
.tel-label { font-size:10px; color:var(--text-dim); text-transform:uppercase; letter-spacing:1.5px; font-family:var(--font-mono); margin-bottom:4px; }
.tel-val { font-family:var(--font-mono); font-size:20px; color:var(--text-main); font-weight:600; }
.tel-val.hi { color:var(--accent); text-shadow:0 0 10px rgba(0, 210, 255, 0.3); }
.sep { height:1px; background:linear-gradient(90deg, var(--border-panel), transparent); margin:16px 0; }
.sys-status-row { display: flex; align-items: center; gap: 15px; margin-top: 15px; font-family: var(--font-mono); font-size: 11px; letter-spacing: 1px; }
.status-dot { display:inline-block; width:6px; height:6px; background:var(--amber); border-radius:50%; animation:dotP 1.5s infinite; }
#bottom-dock {
    align-self: center; background: var(--bg-panel); backdrop-filter: blur(25px) saturate(1.5);
    border: 1px solid var(--border-panel); border-radius: 40px; padding: 10px 15px;
    display: flex; gap: 10px; pointer-events: auto; box-shadow: 0 15px 40px rgba(0,0,0,0.6);
    align-items: center; transition: transform 0.4s;
}
.dock-btn {
    width: 44px; height: 44px; border-radius: 50%; background: rgba(255,255,255,0.03);
    border: 1px solid transparent; display: flex; align-items: center; justify-content: center;
    cursor: pointer; transition: all 0.2s; color: var(--text-dim);
}
.dock-btn svg { width: 22px; height: 22px; fill: none; stroke: currentColor; stroke-width: 1.5; stroke-linecap: round; stroke-linejoin: round; }
.dock-btn:hover { background: rgba(255,255,255,0.08); color: #fff; border-color: rgba(255,255,255,0.2); }
.dock-btn.active { background: var(--accent-dim); color: var(--accent); border-color: var(--accent-border); box-shadow: 0 0 15px rgba(0,210,255,0.25); }
.dock-sep { width: 1px; height: 24px; background: var(--border-panel); margin: 0 5px; }
#crosshair {
    position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
    pointer-events:none; z-index:20; display:flex; align-items:center; justify-content:center;
}
.ch-ring { width:80px; height:80px; border:1px solid var(--border-panel); border-radius:50%; position:relative; }
.ch-ring::before,.ch-ring::after { content:''; position:absolute; background:var(--accent); }
.ch-ring::before { width:10px; height:1px; top:50%; left:-10px; box-shadow: 90px 0 0 var(--accent); }
.ch-ring::after { width:1px; height:10px; left:50%; top:-10px; box-shadow: 0 90px 0 var(--accent); }
.ch-dot { width:4px; height:4px; background:var(--accent); border-radius:50%; position:absolute; box-shadow:0 0 8px var(--accent); }
#scan-btn {
    position:absolute; top:calc(50% + 60px); left:50%; transform:translateX(-50%);
    background:var(--accent-dim); border:1px solid var(--accent); color:var(--accent);
    padding:8px 24px; border-radius:20px; font-family:var(--font-hud); font-size:12px;
    letter-spacing:2px; cursor:pointer; pointer-events:auto; transition:0.2s;
    backdrop-filter: blur(10px); z-index:20;
}
#scan-btn:hover { background:var(--accent); color:#000; box-shadow:0 0 15px var(--accent); }
#labels-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 90; overflow: hidden; }
.plane-label {
    position: absolute; top: 0; left: 0; color: #fff; font-family: var(--font-mono);
    background: rgba(0, 0, 0, 0.7); border: 1px solid var(--border-panel); border-radius: 4px;
    padding: 4px 8px; font-size: 11px; pointer-events: auto; cursor: pointer;
    transform: translate(-50%, -100%); transition: background 0.2s; white-space: nowrap;
}
.plane-label:hover { background: var(--accent-dim); border-color: var(--accent); color: var(--accent); }
.plane-label::after {
    content: ''; position: absolute; bottom: -5px; left: 50%; transform: translateX(-50%);
    border-width: 5px 5px 0; border-style: solid; border-color: rgba(255, 255, 255, 0.1) transparent transparent transparent;
}
#map-container {
    position:absolute; top:2%; left:2%; width:96%; height:96%;
    background:#0f1115; border:1px solid var(--border-panel); border-radius:16px;
    display:none; z-index:50; overflow:hidden; pointer-events:auto;
    box-shadow:0 20px 60px rgba(0,0,0,0.8);
}
#leaflet-map { width:100%; height:100%; }
.leaflet-container { background:#0a0b0e !important; }
.leaflet-control-attribution { display:none !important; }
.map-close {
    position:absolute; top:20px; right:20px; padding:10px 16px; font-size:16px; color:var(--text-dim);
    border: 1px solid var(--border-panel); border-radius: 8px; background: rgba(15,18,22,0.9);
    cursor:pointer; z-index:1000; transition:0.2s; display:flex; align-items:center; justify-content:center;
}
.map-close:hover { color:var(--red); border-color:var(--red); background:rgba(255,71,87,0.15); }
.scanline { position:fixed; top:0; left:0; right:0; bottom:0; background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.04) 2px,rgba(0,0,0,.04) 4px); pointer-events:none; z-index:5; }
</style>
<script type="importmap">
{"imports":{"three":"https://unpkg.com/three@0.160.0/build/three.module.js","three/addons/":"https://unpkg.com/three@0.160.0/examples/jsm/"}}
</script>
</head>
<body>
<div id="global-loader">
<div class="core-loader"><svg viewBox="0 0 100 100"><circle cx="50" cy="50" r="45"></circle><circle cx="50" cy="50" r="35" class="c2"></circle><circle cx="50" cy="50" r="25" class="c3"></circle></svg></div>
<div class="loader-text">INITIALIZING</div>
</div>
<div class="scanline"></div>
<div id="labels-layer"></div>
<div id="crosshair">
    <div class="ch-ring"></div>
    <div class="ch-dot"></div>
</div>
<button id="scan-btn">СКАНИРОВАТЬ СЕКТОР</button>
<div id="map-container">
    <button class="map-close" id="close-map">✕</button>
    <div id="leaflet-map"></div>
</div>
<div id="ui-layer">
    <div class="top-container">
        <div id="hud-left" class="panel">
            <div class="brand">
                <div class="brand-dot"></div>
                <div>
                    <div class="brand-title">AERO 3D</div>
                    <div class="brand-sub">ГЛОБАЛЬНЫЙ МОНИТОРИНГ</div>
                </div>
            </div>
            <div class="tel-grid">
                <div><div class="tel-label">ПОЗЫВНОЙ</div><div class="tel-val hi" id="hud-callsign">N/A</div></div>
                <div><div class="tel-label">СТРАНА</div><div class="tel-val hi" id="hud-country" style="font-size:14px; margin-top:4px;">N/A</div></div>
                <div><div class="tel-label">СКОРОСТЬ</div><div class="tel-val" id="hud-vel">-- км/ч</div></div>
                <div><div class="tel-label">ВЫСОТА</div><div class="tel-val" id="hud-alt">-- м</div></div>
                <div><div class="tel-label">КУРС</div><div class="tel-val" id="hud-head">-- °</div></div>
                <div><div class="tel-label">ВЕРТ. СКОР.</div><div class="tel-val" id="hud-vrate">-- м/с</div></div>
            </div>
            <div class="sep"></div>
            <div class="sys-status-row">
                <span class="status-dot" id="api-status-dot"></span>
                <span id="api-status-text">ОЖИДАНИЕ СКАНИРОВАНИЯ</span>
            </div>
        </div>
    </div>
    <div id="bottom-dock">
        <div class="dock-btn active" data-cam="global" title="Глобальный обзор">
            <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
        </div>
        <div class="dock-sep"></div>
        <div class="dock-btn" data-cam="map2d" title="2D Карта (Leaflet)">
            <svg viewBox="0 0 24 24"><polygon points="3 6 9 3 15 6 21 3 21 18 15 21 9 18 3 21"/><line x1="9" y1="3" x2="9" y2="18"/><line x1="15" y1="6" x2="15" y2="21"/></svg>
        </div>
        <div class="dock-btn" data-cam="localFree" title="3D Карта (Свободная)">
            <svg viewBox="0 0 24 24"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/></svg>
        </div>
        <div class="dock-btn" data-cam="localFwd" title="Вид из кабины (Вперед)">
            <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12 16 16 12 12 8"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
        </div>
        <div class="dock-btn" data-cam="localBwd" title="Вид на хвост (Назад)">
            <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12 8 8 12 12 16"/><line x1="16" y1="12" x2="8" y2="12"/></svg>
        </div>
    </div>
</div>
<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { Lensflare, LensflareElement } from 'three/addons/objects/Lensflare.js';
import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';

const DEG_TO_RAD = Math.PI / 180;
const R_EARTH = 63.71;
let currentMode = 'global'; 
let trackedPlane = null;
let livePlanes = {};
let planeLabels = {};
let lastFetchTime = 0;
let lastFrameTime = Date.now();

const scene = new THREE.Scene();
const renderer = new THREE.WebGLRenderer({ antialias:true, powerPreference:'high-performance' });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.15;
renderer.setClearColor(0x000208);
document.body.appendChild(renderer.domElement);

const camGlobal = new THREE.PerspectiveCamera(50, window.innerWidth/window.innerHeight, 0.1, 20000);
const camLocalFree = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 10, 500000);
const camLocalFwd = new THREE.PerspectiveCamera(70, window.innerWidth/window.innerHeight, 1, 500000);
const camLocalBwd = new THREE.PerspectiveCamera(70, window.innerWidth/window.innerHeight, 1, 500000);
let activeCam = camGlobal;

const renderPass = new RenderPass(scene, camGlobal);
const bloom = new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 0.8, 0.9, 0.85);
const composer = new EffectComposer(renderer);
composer.addPass(renderPass); composer.addPass(bloom);

const tl = new THREE.TextureLoader(); tl.setCrossOrigin('anonymous');
const globalGroup = new THREE.Group(); scene.add(globalGroup);
const localGroup = new THREE.Group(); scene.add(localGroup); localGroup.visible = false;

let texturesLoaded = 0;
const checkLoader = () => { texturesLoaded++; if (texturesLoaded >= 4) { document.getElementById('global-loader').style.opacity = '0'; setTimeout(()=>document.getElementById('global-loader').style.display='none', 800); } };

const tDay = tl.load('./textures/earth-blue-marble.jpg', checkLoader);
const tBump = tl.load('./textures/earth-topology.png', checkLoader);
const tSpec = tl.load('./textures/earth-water.png', checkLoader);
tDay.colorSpace = THREE.SRGBColorSpace;

const earthMat = new THREE.MeshPhongMaterial({ map: tDay, bumpMap: tBump, bumpScale: 0.1, specularMap: tSpec, specular: new THREE.Color(0x111111), shininess: 5 });
const earth = new THREE.Mesh(new THREE.SphereGeometry(R_EARTH, 80, 80), earthMat);
earth.rotation.y = -Math.PI/2;
globalGroup.add(earth);

const atmoMat = new THREE.ShaderMaterial({
    uniforms: { sunDirection: { value: new THREE.Vector3(1, 0, 0) } },
    vertexShader: `varying vec3 vNormal; varying vec3 vWorldPos; void main() { vNormal = normalize(normalMatrix * normal); vWorldPos = (modelMatrix * vec4(position, 1.0)).xyz; gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0); }`,
    fragmentShader: `uniform vec3 sunDirection; varying vec3 vNormal; varying vec3 vWorldPos; void main() { float fresnel = 1.0 - max(0.0, dot(vNormal, vec3(0.0, 0.0, 1.0))); fresnel = pow(fresnel, 6.0); float sunDot = dot(normalize(vWorldPos), sunDirection); vec3 color = mix(vec3(0.0), mix(vec3(1.0, 0.3, 0.1), vec3(0.3, 0.6, 1.0), smoothstep(-0.1, 0.3, sunDot)), smoothstep(-0.2, 0.1, sunDot)); gl_FragColor = vec4(color * fresnel, 1.0); }`,
    blending: THREE.AdditiveBlending, side: THREE.FrontSide, transparent: true, depthWrite: false
});
const atmosphere = new THREE.Mesh(new THREE.SphereGeometry(R_EARTH + 0.6, 80, 80), atmoMat);
globalGroup.add(atmosphere);

const cvStar = document.createElement('canvas'); cvStar.width=64; cvStar.height=64; const ctxS=cvStar.getContext('2d');
const grdS=ctxS.createRadialGradient(32,32,0,32,32,32); grdS.addColorStop(0,'rgba(255,255,255,1)'); grdS.addColorStop(0.2,'rgba(255,255,255,0.8)'); grdS.addColorStop(1,'rgba(0,0,0,0)');
ctxS.fillStyle=grdS; ctxS.fillRect(0,0,64,64); const texStar=new THREE.CanvasTexture(cvStar);

const bgStarsGeo = new THREE.BufferGeometry(); const bgStarsPos = []; const bgStarsColors = [];
for (let i = 0; i < 2000; i++) {
    const raRad = Math.random() * Math.PI * 2; const decRad = Math.asin((Math.random() * 2) - 1); const r = 8000 + Math.random() * 500;
    bgStarsPos.push(r * Math.cos(decRad) * Math.cos(raRad), r * Math.sin(decRad), -r * Math.cos(decRad) * Math.sin(raRad));
    const c = 0.5 + Math.random() * 0.5; bgStarsColors.push(c, c, c + Math.random() * 0.2);
}
bgStarsGeo.setAttribute('position', new THREE.Float32BufferAttribute(bgStarsPos, 3));
bgStarsGeo.setAttribute('color', new THREE.Float32BufferAttribute(bgStarsColors, 3));
const bgStarsMat = new THREE.PointsMaterial({ size: 15, vertexColors: true, transparent: true, opacity: 0.8, map: texStar, blending: THREE.AdditiveBlending, depthWrite: false });
scene.add(new THREE.Points(bgStarsGeo, bgStarsMat));

const ambientLight = new THREE.AmbientLight(0xffffff, 0.2); scene.add(ambientLight);
const hemiLight = new THREE.HemisphereLight(0x000208, 0x4fc3f7, 0.5); scene.add(hemiLight);
const sunLight = new THREE.DirectionalLight(0xffffff, 3.5); scene.add(sunLight);
const sunPos = new THREE.Vector3(5000, 1000, -2000); sunLight.position.copy(sunPos);
atmoMat.uniforms.sunDirection.value.copy(sunPos).normalize();

const cF = document.createElement('canvas'); cF.width=512; cF.height=512; const ctxF=cF.getContext('2d');
const gF=ctxF.createRadialGradient(256,256,0,256,256,256); gF.addColorStop(0,'rgba(255,255,255,1)'); gF.addColorStop(0.08,'rgba(255,240,200,.9)'); gF.addColorStop(0.4,'rgba(255,140,40,.15)'); gF.addColorStop(1,'rgba(0,0,0,0)');
ctxF.fillStyle=gF; ctxF.fillRect(0,0,512,512); const texFlare=new THREE.CanvasTexture(cF);
const lensflare = new Lensflare(); lensflare.addElement(new LensflareElement(texFlare, 600, 0, new THREE.Color(0xfff5e8)));
sunLight.add(lensflare); checkLoader();

const planeMesh = new THREE.Group();
const bodyM = new THREE.MeshStandardMaterial({color:0xffffff, metalness:0.3, roughness:0.2});
const body = new THREE.Mesh(new THREE.CylinderGeometry(2, 2, 35, 16), bodyM); body.rotation.x = Math.PI/2; planeMesh.add(body);
const nose = new THREE.Mesh(new THREE.SphereGeometry(2, 16, 16), bodyM); nose.position.z = 17.5; planeMesh.add(nose);
const tailcone = new THREE.Mesh(new THREE.ConeGeometry(2, 6, 16), bodyM); tailcone.rotation.x = -Math.PI/2; tailcone.position.z = -17.5; planeMesh.add(tailcone);
const wingGeo = new THREE.BufferGeometry();
const wp = new Float32Array([0,0,5, 18,0,-5, 18,0,-10, 0,0,-4, 0,0,5, -18,0,-5, -18,0,-10, 0,0,-4]);
wingGeo.setAttribute('position', new THREE.BufferAttribute(wp, 3)); wingGeo.computeVertexNormals();
const wings = new THREE.Mesh(wingGeo, bodyM); planeMesh.add(wings);
const tailGeo = new THREE.BufferGeometry();
const tp = new Float32Array([0,2,-15, 0,8,-20, 0,8,-22, 0,2,-20]);
tailGeo.setAttribute('position', new THREE.BufferAttribute(tp, 3)); tailGeo.computeVertexNormals();
const tail = new THREE.Mesh(tailGeo, new THREE.MeshStandardMaterial({color:0x00d2ff, side:THREE.DoubleSide})); planeMesh.add(tail);
const lRed = new THREE.PointLight(0xff0000, 2, 50); lRed.position.set(-18, 0, -8); planeMesh.add(lRed);
const lGreen = new THREE.PointLight(0x00ff00, 2, 50); lGreen.position.set(18, 0, -8); planeMesh.add(lGreen);
const lWhite = new THREE.PointLight(0xffffff, 5, 100); lWhite.position.set(0, 8, -22); planeMesh.add(lWhite);
localGroup.add(planeMesh);
planeMesh.add(camLocalFwd); planeMesh.add(camLocalBwd);
camLocalFwd.position.set(0, 4, 18); camLocalFwd.rotation.set(0, Math.PI, 0);
camLocalBwd.position.set(0, 15, -40); camLocalBwd.rotation.set(0, 0, 0); camLocalBwd.lookAt(0,0,0);

const localTiles = new THREE.Group(); localGroup.add(localTiles);

const ctrlGlobal = new OrbitControls(camGlobal, renderer.domElement);
ctrlGlobal.enableDamping = true; ctrlGlobal.minDistance = R_EARTH + 1; ctrlGlobal.maxDistance = R_EARTH * 5;
camGlobal.position.set(0, 0, R_EARTH * 2.5);

const ctrlLocal = new OrbitControls(camLocalFree, renderer.domElement);
ctrlLocal.enableDamping = true; ctrlLocal.minDistance = 50; ctrlLocal.maxDistance = 15000; ctrlLocal.maxPolarAngle = Math.PI/2 - 0.05;

let leafMap, leafMarker;
function initMap() {
    if(leafMap) return;
    leafMap = L.map('leaflet-map', { zoomControl:false, attributionControl:false }).setView([0,0], 6);
    L.tileLayer('https://mt1.google.com/vt/lyrs=m&x={x}&y={y}&z={z}', { maxZoom:19 }).addTo(leafMap);
    const icon = L.divIcon({ className:'', html:'<div style="color:#00d2ff; font-size:24px; transform:translate(-50%,-50%); text-shadow:0 0 5px #00d2ff;">✈</div>' });
    leafMarker = L.marker([0,0], {icon:icon}).addTo(leafMap);
}
document.getElementById('close-map').addEventListener('click', () => { document.getElementById('map-container').style.display='none'; switchCam('global'); });

const pingGeo = new THREE.RingGeometry(0.01, 0.05, 32);
const pingMat = new THREE.MeshBasicMaterial({ color: 0x00d2ff, transparent: true, opacity: 0.8, side: THREE.DoubleSide, depthTest: false });
const pingMesh = new THREE.Mesh(pingGeo, pingMat); pingMesh.visible = false; globalGroup.add(pingMesh);
let pingT = 0;

document.getElementById('scan-btn').addEventListener('click', () => {
    if (currentMode !== 'global') return;
    const rc = new THREE.Raycaster(); rc.setFromCamera(new THREE.Vector2(0,0), camGlobal);
    const hits = rc.intersectObject(earth);
    if (hits.length > 0) {
        const p = hits[0].point.clone().normalize();
        const lat = Math.asin(p.y) * (180/Math.PI);
        const lon = Math.atan2(-p.z, p.x) * (180/Math.PI);
        pingMesh.position.copy(hits[0].point);
        pingMesh.lookAt(pingMesh.position.clone().add(p));
        pingMesh.visible = true; pingT = 1.0;
        fetchPlanes(lat, lon);
    }
});

function mercX(lon) { return lon * 111320; }
function mercY(lat) { return Math.log(Math.tan((90 + lat) * Math.PI / 360)) * 6378137; }

async function fetchPlanes(lat, lon) {
    document.getElementById('api-status-dot').style.background = 'var(--amber)';
    document.getElementById('api-status-text').textContent = 'СКАНИРОВАНИЕ...';
    const bounds = 4;
    try {
     
        const res = await fetch(`https://planes-alpha.vercel.app/api?lamin=${lat-bounds}&lomin=${lon-bounds}&lamax=${lat+bounds}&lomax=${lon+bounds}`);
        if(!res.ok) throw new Error();
        const data = await res.json();
        const now = Date.now();
        if(data && data.states) {
            data.states.forEach(s => {
                if(s[5]!==null && s[6]!==null && s[9]!==null) {
                    livePlanes[s[0]] = { callsign:(s[1]||'UNK').trim(), country:s[2]||'Unknown', lon:s[5], lat:s[6], alt:s[7]||10000, vel:s[9]*3.6, head:s[10]||0, vrate:s[11]||0, lastT:now };
                }
            });
            Object.keys(livePlanes).forEach(k => { if(now - livePlanes[k].lastT > 60000) delete livePlanes[k]; });
            document.getElementById('api-status-dot').style.background = 'var(--accent)';
            document.getElementById('api-status-text').textContent = `НАЙДЕНО БОРТОВ: ${Object.keys(livePlanes).length}`;
        }
    } catch(e) {
        document.getElementById('api-status-dot').style.background = 'var(--red)';
        document.getElementById('api-status-text').textContent = 'ОШИБКА API';
    }
}

function createLabel(id) {
    if(!planeLabels[id]) {
        const el = document.createElement('div'); el.className = 'plane-label';
        el.addEventListener('dblclick', () => { trackedPlane = id; switchCam('localFree'); });
        document.getElementById('labels-layer').appendChild(el);
        planeLabels[id] = el;
    }
    return planeLabels[id];
}

function switchCam(mode) {
    document.querySelectorAll('.dock-btn').forEach(b => b.classList.remove('active'));
    document.querySelector(`[data-cam="${mode}"]`).classList.add('active');
    currentMode = mode;
    document.getElementById('crosshair').style.display = mode === 'global' ? 'flex' : 'none';
    document.getElementById('scan-btn').style.display = mode === 'global' ? 'block' : 'none';
    
    if(mode === 'map2d') {
        document.getElementById('map-container').style.display = 'block';
        if(!leafMap) initMap();
        if(leafMap) setTimeout(()=>leafMap.invalidateSize(), 100);
    } else {
        document.getElementById('map-container').style.display = 'none';
    }

    if(mode === 'global') {
        globalGroup.visible = true; localGroup.visible = false; activeCam = camGlobal;
        ctrlGlobal.enabled = true; ctrlLocal.enabled = false;
        Object.values(planeLabels).forEach(el => el.style.display = 'block');
    } else {
        globalGroup.visible = false; localGroup.visible = (mode !== 'map2d');
        Object.values(planeLabels).forEach(el => el.style.display = 'none');
        ctrlGlobal.enabled = false;
        
        if(!trackedPlane || !livePlanes[trackedPlane]) { switchCam('global'); return; }
        
        if(mode === 'localFree') { activeCam = camLocalFree; ctrlLocal.enabled = true; camLocalFree.position.set(0, 1000, 2000); ctrlLocal.target.set(0,0,0); }
        else if(mode === 'localFwd') { activeCam = camLocalFwd; ctrlLocal.enabled = false; }
        else if(mode === 'localBwd') { activeCam = camLocalBwd; ctrlLocal.enabled = false; }
    }
    renderPass.camera = activeCam;
}

document.querySelectorAll('.dock-btn').forEach(btn => btn.addEventListener('click', () => switchCam(btn.dataset.cam)));

let lastTileCenter = {x:-999, y:-999};
function updateLocalTiles(lat, lon) {
    if(!localGroup.visible) return;
    const z = 13; const E = 20037508.34;
    const tileSize = (2 * E) / Math.pow(2, z);
    const mx = mercX(lon); const my = mercY(lat);
    const tx = Math.floor((mx + E) / tileSize);
    const ty = Math.floor((E - my) / tileSize);
    
    if(tx === lastTileCenter.x && ty === lastTileCenter.y) return;
    lastTileCenter = {x:tx, y:ty};
    
    while(localTiles.children.length > 0) { const c = localTiles.children[0]; localTiles.remove(c); if(c.material.map) c.material.map.dispose(); c.material.dispose(); c.geometry.dispose(); }
    
    for(let i=-3; i<=3; i++) {
        for(let j=-3; j<=3; j++) {
            const ctx = tx + i; const cty = ty + j;
            const minX = -E + ctx * tileSize; const maxX = -E + (ctx + 1) * tileSize;
            const minY = E - (cty + 1) * tileSize; const maxY = E - cty * tileSize;
            const cx = (maxX + minX) / 2; const cy = (maxY + minY) / 2;
            const url = `https://mt1.google.com/vt/lyrs=s&x=${ctx}&y=${cty}&z=${z}`;
            const mat = new THREE.MeshBasicMaterial({color:0xaaaaaa});
            tl.load(url, tex => { tex.colorSpace = THREE.SRGBColorSpace; mat.map = tex; mat.color.setHex(0xffffff); mat.needsUpdate = true; });
            const mesh = new THREE.Mesh(new THREE.PlaneGeometry(maxX-minX, maxY-minY), mat);
            mesh.rotation.x = -Math.PI/2;
            mesh.position.set(cx, 0, -cy);
            localTiles.add(mesh);
        }
    }
}

function animate() {
    requestAnimationFrame(animate);
    const now = Date.now(); const dt = (now - lastFrameTime) / 1000; lastFrameTime = now;

    if(pingMesh.visible) {
        pingT -= dt * 0.5;
        if(pingT <= 0) pingMesh.visible = false;
        else { const s = 1.0 + (1.0 - pingT)*10; pingMesh.scale.set(s,s,s); pingMat.opacity = pingT; }
    }

    const hW = window.innerWidth/2; const hH = window.innerHeight/2;
    const activeIds = new Set();

    Object.keys(livePlanes).forEach(id => {
        const p = livePlanes[id];
        const dtS = (now - p.lastT) / 1000;
        const hdg = p.head * DEG_TO_RAD;
        const mS = p.vel / 3.6;
        const lSpd = (mS * Math.cos(hdg)) / 111320;
        const lnSpd = (mS * Math.sin(hdg)) / (111320 * Math.cos(p.lat * DEG_TO_RAD));
        p.cLat = p.lat + lSpd * dtS; p.cLon = p.lon + lnSpd * dtS;

        if(currentMode === 'global') {
            const r = R_EARTH + (p.alt/100000);
            const rLat = p.cLat * DEG_TO_RAD; const rLon = p.cLon * DEG_TO_RAD;
            const pos = new THREE.Vector3(r * Math.cos(rLat) * Math.cos(rLon), r * Math.sin(rLat), -r * Math.cos(rLat) * Math.sin(rLon));
            
            const dir = new THREE.Vector3().subVectors(pos, camGlobal.position);
            const dist = dir.length(); dir.normalize();
            const b = 2 * camGlobal.position.dot(dir); const c = camGlobal.position.lengthSq() - (R_EARTH*R_EARTH);
            let occluded = false;
            if(b*b - 4*c > 0) { const t = (-b - Math.sqrt(b*b - 4*c))/2; if(t > 0 && t < dist) occluded = true; }

            const el = createLabel(id);
            if(!occluded && camGlobal.position.distanceTo(pos) < R_EARTH * 2) {
                activeIds.add(id); el.style.display = 'block'; el.textContent = `✈ ${p.callsign}`;
                const proj = pos.clone().project(camGlobal);
                if(proj.z > 1.0 || Math.abs(proj.x)>1.1 || Math.abs(proj.y)>1.1) el.style.opacity = '0';
                else { el.style.opacity = '1'; el.style.transform = `translate(-50%, -100%) translate(${proj.x*hW + hW}px, ${-proj.y*hH + hH - 10}px)`; }
            } else { el.style.display = 'none'; }
        }
    });

    Object.keys(planeLabels).forEach(id => { if(!activeIds.has(id) && currentMode === 'global') planeLabels[id].style.display = 'none'; });

    if(trackedPlane && livePlanes[trackedPlane]) {
        const p = livePlanes[trackedPlane];
        document.getElementById('hud-callsign').textContent = p.callsign;
        document.getElementById('hud-country').textContent = p.country;
        document.getElementById('hud-vel').textContent = Math.round(p.vel) + ' км/ч';
        document.getElementById('hud-alt').textContent = Math.round(p.alt) + ' м';
        document.getElementById('hud-head').textContent = Math.round(p.head) + ' °';
        document.getElementById('hud-vrate').textContent = p.vrate.toFixed(1) + ' м/с';

        if(currentMode === 'map2d' && leafMap) {
            leafMarker.setLatLng([p.cLat, p.cLon]); leafMarker.setRotationAngle(p.head);
            leafMap.panTo([p.cLat, p.cLon], {animate:false});
        }
        else if(currentMode.startsWith('local')) {
            const mx = mercX(p.cLon); const my = mercY(p.cLat);
            planeMesh.position.set(mx, p.alt, -my);
            planeMesh.rotation.y = -p.head * DEG_TO_RAD + Math.PI/2;
            updateLocalTiles(p.cLat, p.cLon);
            if(currentMode === 'localFree') ctrlLocal.target.copy(planeMesh.position);
        }
    }

    if(currentMode === 'global') ctrlGlobal.update();
    if(currentMode === 'localFree') ctrlLocal.update();

    const t = now * 0.005;
    lWhite.intensity = (t % 1.0 < 0.1) ? 20 : 0;
    
    composer.render();
}

window.addEventListener('resize', () => {
    [camGlobal, camLocalFree, camLocalFwd, camLocalBwd].forEach(c => { c.aspect = window.innerWidth/window.innerHeight; c.updateProjectionMatrix(); });
    renderer.setSize(window.innerWidth, window.innerHeight); composer.setSize(window.innerWidth, window.innerHeight);
});

animate();
</script>
</body>
