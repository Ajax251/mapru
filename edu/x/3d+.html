<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Кадастр - Умный город</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Segoe UI', Tahoma, sans-serif; background-color: #87CEEB; }
        #canvas-container { width: 100vw; height: 100vh; display: block; }
        #ui-panel {
            position: absolute; top: 20px; left: 20px;
            background: rgba(255, 255, 255, 0.95); padding: 20px;
            border-radius: 12px; box-shadow: 0 8px 32px rgba(0,0,0,0.15);
            backdrop-filter: blur(10px); width: 280px; z-index: 100;
            border: 1px solid #e2e8f0;
        }
        h3 { margin-top: 0; margin-bottom: 15px; color: #1e293b; font-size: 16px; border-bottom: 2px solid #3b82f6; padding-bottom: 8px; font-weight: 600;}
        .layer-control { display: flex; align-items: center; margin-bottom: 10px; cursor: pointer; padding: 4px; border-radius: 6px; transition: background 0.2s; }
        .layer-control:hover { background: #f1f5f9; }
        .layer-control input { margin-right: 12px; cursor: pointer; width: 16px; height: 16px; accent-color: #3b82f6; }
        .layer-control label { cursor: pointer; font-size: 14px; color: #334155; font-weight: 500; }
        .color-box { width: 16px; height: 16px; display: inline-block; margin-right: 10px; border-radius: 4px; border: 1px solid rgba(0,0,0,0.2); }
        .info-text {
            position: absolute; bottom: 20px; right: 20px;
            background: rgba(255, 255, 255, 0.9); color: #333;
            padding: 10px 15px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            font-size: 13px; font-weight: 600; pointer-events: none;
        }
        .divider { height: 1px; background: #e2e8f0; margin: 10px 0; }
    </style>
    <script async src="https://unpkg.com/es-module-shims@1.8.0/dist/es-module-shims.js"></script>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>

    <div id="canvas-container"></div>

    <div id="ui-panel">
        <h3>Объекты города</h3>
        <div class="layer-control"><input type="checkbox" id="l-private" checked><div class="color-box" style="background: #fde68a;"></div><label for="l-private">Частный дом (1 этаж)</label></div>
        <div class="layer-control"><input type="checkbox" id="l-mkd" checked><div class="color-box" style="background: #e2e8f0;"></div><label for="l-mkd">МКД (9 этажей)</label></div>
        <div class="layer-control"><input type="checkbox" id="l-school" checked><div class="color-box" style="background: #fcd34d;"></div><label for="l-school">Школа (3 этажа)</label></div>
        <div class="layer-control"><input type="checkbox" id="l-hospital" checked><div class="color-box" style="background: #ffffff;"></div><label for="l-hospital">Больница (5 этажей)</label></div>
        
        <div class="divider"></div>
        <div class="layer-control"><input type="checkbox" id="l-gas" checked><div class="color-box" style="background: #fbbf24;"></div><label for="l-gas">Газопровод + ЗОУИТ</label></div>
        <div class="layer-control"><input type="checkbox" id="l-power" checked><div class="color-box" style="background: #475569;"></div><label for="l-power">ЛЭП + ЗОУИТ</label></div>
        <div class="layer-control"><input type="checkbox" id="l-compass" checked><div class="color-box" style="background: #ef4444;"></div><label for="l-compass">Компас</label></div>
    </div>

    <div class="info-text">ЛКМ: вращение | ПКМ: панорама | Колесо: масштаб</div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        // ==========================================
        // 1. СЦЕНА И КАМЕРА
        // ==========================================
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0xdbeafe); // Светло-голубое небо
        scene.fog = new THREE.FogExp2(0xdbeafe, 0.004);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 2000);
        camera.position.set(100, 80, 120);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        container.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.maxPolarAngle = Math.PI / 2 - 0.02; // Запрещаем уходить под землю
        controls.target.set(0, 0, 0);

        // ==========================================
        // 2. ОСВЕЩЕНИЕ
        // ==========================================
        scene.add(new THREE.AmbientLight(0xffffff, 0.6));
        scene.add(new THREE.HemisphereLight(0xffffff, 0xe2e8f0, 0.4)); // Мягкий свет с неба и земли

        const sun = new THREE.DirectionalLight(0xfff8e7, 1.2); // Теплый солнечный свет
        sun.position.set(100, 150, 50);
        sun.castShadow = true;
        sun.shadow.mapSize.width = 4096;
        sun.shadow.mapSize.height = 4096;
        sun.shadow.camera.near = 10;
        sun.shadow.camera.far = 400;
        sun.shadow.camera.left = -150;
        sun.shadow.camera.right = 150;
        sun.shadow.camera.top = 150;
        sun.shadow.camera.bottom = -150;
        sun.shadow.bias = -0.0005;
        scene.add(sun);

        // ==========================================
        // 3. ЗЕМЛЯ (Матовая, светлая)
        // ==========================================
        const groundMat = new THREE.MeshStandardMaterial({ 
            color: 0xf8fafc, // Почти белый
            roughness: 0.9,  // Матовый (не зеркало!)
            metalness: 0.0,
        });
        const ground = new THREE.Mesh(new THREE.PlaneGeometry(1000, 1000), groundMat);
        ground.rotation.x = -Math.PI / 2;
        ground.receiveShadow = true;
        scene.add(ground);

        const grid = new THREE.GridHelper(1000, 200, 0xcbd5e1, 0xe2e8f0);
        grid.position.y = 0.05;
        scene.add(grid);

        const groups = { private: new THREE.Group(), mkd: new THREE.Group(), school: new THREE.Group(), hospital: new THREE.Group(), gas: new THREE.Group(), power: new THREE.Group(), compass: new THREE.Group() };
        for (let key in groups) scene.add(groups[key]);

        // ==========================================
        // УМНЫЙ ГЕНЕРАТОР ЗДАНИЙ И ОКОН
        // ==========================================
        function createBuilding(points, type, floors) {
            const group = new THREE.Group();
            
            // 1. Создаем форму (Shape) по точкам
            const shape = new THREE.Shape();
            shape.moveTo(points[0].x, points[0].y);
            for (let i = 1; i < points.length; i++) {
                shape.lineTo(points[i].x, points[i].y);
            }
            shape.lineTo(points[0].x, points[0].y); // Замыкаем

            // Настройки по типам
            let floorHeight = 3.5;
            let wallColor, baseColor, roofColor, windowColor;
            let hasParapet = true;
            let isHippedRoof = false; // Скатная крыша
            let windowWidth = 1.5, windowHeight = 1.8, windowSpacing = 1.5;

            switch(type) {
                case 'private':
                    wallColor = 0xfde68a; baseColor = 0x78350f; roofColor = 0x7f1d1d; windowColor = 0x60a5fa;
                    hasParapet = false; isHippedRoof = true; floorHeight = 4;
                    break;
                case 'mkd':
                    wallColor = 0xe2e8f0; baseColor = 0x475569; roofColor = 0x334155; windowColor = 0x3b82f6;
                    windowWidth = 2; windowSpacing = 1;
                    break;
                case 'school':
                    wallColor = 0xfcd34d; baseColor = 0x92400e; roofColor = 0x1e293b; windowColor = 0x93c5fd;
                    windowWidth = 3.5; windowSpacing = 0.8; // Широкие ленточные окна
                    break;
                case 'hospital':
                    wallColor = 0xffffff; baseColor = 0x94a3b8; roofColor = 0xcbd5e1; windowColor = 0x7dd3fc;
                    break;
            }

            const totalHeight = floors * floorHeight;

            // ЗЕМЕЛЬНЫЙ УЧАСТОК (Подложка под здание)
            const parcelGeo = new THREE.ExtrudeGeometry(shape, { depth: 0.2, bevelEnabled: false });
            const parcel = new THREE.Mesh(parcelGeo, new THREE.MeshStandardMaterial({ color: 0xbbf7d0 }));
            parcel.rotation.x = -Math.PI / 2;
            parcel.position.y = 0.1;
            parcel.receiveShadow = true;
            group.add(parcel);

            // ЦОКОЛЬ
            const baseGeo = new THREE.ExtrudeGeometry(shape, { depth: 0.8, bevelEnabled: false });
            const base = new THREE.Mesh(baseGeo, new THREE.MeshStandardMaterial({ color: baseColor }));
            base.rotation.x = -Math.PI / 2;
            base.position.y = 0.3; // Ставим на участок
            base.castShadow = true; base.receiveShadow = true;
            group.add(base);

            // СТЕНЫ
            const wallGeo = new THREE.ExtrudeGeometry(shape, { depth: totalHeight, bevelEnabled: false });
            const walls = new THREE.Mesh(wallGeo, new THREE.MeshStandardMaterial({ color: wallColor, roughness: 0.9 }));
            walls.rotation.x = -Math.PI / 2;
            walls.position.y = 1.1; // Выше цоколя
            walls.castShadow = true; walls.receiveShadow = true;
            group.add(walls);

            // КРЫША
            if (isHippedRoof && points.length === 4) {
                // Упрощенная скатная крыша для прямоугольника
                const width = Math.abs(points[0].x - points[1].x) + 1;
                const length = Math.abs(points[1].y - points[2].y) + 1;
                const roofGeo = new THREE.ConeGeometry(Math.max(width, length) * 0.7, 3, 4);
                const roof = new THREE.Mesh(roofGeo, new THREE.MeshStandardMaterial({ color: roofColor }));
                roof.position.set((points[0].x + points[1].x)/2, 1.1 + totalHeight + 1.5, -(points[1].y + points[2].y)/2);
                roof.rotation.y = Math.PI / 4;
                roof.castShadow = true;
                group.add(roof);
            } else {
                // Плоская крыша с парапетом
                if (hasParapet) {
                    const parapetGeo = new THREE.ExtrudeGeometry(shape, { depth: 1, bevelEnabled: true, bevelSize: 0.2, bevelThickness: 0.2 });
                    const parapet = new THREE.Mesh(parapetGeo, new THREE.MeshStandardMaterial({ color: roofColor }));
                    parapet.rotation.x = -Math.PI / 2;
                    parapet.position.y = 1.1 + totalHeight;
                    parapet.castShadow = true;
                    group.add(parapet);
                }
                const flatRoofGeo = new THREE.ExtrudeGeometry(shape, { depth: 0.2, bevelEnabled: false });
                const flatRoof = new THREE.Mesh(flatRoofGeo, new THREE.MeshStandardMaterial({ color: 0x1e293b }));
                flatRoof.rotation.x = -Math.PI / 2;
                flatRoof.position.y = 1.1 + totalHeight + (hasParapet ? 0.2 : 0);
                group.add(flatRoof);
            }

            // ГЕНЕРАТОР ОКОН ПО ФАСАДАМ
            const windowMat = new THREE.MeshStandardMaterial({ color: windowColor, roughness: 0.1, metalness: 0.8 });
            const winGeo = new THREE.PlaneGeometry(windowWidth, windowHeight);

            // Проходим по каждому отрезку стены
            for (let i = 0; i < points.length; i++) {
                const p1 = points[i];
                const p2 = points[(i + 1) % points.length];
                
                const dx = p2.x - p1.x;
                const dy = p2.y - p1.y;
                const length = Math.sqrt(dx*dx + dy*dy);
                
                // Вычисляем вектор нормали к стене (наружу)
                const nx = dy / length;
                const ny = -dx / length;
                const angle = Math.atan2(dy, dx);

                // Если стена достаточно длинная для окон
                const windowTotalSpace = windowWidth + windowSpacing;
                const windowCount = Math.floor(length / windowTotalSpace);
                
                if (windowCount > 0) {
                    const padding = (length - (windowCount * windowWidth + (windowCount - 1) * windowSpacing)) / 2;
                    
                    for (let f = 0; f < floors; f++) {
                        const yPos = 1.1 + (f * floorHeight) + (floorHeight / 2); // Центр этажа
                        
                        for (let w = 0; w < windowCount; w++) {
                            const offset = padding + (windowWidth / 2) + w * windowTotalSpace;
                            // Позиция окна вдоль стены
                            const wx = p1.x + (dx / length) * offset;
                            const wz = -(p1.y + (dy / length) * offset); // Z инвертирован

                            const winMesh = new THREE.Mesh(winGeo, windowMat);
                            // Сдвигаем чуть-чуть наружу по нормали, чтобы не было Z-fighting со стеной
                            winMesh.position.set(wx + nx * 0.05, yPos, wz - ny * 0.05);
                            winMesh.rotation.y = -angle; // Поворачиваем параллельно стене
                            group.add(winMesh);
                        }
                    }
                }
            }

            // Если Больница - добавляем знак на крышу
            if (type === 'hospital') {
                const crossGroup = new THREE.Group();
                const mat = new THREE.MeshStandardMaterial({ color: 0xef4444 }); // Красный
                const vBar = new THREE.Mesh(new THREE.BoxGeometry(1, 4, 1), mat);
                const hBar = new THREE.Mesh(new THREE.BoxGeometry(4, 1, 1), mat);
                crossGroup.add(vBar); crossGroup.add(hBar);
                crossGroup.position.set((points[0].x + points[2].x)/2, 1.1 + totalHeight + 3, -(points[0].y + points[2].y)/2);
                group.add(crossGroup);
            }

            return group;
        }

        // РАССТАНОВКА ОБЪЕКТОВ НА СЦЕНЕ

        // 1. Частный дом
        const ptsPrivate = [{x: -40, y: -20}, {x: -30, y: -20}, {x: -30, y: -12}, {x: -40, y: -12}];
        groups.private.add(createBuilding(ptsPrivate, 'private', 1));

        // 2. МКД (9 этажей)
        const ptsMkd = [{x: -10, y: -30}, {x: 20, y: -30}, {x: 20, y: -15}, {x: 5, y: -15}, {x: 5, y: -10}, {x: -10, y: -10}];
        groups.mkd.add(createBuilding(ptsMkd, 'mkd', 9));

        // 3. Школа (П-образная)
        const ptsSchool = [{x: -40, y: 10}, {x: -10, y: 10}, {x: -10, y: 30}, {x: -18, y: 30}, {x: -18, y: 18}, {x: -32, y: 18}, {x: -32, y: 30}, {x: -40, y: 30}];
        groups.school.add(createBuilding(ptsSchool, 'school', 3));

        // 4. Больница
        const ptsHosp = [{x: 10, y: 10}, {x: 40, y: 10}, {x: 40, y: 30}, {x: 10, y: 30}];
        groups.hospital.add(createBuilding(ptsHosp, 'hospital', 5));


        // ==========================================
        // КОМПАС (Стороны света)
        // ==========================================
        function createCompass() {
            const compGroup = new THREE.Group();
            
            // Основание компаса
            const base = new THREE.Mesh(
                new THREE.CylinderGeometry(8, 8, 0.5, 32),
                new THREE.MeshStandardMaterial({ color: 0x334155, roughness: 0.5, metalness: 0.5 })
            );
            base.position.y = 0.25;
            compGroup.add(base);

            // Стрелка
            const arrowGeo = new THREE.ConeGeometry(2, 10, 4);
            arrowGeo.translate(0, 5, 0); // Смещаем ось вращения
            arrowGeo.rotateX(Math.PI/2); // Кладем
            const arrowN = new THREE.Mesh(arrowGeo, new THREE.MeshStandardMaterial({ color: 0xef4444 })); // Красная (Север -Z)
            arrowN.position.y = 0.6;
            arrowN.rotation.y = Math.PI; // Указывает вдаль
            compGroup.add(arrowN);
            
            const arrowS = new THREE.Mesh(arrowGeo, new THREE.MeshStandardMaterial({ color: 0xffffff })); // Белая
            arrowS.position.y = 0.6;
            compGroup.add(arrowS);

            // Буквы
            const addLetter = (text, rotY, color) => {
                const canvas = document.createElement('canvas');
                canvas.width = 128; canvas.height = 128;
                const ctx = canvas.getContext('2d');
                ctx.font = 'bold 80px sans-serif';
                ctx.fillStyle = color;
                ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
                ctx.fillText(text, 64, 64);
                const sprite = new THREE.Sprite(new THREE.SpriteMaterial({ map: new THREE.CanvasTexture(canvas) }));
                sprite.scale.set(6, 6, 1);
                sprite.position.set(Math.sin(rotY) * 11, 2, Math.cos(rotY) * 11);
                compGroup.add(sprite);
            };
            addLetter('С', Math.PI, '#ef4444');
            addLetter('Ю', 0, '#1e293b');
            addLetter('В', Math.PI/2, '#1e293b');
            addLetter('З', -Math.PI/2, '#1e293b');

            compGroup.position.set(-60, 0, 60); // Левый нижний угол сцены
            return compGroup;
        }
        groups.compass.add(createCompass());

        // ==========================================
        // ИНЖЕНЕРИЯ (ГАЗОПРОВОД И ЗОУИТ)
        // ==========================================
        const gasPoints = [ new THREE.Vector3(-45, 3, 0), new THREE.Vector3(-5, 3, -5), new THREE.Vector3(35, 3, -5), new THREE.Vector3(50, 3, 20) ];
        const gasCurve = new THREE.CatmullRomCurve3(gasPoints, false, 'chordal');
        
        // Труба
        const gasPipe = new THREE.Mesh(new THREE.TubeGeometry(gasCurve, 64, 0.4, 16, false), new THREE.MeshStandardMaterial({ color: 0xfbbf24, roughness: 0.4 }));
        gasPipe.castShadow = true; groups.gas.add(gasPipe);

        // Опоры трубы
        gasCurve.getPoints(15).forEach(pt => {
            const support = new THREE.Mesh(new THREE.CylinderGeometry(0.15, 0.15, pt.y), new THREE.MeshStandardMaterial({ color: 0x94a3b8 }));
            support.position.set(pt.x, pt.y/2, pt.z); support.castShadow = true; groups.gas.add(support);
        });

        // ЗОУИТ (Туннель)
        const zouitGas = new THREE.Mesh(
            new THREE.TubeGeometry(gasCurve, 64, 4, 16, false), 
            new THREE.MeshBasicMaterial({ color: 0xfbbf24, transparent: true, opacity: 0.25, depthWrite: false })
        );
        groups.gas.add(zouitGas);

        // ==========================================
        // ИНЖЕНЕРИЯ (ЛЭП И ЗОУИТ)
        // ==========================================
        const powerPoints = [ new THREE.Vector3(50, 0, -30), new THREE.Vector3(10, 0, -40), new THREE.Vector3(-40, 0, -40) ];
        const poleHeight = 15;

        powerPoints.forEach((pt, index) => {
            const poleGroup = new THREE.Group();
            const pole = new THREE.Mesh(new THREE.CylinderGeometry(0.3, 0.5, poleHeight, 12), new THREE.MeshStandardMaterial({ color: 0x5c4033 }));
            pole.position.y = poleHeight / 2; pole.castShadow = true; poleGroup.add(pole);

            const crossArm = new THREE.Mesh(new THREE.BoxGeometry(5, 0.3, 0.3), new THREE.MeshStandardMaterial({ color: 0x475569 }));
            crossArm.position.y = poleHeight - 1;
            
            // Направление траверсы
            if (index < powerPoints.length - 1) crossArm.rotation.y = Math.atan2(powerPoints[index+1].x - pt.x, powerPoints[index+1].z - pt.z);
            else crossArm.rotation.y = Math.atan2(pt.x - powerPoints[index-1].x, pt.z - powerPoints[index-1].z);
            
            poleGroup.add(crossArm);
            poleGroup.position.set(pt.x, 0, pt.z);
            groups.power.add(poleGroup);
        });

        // Провода с дугой
        const wireMat = new THREE.LineBasicMaterial({ color: 0x1e293b });
        for(let i = 0; i < powerPoints.length - 1; i++) {
            const p1 = powerPoints[i].clone(); p1.y = poleHeight - 1;
            const p2 = powerPoints[i+1].clone(); p2.y = poleHeight - 1;
            const mid = new THREE.Vector3().addVectors(p1, p2).multiplyScalar(0.5);
            mid.y -= 3; // Провисание
            
            groups.power.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints(new THREE.QuadraticBezierCurve3(new THREE.Vector3(p1.x+2, p1.y, p1.z), new THREE.Vector3(mid.x+2, mid.y, mid.z), new THREE.Vector3(p2.x+2, p2.y, p2.z)).getPoints(20)), wireMat));
            groups.power.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints(new THREE.QuadraticBezierCurve3(new THREE.Vector3(p1.x-2, p1.y, p1.z), new THREE.Vector3(mid.x-2, mid.y, mid.z), new THREE.Vector3(p2.x-2, p2.y, p2.z)).getPoints(20)), wireMat));
        }

        // ЗОУИТ ЛЭП (Коридор)
        const powerCurve = new THREE.CatmullRomCurve3(powerPoints.map(p => new THREE.Vector3(p.x, poleHeight/2, p.z)), false, 'chordal');
        const zouitPower = new THREE.Mesh(
            new THREE.TubeGeometry(powerCurve, 64, 8, 16, false), 
            new THREE.MeshBasicMaterial({ color: 0xf472b6, transparent: true, opacity: 0.2, depthWrite: false })
        );
        groups.power.add(zouitPower);

        // ==========================================
        // ЛОГИКА UI И АНИМАЦИЯ
        // ==========================================
        document.getElementById('l-private').addEventListener('change', e => groups.private.visible = e.target.checked);
        document.getElementById('l-mkd').addEventListener('change', e => groups.mkd.visible = e.target.checked);
        document.getElementById('l-school').addEventListener('change', e => groups.school.visible = e.target.checked);
        document.getElementById('l-hospital').addEventListener('change', e => groups.hospital.visible = e.target.checked);
        document.getElementById('l-gas').addEventListener('change', e => groups.gas.visible = e.target.checked);
        document.getElementById('l-power').addEventListener('change', e => groups.power.visible = e.target.checked);
        document.getElementById('l-compass').addEventListener('change', e => groups.compass.visible = e.target.checked);

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
