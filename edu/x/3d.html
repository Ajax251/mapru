<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Кадастровая визуализация - Демо</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #87CEEB; /* Цвет неба */
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
            display: block;
        }
        /* Стили панели управления */
        #ui-panel {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.9);
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.2);
            backdrop-filter: blur(10px);
            width: 250px;
            z-index: 100;
        }
        h3 { margin-top: 0; margin-bottom: 15px; color: #1e293b; font-size: 16px; border-bottom: 2px solid #3b82f6; padding-bottom: 8px;}
        .layer-control {
            display: flex;
            align-items: center;
            margin-bottom: 10px;
            cursor: pointer;
        }
        .layer-control input {
            margin-right: 10px;
            cursor: pointer;
            width: 16px;
            height: 16px;
        }
        .layer-control label { cursor: pointer; font-size: 14px; color: #334155; }
        .color-box {
            width: 14px; height: 14px; display: inline-block; margin-right: 8px; border-radius: 3px; border: 1px solid rgba(0,0,0,0.2);
        }
        .info-text {
            position: absolute;
            bottom: 20px; left: 20px;
            background: rgba(0, 0, 0, 0.6); color: white;
            padding: 10px 15px; border-radius: 8px;
            font-size: 13px; pointer-events: none;
        }
    </style>
    <!-- Import maps polyfill for modern Three.js usage -->
    <script async src="https://unpkg.com/es-module-shims@1.8.0/dist/es-module-shims.js"></script>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>

    <div id="canvas-container"></div>

    <div id="ui-panel">
        <h3>Слои 3D сцены</h3>
        <div class="layer-control">
            <input type="checkbox" id="layer-zu" checked>
            <div class="color-box" style="background: #a8d5ba;"></div>
            <label for="layer-zu">Земельный участок</label>
        </div>
        <div class="layer-control">
            <input type="checkbox" id="layer-oks" checked>
            <div class="color-box" style="background: #e2e8f0;"></div>
            <label for="layer-oks">ОКС (Жилой дом)</label>
        </div>
        <div class="layer-control">
            <input type="checkbox" id="layer-gas" checked>
            <div class="color-box" style="background: #fbbf24;"></div>
            <label for="layer-gas">Надземный газопровод</label>
        </div>
        <div class="layer-control">
            <input type="checkbox" id="layer-water" checked>
            <div class="color-box" style="background: #3b82f6;"></div>
            <label for="layer-water">Подземный водопровод</label>
        </div>
        <div class="layer-control">
            <input type="checkbox" id="layer-zouit-gas" checked>
            <div class="color-box" style="background: rgba(251, 191, 36, 0.4);"></div>
            <label for="layer-zouit-gas">ЗОУИТ (Газ)</label>
        </div>
        <div class="layer-control">
            <input type="checkbox" id="layer-zouit-power" checked>
            <div class="color-box" style="background: rgba(168, 85, 247, 0.4);"></div>
            <label for="layer-zouit-power">ЗОУИТ (ЛЭП)</label>
        </div>
    </div>

    <div class="info-text">
        🖱️ Левая кнопка: вращение | 🖱️ Правая кнопка: перемещение | 🖱️ Колесико: масштаб
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        // 1. БАЗОВАЯ НАСТРОЙКА СЦЕНЫ
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB); // Небо
        scene.fog = new THREE.Fog(0x87CEEB, 50, 150); // Легкая дымка на горизонте

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(30, 25, 40); // Начальная позиция камеры

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        container.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.maxPolarAngle = Math.PI / 2 + 0.2; // Позволяем заглянуть чуть под землю

        // 2. ОСВЕЩЕНИЕ
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 1.2);
        dirLight.position.set(20, 40, 20);
        dirLight.castShadow = true;
        dirLight.shadow.camera.top = 30;
        dirLight.shadow.camera.bottom = -30;
        dirLight.shadow.camera.left = -30;
        dirLight.shadow.camera.right = 30;
        dirLight.shadow.mapSize.width = 2048;
        dirLight.shadow.mapSize.height = 2048;
        scene.add(dirLight);

        // 3. ГРУППЫ ОБЪЕКТОВ (СЛОИ)
        const groups = {
            zu: new THREE.Group(),
            oks: new THREE.Group(),
            gas: new THREE.Group(),
            water: new THREE.Group(),
            zouitGas: new THREE.Group(),
            zouitPower: new THREE.Group()
        };
        for (let key in groups) scene.add(groups[key]);

        // 4. СОЗДАНИЕ ОБЪЕКТОВ
        
        // Поверхность земли (полупрозрачная, чтобы видеть подземные коммуникации)
        const groundGeo = new THREE.PlaneGeometry(200, 200);
        const groundMat = new THREE.MeshStandardMaterial({ 
            color: 0xe8e6d9, 
            transparent: true, 
            opacity: 0.8,
            depthWrite: false // Чтобы сетка рисовалась поверх
        });
        const ground = new THREE.Mesh(groundGeo, groundMat);
        ground.rotation.x = -Math.PI / 2;
        ground.receiveShadow = true;
        scene.add(ground);

        // Сетка координат
        const grid = new THREE.GridHelper(200, 100, 0x000000, 0x000000);
        grid.material.opacity = 0.1;
        grid.material.transparent = true;
        scene.add(grid);

        // --- ЗЕМЕЛЬНЫЙ УЧАСТОК ---
        const parcelShape = new THREE.Shape();
        parcelShape.moveTo(-10, -15);
        parcelShape.lineTo(10, -15);
        parcelShape.lineTo(15, 5);
        parcelShape.lineTo(5, 15);
        parcelShape.lineTo(-12, 10);
        parcelShape.lineTo(-10, -15);

        const extrudeSettings = { depth: 0.5, bevelEnabled: false };
        const parcelGeo = new THREE.ExtrudeGeometry(parcelShape, extrudeSettings);
        const parcelMat = new THREE.MeshStandardMaterial({ color: 0xa8d5ba, roughness: 0.8 });
        const parcel = new THREE.Mesh(parcelGeo, parcelMat);
        parcel.rotation.x = Math.PI / 2; // Кладем плашмя
        parcel.position.y = 0.5; // Чуть приподнимаем над сеткой
        parcel.receiveShadow = true;
        
        // Добавляем обводку участку
        const edges = new THREE.EdgesGeometry(parcelGeo);
        const line = new THREE.LineSegments(edges, new THREE.LineBasicMaterial({ color: 0x2e7d32, linewidth: 2 }));
        parcel.add(line);
        groups.zu.add(parcel);

        // --- ОКС (ДОМ) ---
        // Стены
        const houseWidth = 8, houseLength = 10, houseHeight = 4;
        const houseGeo = new THREE.BoxGeometry(houseWidth, houseHeight, houseLength);
        const houseMat = new THREE.MeshStandardMaterial({ color: 0xe2e8f0, roughness: 0.9 });
        const house = new THREE.Mesh(houseGeo, houseMat);
        house.position.set(-2, houseHeight/2 + 0.5, -2);
        house.castShadow = true; house.receiveShadow = true;
        
        // Крыша
        const roofGeo = new THREE.ConeGeometry(7, 3, 4);
        const roofMat = new THREE.MeshStandardMaterial({ color: 0x7f1d1d });
        const roof = new THREE.Mesh(roofGeo, roofMat);
        roof.position.y = houseHeight/2 + 1.5;
        roof.rotation.y = Math.PI / 4; // Поворачиваем под 45 град для квадрата
        roof.castShadow = true;
        house.add(roof);
        
        // Окно (просто для декорации)
        const winGeo = new THREE.PlaneGeometry(1.5, 1.5);
        const winMat = new THREE.MeshBasicMaterial({ color: 0x60a5fa });
        const window1 = new THREE.Mesh(winGeo, winMat);
        window1.position.set(0, 0.5, houseLength/2 + 0.01);
        house.add(window1);

        groups.oks.add(house);

        // --- СООРУЖЕНИЕ 1 (Надземный газопровод) ---
        const pipePoints = [
            new THREE.Vector3(-20, 2, 8),
            new THREE.Vector3(-5, 2, 12),
            new THREE.Vector3(20, 2, -2)
        ];
        const pipePath = new THREE.CatmullRomCurve3(pipePoints);
        const pipeGeo = new THREE.TubeGeometry(pipePath, 20, 0.3, 8, false);
        const pipeMat = new THREE.MeshStandardMaterial({ color: 0xfbbf24, metalness: 0.3, roughness: 0.4 });
        const gasPipe = new THREE.Mesh(pipeGeo, pipeMat);
        gasPipe.castShadow = true;
        
        // Опоры трубы
        pipePoints.forEach(pt => {
            const supportGeo = new THREE.CylinderGeometry(0.1, 0.1, pt.y);
            const supportMat = new THREE.MeshStandardMaterial({ color: 0x94a3b8 });
            const support = new THREE.Mesh(supportGeo, supportMat);
            support.position.set(pt.x, pt.y/2, pt.z);
            support.castShadow = true;
            gasPipe.add(support);
        });
        groups.gas.add(gasPipe);

        // --- СООРУЖЕНИЕ 2 (Подземный водопровод) ---
        const waterPoints = [
            new THREE.Vector3(-15, -2, -10),
            new THREE.Vector3(0, -2, -5),
            new THREE.Vector3(5, -2, -18)
        ];
        const waterPath = new THREE.CatmullRomCurve3(waterPoints);
        const waterGeo = new THREE.TubeGeometry(waterPath, 20, 0.4, 8, false);
        const waterMat = new THREE.MeshStandardMaterial({ color: 0x3b82f6 }); // Синий
        const waterPipe = new THREE.Mesh(waterGeo, waterMat);
        groups.water.add(waterPipe);

        // --- ЗОУИТ 1 (Охранная зона газопровода - объем вокруг трубы) ---
        const zouitGasGeo = new THREE.TubeGeometry(pipePath, 20, 2.5, 12, false); // Радиус охранной зоны 2.5м
        const zouitGasMat = new THREE.MeshBasicMaterial({ 
            color: 0xfbbf24, 
            transparent: true, 
            opacity: 0.2, 
            side: THREE.DoubleSide,
            depthWrite: false
        });
        const zouitGasVolume = new THREE.Mesh(zouitGasGeo, zouitGasMat);
        groups.zouitGas.add(zouitGasVolume);

        // --- ЗОУИТ 2 (Охранная зона ЛЭП - Площадная) ---
        // Имитируем прохождение ЛЭП по краю участка
        const lzShape = new THREE.Shape();
        lzShape.moveTo(5, -20);
        lzShape.lineTo(25, -20);
        lzShape.lineTo(25, 20);
        lzShape.lineTo(5, 20);
        const lzGeo = new THREE.ExtrudeGeometry(lzShape, { depth: 10, bevelEnabled: false }); // Высота зоны 10м
        const lzMat = new THREE.MeshBasicMaterial({ 
            color: 0xa855f7, // Фиолетовый
            transparent: true, 
            opacity: 0.15,
            side: THREE.DoubleSide,
            depthWrite: false
        });
        const zouitPower = new THREE.Mesh(lzGeo, lzMat);
        zouitPower.rotation.x = Math.PI / 2;
        zouitPower.position.y = 0;
        
        // Линия ЛЭП (визуальная)
        const powerWireGeo = new THREE.CylinderGeometry(0.05, 0.05, 40);
        const powerWireMat = new THREE.MeshBasicMaterial({ color: 0x000000 });
        const wire = new THREE.Mesh(powerWireGeo, powerWireMat);
        wire.rotation.x = Math.PI / 2;
        wire.position.set(15, 8, 0); // По центру ЗОУИТ, на высоте 8м
        zouitPower.add(wire);

        groups.zouitPower.add(zouitPower);


        // 5. ОБРАБОТКА ИНТЕРФЕЙСА (Чекбоксы)
        document.getElementById('layer-zu').addEventListener('change', (e) => groups.zu.visible = e.target.checked);
        document.getElementById('layer-oks').addEventListener('change', (e) => groups.oks.visible = e.target.checked);
        document.getElementById('layer-gas').addEventListener('change', (e) => groups.gas.visible = e.target.checked);
        document.getElementById('layer-water').addEventListener('change', (e) => groups.water.visible = e.target.checked);
        document.getElementById('layer-zouit-gas').addEventListener('change', (e) => groups.zouitGas.visible = e.target.checked);
        document.getElementById('layer-zouit-power').addEventListener('change', (e) => groups.zouitPower.visible = e.target.checked);

        // 6. АНИМАЦИЯ И РЕНДЕРИНГ
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        function animate() {
            requestAnimationFrame(animate);
            controls.update(); // Требуется для плавности (damping)
            renderer.render(scene, camera);
        }

        animate();
    </script>
</body>
</html>
