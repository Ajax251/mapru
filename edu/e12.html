<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>ISS Orbital Command</title>
    <script src="https://api-maps.yandex.ru/2.1/?apikey=dde71a0e-b612-44b7-b53b-82533420240f&lang=ru_RU" type="text/javascript"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&family=Space+Mono:wght@400;700&display=swap');

        :root {
            --neon: #00ff66;
            --neon-dim: rgba(0, 255, 102, 0.15);
            --bg: rgba(5, 15, 10, 0.7);
            --ms: 1;
        }

        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; font-family: 'Rajdhani', sans-serif; color: white; user-select: none; }
        canvas { display: block; width: 100%; height: 100%; outline: none; }

        /* UI Overlays */
        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10; display: flex; flex-direction: column; justify-content: space-between; padding: 20px; box-sizing: border-box; }
        .panel { background: var(--bg); backdrop-filter: blur(10px); border: 1px solid rgba(0, 255, 102, 0.4); border-radius: 8px; padding: 15px; pointer-events: auto; box-shadow: 0 0 20px rgba(0, 255, 102, 0.15); }
        
        /* Top Bar */
        #top-bar { display: flex; justify-content: space-between; align-items: flex-start; }
        .title { font-size: 24px; font-weight: 700; color: var(--neon); text-transform: uppercase; letter-spacing: 2px; margin-bottom: 5px; text-shadow: 0 0 10px var(--neon); }
        
        /* Telemetry */
        #telemetry { display: grid; grid-template-columns: 1fr 1fr; gap: 10px 20px; font-size: 16px; margin-bottom: 10px;}
        .tel-label { color: rgba(255,255,255,0.7); text-transform: uppercase; font-size: 12px; letter-spacing: 1px;}
        .tel-val { font-weight: 600; font-size: 18px; font-variant-numeric: tabular-nums; font-family: 'Space Mono', monospace; color: #fff;}
        
        /* Location Bar */
        .location-box { background: var(--neon-dim); border: 1px solid rgba(0, 255, 102, 0.5); padding: 8px 12px; border-radius: 4px; margin-top: 10px; }
        .location-title { font-size: 11px; color: var(--neon); text-transform: uppercase; letter-spacing: 1px; }
        .location-name { font-size: 18px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 300px; color: #fff; text-shadow: 0 0 8px var(--neon); }

        /* Cameras */
        #camera-controls { display: flex; gap: 10px; flex-wrap: wrap; justify-content: flex-end; max-width: 450px; pointer-events: auto; }
        .cam-btn { background: rgba(0,20,10,0.8); border: 1px solid var(--neon); color: var(--neon); padding: 8px 15px; font-family: inherit; font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.2s; border-radius: 4px; text-transform: uppercase; }
        .cam-btn:hover, .cam-btn.active { background: var(--neon); color: #000; box-shadow: 0 0 15px var(--neon); }
        .cam-map-btn { border-color: #ff2a2a; color: #ff2a2a; font-weight: 700;}
        .cam-map-btn:hover, .cam-map-btn.active { background: #ff2a2a; color: white; box-shadow: 0 0 15px #ff2a2a; }

        /* Bottom Bar */
        #bottom-bar { display: flex; justify-content: space-between; align-items: flex-end; pointer-events: none;}
        #status-sys { color: var(--neon); font-weight: 600; letter-spacing: 1px; animation: pulse 2s infinite; font-family: 'Space Mono', monospace; font-size: 12px; }
        @keyframes pulse { 0% {opacity:0.6;} 50% {opacity:1;} 100% {opacity:0.6;} }

        /* Switch Galaxy */
        .switch-container { display: flex; align-items: center; gap: 10px; font-size: 14px; font-weight: 600; text-transform: uppercase; color: #fff; pointer-events: auto; }
        .switch { position: relative; width: 44px; height: 24px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: rgba(255,255,255,0.2); border-radius: 34px; transition: .3s; border: 1px solid rgba(255,255,255,0.3); }
        .slider:before { position: absolute; content: ""; height: 16px; width: 16px; left: 3px; bottom: 3px; background: #fff; border-radius: 50%; transition: .3s; }
        input:checked + .slider { background-color: var(--neon-dim); border-color: var(--neon); }
        input:checked + .slider:before { transform: translateX(20px); background: var(--neon); box-shadow: 0 0 10px var(--neon); }

        /* --- NADIR MAP OVERLAY --- */
        #nadir-map-container {
            position: absolute; top: 5%; left: 5%; width: 90%; height: 90%;
            background: #051105; border: 2px solid var(--neon); border-radius: 12px;
            display: none; z-index: 50; overflow: hidden; pointer-events: auto;
            box-shadow: 0 0 50px rgba(0, 255, 102, 0.3);
        }
        #ymap-instance { width: 100%; height: 100%; }
        
        .map-ui-top { position: absolute; top: 15px; right: 15px; display: flex; gap: 10px; z-index: 101; }
        .map-selector { 
            background: rgba(0,0,0,0.8); color: var(--neon); border: 1px solid var(--neon); 
            padding: 5px 10px; font-family: 'Rajdhani', sans-serif; font-weight: 600; font-size: 14px;
            border-radius: 4px; outline: none; cursor: pointer;
        }
        .map-selector option { background: #000; color: #fff; }
        .map-close-btn { background: rgba(0,0,0,0.8); color: var(--neon); border: 1px solid var(--neon); border-radius: 4px; width: 32px; height: 32px; font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.2s; }
        .map-close-btn:hover { background: var(--neon); color: #000; box-shadow: 0 0 10px var(--neon); }

        /* Hide Yandex copyrights */
        [class*="copyright"], [class*="promo"] { display: none !important; }

        /* Center Crosshair */
        .center-marker { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); pointer-events: none; z-index: 100; color: var(--neon); animation: marker-breathe 2.8s ease-in-out infinite; }
        @keyframes marker-breathe { 0%,100%{opacity:.97} 50%{opacity:.52} }
        .center-marker.type-cross { width: 0; height: 0; filter: drop-shadow(0 0 5px currentColor) drop-shadow(0 0 2px rgba(0,0,0,.6)); }
        .center-marker.type-cross::before, .center-marker.type-cross::after { content: ''; position: absolute; background: currentColor; border-radius: 1px; }
        .center-marker.type-cross::before { width: calc(36px * var(--ms)); height: calc(3px * var(--ms)); top: calc(-1.5px * var(--ms)); left: calc(-18px * var(--ms)); box-shadow: 0 0 0 1px rgba(0,0,0,.5); }
        .center-marker.type-cross::after { width: calc(3px * var(--ms)); height: calc(36px * var(--ms)); top: calc(-18px * var(--ms)); left: calc(-1.5px * var(--ms)); box-shadow: 0 0 0 1px rgba(0,0,0,.5); }
        .mdot { position: absolute; width: calc(6px * var(--ms)); height: calc(6px * var(--ms)); background: currentColor; border-radius: 50%; top: 50%; left: 50%; transform: translate(-50%,-50%); border: 1.5px solid rgba(0,0,0,.8); box-shadow: 0 0 0 1.5px rgba(0,255,102,.3); }
        
        #toast-container { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); z-index: 9999; display: flex; flex-direction: column; gap: 10px; pointer-events: none; }
        .toast { background: var(--neon-dim); border: 1px solid var(--neon); backdrop-filter: blur(8px); padding: 10px 20px; border-radius: 8px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; animation: slideUp 0.3s ease-out forwards; color: #fff; text-shadow: 0 0 5px var(--neon);}
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        #loading { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 24px; color: var(--neon); letter-spacing: 5px; text-transform: uppercase; z-index: 100; text-shadow: 0 0 20px var(--neon); font-family: 'Space Mono', monospace;}
    </style>
</head>
<body>

    <div id="loading">УСТАНОВКА СОЕДИНЕНИЯ...</div>

    <!-- Модуль НАДИР (2D Карта) -->
    <div id="nadir-map-container">
        <div class="map-ui-top">
            <select class="map-selector" id="map-layer-select">
                <option value="google#hybrid">Google Гибрид</option>
                <option value="google#map">Google Схема</option>
                <option value="yandex#satellite">Яндекс Спутник</option>
                <option value="yandex#hybrid">Яндекс Гибрид</option>
                <option value="yandex#map">Яндекс Схема</option>
            </select>
            <button class="map-close-btn" id="close-map">✕</button>
        </div>
        <div class="center-marker type-cross"><div class="mdot"></div></div>
        <div id="ymap-instance"></div>
    </div>

    <!-- UI -->
    <div id="ui-layer">
        <div id="top-bar">
            <div class="panel" style="pointer-events: auto;">
                <div class="title">ISS ORBITAL COMMAND</div>
                <div id="telemetry">
                    <div><div class="tel-label">Широта (LAT)</div><div class="tel-val" id="hud-lat">0.0000°</div></div>
                    <div><div class="tel-label">Долгота (LON)</div><div class="tel-val" id="hud-lon">0.0000°</div></div>
                    <div><div class="tel-label">Высота (ALT)</div><div class="tel-val" id="hud-alt">0.0 km</div></div>
                    <div><div class="tel-label">Скорость (VEL)</div><div class="tel-val" id="hud-vel">0 km/h</div></div>
                </div>
                <div class="location-box">
                    <div class="location-title">ЛОКАЦИЯ (НАДИР)</div>
                    <div class="location-name" id="hud-location">Ожидание телеметрии...</div>
                </div>
            </div>
            
            <div id="camera-controls">
                <button class="cam-btn" data-cam="free">Внешняя (EVA)</button>
                <button class="cam-btn" data-cam="forward">Вперед</button>
                <button class="cam-btn" data-cam="panels">Панели</button>
                <button class="cam-btn" data-cam="moon">Слежение за Луной</button>
                <button class="cam-btn cam-map-btn" id="btn-nadir">Карта (Nadir)</button>
            </div>
        </div>

        <div id="bottom-bar">
            <div class="panel" style="padding: 10px 20px;">
                <span id="status-sys">SYSTEMS GREEN • TELEMETRY LINK ACTIVE</span>
            </div>
            <div class="panel switch-container">
                <span>🌌 Галактика</span>
                <label class="switch">
                    <input type="checkbox" id="chk-galaxy">
                    <span class="slider"></span>
                </label>
            </div>
        </div>
    </div>

    <div id="toast-container"></div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/astronomy-engine@2.1.19/astronomy.browser.min.js"></script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { Lensflare, LensflareElement } from 'three/addons/objects/Lensflare.js';
        import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
        import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
        import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';

        // --- УПРАВЛЕНИЕ НАСТРОЙКАМИ (LocalStorage) ---
        const LS_KEY = 'iss_simulator_settings';
        let settings = JSON.parse(localStorage.getItem(LS_KEY)) || {
            cam: 'free',
            galaxy: true,
            mapType: 'google#hybrid'
        };

        function saveSettings() {
            localStorage.setItem(LS_KEY, JSON.stringify(settings));
        }

        const R_EARTH = 63.71; 
        let issData = { lat: 0, lon: 0, alt: 400, vel: 27000, vis: 'daylight' };
        let currentCam = settings.cam;
        let yandexMap = null;
        let isMapReady = false;

        // Применяем настройки к UI
        document.getElementById('chk-galaxy').checked = settings.galaxy;
        document.getElementById('map-layer-select').value = settings.mapType;
        document.querySelectorAll('.cam-btn').forEach(b => {
            if (b.dataset.cam === currentCam) b.classList.add('active');
        });

        // --- ТОСТЫ УВЕДОМЛЕНИЙ ---
        function showToast(message) {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.innerText = message;
            container.appendChild(toast);
            setTimeout(() => { toast.remove(); }, 3000);
        }

        // --- ИНИЦИАЛИЗАЦИЯ YANDEX MAPS ---
        ymaps.ready(() => {
            const proj = ymaps.projection.sphericalMercator;
            // Добавляем Google слои
            ymaps.layer.storage.add('google#map', function() { return new ymaps.Layer('https://mt1.google.com/vt/lyrs=m&x=%x&y=%y&z=%z&hl=ru', {projection: proj}); });
            ymaps.layer.storage.add('google#satellite', function() { return new ymaps.Layer('https://mt1.google.com/vt/lyrs=s&x=%x&y=%y&z=%z&hl=ru', {projection: proj}); });
            ymaps.layer.storage.add('google#hybrid', function() { return new ymaps.Layer('https://mt1.google.com/vt/lyrs=y&x=%x&y=%y&z=%z&hl=ru', {projection: proj}); });
            ymaps.mapType.storage.add('google#map', new ymaps.MapType('Google Схема', ['google#map']));
            ymaps.mapType.storage.add('google#hybrid', new ymaps.MapType('Google Гибрид', ['google#hybrid']));
            
            yandexMap = new ymaps.Map('ymap-instance', {
                center: [0, 0],
                zoom: 5,
                type: settings.mapType,
                controls: ['zoomControl']
            }, { suppressMapOpenBlock: true });

            isMapReady = true;

            // Обработчик смены типа карты
            document.getElementById('map-layer-select').addEventListener('change', (e) => {
                settings.mapType = e.target.value;
                yandexMap.setType(settings.mapType);
                saveSettings();
            });
        });

        // --- ИНИЦИАЛИЗАЦИЯ 3D СЦЕНЫ ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x000000); 

        const renderer = new THREE.WebGLRenderer({ antialias: false, powerPreference: "high-performance" });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.2;
        renderer.logarithmicDepthBuffer = true;
        document.body.appendChild(renderer.domElement);

        const renderScene = new RenderPass(scene, new THREE.PerspectiveCamera());
        const bloomPass = new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 1.2, 0.5, 0.85);
        const composer = new EffectComposer(renderer);
        composer.addPass(renderScene);
        composer.addPass(bloomPass);

        // --- ЗАГРУЗКА ТЕКСТУР ---
        const textureLoader = new THREE.TextureLoader();
        textureLoader.setCrossOrigin("anonymous");
        
        const tEarthColor = textureLoader.load('https://raw.githubusercontent.com/mrdoob/three.js/master/examples/textures/planets/earth_atmos_2048.jpg');
        const tEarthNormal = textureLoader.load('https://raw.githubusercontent.com/mrdoob/three.js/master/examples/textures/planets/earth_normal_2048.jpg');
        const tEarthSpec = textureLoader.load('https://raw.githubusercontent.com/mrdoob/three.js/master/examples/textures/planets/earth_specular_2048.jpg');
        const tClouds = textureLoader.load('https://raw.githubusercontent.com/mrdoob/three.js/master/examples/textures/planets/earth_clouds_1024.png');
        const tMoon = textureLoader.load('https://raw.githubusercontent.com/mrdoob/three.js/master/examples/textures/planets/moon_1024.jpg');
        
        tEarthColor.colorSpace = THREE.SRGBColorSpace;
        tMoon.colorSpace = THREE.SRGBColorSpace;

        const earthGroup = new THREE.Group();
        scene.add(earthGroup);

        // Нормальная Земля
        const earthGeo = new THREE.SphereGeometry(R_EARTH, 64, 64);
        const earthMat = new THREE.MeshPhongMaterial({ map: tEarthColor, normalMap: tEarthNormal, normalScale: new THREE.Vector2(0.8, 0.8), specularMap: tEarthSpec, specular: new THREE.Color(0x333333), shininess: 25 });
        const earthMesh = new THREE.Mesh(earthGeo, earthMat);
        earthGroup.add(earthMesh);

        const cloudsMat = new THREE.MeshPhongMaterial({ map: tClouds, transparent: true, opacity: 0.8, blending: THREE.AdditiveBlending, depthWrite: false });
        const cloudsMesh = new THREE.Mesh(new THREE.SphereGeometry(R_EARTH + 0.1, 64, 64), cloudsMat);
        earthGroup.add(cloudsMesh);

        const atmoMat = new THREE.ShaderMaterial({
            vertexShader: `varying vec3 vN; varying vec3 vP; void main(){ vN=normalize(normalMatrix*normal); vP=normalize((modelViewMatrix*vec4(position,1.0)).xyz); gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.0); }`,
            fragmentShader: `uniform vec3 sunDirection; varying vec3 vN; varying vec3 vP; void main(){ float i=pow(0.6-dot(vN,vP),3.5); float sunDot=dot(vN,sunDirection); vec3 finalColor=mix(vec3(1.0,0.4,0.1), vec3(0.3,0.6,1.0), smoothstep(-0.2,0.2,sunDot)); float fade=smoothstep(-0.4,0.1,sunDot); gl_FragColor=vec4(finalColor,i*fade*1.5); }`,
            uniforms: { sunDirection: { value: new THREE.Vector3(1, 0, 0) } },
            transparent: true, blending: THREE.AdditiveBlending, side: THREE.BackSide, depthWrite: false
        });
        const atmosphere = new THREE.Mesh(new THREE.SphereGeometry(R_EARTH + 1.2, 64, 64), atmoMat);
        earthGroup.add(atmosphere);

        // X-Ray Земля (Каркас)
        const xrayMat = new THREE.MeshBasicMaterial({ color: 0x00ff66, wireframe: true, transparent: true, opacity: 0.15 });
        const earthXray = new THREE.Mesh(new THREE.SphereGeometry(R_EARTH, 32, 32), xrayMat);
        earthXray.visible = false;
        scene.add(earthXray);

        // Млечный путь
        const mwMat = new THREE.MeshBasicMaterial({ map: textureLoader.load('./textures/milkyway.jpg'), side: THREE.BackSide, transparent: true, opacity: 0.5, depthWrite: false });
        const milkyWay = new THREE.Mesh(new THREE.SphereGeometry(5000, 64, 64), mwMat);
        milkyWay.visible = settings.galaxy;
        scene.add(milkyWay);

        document.getElementById('chk-galaxy').addEventListener('change', (e) => {
            milkyWay.visible = e.target.checked;
            settings.galaxy = e.target.checked;
            saveSettings();
        });

        // ЛУНА
        const moonGeo = new THREE.SphereGeometry(17.37, 64, 64); // Реальные пропорции R_MOON
        const moonMat = new THREE.MeshStandardMaterial({ map: tMoon, roughness: 0.8, metalness: 0.1 });
        const moon = new THREE.Mesh(moonGeo, moonMat);
        scene.add(moon);

        // --- МКС ---
        const iss = new THREE.Group();
        scene.add(iss);

        const matMetal = new THREE.MeshStandardMaterial({ color: 0xdddddd, metalness: 0.9, roughness: 0.3 });
        const matDarkMetal = new THREE.MeshStandardMaterial({ color: 0x444444, metalness: 0.8, roughness: 0.5 });
        const matGold = new THREE.MeshStandardMaterial({ color: 0xffaa00, metalness: 1.0, roughness: 0.2 });
        const matPanel = new THREE.MeshStandardMaterial({ color: 0x051530, metalness: 0.6, roughness: 0.1, side: THREE.DoubleSide });

        const truss = new THREE.Mesh(new THREE.BoxGeometry(2.0, 0.1, 0.1), matDarkMetal); truss.userData = { name: "Главная ферма" }; iss.add(truss);
        const core1 = new THREE.Mesh(new THREE.CylinderGeometry(0.08, 0.08, 0.6, 16), matMetal); core1.rotation.x = Math.PI/2; core1.userData = { name: "Дестини" }; iss.add(core1);
        const core2 = new THREE.Mesh(new THREE.CylinderGeometry(0.06, 0.06, 0.4, 16), matGold); core2.rotation.x = Math.PI/2; core2.position.z = 0.5; core2.userData = { name: "Заря" }; iss.add(core2);

        const panels = [];
        function createSolarArray(x, z) {
            const group = new THREE.Group(); group.position.set(x, 0, z);
            const joint = new THREE.Mesh(new THREE.BoxGeometry(0.05, 0.05, 0.2), matDarkMetal);
            const p1 = new THREE.Mesh(new THREE.BoxGeometry(0.3, 1.2, 0.01), matPanel); p1.position.y = 0.65;
            const p2 = new THREE.Mesh(new THREE.BoxGeometry(0.3, 1.2, 0.01), matPanel); p2.position.y = -0.65;
            p1.userData = { name: "Панель" }; p2.userData = { name: "Панель" }; group.add(joint, p1, p2); return group;
        }
        panels.push(createSolarArray(0.8, 0.1)); panels.push(createSolarArray(0.5, 0.1)); panels.push(createSolarArray(-0.8, 0.1)); panels.push(createSolarArray(-0.5, 0.1));
        panels.forEach(p => iss.add(p));

        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();
        window.addEventListener('pointerdown', (e) => {
            if(e.target.tagName !== 'CANVAS' || currentCam !== 'free') return;
            mouse.x = (e.clientX / window.innerWidth) * 2 - 1; mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
            raycaster.setFromCamera(mouse, cameras.free);
            const intersects = raycaster.intersectObjects(iss.children, true);
            if(intersects.length > 0) {
                let obj = intersects[0].object; while(obj && !obj.userData.name && obj.parent) { obj = obj.parent; }
                if(obj && obj.userData.name) showToast(`ДАТЧИК: ${obj.userData.name}`);
            }
        });

        // --- КАМЕРЫ ---
        const cameras = {
            free: new THREE.PerspectiveCamera(50, window.innerWidth/window.innerHeight, 0.01, 15000),
            forward: new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 0.01, 15000),
            panels: new THREE.PerspectiveCamera(55, window.innerWidth/window.innerHeight, 0.01, 15000),
            moon: new THREE.PerspectiveCamera(30, window.innerWidth/window.innerHeight, 0.01, 15000)
        };
        
        // Вперед (Forward)
        cameras.forward.position.set(0, 0.3, 1.0); 
        cameras.forward.lookAt(0, 0, 10);
        iss.add(cameras.forward);

        // Панели
        cameras.panels.position.set(-1.0, 0.2, -0.2); 
        cameras.panels.lookAt(0, 0, 0); 
        iss.add(cameras.panels);

        // Свободная и Луна привязаны к сцене, но следят за объектами в animate()
        cameras.free.position.set(0.5, 0.5, 1.5);
        renderScene.camera = cameras[currentCam];

        const controls = new OrbitControls(cameras.free, renderer.domElement);
        controls.enableDamping = true; controls.minDistance = 0.2; controls.maxDistance = 10;

        // --- СВЕТ ---
        scene.add(new THREE.AmbientLight(0x202530, 0.5));
        const sunLight = new THREE.DirectionalLight(0xffffff, 3.5);
        scene.add(sunLight);
        
        function createFlare() {
            const c = document.createElement("canvas"); c.width = 512; c.height = 512; const ctx = c.getContext("2d");
            const grad = ctx.createRadialGradient(256, 256, 0, 256, 256, 256);
            grad.addColorStop(0, "rgba(255, 255, 255, 1)"); grad.addColorStop(0.1, "rgba(255, 240, 200, 0.8)");
            grad.addColorStop(0.5, "rgba(255, 150, 50, 0.2)"); grad.addColorStop(1, "rgba(0, 0, 0, 0)");
            ctx.fillStyle = grad; ctx.fillRect(0, 0, 512, 512); return new THREE.CanvasTexture(c);
        }
        const lensflare = new Lensflare();
        lensflare.addElement(new LensflareElement(createFlare(), 1200, 0, new THREE.Color(0xffffff)));
        sunLight.add(lensflare);

        // --- АСТРОНОМИЯ ---
        function getJulianDate(date) { return (date.getTime() / 86400000) + 2440587.5; }
        function getGMST(jd) { const T = (jd - 2451545.0) / 36525.0; return ((280.46061837 + 360.98564736629 * (jd - 2451545.0) + 0.000387933 * T * T) % 360) * (Math.PI / 180); }
        
        function getVectorFromAstronomy(body, date) {
            const eq = Astronomy.Equator(body, date, new Astronomy.Observer(0,0,0), false, true);
            const ra = eq.ra * 15 * (Math.PI / 180), dec = eq.dec * (Math.PI / 180);
            return new THREE.Vector3(Math.cos(dec) * Math.cos(ra), Math.sin(dec), -Math.cos(dec) * Math.sin(ra)).normalize();
        }

        function updatePosition() {
            const latRad = issData.lat * (Math.PI / 180);
            const gmst = getGMST(getJulianDate(new Date()));
            const lonRad = (issData.lon * (Math.PI / 180)) + gmst;
            const R = R_EARTH + (issData.alt / 100);

            const targetPos = new THREE.Vector3(
                R * Math.cos(latRad) * Math.cos(lonRad), R * Math.sin(latRad), -R * Math.cos(latRad) * Math.sin(lonRad)
            );
            iss.position.copy(targetPos);

            const nadir = iss.position.clone().normalize().negate();
            const nextLonRad = ((issData.lon + 0.1) * (Math.PI / 180)) + gmst;
            const nextPos = new THREE.Vector3(R * Math.cos(latRad) * Math.cos(nextLonRad), R * Math.sin(latRad), -R * Math.cos(latRad) * Math.sin(nextLonRad));
            const velocityVec = new THREE.Vector3().subVectors(nextPos, iss.position).normalize();

            const right = new THREE.Vector3().crossVectors(velocityVec, nadir).normalize();
            const forward = new THREE.Vector3().crossVectors(nadir, right).normalize();
            const m = new THREE.Matrix4(); m.makeBasis(right, nadir.negate(), forward);
            iss.quaternion.setFromRotationMatrix(m);
            
            if(isMapReady && yandexMap && document.getElementById('nadir-map-container').style.display === 'block') {
                yandexMap.setCenter([issData.lat, issData.lon], yandexMap.getZoom(), { duration: 1000 });
            }
        }

        let lastGeoCheck = 0;
        async function fetchLocationName(lat, lon) {
            const now = Date.now(); if(now - lastGeoCheck < 10000) return; lastGeoCheck = now;
            try {
                const res = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}&zoom=10&accept-language=ru`);
                const data = await res.json();
                const el = document.getElementById('hud-location');
                if (data.error) { el.innerText = "ОКЕАН / ОТКРЫТАЯ ВОДА"; } 
                else { const addr = data.address; const name = addr.city || addr.town || addr.village || addr.state || ""; const country = addr.country || ""; el.innerText = name ? `${name}, ${country}` : country; }
            } catch (e) { document.getElementById('hud-location').innerText = "ОКЕАН / НЕТ ДАННЫХ"; }
        }

        async function fetchISSData() {
            try {
                const res = await fetch(`https://api.wheretheiss.at/v1/satellites/25544`);
                const data = await res.json();
                issData = { lat: data.latitude, lon: data.longitude, alt: data.altitude, vel: data.velocity, vis: data.visibility };
                document.getElementById('hud-lat').innerText = issData.lat.toFixed(4) + '°'; document.getElementById('hud-lon').innerText = issData.lon.toFixed(4) + '°';
                document.getElementById('hud-alt').innerText = issData.alt.toFixed(1) + ' km'; document.getElementById('hud-vel').innerText = Math.round(issData.vel) + ' km/h';
                document.getElementById('loading').style.display = 'none';
                updatePosition(); fetchLocationName(issData.lat, issData.lon);
            } catch (e) { console.error(e); }
        }

        // --- УПРАВЛЕНИЕ КАМЕРАМИ И КАРТОЙ ---
        document.querySelectorAll('.cam-btn').forEach(btn => {
            if(btn.id === 'btn-nadir') return;
            btn.addEventListener('click', (e) => {
                document.querySelectorAll('.cam-btn').forEach(b => b.classList.remove('active'));
                e.target.classList.add('active');
                currentCam = e.target.dataset.cam;
                renderScene.camera = cameras[currentCam];
                document.getElementById('nadir-map-container').style.display = 'none';
                settings.cam = currentCam; saveSettings();
            });
        });

        const btnNadir = document.getElementById('btn-nadir');
        const mapContainer = document.getElementById('nadir-map-container');
        btnNadir.addEventListener('click', () => {
            document.querySelectorAll('.cam-btn').forEach(b => b.classList.remove('active'));
            btnNadir.classList.add('active'); mapContainer.style.display = 'block';
            if(isMapReady) { yandexMap.container.fitToViewport(); yandexMap.setCenter([issData.lat, issData.lon], 5); }
        });
        document.getElementById('close-map').addEventListener('click', () => {
            mapContainer.style.display = 'none'; btnNadir.classList.remove('active');
            document.querySelector(`[data-cam="${settings.cam}"]`).click();
        });

        // --- РЕНДЕР ЦИКЛ ---
        function animate() {
            requestAnimationFrame(animate);
            const date = new Date();
            
            // Солнце
            const sunVec = getVectorFromAstronomy('Sun', date);
            sunLight.position.copy(sunVec).multiplyScalar(5000);
            const gmst = getGMST(getJulianDate(date));
            const sunLocalVec = sunVec.clone().applyAxisAngle(new THREE.Vector3(0,1,0), -gmst);
            atmoMat.uniforms.sunDirection.value.copy(sunLocalVec);
            earthMat.uniforms = { sunDirection: { value: sunLocalVec } }; 

            // Луна (Масштабированная дистанция ~3840 юнитов, чтобы было видно)
            const moonVec = getVectorFromAstronomy('Moon', date);
            moon.position.copy(moonVec).multiplyScalar(3840);
            // Применяем локальный поворот Земли к Луне, так как текстуры Земли статичны, а МКС вращается вокруг
            moon.position.applyAxisAngle(new THREE.Vector3(0,1,0), -gmst); 

            cloudsMesh.rotation.y += 0.0002;

            const sunDirFromIss = sunLight.position.clone().sub(iss.position).normalize();
            panels.forEach(p => { p.rotation.x = THREE.MathUtils.lerp(p.rotation.x, Math.atan2(sunDirFromIss.y, sunDirFromIss.z), 0.01); });

            if(currentCam === 'free') { controls.target.copy(iss.position); controls.update(); }
            if(currentCam === 'moon') {
                // Камера Луны привязана к МКС и смотрит на Луну
                cameras.moon.position.copy(iss.position).add(iss.position.clone().normalize().multiplyScalar(0.5));
                cameras.moon.lookAt(moon.position);

                // ЛОГИКА РЕНТГЕНА (Затмевается ли Луна Землей?)
                const dirToEarth = new THREE.Vector3(0,0,0).sub(cameras.moon.position).normalize();
                const dirToMoon = moon.position.clone().sub(cameras.moon.position).normalize();
                const distToEarth = cameras.moon.position.length();
                const angularRadius = Math.asin(R_EARTH / distToEarth); // Видимый угловой размер Земли
                const angleToMoon = dirToEarth.angleTo(dirToMoon);

                if(angleToMoon < angularRadius) {
                    // Луна за Землей - включаем рентген
                    earthMesh.visible = false; cloudsMesh.visible = false; atmosphere.visible = false;
                    earthXray.visible = true;
                } else {
                    earthMesh.visible = true; cloudsMesh.visible = true; atmosphere.visible = true;
                    earthXray.visible = false;
                }
            } else {
                // В обычных режимах рентген выключен
                earthMesh.visible = true; cloudsMesh.visible = true; atmosphere.visible = true;
                earthXray.visible = false;
            }

            composer.render();
        }

        window.addEventListener('resize', () => {
            Object.values(cameras).forEach(cam => { cam.aspect = window.innerWidth / window.innerHeight; cam.updateProjectionMatrix(); });
            renderer.setSize(window.innerWidth, window.innerHeight); composer.setSize(window.innerWidth, window.innerHeight);
            if(isMapReady) yandexMap.container.fitToViewport();
        });

        fetchISSData(); setInterval(fetchISSData, 3000); animate();
    </script>
</body>
</html>
