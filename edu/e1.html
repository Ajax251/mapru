<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>МКС</title>
<link rel="icon" href="https://img.icons8.com/?size=100&id=uRvqauJrCCGj&format=png&color=000000" type="image/png">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/satellite.js/5.0.0/satellite.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=Share+Tech+Mono&family=Rajdhani:wght@400;500;600;700&display=swap');

:root {
    --accent: #00d2ff;
    --accent-dim: rgba(0, 210, 255, 0.15);
    --accent-border: rgba(0, 210, 255, 0.4);
    --bg-panel: rgba(20, 24, 30, 0.65);
    --border-panel: rgba(255, 255, 255, 0.1);
    --red: #ff4757;
    --amber: #ffa502;
    --text-main: #f1f2f6;
    --text-dim: rgba(255, 255, 255, 0.6);
    --font-mono: 'Share Tech Mono', monospace;
    --font-hud: 'Orbitron', monospace;
    --font-body: 'Rajdhani', sans-serif;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body, html { width:100%; height:100%; overflow:hidden; background:#000208; font-family:var(--font-body); color:var(--text-main); user-select:none; }
canvas { display:block; width:100%; height:100%; outline:none; }

#global-loader {
    position: fixed; top:0; left:0; width:100%; height:100%;
    background: #000208; z-index: 99999;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    transition: opacity 0.8s ease, visibility 0.8s;
}
.core-loader { position: relative; width: 120px; height: 120px; display: flex; align-items: center; justify-content: center; }
.core-loader svg { width: 100%; height: 100%; animation: rotLoader 8s linear infinite; }
.core-loader circle { fill: none; stroke: var(--accent); stroke-width: 1; stroke-dasharray: 20 10; opacity: 0.7; }
.core-loader .c2 { stroke: var(--amber); stroke-dasharray: 40 20; animation: rotLoader 4s linear infinite reverse; transform-origin: 50% 50%; }
.core-loader .c3 { stroke: #fff; stroke-width: 0.5; stroke-dasharray: 100; opacity: 0.3; }
@keyframes rotLoader { 100% { transform: rotate(360deg); } }
.loader-text { font-family: var(--font-hud); font-size: 14px; letter-spacing: 6px; color: var(--accent); margin-top: 30px; text-shadow: 0 0 10px var(--accent); animation: pulseText 1.5s ease-in-out infinite alternate; }
@keyframes pulseText { 0% { opacity: 0.5; } 100% { opacity: 1; } }

#ui-layer {
    position:absolute; top:0; left:0; width:100%; height:100%;
    pointer-events:none; z-index:10;
    display:flex; flex-direction:column; justify-content:space-between; padding:20px;
}

.panel {
    background: var(--bg-panel); backdrop-filter: blur(20px) saturate(1.2);
    border: 1px solid var(--border-panel); border-radius: 12px; pointer-events: auto;
    box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5), inset 0 1px 0 rgba(255, 255, 255, 0.05);
    transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1), opacity 0.4s;
}

.top-container { display: flex; justify-content: space-between; align-items: flex-start; pointer-events: none; }

#hud-left { padding:20px 24px; min-width:320px; pointer-events: auto; }

.brand { display:flex; align-items:center; gap:12px; margin-bottom:20px; }
.brand-dot { width:8px; height:8px; background:var(--accent); border-radius:50%; box-shadow:0 0 10px var(--accent); animation:dotP 2s infinite; }
@keyframes dotP { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.4;transform:scale(.6)} }
.brand-title { font-family:var(--font-hud); font-size:18px; font-weight:700; color:var(--accent); letter-spacing:3px; }
.brand-sub { font-size:10px; color:var(--text-dim); letter-spacing:2px; font-family:var(--font-mono); margin-top:4px; }

.tel-grid { display:grid; grid-template-columns:1fr 1fr; gap:12px 20px; }
.tel-label { font-size:10px; color:var(--text-dim); text-transform:uppercase; letter-spacing:1.5px; font-family:var(--font-mono); margin-bottom:4px; }
.tel-val { font-family:var(--font-mono); font-size:20px; color:var(--text-main); font-weight:600; }
.tel-val.hi { color:var(--accent); text-shadow:0 0 10px rgba(0, 210, 255, 0.3); }
.sep { height:1px; background:linear-gradient(90deg, var(--border-panel), transparent); margin:16px 0; }

.loc-label { font-size:10px; color:var(--accent); letter-spacing:1.5px; text-transform:uppercase; font-family:var(--font-mono); margin-bottom:6px; }
.loc-name { font-size:16px; font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; max-width:280px; }

.sys-status-row { display: flex; align-items: center; gap: 15px; margin-top: 15px; font-family: var(--font-mono); font-size: 11px; letter-spacing: 1px; }
.status-dot { display:inline-block; width:6px; height:6px; background:var(--accent); border-radius:50%; animation:dotP 1.5s infinite; }
#illum-status { padding: 4px 8px; border-radius: 4px; background: rgba(0,0,0,0.4); font-weight: bold; border: 1px solid rgba(255,255,255,0.05); }

#btn-menu {
    pointer-events: auto; background: var(--bg-panel); border: 1px solid var(--border-panel);
    width: 44px; height: 44px; border-radius: 12px; display: none; align-items: center; justify-content: center;
    cursor: pointer; backdrop-filter: blur(10px); color: #fff;
}
#btn-menu svg { width: 20px; height: 20px; fill: currentColor; }

#bottom-dock {
    align-self: center; background: var(--bg-panel); backdrop-filter: blur(25px) saturate(1.5);
    border: 1px solid var(--border-panel); border-radius: 40px; padding: 10px 15px;
    display: flex; gap: 10px; pointer-events: auto; box-shadow: 0 15px 40px rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,255,255,0.1);
    align-items: center; transition: transform 0.4s;
}

.dock-btn {
    width: 44px; height: 44px; border-radius: 50%; background: rgba(255,255,255,0.03);
    border: 1px solid transparent; display: flex; align-items: center; justify-content: center;
    cursor: pointer; transition: all 0.2s ease; color: var(--text-dim); position: relative;
}
.dock-btn svg { width: 22px; height: 22px; fill: none; stroke: currentColor; stroke-width: 1.5; stroke-linecap: round; stroke-linejoin: round; }
.dock-btn:hover { background: rgba(255,255,255,0.08); color: #fff; border-color: rgba(255,255,255,0.2); }
.dock-btn.active { background: var(--accent-dim); color: var(--accent); border-color: var(--accent-border); box-shadow: 0 0 15px rgba(0,210,255,0.25); }
.dock-sep { width: 1px; height: 24px; background: var(--border-panel); margin: 0 5px; }

.dock-btn.amber-btn { color: rgba(255,170,0,0.6); }
.dock-btn.amber-btn.active { background: rgba(255,170,0,0.15); color: var(--amber); border-color: rgba(255,170,0,0.4); box-shadow: 0 0 15px rgba(255,170,0,0.2); }

#surface-map-container {
    position:absolute; top:2%; left:2%; width:96%; height:96%;
    background:#0f1115; border:1px solid var(--border-panel); border-radius:16px;
    display:none; z-index:50; overflow:hidden; pointer-events:auto;
    box-shadow:0 20px 60px rgba(0,0,0,0.8);
}
.map-corner { position:absolute; width:30px; height:30px; z-index:110; pointer-events:none; }
.map-corner.tl { top:15px; left:15px; border-top:2px solid var(--accent); border-left:2px solid var(--accent); }
.map-corner.tr { top:15px; right:15px; border-top:2px solid var(--accent); border-right:2px solid var(--accent); }
.map-corner.bl { bottom:15px; left:15px; border-bottom:2px solid var(--accent); border-left:2px solid var(--accent); }
.map-corner.br { bottom:15px; right:15px; border-bottom:2px solid var(--accent); border-right:2px solid var(--accent); }

#leaflet-map { width:100%; height:100%; }
.leaflet-container { background:#0a0b0e !important; }
.leaflet-control-attribution { display:none !important; }

.map-ui-top { position:absolute; top:20px; right:20px; display:flex; gap:12px; z-index:1000; align-items:center; }
.map-sel { background: rgba(15, 18, 22, 0.9); color: var(--text-main); border: 1px solid var(--border-panel); padding: 10px 14px; font-family: var(--font-mono); font-size: 12px; border-radius: 8px; outline: none; cursor: pointer; }
.map-sel option { background: #1a1e24; color: #fff; }

.btn-fov { background: rgba(15, 18, 22, 0.9); color: var(--text-dim); border: 1px solid var(--border-panel); border-radius: 8px; padding: 10px 18px; font-family: var(--font-mono); font-size: 12px; cursor: pointer; transition: all 0.2s; text-transform: uppercase; letter-spacing: 1px; }
.btn-fov:hover { background: rgba(255,255,255,0.1); color: var(--text-main); }
.btn-fov.synced { background: var(--accent-dim); color: var(--accent); border-color: var(--accent); box-shadow: 0 0 15px rgba(0,210,255,0.2); }

.map-close { padding:10px 16px; font-size:16px; color:var(--text-dim); border: 1px solid var(--border-panel); border-radius: 8px; background: rgba(15,18,22,0.9); cursor:pointer; transition:0.2s; display:flex; align-items:center; justify-content:center; }
.map-close:hover { color:var(--red); border-color:var(--red); background:rgba(255,71,87,0.15); }

.map-stats { position:absolute; bottom:24px; left:20px; background:rgba(15, 18, 22, 0.85); border:1px solid var(--border-panel); backdrop-filter: blur(15px); border-left: 4px solid var(--accent); border-radius:8px; padding:16px 24px; z-index:1000; min-width:280px; box-shadow:0 10px 30px rgba(0,0,0,0.6); }
.ms-row { display:flex; justify-content:space-between; margin-bottom:10px; font-size:12px; align-items:baseline; }
.ms-label { color:var(--text-dim); text-transform:uppercase; letter-spacing:1px; font-family:var(--font-mono); }
.ms-val { font-family:var(--font-mono); font-weight:700; color:var(--text-main); font-size:15px; }
.ms-loc { color:var(--accent); font-weight:700; font-size:15px; border-top:1px solid rgba(255,255,255,0.1); padding-top:12px; margin-top:8px; text-transform:uppercase; font-family:var(--font-body); letter-spacing: 1px; }

#rangefinder { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); pointer-events:none; z-index:20; color:var(--accent); opacity:0; display:flex; flex-direction:column; align-items:center; transition:opacity .3s; }
.rf-ring { width:200px; height:200px; border:1px solid var(--accent-border); border-radius:50%; position:relative; display:flex; align-items:center; justify-content:center; }
.rf-ring::before,.rf-ring::after { content:''; position:absolute; background:var(--accent-border); }
.rf-ring::before { width:100%; height:1px; }
.rf-ring::after  { width:1px; height:100%; }
.rf-dot { width:8px; height:8px; background:var(--accent); border-radius:50%; box-shadow:0 0 12px var(--accent); }
#rf-dist { margin-top:16px; font-family:var(--font-mono); font-size:16px; background:var(--bg-panel); padding:6px 16px; border-radius:6px; border:1px solid var(--border-panel); color:var(--accent); backdrop-filter: blur(10px); }

.map-center-marker { position: absolute; top: 50%; left: 50%; width: 50px; height: 50px; transform: translate(-50%, -50%); pointer-events: none; z-index: 1050; }
.map-center-marker::before, .map-center-marker::after { content: ''; position: absolute; background: var(--accent); opacity: 0.9; box-shadow: 0 0 8px var(--accent); }
.map-center-marker::before { width: 50px; height: 2px; top: 50%; left: 0; transform: translateY(-50%); }
.map-center-marker::after { width: 2px; height: 50px; left: 50%; top: 0; transform: translateX(-50%); }

#map-vignette { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 200; background: radial-gradient(ellipse at center, transparent 48%, rgba(5, 7, 10, 0.6) 62%, rgba(2, 3, 6, 0.9) 75%, rgba(0, 1, 2, 0.98) 87%, rgb(0, 0, 0) 100%); }

#moon-label { position: absolute; top: 0; left: 0; color: #fff; font-family: var(--font-mono); font-size: 10px; background: rgba(0, 0, 0, 0.6); border: 1px solid rgba(255, 255, 255, 0.3); padding: 4px 8px; border-radius: 4px; pointer-events: none; opacity: 0; z-index: 100; transition: opacity 0.2s ease; letter-spacing: 2px; box-shadow: 0 0 10px rgba(255, 255, 255, 0.2); }
#moon-label::after { content: ''; position: absolute; bottom: -5px; left: 50%; transform: translateX(-50%); border-width: 5px 5px 0; border-style: solid; border-color: rgba(255, 255, 255, 0.3) transparent transparent transparent; }

.scanline { position:fixed; top:0; left:0; right:0; bottom:0; background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.04) 2px,rgba(0,0,0,.04) 4px); pointer-events:none; z-index:5; }

#zoom-container {
    position: absolute; right: 20px; top: 50%; transform: translateY(-50%);
    height: 200px; width: 24px;
    display: flex; align-items: center; justify-content: center;
    background: rgba(20, 24, 30, 0.5); backdrop-filter: blur(10px);
    border: 1px solid var(--border-panel); border-radius: 12px;
    z-index: 100; pointer-events: auto; box-shadow: 0 5px 15px rgba(0,0,0,0.5);
}
#zoom-slider {
    appearance: none; width: 170px; height: 2px; background: rgba(255,255,255,0.2);
    border-radius: 1px; outline: none; transform: rotate(-90deg); cursor: pointer;
}
#zoom-slider::-webkit-slider-thumb {
    appearance: none; width: 12px; height: 12px; border-radius: 50%;
    background: var(--accent); box-shadow: 0 0 8px var(--accent); cursor: pointer;
}

@media (max-width: 768px) {
    #btn-menu { display: flex; }
    #hud-left { position: absolute; top: 80px; left: 20px; width: calc(100% - 40px); transform: translateX(calc(-100% - 40px)); opacity: 0; }
    .hud-open #hud-left { transform: translateX(0); opacity: 1; }
    #bottom-dock { width: calc(100% - 40px); justify-content: center; padding: 12px; gap: 8px; flex-wrap: wrap; margin-bottom: 10px; }
    .dock-btn { width: 40px; height: 40px; }
    .map-ui-top { flex-wrap: wrap; justify-content: flex-end; top: 10px; right: 10px; gap: 8px; }
    .map-stats { bottom: 10px; left: 10px; width: calc(100% - 20px); min-width: 0; padding: 12px; }
    .map-corner { display: none; }
    #zoom-container { display: none; }
}
</style>
</head>
<body>

<div id="global-loader">
<div class="core-loader">
<svg viewBox="0 0 100 100">
<circle cx="50" cy="50" r="45"></circle>
<circle cx="50" cy="50" r="35" class="c2"></circle>
<circle cx="50" cy="50" r="25" class="c3"></circle>
</svg>
</div>
<div class="loader-text"></div>
</div>

<div class="scanline"></div>
<div id="moon-label">ЛУНА</div>

<div id="rangefinder">
<div class="rf-ring"><div class="rf-dot"></div></div>
<div id="rf-dist">ДИСТ: — км</div>
</div>

<div id="surface-map-container">
<div class="map-corner tl"></div><div class="map-corner tr"></div>
<div class="map-corner bl"></div><div class="map-corner br"></div>
<div class="map-ui-top">
<button class="btn-fov synced" id="btn-real-fov">Обзор</button>
<button class="btn-fov" id="btn-tracking">Слежение</button>
<select class="map-sel" id="map-layer-sel">
<option value="google-hybrid">Google Гибрид</option>
<option value="google-sat">Google Спутник</option>
<option value="google-map">Google Карта</option>
<option value="osm">OpenStreetMap</option>
<option value="esri-sat">ESRI Спутник</option>
<option value="esri-topo">ESRI Топо</option>
</select>
<button class="map-close" id="close-map">✕</button>
</div>
<div class="map-stats">
<div class="ms-row"><span class="ms-label">Высота</span><span class="ms-val" id="map-alt">420 км</span></div>
<div class="ms-row"><span class="ms-label">Обзор</span><span class="ms-val" id="map-fov">485 × 485 км</span></div>
<div class="ms-row"><span class="ms-label">Дистанция</span><span class="ms-val" id="map-tdist">0.0 км</span></div>
<div class="ms-row"><span class="ms-label">Время</span><span class="ms-val" id="map-ttime">0 с</span></div>
<div class="ms-loc" id="map-loc">СКАНИРОВАНИЕ...</div>
</div>
<div class="map-center-marker"></div>
<div id="leaflet-map"></div>
<div id="map-vignette"></div>
</div>

<div id="ui-layer">
<div class="top-container">
<div id="hud-left" class="panel">
<div class="brand">
<div class="brand-dot"></div>
<div>
<div class="brand-title">МКС</div>
<div class="brand-sub">ТЕЛЕМЕТРИЯ ОРБИТЫ</div>
</div>
</div>
<div class="tel-grid">
<div><div class="tel-label">ШИРОТА</div><div class="tel-val hi" id="hud-lat">—</div></div>
<div><div class="tel-label">ДОЛГОТА</div><div class="tel-val hi" id="hud-lon">—</div></div>
<div><div class="tel-label">ВЫСОТА</div><div class="tel-val" id="hud-alt">—</div></div>
<div><div class="tel-label">СКОРОСТЬ</div><div class="tel-val" id="hud-vel">—</div></div>
</div>
<div class="sep"></div>
<div class="loc-label">ЛОКАЦИЯ</div>
<div class="loc-name" id="hud-loc">Ожидание...</div>
<div class="sys-status-row">
<span id="illum-status">ЗАГРУЗКА...</span>
<div style="flex:1"></div>
<span class="status-dot"></span>
<span>СИСТЕМЫ ОК</span>
</div>

<div class="sep" style="margin: 12px 0 8px 0;"></div>
<div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:2px;">
    
    <div style="display:flex; flex-direction:column; gap:8px; font-family:var(--font-mono); font-size:12px; flex:1;">
        <div style="display:flex; justify-content:space-between; align-items:center; padding-right:12px;">
            <div style="display:flex; align-items:center; gap:6px; color:var(--text-dim);" title="Восход">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="var(--amber)" stroke-width="2" stroke-linecap="round"><path d="M12 4v4M4.9 8.9l2.8 2.8M19.1 8.9l-2.8 2.8M2 16h20M12 16c-3 0-5-2-5-5h10c0 3-2 5-5 5z"/></svg>
            </div>
            <span id="hud-sunrise" style="color:var(--text-main); font-weight:bold;">Ожидание...</span>
        </div>
        <div style="display:flex; justify-content:space-between; align-items:center; padding-right:12px;">
            <div style="display:flex; align-items:center; gap:6px; color:var(--text-dim);" title="Закат">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="var(--text-dim)" stroke-width="2" stroke-linecap="round"><path d="M12 20v-4M4.9 15.1l2.8-2.8M19.1 15.1l-2.8-2.8M2 8h20M12 8c-3 0-5 2-5 5h10c0-3-2-5-5-5z"/></svg>
            </div>
            <span id="hud-sunset" style="color:var(--text-main); font-weight:bold;">Ожидание...</span>
        </div>
    </div>

   
    <div id="btn-toggle-track" title="Скрыть/Показать трек орбиты" style="width:32px; height:32px; border-radius:8px; background:var(--accent-dim); border:1px solid var(--accent); display:flex; align-items:center; justify-content:center; cursor:pointer; color:var(--accent); transition:all 0.2s;">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><ellipse cx="12" cy="12" rx="10" ry="4" transform="rotate(30 12 12)"/><circle cx="19" cy="8" r="1.5" fill="currentColor" stroke="none"/></svg>
    </div>

</div>

</div>
<div id="btn-menu">
<svg viewBox="0 0 24 24"><path d="M3 12h18M3 6h18M3 18h18" stroke-width="2" stroke-linecap="round"/></svg>
</div>
</div>

<div id="zoom-container">
    <input type="range" id="zoom-slider" min="0" max="100" value="0">
</div>

<div id="bottom-dock">
    <div class="dock-btn active" data-cam="free" title="ВКД (Свободная камера)">
        <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="4"/><ellipse cx="12" cy="12" rx="10" ry="4" transform="rotate(45 12 12)"/></svg>
    </div>
    <div class="dock-btn" data-cam="forward" title="Курсовая камера (Вперед)">
        <svg viewBox="0 0 24 24"><path d="M12 20V4M5 11l7-7 7 7"/></svg>
    </div>
    <div class="dock-btn" data-cam="backward" title="Кормовая камера (Назад)">
        <svg viewBox="0 0 24 24"><path d="M12 4v16M5 13l7 7 7-7"/></svg>
    </div>
    <div class="dock-btn" data-cam="moon" title="Слежение за Луной">
        <svg viewBox="0 0 24 24"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
    </div>
    <div class="dock-sep"></div>
    <div class="dock-btn" id="btn-surface" title="Карта поверхности">
        <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M2 12h20M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
    </div>
    <div class="dock-sep"></div>
    <div class="dock-btn active" id="btn-stars-toggle" title="Звезды и Планеты">
        <svg viewBox="0 0 24 24"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z" stroke="currentColor" fill="none" stroke-width="1.5" stroke-linejoin="round"/></svg>

        varying vec3 vNormal;

            vec3 sunsetColor = vec3(1.0, 0.3, 0.1);
            vec3 nightColor = vec3(0.0, 0.0, 0.0);

            vec3 color = mix(nightColor, mix(sunsetColor, dayColor, smoothstep(-0.1, 0.3, sunDot)), smoothstep(-0.2, 0.1, sunDot));

            // Поэтому в центре Земли атмосфера на 100% прозрачна и не дает теней.
            gl_FragColor = vec4(color * fresnel, 1.0);
        }
    `,
    blending: THREE.AdditiveBlending,

});

function getJD(d) { return (d.getTime() / 86400000) + 2440587.5; }
function getGMST(jd) {
    const T = (jd - 2451545.0) / 36525.0;
    let st = 280.46061837 + 360.98564736629 * (jd - 2451545.0) + 0.000387933 * T * T - T * T * T / 38710000.0;
    st = st % 360; if (st < 0) st += 360; return st * DEG_TO_RAD;
}
function getVector(lat, lon, altKm, gmstRad) {
    const lonRad = (lon * DEG_TO_RAD) + gmstRad; const latRad = lat * DEG_TO_RAD; const r = R_EARTH + (altKm / 100);
    return new THREE.Vector3(r * Math.cos(latRad) * Math.cos(lonRad), r * Math.sin(latRad), -r * Math.cos(latRad) * Math.sin(lonRad));
}

let lastIssPosVec = null;

function updateISS() {
    const now = Date.now();
    
    // Обновляем 3D трек орбиты (хвост) только раз в 10 секунд
    if (now - lastTrailUpdateTime >= 10000) {
        const posLocal = getVector(virtualLat||issData.lat, virtualLon||issData.lon, issData.alt, 0);
        if (trailIndex < MAX_POINTS) {
            const arr = trailLine.geometry.attributes.position.array;
            arr[trailIndex * 3] = posLocal.x; arr[trailIndex * 3 + 1] = posLocal.y; arr[trailIndex * 3 + 2] = posLocal.z;
            trailIndex++; 
            trailLine.geometry.setDrawRange(0, trailIndex); 
        } else {
            const arr = trailLine.geometry.attributes.position.array;
            for(let i=0; i<MAX_POINTS-1; i++) { 
                arr[i*3] = arr[(i+1)*3]; arr[i*3+1] = arr[(i+1)*3+1]; arr[i*3+2] = arr[(i+1)*3+2]; 
            }
            arr[(MAX_POINTS-1)*3] = posLocal.x; arr[(MAX_POINTS-1)*3+1] = posLocal.y; arr[(MAX_POINTS-1)*3+2] = posLocal.z;
        }
        trailLine.geometry.attributes.position.needsUpdate = true;
        lastTrailUpdateTime = now;
    }

    const dtH = (now - lastTrackTime) / 3600000; lastTrackTime = now;
    if (issData.vel > 0 && dtH < 0.1) trackDistKm += issData.vel * dtH;

    const last = trackCoords[trackCoords.length-1];
    if (!last || last[0]!==(virtualLat||issData.lat)) {
        trackCoords.push([virtualLat||issData.lat, virtualLon||issData.lon]);
        if (trackLineLeaflet) trackLineLeaflet.setLatLngs(trackCoords);

    const btn = document.getElementById('btn-real-fov');

        isProgrammaticZoom = true; leafMap.setView([virtualLat||issData.lat, virtualLon||issData.lon], leafMap.getZoom(), {animate:true, duration:1});
        setTimeout(() => { isProgrammaticZoom = false; }, 200);
    }
}

async function fetchISS() {

        try {
            const res = await fetch('https://celestrak.org/NORAD/elements/stations.txt');
            const text = await res.text();
            const lines = text.split('\n');
            let idx = lines.findIndex(l => l.includes('ISS (ZARYA)'));
            if (idx !== -1) {
                satrec = satellite.twoline2satrec(lines[idx+1].trim(), lines[idx+2].trim());
            }
        } catch(e) {}
        isFetchingTLE = false;
    }

    if (DATA_SOURCE === 0 || !satrec) {
        try {
            const d = await (await fetch('https://api.wheretheiss.at/v1/satellites/25544')).json();
            const now = Date.now();
            if (lastLat !== null) {
                const dt = (now - lastIssUpdateTime) / 1000;
                if (dt > 0) {
                    latSpeed = (d.latitude - lastLat) / dt;
                    let dLon = d.longitude - lastLon;
                    if (dLon > 180) dLon -= 360;
                    if (dLon < -180) dLon += 360;
                    lonSpeed = dLon / dt;
                }
            } else { virtualLat = d.latitude; virtualLon = d.longitude; }

            lastLat = d.latitude; lastLon = d.longitude;
            virtualLat = d.latitude; virtualLon = d.longitude;
            lastIssUpdateTime = now;

            issData = { lat:d.latitude, lon:d.longitude, alt:d.altitude, vel:d.velocity };

    }
}

let bT = 0;
const illumSpan = document.getElementById('illum-status');
let activeCam = camFree;

let lastFrameTime = Date.now();
const astromonyObserver = new Astronomy.Observer(0,0,0);

let lastSunCalcTime = 0;
let lastTimerDOMUpdate = 0;
let nextSunriseMs = 0;
let nextSunsetMs = 0;

function updateSunTimers() {
    const now = Date.now();
    
    // Пересчет орбит на будущее: раз в 30 секунд
    if (now - lastSunCalcTime > 30000 && apiLoaded) {
        lastSunCalcTime = now;
        let foundSunrise = false, foundSunset = false;
        
        // Симулируем следующие 100 минут с шагом в 30 секунд
        for (let i = 0; i < 200; i++) {
            const t = new Date(now + i * 30000);
            let issPosVec;
            if (satrec) {
                const pv = satellite.propagate(satrec, t);
                const posGd = satellite.eciToGeodetic(pv.position, satellite.gstime(t));
                issPosVec = getVector(satellite.degreesLat(posGd.latitude), satellite.degreesLong(posGd.longitude), posGd.height, getGMST(getJD(t)));
            } else {
                const dtS = i * 30;
                issPosVec = getVector((virtualLat||issData.lat) + latSpeed*dtS, (virtualLon||issData.lon) + lonSpeed*dtS, issData.alt, getGMST(getJD(t)));
            }

            const eqSun = Astronomy.Equator('Sun', t, astromonyObserver, false, true);
            const sunPos = new THREE.Vector3(
                6000 * Math.cos(eqSun.dec*DEG_TO_RAD) * Math.cos(eqSun.ra*15*DEG_TO_RAD),
                6000 * Math.sin(eqSun.dec*DEG_TO_RAD),
                -6000 * Math.cos(eqSun.dec*DEG_TO_RAD) * Math.sin(eqSun.ra*15*DEG_TO_RAD)
            );

            const angleDeg = Math.acos(issPosVec.normalize().dot(sunPos.normalize())) * (180 / Math.PI);
            const isDay = angleDeg < 100; // Порог света

            if (i === 0) {
                if (isDay) foundSunrise = true; else foundSunset = true;
            } else {
                if (!foundSunrise && isDay) { nextSunriseMs = t.getTime(); foundSunrise = true; }
                if (!foundSunset && !isDay) { nextSunsetMs = t.getTime(); foundSunset = true; }
            }
            if (foundSunrise && foundSunset) break; // Нашли оба события
        }
    }

    // Обновление таймера в интерфейсе: раз в секунду
    if (now - lastTimerDOMUpdate > 1000) {
        lastTimerDOMUpdate = now;
    const formatTime = (ms) => {
            if (!ms) return '-';
            const diff = Math.round((ms - now) / 1000);
            if (diff <= 0) { lastSunCalcTime = 0; return 'Сейчас'; } 
            const d = new Date(ms);
            const hm = d.toLocaleTimeString('ru-RU', {hour: '2-digit', minute:'2-digit'});
            return `${hm} ( ${diff} сек)`; 
        };
        document.getElementById('hud-sunrise').textContent = formatTime(nextSunriseMs);
        document.getElementById('hud-sunset').textContent = formatTime(nextSunsetMs);
    }
}

function animate() {
    requestAnimationFrame(animate);

    const nowFrame = Date.now();
    const dt = (nowFrame - lastFrameTime) / 1000;
    lastFrameTime = nowFrame;

    bT += dt;
    const bOn = (bT % 2.5) < 0.15;
    beacon.intensity = 0; 
    bMesh.material.color.setHex(bOn ? 0xff8800 : 0x441100); 

    const date = new Date();
    const jd = getJD(date);
    const gmstRad = getGMST(jd);

    earth.rotation.y = gmstRad;

    if (starsOn && planetsObjs.length > 0) {
        planetsObjs.forEach(p => {
            try {
                const eq = Astronomy.Equator(p.id, date, astromonyObserver, false, true);
                const raRad = eq.ra * 15 * DEG_TO_RAD;
                const decRad = eq.dec * DEG_TO_RAD;
                const r = 7800;
                p.dot.position.set(r * Math.cos(decRad) * Math.cos(raRad), r * Math.sin(decRad), -r * Math.cos(decRad) * Math.sin(raRad));
                p.label.position.copy(p.dot.position).add(new THREE.Vector3(0, -90, 0));
            } catch (e) {}
        });
    }

    const eqSun = Astronomy.Equator('Sun', date, astromonyObserver, false, true);
    const raSun = eqSun.ra * 15 * DEG_TO_RAD;
    const decSun = eqSun.dec * DEG_TO_RAD;
    const sunPos = new THREE.Vector3(
        6000 * Math.cos(decSun) * Math.cos(raSun),
        6000 * Math.sin(decSun),
        -6000 * Math.cos(decSun) * Math.sin(raSun)
    );

    if (sunOn) {
        sunLight.position.copy(sunPos);
        atmoMat.uniforms.sunDirection.value.copy(sunPos).normalize();
    }

    const eqMoon = Astronomy.Equator('Moon', date, astromonyObserver, false, true);
    const raMoon = eqMoon.ra * 15 * DEG_TO_RAD;
    const decMoon = eqMoon.dec * DEG_TO_RAD;
    moon.position.set(
        3840 * Math.cos(decMoon) * Math.cos(raMoon),
        3840 * Math.sin(decMoon),
        -3840 * Math.cos(decMoon) * Math.sin(raMoon)
    );
    moon.lookAt(0,0,0);

    if (DATA_SOURCE === 1 && satrec) {
        const pv = satellite.propagate(satrec, date);
        const gmstSat = satellite.gstime(date);
        const posGd = satellite.eciToGeodetic(pv.position, gmstSat);
        virtualLat = satellite.degreesLat(posGd.latitude);
        virtualLon = satellite.degreesLong(posGd.longitude);
        const v = pv.velocity;
        const vel = Math.sqrt(v.x*v.x + v.y*v.y + v.z*v.z) * 3600;
        issData = { lat: virtualLat, lon: virtualLon, alt: posGd.height, vel: vel };
        
        if (nowFrame - lastIssUpdateTime > 1000) {
            updateHUD(issData);
            lastIssUpdateTime = nowFrame;
            updateISS(); fetchLoc(virtualLat, virtualLon);
            apiLoaded = true; checkHideLoader();
        }
    } else {
        if (latSpeed !== 0 || lonSpeed !== 0) {
            virtualLat += latSpeed * dt;
            virtualLon += lonSpeed * dt;
            if (virtualLon > 180) virtualLon -= 360;
            if (virtualLon < -180) virtualLon += 360;
        }
    }

    const oldIssPos = iss.position.clone();
    const issPos = getVector(virtualLat || issData.lat, virtualLon || issData.lon, issData.alt, gmstRad);
    iss.position.copy(issPos);

    const moveDelta = new THREE.Vector3().subVectors(iss.position, oldIssPos);

    const up = iss.position.clone().normalize();
    if (!lastIssPosVec) {
        lastIssPosVec = issPos.clone();
        currentIssFwd.crossVectors(new THREE.Vector3(0,1,0), up).normalize();
    } else {
        const moveDir = new THREE.Vector3().subVectors(issPos, lastIssPosVec);
        if (moveDir.lengthSq() > 0.0000001) { 
            moveDir.normalize();
            currentIssFwd.lerp(moveDir, 0.5).normalize();
            lastIssPosVec.copy(issPos);
        }
    }

    const right = new THREE.Vector3().crossVectors(up, currentIssFwd).normalize();
    const realUp = new THREE.Vector3().crossVectors(currentIssFwd, right).normalize();
    const m = new THREE.Matrix4(); m.makeBasis(right, realUp, currentIssFwd);
    const targetQuat = new THREE.Quaternion().setFromRotationMatrix(m);
    iss.quaternion.slerp(targetQuat, 0.05);

    if (currentCam === 'free') {
        if (isIntroActive) {
            controls.enabled = false;
            const introDur = 4000;
            let t = (Date.now() - introStartTime) / introDur;
            if (t > 1) t = 1;

            if (!window.introParamsSet) {
                window.introParamsSet = true;
                const issUp = iss.position.clone().normalize();
                window.introStartPos = iss.position.clone().add(issUp.multiplyScalar(40)); 
            }

            const easeT = 1 - Math.pow(1 - t, 3);
            const issUp = iss.position.clone().normalize();
            const endPos = iss.position.clone().add(issUp.multiplyScalar(targetZoomDist));

            camFree.position.copy(window.introStartPos).lerp(endPos, easeT);
            camFree.lookAt(iss.position);

            if (t === 1) {
                isIntroActive = false;
                controls.enabled = true;
                controls.target.copy(iss.position);
                controls.update();
            }
        } else {
            controls.enabled = true;
            if (camFree.position.distanceToSquared(controls.target) < 0.000000001) {
                camFree.position.copy(iss.position).add(new THREE.Vector3(0.001, 0.001, 0.001));
            }
            camFree.position.add(moveDelta);
            controls.target.copy(iss.position);
            const currentDist = camFree.position.distanceTo(controls.target);
            if (Math.abs(currentDist - targetZoomDist) > 0.00001) {
                const newDist = THREE.MathUtils.lerp(currentDist, targetZoomDist, 0.15);
                const dir = new THREE.Vector3().subVectors(camFree.position, controls.target).normalize();
                camFree.position.copy(controls.target).add(dir.multiplyScalar(newDist));
                if (!isOrbitDragging) showRangefinder();
            }
            controls.update();
        }
        activeCam = camFree;
    }
    else if (currentCam === 'backward') {
        controls.enabled = false;
        camBack.rotation.set(viewPitch, viewYaw, 0, 'YXZ');
        activeCam = camBack;
    }
    else if (currentCam === 'forward') {
        controls.enabled = false;
        camFwd.rotation.set(viewPitch, Math.PI + viewYaw, 0, 'YXZ');
        activeCam = camFwd;
    }
    else if (currentCam === 'moon') {
        controls.enabled = false;
        const toMoon = moon.position.clone().sub(iss.position).normalize();
        camMoon.position.copy(iss.position).add(toMoon.clone().multiplyScalar(3));
        camMoon.lookAt(moon.position);
        activeCam = camMoon;
    }

    renderPass.camera = activeCam;

    if (sunOn) {
        const issN = iss.position.clone().normalize();
        const sunN = sunPos.clone().normalize();
        const angleDeg = Math.acos(issN.dot(sunN)) * (180 / Math.PI);
        if (angleDeg < 85) { illumSpan.textContent = "☀️ НА СОЛНЦЕ; illumSpan.style.color = "var(--amber)"; }
        else if (angleDeg <= 112) { illumSpan.textContent = "🌅 ТЕРМИНАТОР"; illumSpan.style.color = "#ff7f50"; }
        else { illumSpan.textContent = "🌑 В ТЕНИ"; illumSpan.style.color = "var(--text-dim)"; }

        const sfi = sunPos.clone().sub(iss.position).normalize();
        panels.forEach(p => { p.rotation.x = THREE.MathUtils.lerp(p.rotation.x, Math.atan2(sfi.y, sfi.z), 0.01); });
    } else {
        sunLight.position.copy(activeCam.position);
        illumSpan.textContent = "🌕 ПОЛНАЯ ОСВЕЩЕННОСТЬ"; illumSpan.style.color = "var(--accent)";
    }

    const secs = Math.floor((Date.now() - appStart) / 1000);
    document.getElementById('map-ttime').textContent = secs + ' с';
    document.getElementById('map-tdist').textContent = trackDistKm.toFixed(1) + ' км';

    if (isTrackingActive && leafMap && mapCont.style.display === 'block') {
        if (!leafMap._lastTrackUpdate || nowFrame - leafMap._lastTrackUpdate > 1000) {
            isProgrammaticZoom = true;
            leafMap.panTo([virtualLat, virtualLon], {animate: true, duration: 1, easeLinearity: 1});
            leafMap._lastTrackUpdate = nowFrame;
            setTimeout(() => { isProgrammaticZoom = false; }, 900);
        }
    }

    const tempV = moon.position.clone();
    tempV.project(activeCam);
    const moonLabel = document.getElementById('moon-label');
    if (tempV.z > 1.0 || tempV.x < -1.1 || tempV.x > 1.1 || tempV.y < -1.1 || tempV.y > 1.1) {
        moonLabel.style.opacity = '0';
    } else {
        const halfW = window.innerWidth / 2;
        const halfH = window.innerHeight / 2;
        moonLabel.style.opacity = '1';
        moonLabel.style.transform = `translate(-50%, -100%) translate(${tempV.x * halfW + halfW}px, ${-tempV.y * halfH + halfH - 20}px)`;
    }
    
    // --- ГЕОМЕТРИЧЕСКАЯ БЛОКИРОВКА СОЛНЦА СКВОЗЬ ЗЕМЛЮ ---
  if (sunOn) {
        const camWorldPos = new THREE.Vector3();
        activeCam.getWorldPosition(camWorldPos);

        // Вектор от камеры к Солнцу
        const camToSun = sunPos.clone().sub(camWorldPos).normalize();
        // Вектор от камеры к центру Земли (0, 0, 0)
        const camToEarth = new THREE.Vector3(0, 0, 0).sub(camWorldPos);
        
        // Смотрим ли мы в сторону Земли?
        const projection = camToEarth.dot(camToSun);
        
        let isOccluded = false;
        if (projection > 0) {
            // Вычисляем кратчайшее расстояние от центра Земли до луча зрения на Солнце
            const distanceToRay = new THREE.Vector3().crossVectors(camToSun, camToEarth).length();
            // Если луч упирается в Землю (расстояние меньше радиуса Земли + чуть-чуть атмосферы)
            if (distanceToRay < R_EARTH + 0.1) {
                isOccluded = true;
            }
        }
        // Выключаем блик, если Солнце за горизонтом
        lensflare.visible = !isOccluded;
    } else {
        lensflare.visible = false;
    }
    // -----------------------------------------------------
    
updateSunTimers();
    composer.render();
}

window.addEventListener('resize', () => {
    [camFree,camBack,camFwd,camMoon].forEach(c => { c.aspect = window.innerWidth/window.innerHeight; c.updateProjectionMatrix(); });
    renderer.setSize(window.innerWidth, window.innerHeight); composer.setSize(window.innerWidth, window.innerHeight);
    if (leafMap && mapCont.style.display === 'block') leafMap.invalidateSize();
});

fetchISS(); 
setInterval(fetchISS, 10000); 
animate();
</script>
