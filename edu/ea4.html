<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>AERO 3D TRACKER</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=Share+Tech+Mono&family=Rajdhani:wght@400;500;600;700&display=swap');
:root {
    --accent: #00d2ff;
    --accent-dim: rgba(0, 210, 255, 0.15);
    --accent-border: rgba(0, 210, 255, 0.4);
    --bg-panel: rgba(10, 14, 20, 0.75);
    --border-panel: rgba(255, 255, 255, 0.1);
    --red: #ff4757;
    --amber: #ffa502;
    --text-main: #f1f2f6;
    --text-dim: rgba(255, 255, 255, 0.6);
    --font-mono: 'Share Tech Mono', monospace;
    --font-hud: 'Orbitron', monospace;
    --font-body: 'Rajdhani', sans-serif;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body, html { width:100%; height:100%; overflow:hidden; background:#000208; font-family:var(--font-body); color:var(--text-main); user-select:none; }
canvas { display:block; width:100%; height:100%; outline:none; }

#global-loader {
    position: fixed; top:0; left:0; width:100%; height:100%; background: #000208; z-index: 99999;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    transition: opacity 0.8s ease, visibility 0.8s;
}
.core-loader { position: relative; width: 120px; height: 120px; display: flex; align-items: center; justify-content: center; }
.core-loader svg { width: 100%; height: 100%; animation: rotLoader 8s linear infinite; }
.core-loader circle { fill: none; stroke: var(--accent); stroke-width: 1; stroke-dasharray: 20 10; opacity: 0.7; }
.core-loader .c2 { stroke: var(--amber); stroke-dasharray: 40 20; animation: rotLoader 4s linear infinite reverse; transform-origin: 50% 50%; }
.core-loader .c3 { stroke: #fff; stroke-width: 0.5; stroke-dasharray: 100; opacity: 0.3; }
@keyframes rotLoader { 100% { transform: rotate(360deg); } }
.loader-text { font-family: var(--font-hud); font-size: 14px; letter-spacing: 6px; color: var(--accent); margin-top: 30px; text-shadow: 0 0 10px var(--accent); animation: pulseText 1.5s alternate infinite; }
@keyframes pulseText { 0% { opacity: 0.5; } 100% { opacity: 1; } }

#ui-layer {
    position:absolute; top:0; left:0; width:100%; height:100%;
    pointer-events:none; z-index:10; display:flex; flex-direction:column; justify-content:space-between; padding:20px;
}
.panel {
    background: var(--bg-panel); backdrop-filter: blur(20px) saturate(1.2);
    border: 1px solid var(--border-panel); border-radius: 12px; pointer-events: auto;
    box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5), inset 0 1px 0 rgba(255, 255, 255, 0.05);
}
.top-container { display: flex; justify-content: space-between; align-items: flex-start; pointer-events: none; width: 100%; height: 100%; }
#hud-left { padding:20px 24px; min-width:320px; max-width:400px; pointer-events: auto; align-self: flex-start; }
.brand { display:flex; align-items:center; gap:12px; margin-bottom:20px; }
.brand-dot { width:8px; height:8px; background:var(--accent); border-radius:50%; box-shadow:0 0 10px var(--accent); animation:dotP 2s infinite; }
@keyframes dotP { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.4;transform:scale(.6)} }
.brand-title { font-family:var(--font-hud); font-size:18px; font-weight:700; color:var(--accent); letter-spacing:3px; }
.brand-sub { font-size:10px; color:var(--text-dim); letter-spacing:2px; font-family:var(--font-mono); margin-top:4px; }
.tel-grid { display:grid; grid-template-columns:1fr 1fr; gap:12px 20px; }
.tel-label { font-size:10px; color:var(--text-dim); text-transform:uppercase; letter-spacing:1.5px; font-family:var(--font-mono); margin-bottom:4px; }
.tel-val { font-family:var(--font-mono); font-size:20px; color:var(--text-main); font-weight:600; }
.tel-val.hi { color:var(--accent); text-shadow:0 0 10px rgba(0, 210, 255, 0.3); }
.sep { height:1px; background:linear-gradient(90deg, var(--border-panel), transparent); margin:16px 0; }
.sys-status-row { display: flex; align-items: center; gap: 15px; margin-top: 15px; font-family: var(--font-mono); font-size: 11px; letter-spacing: 1px; }
.status-dot { display:inline-block; width:6px; height:6px; background:var(--amber); border-radius:50%; animation:dotP 1.5s infinite; }

#planes-list-panel { width: 300px; max-height: calc(100% - 100px); display: flex; flex-direction: column; padding: 16px; pointer-events: auto; align-self: flex-start; }
.list-header { font-family: var(--font-hud); font-size: 14px; color: var(--accent); letter-spacing: 2px; margin-bottom: 12px; border-bottom: 1px solid var(--border-panel); padding-bottom: 8px; }
#planes-list-content { overflow-y: auto; display: flex; flex-direction: column; gap: 8px; padding-right: 5px; }
#planes-list-content::-webkit-scrollbar { width: 4px; }
#planes-list-content::-webkit-scrollbar-thumb { background: var(--accent-border); border-radius: 4px; }
.plane-item { background: rgba(255,255,255,0.03); border: 1px solid transparent; border-radius: 6px; padding: 10px; cursor: pointer; transition: 0.2s; display: flex; justify-content: space-between; align-items: center; }
.plane-item:hover { background: rgba(255,255,255,0.08); border-color: rgba(255,255,255,0.1); }
.plane-item.active { background: var(--accent-dim); border-color: var(--accent); box-shadow: 0 0 10px rgba(0,210,255,0.1); }
.pi-callsign { font-family: var(--font-mono); font-size: 15px; font-weight: bold; color: #fff; }
.pi-details { font-size: 11px; color: var(--text-dim); margin-top: 4px; }

#bottom-dock {
    position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
    background: var(--bg-panel); backdrop-filter: blur(25px) saturate(1.5);
    border: 1px solid var(--border-panel); border-radius: 40px; padding: 10px 15px;
    display: flex; gap: 10px; pointer-events: auto; box-shadow: 0 15px 40px rgba(0,0,0,0.6);
    align-items: center; z-index: 100;
}
.dock-btn {
    width: 44px; height: 44px; border-radius: 50%; background: rgba(255,255,255,0.03);
    border: 1px solid transparent; display: flex; align-items: center; justify-content: center;
    cursor: pointer; transition: all 0.2s; color: var(--text-dim);
}
.dock-btn svg { width: 22px; height: 22px; fill: none; stroke: currentColor; stroke-width: 1.5; stroke-linecap: round; stroke-linejoin: round; }
.dock-btn:hover { background: rgba(255,255,255,0.08); color: #fff; border-color: rgba(255,255,255,0.2); }
.dock-btn.active { background: var(--accent-dim); color: var(--accent); border-color: var(--accent-border); box-shadow: 0 0 15px rgba(0,210,255,0.25); }
.dock-sep { width: 1px; height: 24px; background: var(--border-panel); margin: 0 5px; }

#crosshair { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); pointer-events:none; z-index:20; display:flex; align-items:center; justify-content:center; }
.ch-ring { width:80px; height:80px; border:1px solid var(--border-panel); border-radius:50%; position:relative; overflow:hidden; }
.ch-ring::before,.ch-ring::after { content:''; position:absolute; background:var(--accent); }
.ch-ring::before { width:10px; height:1px; top:50%; left:-10px; box-shadow: 90px 0 0 var(--accent); }
.ch-ring::after { width:1px; height:10px; left:50%; top:-10px; box-shadow: 0 90px 0 var(--accent); }
.radar-sweep { position:absolute; width:100%; height:100%; background:conic-gradient(from 0deg, transparent 70%, var(--accent) 100%); animation:sweep 1.2s linear infinite; display:none; }
.scanning .radar-sweep { display:block; }
@keyframes sweep { to { transform:rotate(360deg); } }
.ch-dot { width:4px; height:4px; background:var(--accent); border-radius:50%; position:absolute; box-shadow:0 0 8px var(--accent); }

#scan-btn {
    position:absolute; top:calc(50% + 60px); left:50%; transform:translateX(-50%);
    background:var(--accent-dim); border:1px solid var(--accent); color:var(--accent);
    padding:8px 24px; border-radius:20px; font-family:var(--font-hud); font-size:12px;
    letter-spacing:2px; cursor:pointer; pointer-events:auto; transition:0.2s;
    backdrop-filter: blur(10px); z-index:20;
}
#scan-btn:hover { background:var(--accent); color:#000; box-shadow:0 0 15px var(--accent); }

#labels-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 90; overflow: hidden; }
.plane-label {
    position: absolute; top: 0; left: 0; color: #fff; font-family: var(--font-mono);
    background: rgba(0, 0, 0, 0.6); border: 1px solid var(--border-panel); border-radius: 4px;
    padding: 4px 8px; font-size: 12px; pointer-events: auto; cursor: pointer;
    transform: translate(-50%, -100%); transition: background 0.2s; white-space: nowrap;
    display: flex; align-items: center; gap: 6px;
}
.plane-label:hover, .plane-label.active { background: var(--accent-dim); border-color: var(--accent); color: var(--accent); box-shadow: 0 0 10px rgba(0,210,255,0.2); }
.plane-label::after { content: ''; position: absolute; bottom: -5px; left: 50%; transform: translateX(-50%); border-width: 5px 5px 0; border-style: solid; border-color: rgba(255, 255, 255, 0.1) transparent transparent transparent; }
.plane-icon { font-size: 16px; color: var(--text-dim); }
.plane-label:hover .plane-icon, .plane-label.active .plane-icon { color: var(--accent); }

/* Стилизация 2D карты под радар диспетчера */
#map-container {
    position:absolute; top:0; left:0; width:100%; height:100%;
    background:#05070a; display:none; z-index:5; pointer-events:auto;
}
#leaflet-map { width:100%; height:100%; background:#05070a !important; }
.leaflet-control-attribution { display:none !important; }
/* Тактический фильтр на тайлы */
.leaflet-tile-pane { filter: invert(1) hue-rotate(180deg) brightness(0.8) contrast(1.2) sepia(0.2); }
/* Радарная сетка поверх карты */
.map-radar-grid {
    position: absolute; top:0; left:0; width:100%; height:100%; z-index: 400; pointer-events: none;
    background: 
        linear-gradient(rgba(0, 210, 255, 0.1) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0, 210, 255, 0.1) 1px, transparent 1px);
    background-size: 100px 100px;
}
.plane-icon-inner { display: flex; align-items: center; justify-content: center; transition: transform 0.1s linear; }

.scanline { position:fixed; top:0; left:0; right:0; bottom:0; background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.04) 2px,rgba(0,0,0,.04) 4px); pointer-events:none; z-index:1000; }
</style>
<script type="importmap">
{"imports":{"three":"https://unpkg.com/three@0.160.0/build/three.module.js","three/addons/":"https://unpkg.com/three@0.160.0/examples/jsm/"}}

</head>
<body>
<div id="global-loader">
<div class="core-loader"><svg viewBox="0 0 100 100"><circle cx="50" cy="50" r="45"></circle><circle cx="50" cy="50" r="35" class="c2"></circle><circle cx="50" cy="50" r="25" class="c3"></circle></svg></div>
<div class="loader-text">INITIALIZING</div>
</div>
<div class="scanline"></div>
<div id="labels-layer"></div>
<div id="crosshair">
    <div class="ch-ring" id="radar-ring"><div class="radar-sweep"></div></div>
    <div class="ch-dot"></div>
</div>
<button id="scan-btn">СКАНИРОВАТЬ СЕКТОР</button>

<div id="map-container">
    <div class="map-radar-grid"></div>
    <div id="leaflet-map"></div>
</div>

<div id="ui-layer">
    <div class="top-container">
        <div id="hud-left" class="panel">
            <div class="brand">
                <div class="brand-dot"></div>
                <div>
                    <div class="brand-title">ATC RADAR</div>
                    <div class="brand-sub">ГЛОБАЛЬНЫЙ МОНИТОРИНГ</div>
                </div>
            </div>
            <div class="tel-grid">
                <div><div class="tel-label">ПОЗЫВНОЙ</div><div class="tel-val hi" id="hud-callsign">N/A</div></div>
                <div><div class="tel-label">СТРАНА</div><div class="tel-val hi" id="hud-country" style="font-size:14px; margin-top:4px;">N/A</div></div>
                <div><div class="tel-label">СКОРОСТЬ</div><div class="tel-val" id="hud-vel">-- км/ч</div></div>
                <div><div class="tel-label">ВЫСОТА</div><div class="tel-val" id="hud-alt">-- м</div></div>
                <div><div class="tel-label">КУРС</div><div class="tel-val" id="hud-head">-- °</div></div>
                <div><div class="tel-label">ВЕРТ. СКОР.</div><div class="tel-val" id="hud-vrate">-- м/с</div></div>
            </div>
            <div class="sep"></div>
            <div class="sys-status-row">
                <span class="status-dot" id="api-status-dot"></span>
                <span id="api-status-text">ОЖИДАНИЕ СКАНИРОВАНИЯ</span>
            </div>
        </div>
        
        <div id="planes-list-panel" class="panel">
            <div class="list-header">НАЙДЕННЫЕ БОРТЫ</div>
            <div id="planes-list-content"></div>
        </div>
    </div>
</div>

<div id="bottom-dock">
    <div class="dock-btn active" data-cam="global" title="Глобальный обзор">
        <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
    </div>
    <div class="dock-sep"></div>
    <div class="dock-btn" data-cam="map2d" title="ATC Радар (2D)">
        <svg viewBox="0 0 24 24"><polygon points="3 6 9 3 15 6 21 3 21 18 15 21 9 18 3 21"/><line x1="9" y1="3" x2="9" y2="18"/><line x1="15" y1="6" x2="15" y2="21"/></svg>
    </div>
</div>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { Lensflare, LensflareElement } from 'three/addons/objects/Lensflare.js';
import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';

const DEG_TO_RAD = Math.PI / 180;
const R_EARTH = 63.71;
let currentMode = 'global'; 
let trackedPlane = null;
let livePlanes = {};
let planeLabels = {};
let lastFrameTime = Date.now();

const scene = new THREE.Scene();
const renderer = new THREE.WebGLRenderer({ antialias:true, powerPreference:'high-performance' });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.15;
renderer.setClearColor(0x000208);
document.body.appendChild(renderer.domElement);

const camGlobal = new THREE.PerspectiveCamera(50, window.innerWidth/window.innerHeight, 0.1, 20000);
const renderPass = new RenderPass(scene, camGlobal);
const bloom = new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 0.8, 0.9, 0.85);
const composer = new EffectComposer(renderer);
composer.addPass(renderPass); composer.addPass(bloom);

const tl = new THREE.TextureLoader(); tl.setCrossOrigin('anonymous');
let texturesLoaded = 0;
const checkLoader = () => { texturesLoaded++; if (texturesLoaded >= 3) { document.getElementById('global-loader').style.opacity = '0'; setTimeout(()=>document.getElementById('global-loader').style.display='none', 800); } };

const tDay = tl.load('./textures/earth-blue-marble.jpg', checkLoader);
const tBump = tl.load('./textures/earth-topology.png', checkLoader);
const tSpec = tl.load('./textures/earth-water.png', checkLoader);
tDay.colorSpace = THREE.SRGBColorSpace;

const earthMat = new THREE.MeshPhongMaterial({ map: tDay, bumpMap: tBump, bumpScale: 0.1, specularMap: tSpec, specular: new THREE.Color(0x111111), shininess: 5 });
const earth = new THREE.Mesh(new THREE.SphereGeometry(R_EARTH, 80, 80), earthMat);
scene.add(earth);

const atmoMat = new THREE.ShaderMaterial({
    uniforms: { sunDirection: { value: new THREE.Vector3(1, 0, 0) } },
    vertexShader: `varying vec3 vNormal; varying vec3 vWorldPos; void main() { vNormal = normalize(normalMatrix * normal); vWorldPos = (modelMatrix * vec4(position, 1.0)).xyz; gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0); }`,
    fragmentShader: `uniform vec3 sunDirection; varying vec3 vNormal; varying vec3 vWorldPos; void main() { float fresnel = 1.0 - max(0.0, dot(vNormal, vec3(0.0, 0.0, 1.0))); fresnel = pow(fresnel, 6.0); float sunDot = dot(normalize(vWorldPos), sunDirection); vec3 color = mix(vec3(0.0), mix(vec3(1.0, 0.3, 0.1), vec3(0.3, 0.6, 1.0), smoothstep(-0.1, 0.3, sunDot)), smoothstep(-0.2, 0.1, sunDot)); gl_FragColor = vec4(color * fresnel, 1.0); }`,
    blending: THREE.AdditiveBlending, side: THREE.FrontSide, transparent: true, depthWrite: false
});
const atmosphere = new THREE.Mesh(new THREE.SphereGeometry(R_EARTH + 0.6, 80, 80), atmoMat);
scene.add(atmosphere);

const bgStarsGeo = new THREE.BufferGeometry(); const bgStarsPos = []; const bgStarsColors = [];
for (let i = 0; i < 2000; i++) {
    const raRad = Math.random() * Math.PI * 2; const decRad = Math.asin((Math.random() * 2) - 1); const r = 8000 + Math.random() * 500;
    bgStarsPos.push(r * Math.cos(decRad) * Math.cos(raRad), r * Math.sin(decRad), -r * Math.cos(decRad) * Math.sin(raRad));
    const c = 0.5 + Math.random() * 0.5; bgStarsColors.push(c, c, c + Math.random() * 0.2);
}
bgStarsGeo.setAttribute('position', new THREE.Float32BufferAttribute(bgStarsPos, 3));
bgStarsGeo.setAttribute('color', new THREE.Float32BufferAttribute(bgStarsColors, 3));
const bgStarsMat = new THREE.PointsMaterial({ size: 10, vertexColors: true, transparent: true, opacity: 0.8, depthWrite: false });
scene.add(new THREE.Points(bgStarsGeo, bgStarsMat));

const ambientLight = new THREE.AmbientLight(0xffffff, 0.2); scene.add(ambientLight);
const hemiLight = new THREE.HemisphereLight(0x000208, 0x4fc3f7, 0.5); scene.add(hemiLight);
const sunLight = new THREE.DirectionalLight(0xffffff, 3.5); scene.add(sunLight);
const sunPos = new THREE.Vector3(5000, 1000, -2000); sunLight.position.copy(sunPos);
atmoMat.uniforms.sunDirection.value.copy(sunPos).normalize();

const ctrlGlobal = new OrbitControls(camGlobal, renderer.domElement);
ctrlGlobal.enableDamping = true; ctrlGlobal.minDistance = R_EARTH + 1; ctrlGlobal.maxDistance = R_EARTH * 5;
camGlobal.position.set(0, 0, R_EARTH * 2.5);

// ====== ЛОГИКА 2D КАРТЫ ======
let leafMap, leafMarker, iconInnerNode;
function initMap() {
    if(leafMap) return;
    leafMap = L.map('leaflet-map', { zoomControl:true }).setView([0,0], 6);
    const basemaps = {
        "Google Гибрид": L.tileLayer('https://mt1.google.com/vt/lyrs=y&x={x}&y={y}&z={z}', {maxZoom:20}),
        "Google Спутник": L.tileLayer('https://mt1.google.com/vt/lyrs=s&x={x}&y={y}&z={z}', {maxZoom:20}),
        "Google Карта": L.tileLayer('https://mt1.google.com/vt/lyrs=m&x={x}&y={y}&z={z}', {maxZoom:20}),
        "OpenStreetMap": L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {maxZoom:19})
    };
    basemaps["Google Гибрид"].addTo(leafMap);
    L.control.layers(basemaps).addTo(leafMap);
    
    // Создаем маркер с внутренним div, который будем вращать
    const icon = L.divIcon({ 
        className:'plane-map-marker', 
        html:'<div class="plane-icon-inner" style="color:var(--accent); font-size:32px; width:40px; height:40px; text-shadow:0 0 10px rgba(0,210,255,0.8);">✈</div>',
        iconSize: [40, 40],
        iconAnchor: [20, 20]
    });
    leafMarker = L.marker([0,0], {icon:icon}).addTo(leafMap);
}

document.querySelectorAll('.dock-btn').forEach(btn => btn.addEventListener('click', () => switchCam(btn.dataset.cam)));

function switchCam(mode) {
    document.querySelectorAll('.dock-btn').forEach(b => b.classList.remove('active'));
    document.querySelector(`[data-cam="${mode}"]`).classList.add('active');
    currentMode = mode;
    
    if(mode === 'map2d') {
        document.getElementById('map-container').style.display = 'block';
        document.getElementById('crosshair').style.display = 'none';
        document.getElementById('scan-btn').style.display = 'none';
        ctrlGlobal.enabled = false;
        
        if(!leafMap) initMap();
        if(leafMap && trackedPlane && livePlanes[trackedPlane]) {
            leafMap.panTo([livePlanes[trackedPlane].cLat, livePlanes[trackedPlane].cLon]);
        }
        setTimeout(()=>leafMap.invalidateSize(), 100);
    } else {
        document.getElementById('map-container').style.display = 'none';
        document.getElementById('crosshair').style.display = 'flex';
        document.getElementById('scan-btn').style.display = 'block';
        ctrlGlobal.enabled = true;
    }
}

function selectPlane(id) {
    trackedPlane = id;
    Object.values(planeLabels).forEach(el => el.classList.remove('active'));
    document.querySelectorAll('.plane-item').forEach(el => el.classList.remove('active'));
    
    if(planeLabels[id]) planeLabels[id].classList.add('active');
    const listItem = document.getElementById(`list-item-${id}`);
    if(listItem) {
        listItem.classList.add('active');
        listItem.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }
    
    if(livePlanes[id] && currentMode === 'global') {
        const p = livePlanes[id];
        const rLat = p.cLat * DEG_TO_RAD; const rLon = p.cLon * DEG_TO_RAD; const r = R_EARTH + 2;
        const targetPos = new THREE.Vector3(r*Math.cos(rLat)*Math.cos(rLon), r*Math.sin(rLat), -r*Math.cos(rLat)*Math.sin(rLon));
        ctrlGlobal.target.set(0,0,0);
        camGlobal.position.copy(targetPos);
    }
}

function updatePlanesList() {
    const container = document.getElementById('planes-list-content');
    container.innerHTML = '';
    const planes = Object.values(livePlanes).sort((a,b) => b.vel - a.vel);
    
    if(planes.length === 0) {
        container.innerHTML = '<div style="color:var(--text-dim); font-size:12px;">Бортов не найдено. Сканируйте другую область.</div>';
        return;
    }

    planes.forEach(p => {
        const el = document.createElement('div');
        el.className = 'plane-item';
        el.id = `list-item-${p.id}`;
        if(trackedPlane === p.id) el.classList.add('active');
        el.innerHTML = `
            <div>
                <div class="pi-callsign">${p.callsign}</div>
                <div class="pi-details">${p.country} | ${Math.round(p.alt)}м</div>
            </div>
            <div style="text-align:right;">
                <div class="pi-callsign" style="color:var(--accent); font-size:13px;">${Math.round(p.vel)} км/ч</div>
                <div class="pi-details">${Math.round(p.head)}°</div>
            </div>
        `;
        el.addEventListener('click', () => selectPlane(p.id));
        container.appendChild(el);
    });
}

document.getElementById('scan-btn').addEventListener('click', async () => {
    if (currentMode !== 'global') return;
    const rc = new THREE.Raycaster(); rc.setFromCamera(new THREE.Vector2(0,0), camGlobal);
    const hits = rc.intersectObject(earth);
    if (hits.length > 0) {
        const p = hits[0].point.clone().normalize();
        const lat = Math.asin(p.y) * (180/Math.PI);
        const lon = Math.atan2(-p.z, p.x) * (180/Math.PI);
        
        document.getElementById('radar-ring').classList.add('scanning');
        document.getElementById('api-status-dot').style.background = 'var(--amber)';
        document.getElementById('api-status-text').textContent = 'СКАНИРОВАНИЕ СЕКТОРА...';
        
        const bounds = 8;
        try {
            const res = await fetch(`https://planes-alpha.vercel.app/api?lamin=${lat-bounds}&lomin=${lon-bounds}&lamax=${lat+bounds}&lomax=${lon+bounds}`);
            if(!res.ok) throw new Error();
            const data = await res.json();
            const now = Date.now();
            
            Object.keys(livePlanes).forEach(k => livePlanes[k].updated = false);
            
            if(data && data.states) {
                data.states.forEach(s => {
                    if(s[5]!==null && s[6]!==null && s[9]!==null) {
                        const id = s[0];
                        livePlanes[id] = { id:id, callsign:(s[1]||'UNK').trim(), country:s[2]||'Unknown', lon:s[5], lat:s[6], alt:s[7]||10000, vel:s[9]*3.6, head:s[10]||0, vrate:s[11]||0, lastT:now, updated:true };
                    }
                });
                
                Object.keys(livePlanes).forEach(k => {
                    if(!livePlanes[k].updated) {
                        delete livePlanes[k];
                        if(planeLabels[k]) { planeLabels[k].remove(); delete planeLabels[k]; }
                        if(trackedPlane === k) trackedPlane = null;
                    }
                });
                
                document.getElementById('api-status-dot').style.background = 'var(--accent)';
                document.getElementById('api-status-text').textContent = `НАЙДЕНО БОРТОВ: ${Object.keys(livePlanes).length}`;
                updatePlanesList();
            }
        } catch(e) {
            document.getElementById('api-status-dot').style.background = 'var(--red)';
            document.getElementById('api-status-text').textContent = 'ОШИБКА API';
        }
        document.getElementById('radar-ring').classList.remove('scanning');
    }
});

function animate() {
    requestAnimationFrame(animate);
    const now = Date.now(); const dt = (now - lastFrameTime) / 1000; lastFrameTime = now;
    const hW = window.innerWidth/2; const hH = window.innerHeight/2;

    Object.keys(livePlanes).forEach(id => {
        const p = livePlanes[id];
        const dtS = (now - p.lastT) / 1000;
        const hdg = p.head * DEG_TO_RAD;
        const mS = p.vel / 3.6;
        const lSpd = (mS * Math.cos(hdg)) / 111320;
        const lnSpd = (mS * Math.sin(hdg)) / (111320 * Math.cos(p.lat * DEG_TO_RAD));
        p.cLat = p.lat + lSpd * dtS; p.cLon = p.lon + lnSpd * dtS;

        if(currentMode === 'global') {
            const rLat = p.cLat * DEG_TO_RAD; const rLon = p.cLon * DEG_TO_RAD;
            const r = R_EARTH + (p.alt/100000); 
            const pos = new THREE.Vector3(r*Math.cos(rLat)*Math.cos(rLon), r*Math.sin(rLat), -r*Math.cos(rLat)*Math.sin(rLon));
            
            const dir = new THREE.Vector3().subVectors(pos, camGlobal.position);
            const dist = dir.length(); dir.normalize();
            const b = 2 * camGlobal.position.dot(dir); const c = camGlobal.position.lengthSq() - (R_EARTH*R_EARTH);
            let occluded = false;
            if(b*b - 4*c > 0) { const t = (-b - Math.sqrt(b*b - 4*c))/2; if(t > 0 && t < dist) occluded = true; }

            if(!planeLabels[id]) {
                const el = document.createElement('div'); el.className = 'plane-label';
                el.addEventListener('click', () => selectPlane(id));
                document.getElementById('labels-layer').appendChild(el);
                planeLabels[id] = el;
            }
            
            const el = planeLabels[id];
            if(!occluded && camGlobal.position.distanceTo(pos) < R_EARTH * 2.5) {
                el.style.display = 'flex'; 
                // Векторная иконка, повернутая по курсу полета
                el.innerHTML = `<div class="plane-icon" style="transform: rotate(${Math.round(p.head)}deg);">✈</div> ${p.callsign}`;
                
                const proj = pos.clone().project(camGlobal);
                if(proj.z > 1.0 || Math.abs(proj.x)>1.1 || Math.abs(proj.y)>1.1) el.style.opacity = '0';
                else { el.style.opacity = '1'; el.style.transform = `translate(-50%, -100%) translate(${proj.x*hW + hW}px, ${-proj.y*hH + hH - 10}px)`; }
            } else { el.style.display = 'none'; }
        } else {
            if(planeLabels[id]) planeLabels[id].style.display = 'none';
        }
    });

    if(trackedPlane && livePlanes[trackedPlane]) {
        const p = livePlanes[trackedPlane];
        document.getElementById('hud-callsign').textContent = p.callsign;
        document.getElementById('hud-country').textContent = p.country;
        document.getElementById('hud-vel').textContent = Math.round(p.vel) + ' км/ч';
        document.getElementById('hud-alt').textContent = Math.round(p.alt) + ' м';
        document.getElementById('hud-head').textContent = Math.round(p.head) + ' °';
        document.getElementById('hud-vrate').textContent = p.vrate.toFixed(1) + ' м/с';

        if(currentMode === 'map2d' && leafMap) {
            leafMarker.setLatLng([p.cLat, p.cLon]);
            // Поворачиваем DOM элемент иконки в Leaflet по курсу
            if(!iconInnerNode) iconInnerNode = leafMarker.getElement().querySelector('.plane-icon-inner');
            if(iconInnerNode) iconInnerNode.style.transform = `rotate(${p.head}deg)`;
            leafMap.panTo([p.cLat, p.cLon], {animate:false});
        }
    }

    if(currentMode === 'global') {
        ctrlGlobal.update();
        composer.render();
    }
}

window.addEventListener('resize', () => {
    camGlobal.aspect = window.innerWidth/window.innerHeight; camGlobal.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight); composer.setSize(window.innerWidth, window.innerHeight);
});

animate();
</script>
</body>
