<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>МКС - Симулятор</title>
<link rel="icon" href="https://img.icons8.com/?size=100&id=uRvqauJrCCGj&format=png&color=000000" type="image/png">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/satellite.js/5.0.0/satellite.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=Share+Tech+Mono&family=Rajdhani:wght@400;500;600;700&display=swap');

:root {
    --accent: #00d2ff;
    --accent-dim: rgba(0, 210, 255, 0.15);
    --accent-border: rgba(0, 210, 255, 0.4);
    --bg-panel: rgba(20, 24, 30, 0.65);
    --border-panel: rgba(255, 255, 255, 0.1);
    --red: #ff4757;
    --amber: #ffa502;
    --text-main: #f1f2f6;
    --text-dim: rgba(255, 255, 255, 0.6);
    --font-mono: 'Share Tech Mono', monospace;
    --font-hud: 'Orbitron', monospace;
    --font-body: 'Rajdhani', sans-serif;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body, html { width:100%; height:100%; overflow:hidden; background:#000208; font-family:var(--font-body); color:var(--text-main); user-select:none; }
canvas { display:block; width:100%; height:100%; outline:none; }

#global-loader { position: fixed; top:0; left:0; width:100%; height:100%; background: #000208; z-index: 99999; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: opacity 0.8s ease, visibility 0.8s; }
.core-loader { position: relative; width: 120px; height: 120px; display: flex; align-items: center; justify-content: center; }
.core-loader svg { width: 100%; height: 100%; animation: rotLoader 8s linear infinite; }
.core-loader circle { fill: none; stroke: var(--accent); stroke-width: 1; stroke-dasharray: 20 10; opacity: 0.7; }
.core-loader .c2 { stroke: var(--amber); stroke-dasharray: 40 20; animation: rotLoader 4s linear infinite reverse; transform-origin: 50% 50%; }
.core-loader .c3 { stroke: #fff; stroke-width: 0.5; stroke-dasharray: 100; opacity: 0.3; }
@keyframes rotLoader { 100% { transform: rotate(360deg); } }
.loader-text { font-family: var(--font-hud); font-size: 14px; letter-spacing: 6px; color: var(--accent); margin-top: 30px; text-shadow: 0 0 10px var(--accent); animation: pulseText 1.5s ease-in-out infinite alternate; }
@keyframes pulseText { 0% { opacity: 0.5; } 100% { opacity: 1; } }

#ui-layer { position:absolute; top:0; left:0; width:100%; height:100%; pointer-events:none; z-index:10; display:flex; flex-direction:column; justify-content:space-between; padding:20px; }
.panel { background: var(--bg-panel); backdrop-filter: blur(20px) saturate(1.2); border: 1px solid var(--border-panel); border-radius: 12px; pointer-events: auto; box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5), inset 0 1px 0 rgba(255, 255, 255, 0.05); transition: transform 0.4s, opacity 0.4s; }
.top-container { display: flex; justify-content: space-between; align-items: flex-start; pointer-events: none; }
#hud-left { padding:20px 24px; min-width:320px; pointer-events: auto; }

.brand { display:flex; align-items:center; gap:12px; margin-bottom:20px; }
.brand-dot { width:8px; height:8px; background:var(--accent); border-radius:50%; box-shadow:0 0 10px var(--accent); animation:dotP 2s infinite; }
.brand-dot.manual { background: var(--red); box-shadow: 0 0 15px var(--red); animation: dotFast 0.5s infinite; }
@keyframes dotP { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.4;transform:scale(.6)} }
@keyframes dotFast { 0%,100%{opacity:1;} 50%{opacity:.2;} }
.brand-title { font-family:var(--font-hud); font-size:18px; font-weight:700; color:var(--accent); letter-spacing:3px; transition: color 0.3s; }
.brand-title.manual { color: var(--red); text-shadow: 0 0 10px rgba(255,71,87,0.5); }
.brand-sub { font-size:10px; color:var(--text-dim); letter-spacing:2px; font-family:var(--font-mono); margin-top:4px; }

.tel-grid { display:grid; grid-template-columns:1fr 1fr; gap:12px 20px; }
.tel-label { font-size:10px; color:var(--text-dim); text-transform:uppercase; letter-spacing:1.5px; font-family:var(--font-mono); margin-bottom:4px; }
.tel-val { font-family:var(--font-mono); font-size:20px; color:var(--text-main); font-weight:600; }
.tel-val.hi { color:var(--accent); text-shadow:0 0 10px rgba(0, 210, 255, 0.3); }
.sep { height:1px; background:linear-gradient(90deg, var(--border-panel), transparent); margin:16px 0; }
.loc-label { font-size:10px; color:var(--accent); letter-spacing:1.5px; text-transform:uppercase; font-family:var(--font-mono); margin-bottom:6px; }
.loc-name { font-size:16px; font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; max-width:280px; }
.sys-status-row { display: flex; align-items: center; gap: 15px; margin-top: 15px; font-family: var(--font-mono); font-size: 11px; letter-spacing: 1px; }
.status-dot { display:inline-block; width:6px; height:6px; background:var(--accent); border-radius:50%; animation:dotP 1.5s infinite; }
.status-dot.manual { background: var(--red); box-shadow: 0 0 10px var(--red); }
#illum-status { padding: 4px 8px; border-radius: 4px; background: rgba(0,0,0,0.4); font-weight: bold; border: 1px solid rgba(255,255,255,0.05); }

#bottom-dock { align-self: center; background: var(--bg-panel); backdrop-filter: blur(25px) saturate(1.5); border: 1px solid var(--border-panel); border-radius: 40px; padding: 10px 15px; display: flex; gap: 10px; pointer-events: auto; box-shadow: 0 15px 40px rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,255,255,0.1); align-items: center; }
.dock-btn { width: 44px; height: 44px; border-radius: 50%; background: rgba(255,255,255,0.03); border: 1px solid transparent; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: all 0.2s ease; color: var(--text-dim); position: relative; }
.dock-btn svg { width: 22px; height: 22px; fill: none; stroke: currentColor; stroke-width: 1.5; stroke-linecap: round; stroke-linejoin: round; }
.dock-btn:hover { background: rgba(255,255,255,0.08); color: #fff; border-color: rgba(255,255,255,0.2); }
.dock-btn.active { background: var(--accent-dim); color: var(--accent); border-color: var(--accent-border); box-shadow: 0 0 15px rgba(0,210,255,0.25); }
.dock-btn.danger-btn.active { background: rgba(255,71,87,0.15); color: var(--red); border-color: rgba(255,71,87,0.5); box-shadow: 0 0 15px rgba(255,71,87,0.3); }
.dock-sep { width: 1px; height: 24px; background: var(--border-panel); margin: 0 5px; }

#zoom-container { position: absolute; right: 20px; top: 50%; transform: translateY(-50%); height: 200px; width: 24px; display: flex; align-items: center; justify-content: center; background: rgba(20, 24, 30, 0.5); backdrop-filter: blur(10px); border: 1px solid var(--border-panel); border-radius: 12px; z-index: 100; pointer-events: auto; box-shadow: 0 5px 15px rgba(0,0,0,0.5); }
#zoom-slider { appearance: none; width: 170px; height: 2px; background: rgba(255,255,255,0.2); border-radius: 1px; outline: none; transform: rotate(-90deg); cursor: pointer; }
#zoom-slider::-webkit-slider-thumb { appearance: none; width: 12px; height: 12px; border-radius: 50%; background: var(--accent); box-shadow: 0 0 8px var(--accent); cursor: pointer; }

/* Прицел (показывается только в ручном режиме) */
#crosshair { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 40px; height: 40px; pointer-events: none; z-index: 50; display: none; opacity: 0.7; }
#crosshair::before, #crosshair::after { content: ''; position: absolute; background: var(--accent); box-shadow: 0 0 5px var(--accent); }
#crosshair::before { width: 100%; height: 1px; top: 50%; left: 0; }
#crosshair::after { width: 1px; height: 100%; left: 50%; top: 0; }
.manual-controls-help { position: absolute; bottom: 80px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.7); border: 1px solid var(--accent); padding: 10px 20px; border-radius: 8px; font-family: var(--font-mono); color: var(--accent); font-size: 12px; text-align: center; display: none; pointer-events: none; }
</style>
</head>
<body>

<div id="global-loader">
    <div class="core-loader"><svg viewBox="0 0 100 100"><circle cx="50" cy="50" r="45"></circle><circle cx="50" cy="50" r="35" class="c2"></circle><circle cx="50" cy="50" r="25" class="c3"></circle></svg></div>
    <div class="loader-text"></div>
</div>

<div id="crosshair"></div>
<div class="manual-controls-help" id="manual-help">
    W/S: Газ/Тормоз | A/D: Стрейф | Q/E: Крен | R/F: Вверх/Вниз<br>SHIFT: Форсаж | Мышь (ЛКМ): Направление
</div>

<div id="ui-layer">
    <div class="top-container">
        <div id="hud-left" class="panel">
            <div class="brand">
                <div class="brand-dot" id="brand-dot"></div>
                <div>
                    <div class="brand-title" id="brand-title">МКС</div>
                    <div class="brand-sub" id="brand-sub">ТЕЛЕМЕТРИЯ ОРБИТЫ</div>
                </div>
            </div>
            <div class="tel-grid">
                <div><div class="tel-label">ШИРОТА</div><div class="tel-val hi" id="hud-lat">—</div></div>
                <div><div class="tel-label">ДОЛГОТА</div><div class="tel-val hi" id="hud-lon">—</div></div>
                <div><div class="tel-label">ВЫСОТА</div><div class="tel-val" id="hud-alt">—</div></div>
                <div><div class="tel-label">СКОРОСТЬ</div><div class="tel-val" id="hud-vel">—</div></div>
            </div>
            <div class="sep"></div>
            <div class="loc-label">ЛОКАЦИЯ</div>
            <div class="loc-name" id="hud-loc">Ожидание...</div>
            <div class="sys-status-row">
                <span id="illum-status">ЗАГРУЗКА...</span>
                <div style="flex:1"></div>
                <span class="status-dot" id="status-dot"></span>
                <span id="sys-status-text">СИСТЕМЫ ОК</span>
            </div>
        </div>
    </div>

    <div id="zoom-container"><input type="range" id="zoom-slider" min="0" max="100" value="0"></div>

    <div id="bottom-dock">
        <div class="dock-btn active" data-cam="free" title="Свободная камера"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="4"/><ellipse cx="12" cy="12" rx="10" ry="4" transform="rotate(45 12 12)"/></svg></div>
        <div class="dock-btn" data-cam="forward" title="Курсовая камера"><svg viewBox="0 0 24 24"><path d="M12 20V4M5 11l7-7 7 7"/></svg></div>
        <div class="dock-sep"></div>
        <div class="dock-btn danger-btn" data-cam="manual" title="РУЧНОЕ УПРАВЛЕНИЕ (ПИЛОТ)"><svg viewBox="0 0 24 24"><path d="M5 12h14M12 5v14M8 8l8 8M16 8l-8 8" stroke="currentColor" fill="none"/></svg></div>
    </div>
</div>

<script type="importmap">{"imports":{"three":"https://unpkg.com/three@0.160.0/build/three.module.js","three/addons/":"https://unpkg.com/three@0.160.0/examples/jsm/"}}</script>
<script src="https://cdn.jsdelivr.net/npm/astronomy-engine@2.1.19/astronomy.browser.min.js"></script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { Lensflare, LensflareElement } from 'three/addons/objects/Lensflare.js';
import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';

// ---- БАЗОВЫЕ НАСТРОЙКИ И ДАННЫЕ ----
const DEG_TO_RAD = Math.PI / 180;
const R_EARTH = 63.71; 
let issData = { lat:0, lon:0, alt:400, vel:27000 };
let currentCam = 'free';
let satrec = null; 
let isIntroActive = false;
let apiLoaded = false;
let texturesLoaded = false;
let lastIssUpdateTime = Date.now();

// ---- ИНИЦИАЛИЗАЦИЯ THREE.JS ----
const scene = new THREE.Scene();
const renderer = new THREE.WebGLRenderer({ antialias:true, powerPreference:'high-performance', logarithmicDepthBuffer:true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.15;
renderer.setClearColor(0x000208);
document.body.appendChild(renderer.domElement);

// Камеры
const camFree = new THREE.PerspectiveCamera(50, window.innerWidth/window.innerHeight, 0.00001, 20000);
const camFwd = new THREE.PerspectiveCamera(70, window.innerWidth/window.innerHeight, 0.00001, 20000);
const camManual = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.00001, 20000); // Камера для пилота

const renderPass = new RenderPass(scene, camFree);
const bloom = new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 0.8, 0.9, 0.85);
const composer = new EffectComposer(renderer);
composer.addPass(renderPass); composer.addPass(bloom);

// Загрузка текстур (заглушка для упрощения примера)
const tl = new THREE.TextureLoader();
const tDay = tl.load('https://raw.githubusercontent.com/mrdoob/three.js/master/examples/textures/planets/earth_atmos_2048.jpg', () => checkLoad());
const tBump = tl.load('https://raw.githubusercontent.com/mrdoob/three.js/master/examples/textures/planets/earth_normal_2048.jpg');
const tSpec = tl.load('https://raw.githubusercontent.com/mrdoob/three.js/master/examples/textures/planets/earth_specular_2048.jpg');

function checkLoad() { texturesLoaded = true; hideLoader(); }
function hideLoader() { if(texturesLoaded && apiLoaded) document.getElementById('global-loader').style.opacity = '0'; setTimeout(()=>document.getElementById('global-loader').style.display='none',800); }

// Создание Земли
const earthGroup = new THREE.Group(); scene.add(earthGroup);
const earthMat = new THREE.MeshPhongMaterial({ map: tDay, bumpMap: tBump, bumpScale: 0.1, specularMap: tSpec, specular: new THREE.Color(0x0a0a0a), shininess: 5 });
const earth = new THREE.Mesh(new THREE.SphereGeometry(R_EARTH, 80, 80), earthMat);
earthGroup.add(earth);

// Освещение
const ambientLight = new THREE.AmbientLight(0xffffff, 0.05); scene.add(ambientLight);
const hemiLight = new THREE.HemisphereLight(0x000208, 0x4fc3f7, 0.1); scene.add(hemiLight); 
const sunLight = new THREE.DirectionalLight(0xffffff, 4.0); scene.add(sunLight);

// Создание МКС
const iss = new THREE.Group(); scene.add(iss);
iss.scale.set(0.0005, 0.0005, 0.0005);
const mM = new THREE.MeshStandardMaterial({color:0xd8d8d8, metalness:0.4, roughness:0.5});
iss.add(new THREE.Mesh(new THREE.BoxGeometry(2.2, 0.09, 0.09), mM));
const c1 = new THREE.Mesh(new THREE.CylinderGeometry(0.09,0.09,0.65,16), mM); c1.rotation.x = Math.PI/2; iss.add(c1);

// Прикрепление камер
iss.add(camFwd);
camFwd.position.set(0, 0.4, 1.2); camFwd.rotation.set(0, Math.PI, 0); camFwd.rotateX(-0.15);
iss.add(camManual);
camManual.position.set(0, 0.6, -1.8); // Висит сзади и сверху

// Визуальный выхлоп для ручного режима
const exhaustMat = new THREE.MeshBasicMaterial({ color: 0x00d2ff, transparent: true, opacity: 0.8, blending: THREE.AdditiveBlending });
const exhaust = new THREE.Mesh(new THREE.ConeGeometry(0.05, 0.8, 8), exhaustMat);
exhaust.rotation.x = -Math.PI / 2;
exhaust.position.z = -0.4;
exhaust.visible = false;
iss.add(exhaust);

const controls = new OrbitControls(camFree, renderer.domElement);
controls.enableDamping = true; controls.enableZoom = false; controls.enablePan = false; controls.minDistance = 0.00005; controls.maxDistance = 150;
let targetZoomDist = 0.01;

// ---- РУЧНОЕ УПРАВЛЕНИЕ (ПИЛОТ) ----
let isManualMode = false;
const flightState = { pos: new THREE.Vector3(), vel: new THREE.Vector3(), quat: new THREE.Quaternion() };
const keys = { w:false, s:false, a:false, d:false, q:false, e:false, r:false, f:false, shift:false };
let mouseSteerX = 0, mouseSteerY = 0;
let isSteering = false;

window.addEventListener('keydown', e => { if (keys.hasOwnProperty(e.key.toLowerCase())) keys[e.key.toLowerCase()] = true; });
window.addEventListener('keyup', e => { if (keys.hasOwnProperty(e.key.toLowerCase())) keys[e.key.toLowerCase()] = false; });
window.addEventListener('mousedown', e => { if(isManualMode && e.button === 0) { isSteering = true; } });
window.addEventListener('mouseup', () => { isSteering = false; mouseSteerX = 0; mouseSteerY = 0; });
window.addEventListener('mousemove', e => {
    if(isSteering && isManualMode) {
        mouseSteerX = (e.movementX * -0.002);
        mouseSteerY = (e.movementY * -0.002);
    }
});

// UI Переключение режимов
document.querySelectorAll('[data-cam]').forEach(btn => {
    btn.addEventListener('click', () => {
        document.querySelectorAll('.dock-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentCam = btn.dataset.cam;
        
        if (currentCam === 'manual') {
            enableManualMode();
        } else {
            disableManualMode();
        }
    });
});

function enableManualMode() {
    isManualMode = true;
    document.getElementById('crosshair').style.display = 'block';
    document.getElementById('manual-help').style.display = 'block';
    document.getElementById('brand-title').classList.add('manual');
    document.getElementById('brand-dot').classList.add('manual');
    document.getElementById('status-dot').classList.add('manual');
    document.getElementById('sys-status-text').textContent = 'РУЧНОЕ УПРАВЛЕНИЕ';
    document.getElementById('brand-sub').textContent = 'ЛОКАЛЬНАЯ ФИЗИКА КОРАБЛЯ';
    
    // Инициализация физики текущим положением МКС
    flightState.pos.copy(iss.position);
    flightState.quat.copy(iss.quaternion);
    
    // Даем начальный импульс (орбитальная скорость), чтобы станция не зависла на месте
    const fwd = new THREE.Vector3(0,0,1).applyQuaternion(iss.quaternion).normalize();
    flightState.vel.copy(fwd.multiplyScalar(0.015)); // Масштабированная скорость
    exhaust.visible = true;
}

function disableManualMode() {
    isManualMode = false;
    document.getElementById('crosshair').style.display = 'none';
    document.getElementById('manual-help').style.display = 'none';
    document.getElementById('brand-title').classList.remove('manual');
    document.getElementById('brand-dot').classList.remove('manual');
    document.getElementById('status-dot').classList.remove('manual');
    document.getElementById('sys-status-text').textContent = 'СИСТЕМЫ ОК';
    document.getElementById('brand-sub').textContent = 'ТЕЛЕМЕТРИЯ ОРБИТЫ';
    exhaust.visible = false;
    isSteering = false;
}


// ---- ОРБИТАЛЬНАЯ МАТЕМАТИКА (АВТОПИЛОТ) ----
function getJD(d) { return (d.getTime() / 86400000) + 2440587.5; }
function getGMST(jd) { const T = (jd - 2451545.0) / 36525.0; let st = 280.46061837 + 360.98564736629 * (jd - 2451545.0) + 0.000387933 * T * T - T * T * T / 38710000.0; return (st % 360) * DEG_TO_RAD; }
function getVector(lat, lon, altKm, gmstRad) {
    const lonRad = (lon * DEG_TO_RAD) + gmstRad; const latRad = lat * DEG_TO_RAD; const r = R_EARTH + (altKm / 100);
    return new THREE.Vector3(r * Math.cos(latRad) * Math.cos(lonRad), r * Math.sin(latRad), -r * Math.cos(latRad) * Math.sin(lonRad));
}

async function fetchISS() {
    if (isManualMode) return; // Не качать данные, если мы сами рулим
    try {
        const d = await (await fetch('https://api.wheretheiss.at/v1/satellites/25544')).json();
        issData = { lat:d.latitude, lon:d.longitude, alt:d.altitude, vel:d.velocity };
        apiLoaded = true; hideLoader();
    } catch(e) {}
}

let lastFrameTime = Date.now();
let lastIssPosVec = null;
let currentIssFwd = new THREE.Vector3(0,0,1);

function updateHUDAuto() {
    document.getElementById('hud-lat').textContent = issData.lat.toFixed(4)+'°';
    document.getElementById('hud-lon').textContent = issData.lon.toFixed(4)+'°';
    document.getElementById('hud-alt').textContent = issData.alt.toFixed(1)+' км';
    document.getElementById('hud-vel').textContent = Math.round(issData.vel)+' км/ч';
}

function updateHUDManual() {
    const realAlt = (flightState.pos.length() - R_EARTH) * 100;
    const realSpeed = flightState.vel.length() * 360000; // Условный коэффициент для фана
    document.getElementById('hud-lat').textContent = 'АВТОНОМНО';
    document.getElementById('hud-lon').textContent = 'АВТОНОМНО';
    document.getElementById('hud-alt').textContent = Math.max(0, realAlt).toFixed(1)+' км';
    document.getElementById('hud-vel').textContent = Math.round(realSpeed)+' км/ч';
    
    if (realAlt < 10) { document.getElementById('hud-alt').style.color = "var(--red)"; } 
    else { document.getElementById('hud-alt').style.color = "var(--text-main)"; }
}

// ---- АНИМАЦИЯ И ФИЗИКА ----
function animate() {
    requestAnimationFrame(animate);
    const nowFrame = Date.now();
    const dt = Math.min((nowFrame - lastFrameTime) / 1000, 0.1); // Лимит dt от лагов
    lastFrameTime = nowFrame;

    const date = new Date();
    const gmstRad = getGMST(getJD(date));
    earth.rotation.y = gmstRad;

    // --- ЛОГИКА ДВИЖЕНИЯ ---
    if (isManualMode) {
        // Управление ориентацией (Рысканье и Тангаж от мыши)
        iss.rotateX(mouseSteerY);
        iss.rotateY(mouseSteerX);
        
        // Крен (Roll)
        if (keys.q) iss.rotateZ(1.5 * dt);
        if (keys.e) iss.rotateZ(-1.5 * dt);

        // Плавное затухание мыши (инерция рук пилота)
        mouseSteerX *= 0.8; mouseSteerY *= 0.8;

        // Тяга двигателей
        let thrustBase = keys.shift ? 0.05 : 0.005; // Ускорение (Форсаж)
        let localThrust = new THREE.Vector3(0,0,0);
        
        if (keys.w) localThrust.z = 1;
        if (keys.s) localThrust.z = -1;
        if (keys.a) localThrust.x = 1;
        if (keys.d) localThrust.x = -1;
        if (keys.r) localThrust.y = 1;
        if (keys.f) localThrust.y = -1;

        if (localThrust.lengthSq() > 0) {
            localThrust.normalize().multiplyScalar(thrustBase * dt);
            localThrust.applyQuaternion(iss.quaternion); // Перевод в мировые координаты
            flightState.vel.add(localThrust);
            exhaust.scale.setScalar(keys.shift ? 2.5 : 1.0);
            exhaust.material.color.setHex(keys.shift ? 0xff4757 : 0x00d2ff);
        } else {
            exhaust.scale.setScalar(0.001); // Скрыть выхлоп
        }

        // Инерционный гаситель (Flight Assist) - Плавно тормозит в вакууме
        if (!keys.w && !keys.s && !keys.a && !keys.d && !keys.r && !keys.f) {
            flightState.vel.multiplyScalar(0.995); 
        }

        // Применение скорости к позиции
        flightState.pos.add(flightState.vel);
        iss.position.copy(flightState.pos);
        updateHUDManual();

    } else {
        // Автопилот (TLE/API)
        const oldIssPos = iss.position.clone();
        const issPos = getVector(issData.lat, issData.lon, issData.alt, gmstRad);
        iss.position.copy(issPos);

        const moveDelta = new THREE.Vector3().subVectors(iss.position, oldIssPos);
        const up = iss.position.clone().normalize();
        
        if (!lastIssPosVec) {
            lastIssPosVec = issPos.clone();
            currentIssFwd.crossVectors(new THREE.Vector3(0,1,0), up).normalize();
        } else {
            const moveDir = new THREE.Vector3().subVectors(issPos, lastIssPosVec);
            if (moveDir.lengthSq() > 0.0000001) { 
                moveDir.normalize();
                currentIssFwd.lerp(moveDir, 0.5).normalize();
                lastIssPosVec.copy(issPos);
            }
        }

        const right = new THREE.Vector3().crossVectors(up, currentIssFwd).normalize();
        const realUp = new THREE.Vector3().crossVectors(currentIssFwd, right).normalize();
        const m = new THREE.Matrix4(); m.makeBasis(right, realUp, currentIssFwd);
        const targetQuat = new THREE.Quaternion().setFromRotationMatrix(m);
        iss.quaternion.slerp(targetQuat, 0.05);

        if (nowFrame - lastIssUpdateTime > 2000) { updateHUDAuto(); lastIssUpdateTime = nowFrame; }
    }

    // --- КАМЕРА ---
    let activeCam;
    if (currentCam === 'manual') {
        controls.enabled = false;
        activeCam = camManual; // Камера от 3-го лица прибитая к МКС
    } else if (currentCam === 'forward') {
        controls.enabled = false;
        activeCam = camFwd;
    } else {
        controls.enabled = true;
        if (!isManualMode) {
            camFree.position.add(new THREE.Vector3().subVectors(iss.position, controls.target));
        }
        controls.target.copy(iss.position);
        
        const currentDist = camFree.position.distanceTo(controls.target);
        if (Math.abs(currentDist - targetZoomDist) > 0.00001) {
            const newDist = THREE.MathUtils.lerp(currentDist, targetZoomDist, 0.15);
            const dir = new THREE.Vector3().subVectors(camFree.position, controls.target).normalize();
            camFree.position.copy(controls.target).add(dir.multiplyScalar(newDist));
        }
        controls.update();
        activeCam = camFree;
    }

    renderPass.camera = activeCam;
    
    // Солнце (заглушка)
    sunLight.position.set(5000, 0, 5000);
    composer.render();
}

window.addEventListener('resize', () => {
    [camFree, camFwd, camManual].forEach(c => { c.aspect = window.innerWidth/window.innerHeight; c.updateProjectionMatrix(); });
    renderer.setSize(window.innerWidth, window.innerHeight); composer.setSize(window.innerWidth, window.innerHeight);
});

fetchISS(); setInterval(fetchISS, 5000); animate();
</script>
</body>
