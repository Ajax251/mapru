<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Бесконечный 3D Кадастр</title>

    <!-- Подключаем MapLibre GL (базовая карта) -->
    <link href="https://unpkg.com/maplibre-gl@3.3.1/dist/maplibre-gl.css" rel="stylesheet" />
    <script src="https://unpkg.com/maplibre-gl@3.3.1/dist/maplibre-gl.js"></script>

    <!-- Подключаем Deck.gl (3D движок) -->
    <script src="https://unpkg.com/deck.gl@latest/dist.min.js"></script>

    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #0f172a; /* Темный фон космоса */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        #map-container {
            width: 100vw;
            height: 100vh;
            position: absolute;
            top: 0;
            left: 0;
        }

        /* UI Элементы */
        #ui-panel {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(15, 23, 42, 0.85);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.15);
            padding: 15px 20px;
            border-radius: 12px;
            color: #f8fafc;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            z-index: 10;
            pointer-events: none; /* Чтобы клики проходили сквозь панель на карту */
        }

        h1 { margin: 0 0 5px 0; font-size: 18px; color: #60a5fa; }
        p { margin: 0; font-size: 13px; color: #94a3b8; }

        #stats { margin-top: 10px; font-weight: bold; color: #10b981; }

        #tooltip {
            position: absolute;
            background: rgba(255, 255, 255, 0.95);
            border: 1px solid #ccc;
            padding: 10px 15px;
            border-radius: 8px;
            color: #1e293b;
            font-size: 13px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            pointer-events: none;
            display: none;
            z-index: 20;
            transform: translate(-50%, -100%);
            margin-top: -15px;
        }
        .tt-title { font-weight: 800; color: #2563eb; display: block; margin-bottom: 5px; }
        .tt-info { display: block; margin-bottom: 2px; }
    </style>
</head>
<body>

    <div id="map-container"></div>

    <div id="ui-panel">
        <h1>3D Кадастр (Deck.gl)</h1>
        <p>ПКМ - вращение и наклон камеры<br>ЛКМ - перемещение</p>
        <div id="stats">Загружено объектов: 0</div>
    </div>

    <div id="tooltip"></div>

    <script>
        const API_URL = 'http://127.0.0.1:8010/api/3d/buildings';
        
        // --- Вспомогательные математические функции ---
        // НСПД отдает данные в EPSG:3857 (метры), а Deck.gl работает в WGS84 (градусы)
        
        function mercatorToWgs84(x, y) {
            const lon = (x / 20037508.34) * 180;
            let lat = (y / 20037508.34) * 180;
            lat = 180 / Math.PI * (2 * Math.atan(Math.exp(lat * Math.PI / 180)) - Math.PI / 2);
            return [lon, lat];
        }

        function wgs84ToMercator(lon, lat) {
            const x = lon * 20037508.34 / 180;
            let y = Math.log(Math.tan((90 + lat) * Math.PI / 360)) / (Math.PI / 180);
            y = y * 20037508.34 / 180;
            return [x, y];
        }

        // Рекурсивная функция для перевода целого GeoJSON из 3857 в 4326
        function convertGeometryToWgs84(coords) {
            if (typeof coords[0] === 'number') {
                return mercatorToWgs84(coords[0], coords[1]);
            }
            return coords.map(convertGeometryToWgs84);
        }

        // --- Инициализация Карты и Deck.gl ---
        const { DeckGL, GeoJsonLayer, MapView, lightingEffect, ambientLight, directionalLight } = deck;

        // Стиль подложки (Google Satellite)
        const mapStyle = {
            version: 8,
            sources: {
                'google-satellite': {
                    type: 'raster',
                    tiles: ['https://mt1.google.com/vt/lyrs=s&x={x}&y={y}&z={z}'],
                    tileSize: 256
                }
            },
            layers: [{
                id: 'google-satellite-layer',
                type: 'raster',
                source: 'google-satellite',
                minzoom: 0,
                maxzoom: 22
            }]
        };

        // Начальная позиция камеры (Казань / Нурлат - можно поменять)
        const INITIAL_VIEW_STATE = {
            longitude: 50.7910,
            latitude: 54.8492,
            zoom: 16,
            pitch: 60, // Наклон камеры (3D эффект)
            bearing: 0 // Поворот
        };

        let currentData = []; // Сюда будем складывать загруженные здания
        let fetchTimeout = null;

        // Создаем Deck.gl инстанс
        const deckgl = new DeckGL({
            container: 'map-container',
            mapStyle: mapStyle,
            initialViewState: INITIAL_VIEW_STATE,
            controller: true, // Включаем управление мышью
            
            // Эта функция вызывается каждый раз, когда камера двигается
            onViewStateChange: ({viewState}) => {
                // Запускаем загрузку данных с задержкой (Debounce), 
                // чтобы не спамить сервер, пока пользователь крутит карту
                clearTimeout(fetchTimeout);
                fetchTimeout = setTimeout(() => fetchBuildings(viewState), 300);
            },
            
            layers: [] // Слои будем обновлять функцией renderLayers
        });

        // --- Функция рендеринга слоя ---
        function renderLayers() {
            const buildingsLayer = new GeoJsonLayer({
                id: 'buildings-layer',
                data: currentData,
                
                // Настройки 3D рендеринга
                extruded: true, 
                wireframe: true,
                filled: true,

                // Высота здания (считаем этажи * 3.5 метра)
                getElevation: d => {
                    const floors = parseInt(d.properties?.options?.floors) || 1;
                    return floors * 3.5;
                },
                
                // Цвет здания (синеватый полупрозрачный)
                getFillColor: [59, 130, 246, 200],
                getLineColor: [255, 255, 255, 100], // Белые контуры крыш
                
                pickable: true, // Включаем возможность наведения мышью
                autoHighlight: true, // Авто-подсветка при наведении
                highlightColor: [255, 200, 0, 255], // Желтый цвет при наведении

                // Обработчик наведения мыши
                onHover: (info) => {
                    const tooltip = document.getElementById('tooltip');
                    if (info.object) {
                        const props = info.object.properties.options || {};
                        const name = props.name || props.purpose || props.building_name || 'Объект недвижимости';
                        const cadNum = props.cad_num || info.object.id || 'Без номера';
                        const area = props.build_record_area || 'Не указана';

                        tooltip.innerHTML = `
                            <span class="tt-title">${name}</span>
                            <span class="tt-info"><b>КН:</b> ${cadNum}</span>
                            <span class="tt-info"><b>Площадь:</b> ${area} м²</span>
                            <span class="tt-info"><b>Этажность:</b> ${props.floors || 1}</span>
                        `;
                        tooltip.style.left = `${info.x}px`;
                        tooltip.style.top = `${info.y}px`;
                        tooltip.style.display = 'block';
                    } else {
                        tooltip.style.display = 'none';
                    }
                },
                
                // Плавные переходы при обновлении данных
                transitions: {
                    getElevation: 500
                }
            });

            deckgl.setProps({ layers: [buildingsLayer] });
            document.getElementById('stats').innerText = `Загружено объектов: ${currentData.length}`;
        }

        // --- Основная функция загрузки данных с бэкенда ---
        async function fetchBuildings(viewState) {
            // Если слишком высоко, не грузим здания (чтобы не перегрузить ПК)
            if (viewState.zoom < 13) {
                currentData = [];
                renderLayers();
                return;
            }

            // Получаем границы экрана в градусах
            const viewport = new deck.WebMercatorViewport(viewState);
            const bounds = viewport.getBounds(); // [minLon, minLat, maxLon, maxLat]

            // Добавляем +20% запаса по краям, чтобы здания подгружались заранее
            const width = bounds[2] - bounds[0];
            const height = bounds[3] - bounds[1];
            
            const minLon = bounds[0] - width * 0.2;
            const maxLon = bounds[2] + width * 0.2;
            const minLat = bounds[1] - height * 0.2;
            const maxLat = bounds[3] + height * 0.2;

            // Конвертируем WGS84 в EPSG:3857, так как наша БД SQLite ищет по метрам
            const minMercator = wgs84ToMercator(minLon, minLat);
            const maxMercator = wgs84ToMercator(maxLon, maxLat);

            const url = `${API_URL}?min_x=${minMercator[0]}&max_x=${maxMercator[0]}&min_y=${minMercator[1]}&max_y=${maxMercator[1]}`;

            try {
                const response = await fetch(url);
                if (!response.ok) throw new Error('Network error');
                
                const geojsonData = await response.json();

                // Deck.gl требует координаты в WGS84, конвертируем их на лету
                geojsonData.features.forEach(f => {
                    f.geometry.coordinates = convertGeometryToWgs84(f.geometry.coordinates);
                });

                currentData = geojsonData.features;
                renderLayers();

            } catch (err) {
                console.error('Ошибка загрузки 3D зданий:', err);
            }
        }

        // Запускаем первую загрузку при старте
        fetchBuildings(INITIAL_VIEW_STATE);

    </script>
</body>
</html>
