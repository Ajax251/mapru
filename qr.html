<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
   <link id="favicon" rel="icon" href="img/qrcode.png" type="image/png">
<title>QR Генератор</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@400;500;600&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f4f4f0;
    --surface: #ffffff;
    --surface2: #f9f9f7;
    --border: #ddddd5;
    --accent: #6abf2e;
    --accent-hover: #5aa127;
    --text: #111111;
    --muted: #666666;
    --mono: 'Space Mono', monospace;
    --sans: 'DM Sans', sans-serif;
    --shadow: rgba(0,0,0,0.08);
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 2rem 1rem;
  }

  .card {
    width: 100%;
    max-width: 440px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 2.5rem 2rem;
    box-shadow: 0 10px 40px var(--shadow);
  }

  h1 {
    font-size: 28px;
    font-weight: 600;
    margin-bottom: 0.5rem;
    letter-spacing: -0.5px;
  }

  h1 span { color: var(--accent); }

  .desc {
    font-size: 15px;
    color: var(--muted);
    margin-bottom: 1.5rem;
  }

  .input-wrap {
    position: relative;
    margin-bottom: 12px;
  }

  #url {
    width: 100%;
    padding: 14px 16px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-size: 15px;
    outline: none;
    transition: border-color 0.2s;
  }

  #url::placeholder { color: #aaa; }
  #url:focus { border-color: var(--accent); }

  /* Стили для выбора размера */
  .size-wrap {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 16px;
    margin-bottom: 16px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .size-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 14px;
    font-weight: 500;
  }

  .size-val {
    font-family: var(--mono);
    color: var(--muted);
    font-size: 13px;
  }

  input[type="range"] {
    -webkit-appearance: none;
    width: 100%;
    background: transparent;
  }

  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    height: 18px;
    width: 18px;
    border-radius: 50%;
    background: var(--accent);
    cursor: pointer;
    margin-top: -6px;
    box-shadow: 0 2px 6px rgba(0,0,0,0.2);
  }

  input[type="range"]::-webkit-slider-runnable-track {
    width: 100%;
    height: 6px;
    cursor: pointer;
    background: var(--border);
    border-radius: 3px;
  }

  #gen {
    width: 100%;
    padding: 14px;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 10px;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.2s, transform 0.1s;
  }

  #gen:hover { background: var(--accent-hover); }
  #gen:active { transform: scale(0.98); }

  .qr-section {
    margin-top: 2rem;
    display: none;
    text-align: center;
  }

  .divider {
    height: 1px;
    background: var(--border);
    margin-bottom: 2rem;
  }

  .qr-frame {
    display: inline-flex;
    padding: 16px;
    background: #fff;
    border: 1px solid var(--border);
    border-radius: 12px;
    margin-bottom: 1rem;
    /* Защита, чтобы большая картинка не вылезала за пределы экрана */
    max-width: 100%; 
  }

  #qr-container img, #qr-container canvas {
    display: block;
    margin: 0 auto;
    border-radius: 4px;
    max-width: 100% !important; /* масштабируем визуально, даже если код на 4000px */
    height: auto !important;
  }

  .url-display {
    font-family: var(--mono);
    font-size: 13px;
    color: var(--muted);
    word-break: break-all;
    margin-bottom: 1.5rem;
    padding: 10px;
    background: var(--surface2);
    border-radius: 8px;
  }

  /* Кнопки скачивания */
  .actions {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .actions button {
    width: 100%;
    padding: 14px;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    transition: background 0.15s;
  }

  .act-primary {
    background: var(--accent);
    color: #fff;
    border: none;
  }
  .act-primary:hover { background: var(--accent-hover); }

  .act-secondary {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text);
  }
  .act-secondary:hover { background: var(--surface2); }
</style>

<!-- Надежная библиотека qrcode.js (1.0.0) -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

</head>
<body>

<div class="card">
  <h1>Создать <span>QR-код</span></h1>
  <p class="desc">Вставьте любую ссылку ниже</p>

  <div class="input-wrap">
    <input type="text" id="url" placeholder="https://example.com" autocomplete="off"/>
  </div>

  <div class="size-wrap">
    <div class="size-header">
      <label for="size-slider">Качество (размер)</label>
      <span class="size-val" id="size-val">512x512 px</span>
    </div>
    <!-- Ползунок от 1 до 5 -->
    <input type="range" id="size-slider" min="1" max="5" value="2" oninput="updateSizeLabel()">
  </div>

  <button id="gen" onclick="generate()">Сгенерировать</button>

  <div class="qr-section" id="qr-section">
    <div class="divider"></div>
    <div class="qr-frame" id="qr-container"></div>
    <div class="url-display" id="url-display"></div>
    
    <div class="actions">
      <!-- Кнопка 1: Классический, белый фон -->
      <button class="act-primary" onclick="downloadPNG('white')">Скачать PNG (с белым фоном)</button>
      
      <!-- Кнопка 2: Прозрачный фон (для наложения в Photoshop/Figma) -->
      <button class="act-secondary" onclick="downloadPNG('transparent')">Скачать PNG (прозрачный)</button>
    </div>
  </div>
</div>

<script>
// Таблица размеров: от 1 до 5
const sizeMap = {
  1: 256,
  2: 512,
  3: 1024,
  4: 2048,
  5: 4096 // Огромный размер для профессиональной печати
};

// Обновление текста при движении ползунка
function updateSizeLabel() {
  const val = document.getElementById('size-slider').value;
  const px = sizeMap[val];
  document.getElementById('size-val').textContent = `${px}x${px} px`;
}

// Запуск по Enter
document.getElementById('url').addEventListener('keydown', e => {
  if (e.key === 'Enter') generate();
});

// Инициализация (чтобы сразу был текст 512x512)
updateSizeLabel();

function generate() {
  const input = document.getElementById('url');
  let val = input.value.trim();
  
  if (!val) { 
    console.warn("Пустое поле");
    input.focus(); 
    return; 
  }
  
  if (!/^https?:\/\//i.test(val)) val = 'https://' + val;

  if (typeof QRCode === 'undefined') {
    alert("Критическая ошибка: библиотека QR не загрузилась.");
    return;
  }

  // Получаем размер из ползунка
  const sizeLvl = document.getElementById('size-slider').value;
  const px = sizeMap[sizeLvl];

  console.log(`=== Старт генерации | Размер: ${px}x${px} ===`);
  console.log("URL:", val);

  const container = document.getElementById('qr-container');
  container.innerHTML = ''; // очищаем старый код

  try {
    // Создаем QR-код
    // Фоном ставим полную прозрачность rgba(255,255,255,0)
    new QRCode(container, {
      text: val,
      width: px,
      height: px,
      colorDark : "#000000",
      colorLight : "rgba(255,255,255,0)", 
      correctLevel : QRCode.CorrectLevel.M
    });

    console.log("✅ Успех: QR-код сгенерирован!");
    
    document.getElementById('url-display').textContent = val;
    document.getElementById('qr-section').style.display = 'block';

  } catch (error) {
    console.error("Ошибка при создании QR-кода:", error);
    alert("Не удалось сгенерировать код.");
  }
}

// Функция сохранения
function downloadPNG(type) {
  // Ищем canvas, который нарисовала библиотека
  const canvas = document.querySelector('#qr-container canvas');
  if (!canvas) {
    alert("Ошибка: Изображение не найдено.");
    return;
  }

  let exportCanvas = canvas;

  // Если нужен БЕЛЫЙ фон, создаем новый холст, заливаем белым и рисуем поверх наш прозрачный код
  if (type === 'white') {
    exportCanvas = document.createElement('canvas');
    
    // Добавляем отступ 6% от размера (очень полезно для камер, чтобы код не сливался с темным фоном)
    const padding = Math.round(canvas.width * 0.06); 
    
    exportCanvas.width = canvas.width + padding * 2;
    exportCanvas.height = canvas.height + padding * 2;
    
    const ctx = exportCanvas.getContext('2d');
    
    // Заливаем белым фоном
    ctx.fillStyle = '#ffffff';
    ctx.fillRect(0, 0, exportCanvas.width, exportCanvas.height);
    
    // Рисуем сам код по центру
    ctx.drawImage(canvas, padding, padding);
  }

  // Превращаем в ссылку
  const a = document.createElement('a');
  a.href = exportCanvas.toDataURL('image/png');
  
  // Формируем аккуратное имя файла
  const name = document.getElementById('url-display').textContent
    .replace(/https?:\/\//,'')
    .replace(/[^a-z0-9]/gi,'-')
    .substring(0,30);
    
  const suffix = (type === 'white') ? '-white' : '-transparent';
  a.download = `qr-${name}${suffix}.png`;
  
  // Эмулируем клик для скачивания
  a.click();
  console.log(`📥 Скачан файл: qr-${name}${suffix}.png`);
}
</script>
</body>
</html>
