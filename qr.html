<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<link id="favicon" rel="icon" href="img/qrcode.png" type="image/png">
<title>QR Генератор</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@400;500;600&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f4f4f0;
    --surface: #ffffff;
    --surface2: #f9f9f7;
    --border: #ddddd5;
    --accent: #6abf2e;
    --accent-hover: #5aa127;
    --text: #111111;
    --muted: #666666;
    --mono: 'Space Mono', monospace;
    --sans: 'DM Sans', sans-serif;
    --shadow: rgba(0,0,0,0.08);
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 2rem 1rem;
  }

  .card {
    width: 100%;
    max-width: 440px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 2.5rem 2rem;
    box-shadow: 0 10px 40px var(--shadow);
  }

  .header-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 0.5rem;
  }

  h1 { font-size: 28px; font-weight: 600; letter-spacing: -0.5px; }
  h1 span { color: var(--accent); }

  .print-btn {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 6px 12px; background: var(--surface2);
    border: 1px solid var(--border); border-radius: 8px;
    color: var(--text); text-decoration: none; font-size: 14px; font-weight: 500;
    transition: background 0.2s, border-color 0.2s;
  }
  .print-btn:hover { background: #f0f0eb; border-color: #ccc; }
  .print-btn img { width: 16px; height: 16px; object-fit: contain; }

  .desc { font-size: 15px; color: var(--muted); margin-bottom: 1.5rem; }

  .input-wrap { margin-bottom: 12px; }
  #url, #logo-url {
    width: 100%; padding: 14px 16px; background: var(--surface2);
    border: 1px solid var(--border); border-radius: 10px;
    color: var(--text); font-size: 15px; outline: none; transition: border-color 0.2s;
  }
  #url::placeholder, #logo-url::placeholder { color: #aaa; }
  #url:focus, #logo-url:focus { border-color: var(--accent); }

  .settings-wrap {
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 10px; padding: 16px; margin-bottom: 16px;
    display: flex; flex-direction: column; gap: 16px;
  }
  .setting-row { display: flex; flex-direction: column; gap: 10px; }
  .setting-header { display: flex; justify-content: space-between; align-items: center; font-size: 14px; font-weight: 500; }
  
  .size-val { font-family: var(--mono); color: var(--muted); font-size: 13px; }

  input[type="range"] { -webkit-appearance: none; width: 100%; background: transparent; }
  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none; height: 18px; width: 18px; border-radius: 50%;
    background: var(--accent); cursor: pointer; margin-top: -6px; box-shadow: 0 2px 6px rgba(0,0,0,0.2);
  }
  input[type="range"]::-webkit-slider-runnable-track {
    width: 100%; height: 6px; cursor: pointer; background: var(--border); border-radius: 3px;
  }

  .color-picker-wrap { display: flex; align-items: center; gap: 10px; }
  .color-hex { font-family: var(--mono); font-size: 13px; color: var(--text); text-transform: uppercase; }
  input[type="color"] {
    -webkit-appearance: none; border: none; width: 36px; height: 36px; border-radius: 8px;
    cursor: pointer; padding: 0; background: transparent;
  }
  input[type="color"]::-webkit-color-swatch-wrapper { padding: 0; }
  input[type="color"]::-webkit-color-swatch { border: 1px solid var(--border); border-radius: 8px; }

  .preset-btn {
    padding: 6px 10px; background: white; border: 1px solid var(--border);
    border-radius: 6px; font-size: 12px; cursor: pointer; transition: 0.2s;
  }
  .preset-btn:hover { border-color: var(--accent); color: var(--accent); }

  #gen {
    width: 100%; padding: 14px; background: var(--accent); color: #fff;
    border: none; border-radius: 10px; font-size: 16px; font-weight: 600;
    cursor: pointer; transition: background 0.2s, transform 0.1s;
  }
  #gen:hover { background: var(--accent-hover); }
  #gen:active { transform: scale(0.98); }

  .qr-section { margin-top: 2rem; display: none; text-align: center; }
  .divider { height: 1px; background: var(--border); margin-bottom: 2rem; }
  .qr-frame {
    display: inline-flex; padding: 16px; background: #fff;
    border: 1px solid var(--border); border-radius: 12px; margin-bottom: 1rem; max-width: 100%; position: relative;
  }
  #qr-container img, #qr-container canvas { display: block; margin: 0 auto; border-radius: 4px; max-width: 100% !important; height: auto !important; }
  .url-display { font-family: var(--mono); font-size: 13px; color: var(--muted); word-break: break-all; margin-bottom: 1.5rem; padding: 10px; background: var(--surface2); border-radius: 8px; }
  .actions { display: flex; flex-direction: column; gap: 10px; }
  .actions button { width: 100%; padding: 14px; border-radius: 8px; font-size: 14px; font-weight: 500; cursor: pointer; transition: background 0.15s; }
  .act-primary { background: var(--accent); color: #fff; border: none; }
  .act-primary:hover { background: var(--accent-hover); }
  .act-secondary { background: transparent; border: 1px solid var(--border); color: var(--text); }
  .act-secondary:hover { background: var(--surface2); }
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
</head>
<body>

<div class="card">
  <div class="header-row">
    <h1>Создать <span>QR-код</span></h1>
    <a href="qrp.html" class="print-btn"><img src="img/print.png" alt="QR">Печать</a>
  </div>
  <p class="desc">Вставьте любую ссылку ниже</p>

  <div class="input-wrap">
    <input type="text" id="url" placeholder="https://example.com" autocomplete="off"/>
  </div>

  <div class="settings-wrap">
    <div class="setting-row">
      <div class="setting-header">
        <label>Логотип по центру (опционально)</label>
      </div>
      <div style="display: flex; gap: 6px; flex-wrap: wrap;">
        <button class="preset-btn" onclick="setLogo('https://upload.wikimedia.org/wikipedia/commons/5/58/Yandex_icon.svg')">Яндекс</button>
        <button class="preset-btn" onclick="setLogo('https://upload.wikimedia.org/wikipedia/ru/7/77/Логотип_2ГИС.svg')">2GIS</button>
        <button class="preset-btn" onclick="setLogo('https://upload.wikimedia.org/wikipedia/commons/c/c1/Google_%22G%22_logo.svg')">Google</button>
        <button class="preset-btn" onclick="document.getElementById('logo-file').click()">Файл...</button>
        <button class="preset-btn" onclick="setLogo('')" style="color: #dc2626;" title="Удалить">✕</button>
      </div>
      <input type="text" id="logo-url" placeholder="URL картинки логотипа" style="padding: 10px; font-size: 13px;">
      <input type="file" id="logo-file" accept="image/*" style="display: none;" onchange="uploadLogo(this)">
    </div>

    <div class="setting-row">
      <div class="setting-header">
        <label for="size-slider">Размер</label>
        <span class="size-val" id="size-val">512x512 px</span>
      </div>
      <input type="range" id="size-slider" min="1" max="5" value="2">
    </div>

    <div class="setting-row">
      <div class="setting-header"><label for="qr-color">Цвет</label></div>
      <div class="color-picker-wrap">
        <input type="color" id="qr-color" value="#000000">
        <span class="color-hex" id="color-hex">#000000</span>
      </div>
    </div>
  </div>

  <button id="gen" onclick="generate()">Сгенерировать</button>

  <div class="qr-section" id="qr-section">
    <div class="divider"></div>
    <div class="qr-frame" id="qr-container"></div>
    <div class="url-display" id="url-display"></div>
    
    <div class="actions">
      <button class="act-primary" onclick="downloadPNG('white')">Скачать PNG</button>
      <button class="act-secondary" onclick="downloadPNG('transparent')">Скачать PNG (прозрачный)</button>
    </div>
  </div>
</div>

<script>
const sizeMap = { 1: 256, 2: 512, 3: 1024, 4: 2048, 5: 4096 };

function saveSettings() {
  try {
    localStorage.setItem('qr_url', document.getElementById('url').value);
    localStorage.setItem('qr_size', document.getElementById('size-slider').value);
    localStorage.setItem('qr_color', document.getElementById('qr-color').value);
    localStorage.setItem('qr_logo', document.getElementById('logo-url').value);
  } catch (e) {}
}

function loadSettings() {
  try {
    const sUrl = localStorage.getItem('qr_url'), sSize = localStorage.getItem('qr_size'), 
          sCol = localStorage.getItem('qr_color'), sLogo = localStorage.getItem('qr_logo');
    if (sUrl) document.getElementById('url').value = sUrl;
    if (sSize) document.getElementById('size-slider').value = sSize;
    if (sCol) document.getElementById('qr-color').value = sCol;
    if (sLogo) document.getElementById('logo-url').value = sLogo;
  } catch (e) {}
}

function updateUI() {
  const val = document.getElementById('size-slider').value;
  document.getElementById('size-val').textContent = `${sizeMap[val]}x${sizeMap[val]} px`;
  document.getElementById('color-hex').textContent = document.getElementById('qr-color').value;
}

function setLogo(url) {
  document.getElementById('logo-url').value = url;
  saveSettings();
  if(document.getElementById('url').value) generate();
}

function uploadLogo(input) {
  const f = input.files[0];
  if (!f) return;
  const r = new FileReader();
  r.onload = e => setLogo(e.target.result);
  r.readAsDataURL(f);
  input.value = '';
}

document.getElementById('url').addEventListener('input', saveSettings);
document.getElementById('url').addEventListener('keydown', e => { if (e.key === 'Enter') generate(); });
document.getElementById('logo-url').addEventListener('input', saveSettings);
document.getElementById('size-slider').addEventListener('input', () => { updateUI(); saveSettings(); });
document.getElementById('qr-color').addEventListener('input', () => { updateUI(); saveSettings(); });

window.addEventListener('DOMContentLoaded', () => {
  loadSettings(); updateUI();
  if (document.getElementById('url').value.trim()) generate();
});

// --- ГЕНЕРАЦИЯ ---
function generate() {
  let val = document.getElementById('url').value.trim();
  if (!val) { document.getElementById('url').focus(); return; }
  if (!/^https?:\/\//i.test(val)) val = 'https://' + val;
  document.getElementById('url').value = val; 
  saveSettings();

  const px = sizeMap[document.getElementById('size-slider').value];
  const qrColor = document.getElementById('qr-color').value;
  const logoUrl = document.getElementById('logo-url').value.trim();
  const container = document.getElementById('qr-container');
  container.innerHTML = ''; 

  // Уровень H (30%) для логотипа, M (15%) для обычного
  const correctLvl = logoUrl ? QRCode.CorrectLevel.H : QRCode.CorrectLevel.M;

  try {
    new QRCode(container, {
      text: val,
      width: px,
      height: px,
      colorDark : qrColor,
      colorLight : "rgba(255,255,255,0)", 
      correctLevel : correctLvl
    });

    document.getElementById('url-display').textContent = val;
    document.getElementById('qr-section').style.display = 'block';

    // Рисуем логотип
    if (logoUrl) {
      const img = new Image();
      img.crossOrigin = 'Anonymous'; // Запрос без CORS-блокировок
      
      img.onload = () => {
        const canvas = container.querySelector('canvas');
        if (!canvas) return;
        
        const ctx = canvas.getContext('2d');
        const logoSize = px * 0.22; // Логотип занимает ~22% ширины
        const xy = (px - logoSize) / 2;
        
        // Рисуем белую подложку
        ctx.fillStyle = '#ffffff';
        ctx.fillRect(xy - 6, xy - 6, logoSize + 12, logoSize + 12);
        
        // Рисуем саму картинку
        ctx.drawImage(img, xy, xy, logoSize, logoSize);
        
        // ВАЖНО: Обновляем видимый <img> тег сгенерированным холстом
        const qrImg = container.querySelector('img');
        if (qrImg) {
          qrImg.src = canvas.toDataURL('image/png');
        }
      };
      
      img.onerror = () => {
        console.error("Ошибка загрузки логотипа. Возможно, сервер картинки блокирует CORS.");
      };
      
      img.src = logoUrl;
    }
  } catch (error) {
    alert("Не удалось сгенерировать код.");
  }
}
function downloadPNG(type) {
  const canvas = document.querySelector('#qr-container canvas');
  if (!canvas) return alert("Изображение не найдено.");

  let exportCanvas = canvas;
  if (type === 'white') {
    exportCanvas = document.createElement('canvas');
    const padding = Math.round(canvas.width * 0.06);
    exportCanvas.width = canvas.width + padding * 2;
    exportCanvas.height = canvas.height + padding * 2;
    const ctx = exportCanvas.getContext('2d');
    ctx.fillStyle = '#ffffff';
    ctx.fillRect(0, 0, exportCanvas.width, exportCanvas.height);
    ctx.drawImage(canvas, padding, padding);
  }

  const a = document.createElement('a');
  a.href = exportCanvas.toDataURL('image/png');
  const name = document.getElementById('url-display').textContent.replace(/https?:\/\//,'').replace(/[^a-z0-9]/gi,'-').substring(0,30);
  a.download = `qr-${name}${type==='white'?'-white':'-transparent'}.png`;
  a.click();
}
</script>
</body>
</html>
